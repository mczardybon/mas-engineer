<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAS Dispatch Tree Dashboard</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--green:#3fb950;--yellow:#d29922;--red:#f85149;--blue:#58a6ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:var(--bg);color:var(--text);padding:20px;font-size:14px}
h1{font-size:1.5rem;margin-bottom:20px;color:var(--blue)}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.card h2{font-size:1rem;margin-bottom:12px;color:var(--text);opacity:0.8;border-bottom:1px solid var(--border);padding-bottom:8px}
.loading{text-align:center;padding:40px;opacity:0.5}
.error{color:var(--red);padding:20px;text-align:center}
.tree-node{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px;line-height:1.5}
.tree-indent{color:var(--border);white-space:pre}
.tree-icon{width:20px;text-align:center}
.tree-from{color:var(--blue);font-weight:600}
.tree-arrow{color:var(--border)}
.tree-to{font-weight:600}
.tree-task{color:var(--yellow);background:rgba(210,153,34,0.1);padding:0 6px;border-radius:3px;font-size:11px}
.tree-dur{color:var(--text);opacity:0.5;margin-left:auto;font-size:12px}
.tree-reason{color:var(--text);opacity:0.6;font-size:12px;font-style:italic;padding-left:28px}
.status-done{color:var(--green)}
.status-running{color:var(--blue);animation:pulse 2s infinite}
.status-error{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.summary-bar{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:rgba(88,166,255,0.05);border-radius:6px;font-size:13px}
.summary-bar .num{font-weight:700;font-size:16px}
.summary-bar .lbl{opacity:0.6}
.timestamp{font-size:12px;opacity:0.5;margin-top:20px;text-align:center}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.health-item{text-align:center;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px}
.health-item .num{font-size:24px;font-weight:700}
.health-item .lbl{font-size:11px;opacity:0.6}
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--blue);padding:8px 16px;border-radius:6px;cursor:pointer;font-family:monospace;font-size:13px;margin-bottom:12px}
.refresh-btn:hover{background:var(--border)}
</style>
</head>
<body>

<h1>🌳 MAS Dispatch Tree</h1>

<div id="loading" class="loading">Loading dispatch tree...</div>
<div id="content" style="display:none">
  <button class="refresh-btn" onclick="loadDashboard()">⟳ Refresh Now</button>
  <div class="card">
    <h2>📦 Dispatch Verlauf</h2>
    <div id="summaryBar" class="summary-bar"></div>
    <div id="treeContainer"></div>
  </div>

  <div id="infoBar" class="timestamp"></div>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard');
    const json = await res.json();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    if(!json.success){document.getElementById('treeContainer').innerHTML='<div class="error">'+json.error+'</div>';return;}
    
    const d=json.data;
    const di=d.dispatch||{};
    const tree=di.tree||[];
    const a=d.agents||{};
    
    // Summary Bar
    document.getElementById('summaryBar').innerHTML=
      '<span><span class="num">'+di.total+'</span> <span class="lbl">Total</span></span>'+
      '<span><span class="num" style="color:var(--green)">'+di.done+'</span> <span class="lbl">Done</span></span>'+
      '<span><span class="num" style="color:var(--blue)">'+di.active+'</span> <span class="lbl">Active</span></span>'+
      '<span><span class="num" style="color:var(--red)">'+di.failed+'</span> <span class="lbl">Failed</span></span>'+
      '<span><span class="num">'+di.avg_duration_ms+'</span> <span class="lbl">Avg ms</span></span>';
    
    // Health
    const h=a.total>0?Math.round(a.healthy/a.total*100):0;
    const hc=h>=80?'var(--green)':h>=50?'var(--yellow)':'var(--red)';


    // BAUM RENDERN
    function renderTree(entries,parentId,depth){
      let html='';
      const kids=entries.filter(e=>e.parent_id===parentId);
      kids.forEach((k,i)=>{
        const isLast=i===kids.length-1;
        const connector=isLast?'└── ':'├── ';
        const childConnector=isLast?'    ':'│   ';
        const icon={'done':'✅','running':'⏳','error':'❌'}[k.status]||'⏹️';
        const sc={'done':'status-done','running':'status-running','error':'status-error'}[k.status]||'';
        const dur=k.duration_ms!=null?(k.duration_ms/1000).toFixed(1)+'s':'...';
        const indent='  '.repeat(depth);
        html+='<div class="tree-node">'+
          '<span class="tree-indent">'+indent+connector+'</span>'+
          '<span class="tree-icon">'+icon+'</span>'+
          '<span class="tree-from">'+k.from+'</span>'+
          '<span class="tree-arrow"> → </span>'+
          '<span class="tree-to '+sc+'">'+k.to+'</span>'+
          '<span class="tree-task">'+k.task+'</span>'+
          '<span class="tree-dur">'+dur+'</span></div>';
        if(k.reason){
          html+='<div class="tree-reason">'+'  '.repeat(depth+1)+connector+' 💬 '+k.reason+'</div>';
        }
        html+=renderTree(entries,k.id,depth+1);
      });
      return html;
    }
    
    const roots=tree.filter(e=>!e.parent_id);
    let treeHtml='';
    roots.forEach(r=>{
      const icon={'done':'✅','running':'⏳','error':'❌'}[r.status]||'⏹️';
      const sc={'done':'status-done','running':'status-running','error':'status-error'}[r.status]||'';
      const dur=r.duration_ms!=null?(r.duration_ms/1000).toFixed(1)+'s':'...';
      treeHtml+='<div class="tree-node">'+
        '<span class="tree-icon">'+icon+'</span>'+
        '<span class="tree-from">'+r.from+'</span>'+
        '<span class="tree-arrow"> → </span>'+
        '<span class="tree-to '+sc+'">'+r.to+'</span>'+
        '<span class="tree-task">'+r.task+'</span>'+
        '<span class="tree-dur">'+dur+'</span></div>';
      if(r.reason){
        treeHtml+='<div class="tree-reason">💬 '+r.reason+'</div>';
      }
      treeHtml+=renderTree(tree,r.id,1);
    });
    
    if(!treeHtml) treeHtml='<div style="opacity:0.5">No dispatch data yet.</div>';
    document.getElementById('treeContainer').innerHTML=treeHtml;
    
    const ts=d.timestamp||d.generated_at||'unknown';
    document.getElementById('infoBar').innerHTML=
      '🕐 '+ts.replace('T',' ').substring(0,19)+
      ' | 📂 '+d.workspace;
  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('treeContainer').innerHTML='<div class="error">❌ '+err.message+'</div>';
  }
}
loadDashboard();
setInterval(loadDashboard,10000);
</script>
</body>
</html>
