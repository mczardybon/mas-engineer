<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAS Dispatch Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border-color: #30363d;
    --text-primary: #f0f6fc;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-blue: #58a6ff;
    --accent-purple: #bc8cff;
    --accent-cyan: #39d2c0;
    --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --radius: 8px;
    --radius-sm: 4px;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }

  /* ─── Status Bar ─── */
  #status-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 1.2em;
    padding: 10px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    min-height: 44px;
  }
  #status-bar .stat {
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  #status-bar .stat .label { color: var(--text-secondary); }
  #status-bar .stat .value { color: var(--text-primary); font-weight: 600; }
  #status-bar .stat .value.green { color: var(--accent-green); }
  #status-bar .stat .value.red { color: var(--accent-red); }
  #status-bar .stat .value.yellow { color: var(--accent-yellow); }
  #status-bar .stat .value.blue { color: var(--accent-blue); }
  #status-bar .stat .value.cyan { color: var(--accent-cyan); }
  #status-bar .pipe { color: var(--border-color); font-weight: 300; user-select: none; }
  #status-bar .right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    font-size: 11px;
  }
  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  #status-dot.error { background: var(--accent-red); animation: none; }
  #status-dot.paused { background: var(--accent-yellow); animation: none; }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  #last-update {
    color: var(--text-muted);
    font-size: 11px;
  }
  #refresh-btn {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    transition: all 0.15s;
  }
  #refresh-btn:hover {
    background: var(--border-color);
    color: var(--text-primary);
  }
  #toggle-pause {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    transition: all 0.15s;
  }
  #toggle-pause:hover {
    background: var(--border-color);
    color: var(--text-primary);
  }
  #toggle-pause.paused {
    border-color: var(--accent-yellow);
    color: var(--accent-yellow);
  }

  /* ─── Content ─── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }

  /* ─── Top Section: LIVE ─── */
  #live-section {
    flex: 0 0 30%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-primary);
  }
  #live-section .section-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.03em;
  }
  #live-section .section-header .live-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-red);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  #live-section .section-header .count-badge {
    margin-left: auto;
    background: var(--bg-tertiary);
    padding: 1px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  #live-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
    scroll-behavior: smooth;
  }
  #live-list::-webkit-scrollbar { width: 5px; }
  #live-list::-webkit-scrollbar-track { background: transparent; }
  #live-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  /* ─── Middle Section: Timeline ─── */
  #timeline-section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #timeline-section .section-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.03em;
  }
  #timeline-section .section-header .count-badge {
    margin-left: auto;
    background: var(--bg-tertiary);
    padding: 1px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  #timeline-container {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    scroll-behavior: smooth;
  }
  #timeline-container::-webkit-scrollbar { width: 5px; }
  #timeline-container::-webkit-scrollbar-track { background: transparent; }
  #timeline-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  /* ─── Items ─── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    padding: 20px;
  }

  .dispatch-item {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 4px;
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    border-left: 3px solid var(--border-color);
    transition: background 0.12s;
    cursor: pointer;
  }
  .dispatch-item:hover { background: var(--bg-tertiary); }
  .dispatch-item.running { border-left-color: var(--accent-green); }
  .dispatch-item.done { border-left-color: var(--accent-blue); }
  .dispatch-item.failed { border-left-color: var(--accent-red); }
  .dispatch-item.pending { border-left-color: var(--accent-yellow); }

  .dispatch-item .main-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    font-size: 12px;
    min-height: 32px;
    flex-wrap: wrap;
  }
  .dispatch-item .main-row .status-icon {
    flex-shrink: 0;
    font-size: 14px;
    width: 20px;
    text-align: center;
  }
  .dispatch-item .main-row .route {
    color: var(--text-primary);
    font-weight: 500;
    white-space: nowrap;
  }
  .dispatch-item .main-row .route .arrow {
    color: var(--text-muted);
    margin: 0 3px;
  }
  .dispatch-item .main-row .task-name {
    color: var(--accent-cyan);
    font-weight: 500;
  }
  .dispatch-item .main-row .badge {
    flex-shrink: 0;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 500;
  }
  .dispatch-item .main-row .badge.duration {
    background: rgba(88,166,255,0.15);
    color: var(--accent-blue);
  }
  .dispatch-item .main-row .badge.reason {
    background: rgba(210,153,34,0.15);
    color: var(--accent-yellow);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dispatch-item .main-row .badge.time {
    background: rgba(139,148,158,0.12);
    color: var(--text-secondary);
    margin-left: auto;
  }
  .dispatch-item .main-row .expand-arrow {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .dispatch-item .main-row .expand-arrow.open {
    transform: rotate(90deg);
  }

  .dispatch-item .detail-row {
    display: none;
    padding: 6px 10px 8px 38px;
    font-size: 11px;
    color: var(--text-secondary);
    background: rgba(0,0,0,0.15);
    border-top: 1px solid var(--border-color);
    max-height: 200px;
    overflow-y: auto;
  }
  .dispatch-item .detail-row.open { display: block; }
  .dispatch-item .detail-row .detail-label {
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 5px;
  }
  .dispatch-item .detail-row .detail-label:first-child { margin-top: 0; }
  .dispatch-item .detail-row .detail-value {
    color: var(--text-primary);
    word-break: break-word;
    white-space: pre-wrap;
    max-height: 80px;
    overflow-y: auto;
    background: rgba(0,0,0,0.2);
    padding: 4px 8px;
    border-radius: 3px;
    margin-top: 2px;
    font-size: 11px;
  }
  .dispatch-item .detail-row .detail-value::-webkit-scrollbar { width: 3px; }
  .dispatch-item .detail-row .detail-value::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

  /* ─── Live-Item Variant ─── */
  .dispatch-item.live-item {
    background: rgba(63,185,80,0.06);
    border-left-color: var(--accent-green);
    animation: live-glow 2s ease-in-out infinite;
  }
  @keyframes live-glow {
    0%, 100% { box-shadow: inset 3px 0 8px -4px rgba(63,185,80,0.15); }
    50% { box-shadow: inset 3px 0 12px -2px rgba(63,185,80,0.35); }
  }
  .dispatch-item.live-item .main-row .route { color: var(--accent-green); }

  /* ─── Error Banner ─── */
  #error-banner {
    display: none;
    flex-shrink: 0;
    background: rgba(248,81,73,0.12);
    border-bottom: 1px solid rgba(248,81,73,0.3);
    color: var(--accent-red);
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
  }
  #error-banner.visible { display: block; }

  /* ─── Responsive ─── */
  @media (max-width: 700px) {
    #status-bar { flex-wrap: wrap; gap: 0.5em; padding: 8px 12px; font-size: 11px; }
    #status-bar .right { margin-left: 0; width: 100%; justify-content: flex-end; }
    .dispatch-item .main-row { font-size: 11px; padding: 4px 8px; gap: 4px; }
    .dispatch-item .main-row .badge.reason { max-width: 100px; }
    #live-section { flex: 0 0 35%; }
  }
  @media (max-width: 500px) {
    #status-bar .pipe { display: none; }
    #status-bar { gap: 0.3em; }
    .dispatch-item .main-row .badge.time { display: none; }
  }
</style>

MAS Dispatch Monitor - Echtzeit-Monitoring.

Datenquelle: fetch('http://localhost:3000/api/dashboard') alle 5 Sekunden.
Die API liefert: {success: true, data: {dispatch: {tree: [{id, parent_id, from, to, task, reason, status, duration_ms, ts, result_detail, messages, turns, errors}], total, active, done, failed}, agents: {total, healthy}, timestamp}}

WICHTIGE API-ZUGRIFFE:
- const apiData = json.data
- const items = apiData.dispatch.tree || []
- apiData.dispatch.total, apiData.dispatch.active, apiData.dispatch.done
- apiData.agents.total, apiData.agents.healthy
- apiData.timestamp

Layout (1200x900 pixel, dark theme, monospace font):

OBEN (30%): "🔴 LIVE" - Nur Einträge mit status==="running".
Zeige für jeden: "⏳ [from] → [to] [TASK]" + Dauer in Sekunden + Grund
Wenn nichts aktiv: "Keine aktiven Dispatches"

MITTE (60%): "🕐 ZEITSTRAHL" - ALLE Einträge, neueste ZUERST
Jeder Eintrag zeigt: StatusIcon [from] → [to] [TASK] | Dauer | Grund | Zeit
Bei Klick expandieren mit result_detail und messages.

UNTEN (fix): Statusleiste: Total | Active | Done | Failed | Agents (healthy/total)

Kein Scroll-Springen! Vor Refresh scrollTop merken, nach Refresh wiederherstellen.
Auto-Refresh alle 5 Sekunden.

<body>
<div id="app">
  <!-- Error Banner -->
  <div id="error-banner"></div>

  <!-- Status Bar (bottom-anchored via flex order) -->
  <!-- Content Area -->
  <div id="content">
    <!-- LIVE Section -->
    <div id="live-section">
      <div class="section-header">
        <span class="live-dot"></span> LIVE
        <span class="count-badge" id="live-count">0 aktiv</span>
      </div>
      <div id="live-list"></div>
    </div>

    <!-- Timeline Section -->
    <div id="timeline-section">
      <div class="section-header">
        🕐 ZEITSTRAHL
        <span class="count-badge" id="timeline-count">0 Einträge</span>
      </div>
      <div id="timeline-container"></div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <span class="stat"><span class="label">Total:</span> <span class="value blue" id="stat-total">0</span></span>
    <span class="pipe">|</span>
    <span class="stat"><span class="label">Active:</span> <span class="value green" id="stat-active">0</span></span>
    <span class="pipe">|</span>
    <span class="stat"><span class="label">Done:</span> <span class="value cyan" id="stat-done">0</span></span>
    <span class="pipe">|</span>
    <span class="stat"><span class="label">Failed:</span> <span class="value red" id="stat-failed">0</span></span>
    <span class="pipe">|</span>
    <span class="stat"><span class="label">Agents:</span> <span class="value" id="stat-agents">0/0</span></span>
    <span class="right">
      <span id="status-indicator">
        <span id="status-dot"></span>
        <span id="status-text">Live</span>
      </span>
      <span id="last-update">–</span>
      <button id="toggle-pause" title="Auto-Refresh pausieren/resume">⏸ Pause</button>
      <button id="refresh-btn" title="Manuell aktualisieren">⟳ Refresh</button>
    </span>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── State ───
  let paused = false;
  let lastData = null;
  let intervalId = null;
  let savedScrollTop = { timeline: 0, live: 0 };
  let expandedIds = new Set();

  // ─── DOM Refs ───
  const liveList = document.getElementById('live-list');
  const timelineContainer = document.getElementById('timeline-container');
  const errorBanner = document.getElementById('error-banner');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const lastUpdateEl = document.getElementById('last-update');
  const refreshBtn = document.getElementById('refresh-btn');
  const togglePauseBtn = document.getElementById('toggle-pause');
  const statTotal = document.getElementById('stat-total');
  const statActive = document.getElementById('stat-active');
  const statDone = document.getElementById('stat-done');
  const statFailed = document.getElementById('stat-failed');
  const statAgents = document.getElementById('stat-agents');
  const liveCount = document.getElementById('live-count');
  const timelineCount = document.getElementById('timeline-count');

  // ─── Helpers ───
  function formatDuration(ms) {
    if (ms == null) return '–';
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + 'm ' + sec + 's';
  }

  function formatTime(ts) {
    if (!ts) return '–';
    const d = new Date(ts);
    return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function statusIcon(status) {
    switch (status) {
      case 'running': return '▶️';
      case 'done': return '✅';
      case 'failed': return '❌';
      case 'pending': return '⏳';
      default: return '❓';
    }
  }

  function statusClass(status) {
    switch (status) {
      case 'running': return 'running';
      case 'done': return 'done';
      case 'failed': return 'failed';
      case 'pending': return 'pending';
      default: return '';
    }
  }

  function truncate(str, max = 80) {
    if (!str) return '';
    return str.length > max ? str.slice(0, max) + '…' : str;
  }

  // ─── Render Items ───
  function renderLiveItems(items) {
    const running = items.filter(i => i.status === 'running');
    liveCount.textContent = running.length + ' aktiv';

    if (running.length === 0) {
      liveList.innerHTML = '<div class="empty-state">Keine aktiven Dispatches</div>';
      return;
    }

    let html = '';
    for (const item of running) {
      html += dispatchItemHTML(item, true);
    }
    liveList.innerHTML = html;
    attachClickHandlers(liveList);
  }

  function renderTimelineItems(items) {
    const sorted = [...items].sort((a, b) => {
      const ta = a.ts || a.id || 0;
      const tb = b.ts || b.id || 0;
      return tb > ta ? 1 : tb < ta ? -1 : 0;
    });
    timelineCount.textContent = sorted.length + ' Einträge';

    if (sorted.length === 0) {
      timelineContainer.innerHTML = '<div class="empty-state">Keine Dispatch-Einträge vorhanden</div>';
      return;
    }

    let html = '';
    for (const item of sorted) {
      const isExpanded = expandedIds.has(item.id);
      html += dispatchItemHTML(item, false, isExpanded);
    }
    timelineContainer.innerHTML = html;
    attachClickHandlers(timelineContainer);
  }

  function dispatchItemHTML(item, isLive, isExpanded) {
    const statusCls = statusClass(item.status);
    const icon = statusIcon(item.status);
    const dur = formatDuration(item.duration_ms);
    const time = formatTime(item.ts);
    const reason = item.reason || item.task || '–';
    const from = item.from || '?';
    const to = item.to || '?';
    const task = item.task || '–';
    const arrow = '→';

    const expandArrow = isExpanded ? '▸ open' : '▸';
    const detailOpen = isExpanded ? ' open' : '';
    const liveCls = isLive ? ' live-item' : '';

    // Detail content
    let detailHTML = '';
    if (isExpanded) {
      detailHTML = '<div class="detail-label">Result Detail:</div>';
      detailHTML += '<div class="detail-value">' + (item.result_detail ? escapeHtml(item.result_detail) : '–') + '</div>';
      detailHTML += '<div class="detail-label" style="margin-top:6px;">Messages (' + (item.messages || 0) + '):</div>';
      detailHTML += '<div class="detail-value">' + (item.messages ? escapeHtml(JSON.stringify(item.messages, null, 2)) : '–') + '</div>';
      if (item.errors) {
        detailHTML += '<div class="detail-label" style="margin-top:6px;color:var(--accent-red);">Errors:</div>';
        detailHTML += '<div class="detail-value" style="color:var(--accent-red);">' + escapeHtml(JSON.stringify(item.errors, null, 2)) + '</div>';
      }
      if (item.turns != null) {
        detailHTML += '<div class="detail-label" style="margin-top:6px;">Turns:</div>';
        detailHTML += '<div class="detail-value">' + item.turns + '</div>';
      }
    }

    return '<div class="dispatch-item ' + statusCls + liveCls + '" data-id="' + item.id + '">' +
      '<div class="main-row">' +
        '<span class="status-icon">' + icon + '</span>' +
        '<span class="route"><span class="from">' + escapeHtml(from) + '</span><span class="arrow"> ' + arrow + ' </span><span class="to">' + escapeHtml(to) + '</span></span>' +
        '<span class="task-name">' + escapeHtml(truncate(task, 40)) + '</span>' +
        '<span class="badge duration">' + dur + '</span>' +
        '<span class="badge reason" title="' + escapeHtml(reason) + '">' + escapeHtml(truncate(reason, 25)) + '</span>' +
        '<span class="badge time">' + time + '</span>' +
        '<span class="expand-arrow ' + (isExpanded ? 'open' : '') + '">▸</span>' +
      '</div>' +
      '<div class="detail-row' + detailOpen + '">' + detailHTML + '</div>' +
    '</div>';
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ─── Click Handling ───
  function attachClickHandlers(container) {
    container.querySelectorAll('.dispatch-item').forEach(el => {
      el.addEventListener('click', function(e) {
        // Don't toggle if clicking inside detail-row scroll areas
        if (e.target.closest('.detail-value') || e.target.closest('.detail-row')) return;
        const id = this.dataset.id;
        if (!id) return;
        const detailRow = this.querySelector('.detail-row');
        const arrow = this.querySelector('.expand-arrow');
        if (!detailRow) return;

        if (expandedIds.has(id)) {
          expandedIds.delete(id);
          detailRow.classList.remove('open');
          if (arrow) arrow.classList.remove('open');
        } else {
          expandedIds.add(id);
          detailRow.classList.add('open');
          if (arrow) arrow.classList.add('open');
          // Re-render detail content if empty
          if (!detailRow.innerHTML.trim()) {
            // We need the full item to re-render - find it from lastData
            const item = findItemById(id);
            if (item) {
              let html = '<div class="detail-label">Result Detail:</div>';
              html += '<div class="detail-value">' + (item.result_detail ? escapeHtml(item.result_detail) : '–') + '</div>';
              html += '<div class="detail-label" style="margin-top:6px;">Messages (' + (item.messages || 0) + '):</div>';
              html += '<div class="detail-value">' + (item.messages ? escapeHtml(JSON.stringify(item.messages, null, 2)) : '–') + '</div>';
              if (item.errors) {
                html += '<div class="detail-label" style="margin-top:6px;color:var(--accent-red);">Errors:</div>';
                html += '<div class="detail-value" style="color:var(--accent-red);">' + escapeHtml(JSON.stringify(item.errors, null, 2)) + '</div>';
              }
              if (item.turns != null) {
                html += '<div class="detail-label" style="margin-top:6px;">Turns:</div>';
                html += '<div class="detail-value">' + item.turns + '</div>';
              }
              detailRow.innerHTML = html;
            }
          }
        }
      });
    });
  }

  function findItemById(id) {
    if (!lastData || !lastData.dispatch || !lastData.dispatch.tree) return null;
    return lastData.dispatch.tree.find(i => String(i.id) === String(id)) || null;
  }

  // ─── Update Status Bar ───
  function updateStatusBar(data) {
    const dispatch = data.dispatch || {};
    const agents = data.agents || {};
    statTotal.textContent = dispatch.total ?? 0;
    statActive.textContent = dispatch.active ?? 0;
    statDone.textContent = dispatch.done ?? 0;
    statFailed.textContent = dispatch.failed ?? 0;
    const healthy = agents.healthy ?? 0;
    const total = agents.total ?? 0;
    statAgents.textContent = healthy + '/' + total;
    if (total > 0 && healthy === total) {
      statAgents.style.color = 'var(--accent-green)';
    } else if (healthy < total) {
      statAgents.style.color = 'var(--accent-red)';
    } else {
      statAgents.style.color = 'var(--text-primary)';
    }
  }

  // ─── Scroll Save/Restore ───
  function saveScrollPositions() {
    savedScrollTop.timeline = timelineContainer.scrollTop;
    savedScrollTop.live = liveList.scrollTop;
  }

  function restoreScrollPositions() {
    requestAnimationFrame(() => {
      timelineContainer.scrollTop = savedScrollTop.timeline;
      liveList.scrollTop = savedScrollTop.live;
    });
  }

  // ─── Main Render ───
  function renderAll(data) {
    const items = data.dispatch.tree || [];
    renderLiveItems(items);
    renderTimelineItems(items);
    updateStatusBar(data);
    const ts = data.timestamp;
    lastUpdateEl.textContent = ts ? formatTime(ts) : '–';
  }

  // ─── Fetch Data ───
  async function fetchData() {
    if (paused) return;

    try {
      const res = await fetch('http://localhost:3000/api/dashboard');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json.success) throw new Error('API error: success=false');
      const apiData = json.data;
      if (!apiData || !apiData.dispatch) throw new Error('Ungültige API-Struktur');

      saveScrollPositions();
      lastData = apiData;
      renderAll(apiData);
      restoreScrollPositions();
      hideError();
    } catch (err) {
      showError('⛔ ' + err.message);
      statusDot.className = 'error';
      statusText.textContent = 'Fehler';
    }
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    statusDot.className = 'error';
    statusText.textContent = 'Fehler';
  }

  function hideError() {
    errorBanner.classList.remove('visible');
    statusDot.className = '';
    statusText.textContent = 'Live';
  }

  // ─── Auto-Refresh ───
  function startAutoRefresh() {
    stopAutoRefresh();
    fetchData(); // immediate first fetch
    intervalId = setInterval(fetchData, 5000);
  }

  function stopAutoRefresh() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
  }

  // ─── Pause / Resume ───
  function togglePause() {
    paused = !paused;
    if (paused) {
      togglePauseBtn.classList.add('paused');
      togglePauseBtn.textContent = '▶ Resume';
      statusDot.className = 'paused';
      statusText.textContent = 'Pausiert';
    } else {
      togglePauseBtn.classList.remove('paused');
      togglePauseBtn.textContent = '⏸ Pause';
      statusDot.className = '';
      statusText.textContent = 'Live';
      fetchData();
    }
  }

  // ─── Init ───
  function init() {
    refreshBtn.addEventListener('click', () => {
      if (paused) {
        // manual refresh even when paused
        fetchData().catch(() => {});
      } else {
        fetchData();
      }
    });
    togglePauseBtn.addEventListener('click', togglePause);
    startAutoRefresh();

    // Handle visibility change: re-fetch when tab becomes visible again
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && !paused) {
        fetchData();
      }
    });
  }

  // ─── Start ───
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
