<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAS Dispatch Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --cyan: #39d2c0;
    --orange: #d4760e;
    --running: #58a6ff;
    --done: #3fb950;
    --error: #f85149;
    --pending: #8b949e;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    font-size: 13px;
    line-height: 1.5;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 15px; font-weight: 700; color: var(--cyan); }
  .header h1 span { color: var(--text-dim); font-weight: 400; font-size: 12px; }
  .header .ts { font-size: 11px; color: var(--text-dim); }

  .main-content {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* LIVE SECTION */
  .live-section {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }
  .live-header {
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--running);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 2;
    display: flex; align-items: center; gap: 8px;
  }
  .live-header .pulse {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--running);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--running); }
    50% { opacity: 0.4; box-shadow: 0 0 12px var(--running); }
  }
  .live-list { padding: 4px 0; }
  .live-entry {
    padding: 5px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
    border-bottom: 1px solid rgba(48,54,61,0.3);
    transition: background 0.15s;
  }
  .live-entry:hover { background: var(--surface2); }
  .live-entry .icon { flex-shrink: 0; font-size: 14px; }
  .live-entry .from-to {
    color: var(--blue);
    font-weight: 500;
    flex-shrink: 0;
    min-width: 100px;
  }
  .live-entry .task {
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .live-entry .duration {
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 11px;
    min-width: 60px;
    text-align: right;
  }
  .live-entry .turns {
    flex-shrink: 0;
    color: var(--purple);
    font-size: 11px;
    min-width: 40px;
    text-align: right;
  }
  .live-empty {
    padding: 20px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* TIMELINE SECTION */
  .timeline-section {
    flex: 1;
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .timeline-header {
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .timeline-header .count { color: var(--text-dim); font-weight: 400; }
  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 0;
  }

  .date-group { margin-bottom: 4px; }
  .date-label {
    padding: 3px 16px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    background: rgba(48,54,61,0.2);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky; top: 0; z-index: 1;
  }

  .tl-entry {
    border-bottom: 1px solid rgba(48,54,61,0.2);
    cursor: pointer;
    transition: background 0.12s;
  }
  .tl-entry:hover { background: var(--surface2); }
  .tl-entry .tl-summary {
    padding: 5px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
  }
  .tl-entry .tl-summary .status-icon {
    flex-shrink: 0;
    font-size: 14px;
    width: 20px; text-align: center;
  }
  .tl-entry .tl-summary .from-to {
    color: var(--blue);
    font-weight: 500;
    flex-shrink: 0;
    min-width: 100px;
  }
  .tl-entry .tl-summary .task {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .tl-entry .tl-summary .meta {
    flex-shrink: 0;
    display: flex; gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .tl-entry .tl-summary .meta .dur { color: var(--yellow); }
  .tl-entry .tl-summary .meta .turns { color: var(--purple); }
  .tl-entry .tl-summary .arrow {
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 10px;
    transition: transform 0.2s;
    width: 16px; text-align: center;
  }
  .tl-entry.expanded .tl-summary .arrow { transform: rotate(90deg); }

  .tl-entry .tl-details {
    display: none;
    padding: 8px 16px 12px 46px;
    background: rgba(22,27,34,0.6);
    border-top: 1px solid rgba(48,54,61,0.2);
    font-size: 12px;
  }
  .tl-entry.expanded .tl-details { display: block; }

  .tl-details .detail-section {
    margin-bottom: 8px;
  }
  .tl-details .detail-section:last-child { margin-bottom: 0; }
  .tl-details .detail-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .tl-details .detail-label .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 6px;
  }
  .badge-done { background: rgba(63,185,80,0.15); color: var(--done); }
  .badge-error { background: rgba(248,81,73,0.15); color: var(--error); }
  .badge-running { background: rgba(88,166,255,0.15); color: var(--running); }

  .detail-result {
    color: var(--green);
    background: rgba(63,185,80,0.08);
    padding: 5px 8px;
    border-radius: 4px;
    border-left: 2px solid var(--green);
    font-size: 11px;
    word-break: break-word;
  }
  .detail-result.error {
    color: var(--red);
    background: rgba(248,81,73,0.08);
    border-left-color: var(--red);
  }
  .detail-result.running {
    color: var(--yellow);
    background: rgba(210,153,34,0.08);
    border-left-color: var(--yellow);
  }

  .detail-messages { max-height: 200px; overflow-y: auto; }
  .detail-msg {
    padding: 4px 8px;
    margin-bottom: 3px;
    background: rgba(48,54,61,0.15);
    border-radius: 3px;
    font-size: 11px;
  }
  .detail-msg .msg-from {
    color: var(--blue);
    font-weight: 500;
    margin-right: 6px;
  }
  .detail-msg .msg-text {
    color: var(--text-dim);
    word-break: break-word;
  }

  .detail-children {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .detail-child-ref {
    display: inline-block;
    padding: 2px 6px;
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: 3px;
    font-size: 10px;
    color: var(--blue);
    cursor: pointer;
  }
  .detail-child-ref:hover {
    background: rgba(88,166,255,0.2);
  }

  .detail-errors {
    color: var(--red);
    background: rgba(248,81,73,0.08);
    padding: 5px 8px;
    border-radius: 4px;
    border-left: 2px solid var(--red);
    font-size: 11px;
    word-break: break-word;
  }

  /* STATUS BAR */
  .status-bar {
    flex-shrink: 0;
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
  }
  .status-bar .stat {
    display: flex; align-items: center; gap: 4px;
  }
  .status-bar .stat .label { color: var(--text-dim); }
  .status-bar .stat .value { font-weight: 700; }
  .stat-total .value { color: var(--text); }
  .stat-active .value { color: var(--running); }
  .stat-done .value { color: var(--done); }
  .stat-failed .value { color: var(--error); }
  .stat-avg .value { color: var(--yellow); }
  .stat-agents .value { color: var(--cyan); }
  .stat-healthy .value { color: var(--green); }
  .status-bar .divider { width: 1px; height: 16px; background: var(--border); }
  .status-bar .connection-status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    color: var(--text-dim);
  }
  .status-bar .connection-status .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-bar .connection-status .dot.error { background: var(--error); animation: none; }
  .status-bar .connection-status .dot.pending { background: var(--yellow); animation: pulse 1s infinite; }

  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  @media (max-width: 768px) {
    body { font-size: 12px; }
    .live-entry .from-to, .tl-entry .tl-summary .from-to { min-width: 70px; }
    .status-bar { gap: 8px; }
  }
</style>
  <script type="application/ld+json">
{
  "@context": "urn:goose.ai:schema",
  "@type": "GooseApp",
  "name": "mas-dispatch-monitor",
  "description": "Real-time MAS (Multi-Agent System) dispatch monitoring with live view and timeline",
  "width": 1200,
  "height": 900,
  "resizable": true,
  "mcpServers": [
    "apps"
  ]
}
  </script>
  <script type="application/x-goose-prd">
Erstelle eine Echtzeit-Dispatch-Überwachung 'mas-dispatch' (1200x900) für ein MAS (Multi-Agent System).

Datenquelle: fetch('http://localhost:3000/api/dashboard') alle 5 Sekunden.
Antwort: {success: true, data: {dispatch: {tree: [Entry], total, active, done, failed}, agents: {total, healthy}, timestamp}}

Jeder Entry: id, parent_id, from, to, task, reason, status (running/done/error), duration_ms, ts, result_detail, messages [{from, text}], turns, errors

KRITISCH:
- const json = await response.json(); const apiData = json.data; const items = apiData.dispatch.tree || [];
- const total = apiData.dispatch.total; const active = apiData.dispatch.active;

App hat 2 Bereiche, KEIN Scroll-Springen:

1. LIVE (oben): NUR Einträge mit status='running'. Zeige: ⏳ + Von -> Nach [Task] + Dauer
2. ZEITSTRAHL (unten, scrollbar): ALLE Einträge, neueste ZUERST. Gruppiert nach Datum. BEIM KLICK expandieren und zeigen: messages, result_detail, children-refs
3. STATUS-BAR (fix unten): Total | Active | Done | Failed | Avg | Agents

scrollTop merken vor refresh, wiederherstellen nach refresh. Monospace Font, Dark Theme.
  </script>
</head>
<body>
<div class="header">
  <h1>⚡ MAS Dispatch <span>Monitor</span></h1>
  <div class="ts" id="headerTs">—</div>
</div>

<div class="main-content">
  <!-- LIVE SECTION -->
  <div class="live-section" id="liveSection">
    <div class="live-header">
      <span class="pulse"></span>
      LIVE — Aktive Dispatchs
      <span id="liveCount" style="font-weight:400;color:var(--text-dim);font-size:11px;margin-left:auto;">0</span>
    </div>
    <div class="live-list" id="liveList"></div>
  </div>

  <!-- TIMELINE SECTION -->
  <div class="timeline-section">
    <div class="timeline-header">
      📋 ZEITSTRAHL — Alle Dispatchs
      <span class="count" id="tlCount">(0)</span>
    </div>
    <div class="timeline-scroll" id="timelineScroll">
      <div id="timelineList"></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar">
  <div class="stat stat-total"><span class="label">Total:</span><span class="value" id="statTotal">0</span></div>
  <div class="divider"></div>
  <div class="stat stat-active"><span class="label">Active:</span><span class="value" id="statActive">0</span></div>
  <div class="divider"></div>
  <div class="stat stat-done"><span class="label">Done:</span><span class="value" id="statDone">0</span></div>
  <div class="divider"></div>
  <div class="stat stat-failed"><span class="label">Failed:</span><span class="value" id="statFailed">0</span></div>
  <div class="divider"></div>
  <div class="stat stat-avg"><span class="label">⏱ Ø:</span><span class="value" id="statAvg">—</span></div>
  <div class="divider"></div>
  <div class="stat stat-agents"><span class="label">Agents:</span><span class="value" id="statAgents">0</span></div>
  <div class="stat stat-healthy"><span class="label">✓:</span><span class="value" id="statHealthy">0</span></div>
  <div class="connection-status">
    <span class="dot" id="connDot"></span>
    <span id="connText">Verbinde...</span>
  </div>
</div>

<script>
(function(){
  'use strict';

  // State
  let allEntries = [];
  let expandedIds = new Set();
  let savedScrollTop = 0;
  let pollInterval = null;
  let isPolling = false;

  const SCROLL_KEY = 'mas_dispatch_scroll';

  // DOM refs
  const liveList = document.getElementById('liveList');
  const liveCount = document.getElementById('liveCount');
  const timelineList = document.getElementById('timelineList');
  const timelineScroll = document.getElementById('timelineScroll');
  const tlCount = document.getElementById('tlCount');
  const headerTs = document.getElementById('headerTs');

  const statTotal = document.getElementById('statTotal');
  const statActive = document.getElementById('statActive');
  const statDone = document.getElementById('statDone');
  const statFailed = document.getElementById('statFailed');
  const statAvg = document.getElementById('statAvg');
  const statAgents = document.getElementById('statAgents');
  const statHealthy = document.getElementById('statHealthy');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');

  // Helpers
  function fmtDuration(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return m + 'm ' + s + 's';
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    const pad = n => String(n).padStart(2, '0');
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  function fmtDate(ts) {
    if (!ts) return 'Unbekannt';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return 'Unbekannt';
    const now = new Date();
    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === now.toDateString()) return 'Heute';
    if (d.toDateString() === yesterday.toDateString()) return 'Gestern';
    const pad = n => String(n).padStart(2, '0');
    return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
  }

  function getDateGroupKey(ts) {
    if (!ts) return 'Unbekannt';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return 'Unbekannt';
    return d.toDateString();
  }

  function getStatusIcon(status) {
    switch (status) {
      case 'running': return '⏳';
      case 'done': return '✅';
      case 'error': return '❌';
      default: return '⬜';
    }
  }

  function getStatusClass(status) {
    switch (status) {
      case 'running': return 'running';
      case 'done': return 'badge-done';
      case 'error': return 'badge-error';
      default: return '';
    }
  }

  // Render LIVE entries (only running)
  function renderLive(entries) {
    const running = entries.filter(e => e && e.status === 'running');
    liveCount.textContent = running.length;

    if (running.length === 0) {
      liveList.innerHTML = '<div class="live-empty">Keine aktiven Dispatchs — System idle ⏸</div>';
      return;
    }

    let html = '';
    for (const e of running) {
      const dur = e.duration_ms != null ? fmtDuration(Date.now() - (Date.now() - e.duration_ms)) : '0s';
      html += '<div class="live-entry">'
        + '<span class="icon">⏳</span>'
        + '<span class="from-to">' + escHtml(e.from || '?') + ' → ' + escHtml(e.to || '?') + '</span>'
        + '<span class="task truncate">' + escHtml(e.task || e.reason || '—') + '</span>'
        + '<span class="duration">' + dur + '</span>'
        + '<span class="turns">#' + (e.turns || 0) + '</span>'
        + '</div>';
    }
    liveList.innerHTML = html;
  }

  function escHtml(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  // Render timeline (ALL entries, newest first, grouped by date)
  function renderTimeline(entries) {
    const sorted = [...entries].sort((a, b) => {
      const ta = a.ts ? new Date(a.ts).getTime() : 0;
      const tb = b.ts ? new Date(b.ts).getTime() : 0;
      return tb - ta;
    });

    tlCount.textContent = '(' + sorted.length + ')';

    // Group by date
    const groups = {};
    for (const e of sorted) {
      const key = getDateGroupKey(e.ts);
      if (!groups[key]) groups[key] = [];
      groups[key].push(e);
    }

    let html = '';
    for (const [dateKey, ents] of Object.entries(groups)) {
      html += '<div class="date-group">';
      html += '<div class="date-label">' + escHtml(fmtDate(ents[0]?.ts)) + ' — ' + ents.length + ' Einträge</div>';
      for (const e of ents) {
        const isExpanded = expandedIds.has(e.id);
        const hasChildren = entries.some(c => c.parent_id === e.id);
        html += '<div class="tl-entry' + (isExpanded ? ' expanded' : '') + '" data-id="' + escHtml(e.id) + '">';
        html += '<div class="tl-summary">';
        html += '<span class="status-icon">' + getStatusIcon(e.status) + '</span>';
        html += '<span class="from-to">' + escHtml(e.from || '?') + ' → ' + escHtml(e.to || '?') + '</span>';
        html += '<span class="task truncate">' + escHtml(e.task || e.reason || '—') + '</span>';
        html += '<span class="meta">';
        html += '<span class="dur">' + fmtDuration(e.duration_ms) + '</span>';
        if (e.turns != null) html += '<span class="turns">#' + e.turns + '</span>';
        html += '<span class="time">' + fmtTime(e.ts) + '</span>';
        html += '</span>';
        html += '<span class="arrow">▶</span>';
        html += '</div>';

        // Details
        html += '<div class="tl-details">';
        html += '<div class="detail-section">';
        html += '<div class="detail-label">Status <span class="badge ' + getStatusClass(e.status) + '">' + escHtml(e.status) + '</span></div>';
        if (e.result_detail) {
          const cls = e.status === 'error' ? 'error' : (e.status === 'running' ? 'running' : '');
          html += '<div class="detail-result ' + cls + '">' + escHtml(e.result_detail) + '</div>';
        }
        if (e.errors && e.errors.length > 0) {
          html += '<div style="margin-top:4px;"><div class="detail-label">Fehler</div>';
          for (const err of e.errors) {
            html += '<div class="detail-errors">' + escHtml(typeof err === 'string' ? err : JSON.stringify(err)) + '</div>';
          }
        }
        html += '</div>';

        if (e.messages && e.messages.length > 0) {
          html += '<div class="detail-section">';
          html += '<div class="detail-label">Messages (' + e.messages.length + ')</div>';
          html += '<div class="detail-messages">';
          for (const m of e.messages) {
            html += '<div class="detail-msg"><span class="msg-from">' + escHtml(m.from || '?') + ':</span><span class="msg-text">' + escHtml(m.text || '') + '</span></div>';
          }
          html += '</div></div>';
        }

        if (hasChildren) {
          const children = entries.filter(c => c.parent_id === e.id);
          html += '<div class="detail-section">';
          html += '<div class="detail-label">Kind-Einträge (' + children.length + ')</div>';
          html += '<div class="detail-children">';
          for (const c of children) {
            html += '<span class="detail-child-ref" data-id="' + escHtml(c.id) + '">#' + escHtml(c.id && c.id.length > 8 ? c.id.substring(0, 8)+'…' : c.id) + ' (' + escHtml(c.status) + ')</span>';
          }
          html += '</div></div>';
        }

        html += '</div>'; // tl-details
        html += '</div>'; // tl-entry
      }
      html += '</div>'; // date-group
    }

    if (sorted.length === 0) {
      html = '<div class="live-empty">⏳ Warte auf erste Dispatch-Daten...</div>';
    }

    timelineList.innerHTML = html;

    // Attach click events
    timelineList.querySelectorAll('.tl-entry').forEach(el => {
      el.addEventListener('click', function(e) {
        // Don't toggle if clicking on a child-ref
        if (e.target.classList.contains('detail-child-ref')) {
          const id = e.target.getAttribute('data-id');
          if (id) {
            // Scroll to first entry with this id (if exists)
            const targetEntry = document.querySelector('.tl-entry[data-id="' + CSS.escape(id) + '"]');
            if (targetEntry) {
              targetEntry.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // Also expand it
              expandedIds.add(id);
              saveExpanded();
              renderAll();
            }
          }
          return;
        }
        const id = el.getAttribute('data-id');
        if (id) {
          if (expandedIds.has(id)) {
            expandedIds.delete(id);
          } else {
            expandedIds.add(id);
          }
          saveExpanded();
          renderAll();
        }
      });
    });
  }

  function saveExpanded() {
    try {
      sessionStorage.setItem('mas_dispatch_expanded', JSON.stringify([...expandedIds]));
    } catch(e) { /* ignore */ }
  }

  function loadExpanded() {
    try {
      const data = sessionStorage.getItem('mas_dispatch_expanded');
      if (data) {
        const arr = JSON.parse(data);
        if (Array.isArray(arr)) {
          expandedIds = new Set(arr);
        }
      }
    } catch(e) { /* ignore */ }
  }

  function saveScroll() {
    savedScrollTop = timelineScroll.scrollTop;
    try {
      sessionStorage.setItem(SCROLL_KEY, String(savedScrollTop));
    } catch(e) { /* ignore */ }
  }

  function restoreScroll() {
    try {
      const saved = sessionStorage.getItem(SCROLL_KEY);
      if (saved) {
        savedScrollTop = parseInt(saved, 10) || 0;
      }
    } catch(e) { /* ignore */ }
    // Apply after render
    requestAnimationFrame(() => {
      timelineScroll.scrollTop = savedScrollTop;
    });
  }

  // Full render
  function renderAll() {
    renderLive(allEntries);
    renderTimeline(allEntries);
    // Restore scroll after render
    requestAnimationFrame(() => {
      timelineScroll.scrollTop = savedScrollTop;
    });
  }

  // Update status bar
  function updateStats(data) {
    if (!data) {
      statTotal.textContent = '0';
      statActive.textContent = '0';
      statDone.textContent = '0';
      statFailed.textContent = '0';
      statAvg.textContent = '—';
      statAgents.textContent = '0';
      statHealthy.textContent = '0';
      return;
    }

    const dispatch = data.dispatch || {};
    const agents = data.agents || {};

    const total = dispatch.total || 0;
    const active = dispatch.active || 0;
    const done = dispatch.done || 0;
    const failed = dispatch.failed || 0;

    statTotal.textContent = total;
    statActive.textContent = active;
    statDone.textContent = done;
    statFailed.textContent = failed;

    // Average duration of completed entries (done/error)
    const completed = (allEntries || []).filter(e => e && (e.status === 'done' || e.status === 'error') && e.duration_ms != null);
    if (completed.length > 0) {
      const avg = completed.reduce((sum, e) => sum + e.duration_ms, 0) / completed.length;
      statAvg.textContent = fmtDuration(Math.round(avg));
    } else {
      statAvg.textContent = '—';
    }

    statAgents.textContent = agents.total || 0;
    statHealthy.textContent = agents.healthy || 0;
  }

  // Connection status
  function setConnStatus(ok, msg) {
    connDot.className = 'dot' + (ok ? '' : ' error');
    connText.textContent = msg || (ok ? 'Verbunden' : 'Fehler');
  }

  // Fetch data
  async function fetchData() {
    if (isPolling) return;
    isPolling = true;

    try {
      // Save scroll before fetching
      saveScroll();

      const response = await fetch('http://localhost:3000/api/dashboard', {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      const json = await response.json();
      const apiData = json.data;
      if (!apiData || !apiData.dispatch) {
        throw new Error('Ungültige API-Antwort');
      }

      const items = apiData.dispatch.tree || [];
      const total = apiData.dispatch.total;
      const active = apiData.dispatch.active;

      allEntries = items;

      // Render
      renderAll();
      updateStats(apiData);

      // Timestamp
      if (apiData.timestamp) {
        headerTs.textContent = 'Letztes Update: ' + fmtTime(apiData.timestamp);
      } else {
        headerTs.textContent = 'Letztes Update: ' + new Date().toLocaleTimeString();
      }

      setConnStatus(true, 'Verbunden');

    } catch (err) {
      console.warn('MAS Dispatch fetch error:', err);
      setConnStatus(false, 'Fehler: ' + err.message);
    } finally {
      isPolling = false;
    }
  }

  // Start polling
  function startPolling() {
    fetchData();
    pollInterval = setInterval(fetchData, 5000);
  }

  function stopPolling() {
    if (pollInterval) {
      clearInterval(pollInterval);
      pollInterval = null;
    }
  }

  // Init
  loadExpanded();
  restoreScroll();
  startPolling();

  // Cleanup
  window.addEventListener('beforeunload', function() {
    saveScroll();
    stopPolling();
  });

  // Handle visibility change - pause when hidden
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      stopPolling();
    } else {
      startPolling();
    }
  });

  // Save scroll on manual scroll
  timelineScroll.addEventListener('scroll', function() {
    savedScrollTop = timelineScroll.scrollTop;
    try {
      sessionStorage.setItem(SCROLL_KEY, String(savedScrollTop));
    } catch(e) { /* ignore */ }
  });

})();
</script>
</body>
</html>
