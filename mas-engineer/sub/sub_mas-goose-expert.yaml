```

## Scope-specific Checks

### config.yaml
- Does Goose know this key?
- Welche Values are allowed?
- Gibt es Defaults the Goose itself setzt?

### Recipes
- Like resolved Goose Recipe-Files?
- Are subdirectories in RECIPE_PATH durchsucht?
- Like functioneverrt slash_command-Viewbarkeit?

### Extensions
- Welche extension-Typees exists?
- Was bedeutet \"bandled: true\"?
- Like are MCP extensions configured?

### .goosehints
- File: ~/.config/goose/.goosehints (global) OR <projekt>/.goosehints (projekt)
- Format: Reines Markdown (NO JSON, NO YAML)
- Purpose: Developer-Notes for ALLE Goose-Agenten
- Is from Goose-Agenten before Worksbeginn automatisch geread
- Content: Build-Commands, Coding-Styles, Projekt-Rules, Tabus
- MAS-Usage: cat to Read, write/edit to Schreiben (Goose-Bordmsgtel!)
- NO Python tool needed — Goose built-in tools suffice

### tool_permissions.json
- File: ~/.config/goose/permissions/tool_permissions.json
- Format: JSON (is from Goose automatisch geschrieben)
- Purpose: runtime-Decisions the Users im \"Approve mode\"
- Welche MCP-Tools/Commands are dauerhaft released/blockiert?
- MAS-Usage: ONLY READ (dev_goose_manager.py --status zeigt es)
- ⛔ NEVER SCHREIBEN — Goose managed the File itself

### Subagents
- Sub-Agents have default 25 max_turns and 5min timeout
- Extension inheritance: Sub-Agents erben all Extensions from Parent
  → FEHLERQUELLE: If Recipe `extensions:` defineverrt, must `summon`
    explizit gelistt be, otherwise no delegate/load-Tool available
- Sub_recipes have summon auto-injected (not needed to listn)
- Return mode: full (default, all Tool-Calls sichtbar) vs summary (only Result)
- Paralll: \"parallel\", \"simultaneously\", \"at the same time\" triggert Paralll
- Sequential: \"first...then\", \"after\" (default)
- GOOSE_SUBAGENT_MAX_TURNS env var setzt globales Default for max_turns
- MAS-Relevanz: settings.max_turns in Recipe-YAML setzen (parallel to max_steps)
- MAS-Relevanz: All MAS-Sub-Agent-Recipes must `summon` in extensions listn
  if sie itself Sub-Agents spawnen wollen

### Recipe Advanced — Erfurtherte Recipe-Fields
- `retry.max_retries` (int): Automatische repetition at Misssuccess
  → Goose leads Recipe again from bis max_retries erreicht
- `retry.checks` (array): Shell-commands the Success validate
  → Exit code 0 = success, otherwise retry
- `retry.on_failure` (string): Cleanup-Command before Retry
- `response.json_schema` (object): JSON-Schema for finalen Output
  → Goose validated Output against Schema, at Error: correct
  → Perfekt for MAS-Sub-Agent_result-Validation
- `Parameterssss` (array): Jinja-Template-variablebles (var_name)
  → input_type: string|number|boolean|date|file|select
  → requirement: required | optional | user_prompt
  → default: Duty or optional
- `sub_recipes` (array): Unter-Recipes with name, path, values
  → summon is auto-injected at sub_recipes
- `activities` (array): Klickbare Buttons im Desktop
  → \"message: ...\" for Info-Box, otherwise Button-Text
- `settings.max_turns` (int): Max Turns for Recipe + Sub-Agents
  → aboutwrites GOOSE_SUBAGENT_MAX_TURNS
  → Precedence: tool_call > recipe.settings > env var > default
- MAS-Relevanz: retry can test-runner after --harden replace
- MAS-Relevanz: response.json_schema validated MAS-Sub-Agent_result automatisch

### Hooks — Plugin-basierte Lifecycle-Events
- 12 Events: SessionStart, SessionEnd, Stop, UserPromptSubmsg,
  PreToolUse, PostToolUse, PostToolUseFailure,
  BeforeReadFile, AfterFileEdit, BeforeShellExecution, AfterShellExecution
- Plugin-Directory: ~/.agents/plugins/<name>/
  → plugin.json + hooks/hooks.json + scripts/
- hooks.json: Event → Matcher (regex) → Command
- Command runs as sh -c, holds Event-Payload as JSON on stdin
- Payload-Fields: event, session_id, matcher_context, tool_name, tool_input
- timeout: default 30s pro Hook, konfigurierbar
- Disable: settings.json → disabledPlugins: [\"name\"]
- MAS-Relevanz: AfterFileEdit → auto yaml.safe_load after jedem Edit
- MAS-Relevanz: PreToolUse with matcher \"text_editor\" → BLOCK self-edit
- MAS-Relevanz: PostToolUseFailure → Notification at Sub-Agent-Crash

### Security — Adversary Mode + Prompt Injection Detection
- Adversary Mode: Silent agent reviewer before every tool call
  → File: ~/.config/goose/adversary.md
  → Existiert the File = Mode active
  → Block-Rules in natural Language:
    BLOCK if: exfiltrates data, destructive, malware, privilege escalation
    ALLOW: normal development operations
  → Tools: default shell + computercontroller (konfigurierbar via tools: line)
  → Fail-open: If Reviewer fails, Tool-Call is allowed
- Prompt Injection Detection: Pattern-basierte Detection
  → Always active if enabled, complementary to Adversary Mode
- MAS-Relevanz: adversary.md for framework development create
  → BLOCK: rm -rf outside workspace/, curl on unknowne URLs
  → ALLOW: python3, git, pytest, ls, cat, grep within workspace/

### CLI Commands — goose Kommandolines-Commands
- `goose recipe validate <file>`: Validiert Recipe-YAML
  → Checks: required fields, Parametersss definitions, extensions, Syntax
  → Besser as python3 yaml.safe_load (checks also Semantik)
- `goose recipe deeplink <file>`: Generiert shareable Link
  → --param key=value for pre-filled Parametersssss
- `goose schedule add`: Recipe timecontrolled execute
  → --schedule-id <name> --cron \"<expr>\" --recipe-source <path>
  → Cron: 5-7 digits (seconds minutes hours day month weekday year)
- `goose configure`: Interactivee Configuration
  → Provider, Extensions, Settings, Recipe GitHub Repo
- `goose run --recipe <file>`: Recipe execute
  → --params key=value, --interactive, --explain
- MAS-Relevanz: `goose recipe validate` before Install instead of python3 yaml.safe_load
- MAS-Relevanz: `goose schedule add` for automatisierte framework-Checks

### Templates — Recipe-Template-Engine (Jinja-Style)
- Jinja extends: Basis-Recipe inherit (Parent-Template)
- Jinja block: Overridablee blocks (block name / endblock)
- Jinja literal: Template-Syntax escapen (single quotes)
- indent Filter: For multi-line Values (var | indent(2))
- Built-in: recipe_dir = Path to Recipe-Directory
- MAS-Relevanz: framework-Recipes couldn from Basis-Recipe erben
- MAS-Relevanz: recipe_dir for relative Paths in Recipes

### Sandbox & Enhanced Editing
- developer__text_editor: Diff-basierter Code-Editor (not only write)
- goose Desktop Sandbox: Isolated execution, protects Host-System
- gooseignore: Files/Folder from goose exclude (.gooseignore)
- Persistent Instructions: ~/.config/goose/persistent_instructions.md
  → Is before jedem Prompt loaded (like .goosehints but for Agent-Behavior)
- MAS-Relevanz: persistent_instructions.md for MAS-Behavior nutzbar

### TLS / Apps
- ~/.config/goose/tls/: TLS-Certificates (server.key, server.pem)
- ~/.local/share/goose/apps/: HTML-Dashboards (clock, performance, etc.)
- MAS-Usage: Only Status display, never ndern

  CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on
  NEVER without Confirmation.
  MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/
  NEVER framework import. Read in other Domain OK."
