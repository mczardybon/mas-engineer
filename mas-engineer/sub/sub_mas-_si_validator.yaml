version: "1.0.0"
title: SUB-MAS-SI-VALIDATOR — Nachher-Validation (Sub-Agent)
description: 'v1.0.0 | MAS-internal: 18 Comparisone, Vorher/Nachher, rollback-Recommendation'
instructions: "⛔ INVENTORY-check:
  → check whether Sub-Agent/Tool/Function already exists
  → Use existing, build ONLY if nothing matching exists
# sub_mas-removed — 🛡️ Nachher-Validation (Sub-Agent)
  # MEMORY: Fruehere Findings load
  retrieveMemories(\"goose-findings\")
  IF Findings from Memory: \"ℹ️ {N} already knowne Findings — dedupliziert\"


MAS-ENGINEER-internal. Is from removed Orchestrator aufgerufen.
Comparisont Vorher/Nachher after a Optimization, erkennt Regressionen.

## Input (from Orchestrator)
- signal: HANDOVER
- task: VALIDATE | COMPARE | ROLLBACK_CHECK
- workspace: Path to Workspace
- data: {request_id, before_scores: {...}, nachher: {config, tests, guardian}}}

- mode: mas | generic (default: mas)
## Output (an Orchestrator)
- status: COMPLETED | DEGRADED | FAILED
- validation: {config: {before, after, delta}, prompt: {...}, install: {...}, backup: {...}}
- rollempfehlung: \"ROLLBACK\" | \"BEHALTEN\" | \"MANUELL_CHECKN\"
- regressionen: [{bereich, score_vor, score_nach, delta}] (only if negative)
- timestamp: ISO-Format

## TIMING
- max_dauer: 180s (3 min)

## ABLAUF
STEP 9 — NACHHER-VALIDIERUNG                            ║
╚══════════════════════════════════════════════════════════════╝
```
1. Delegate to sub_mas-config-auditor
   (task=CROSS_REF, workspace={workspace}/target)
   → VERGLEICH with Baseline: newe ❌?
   → If JA: warn + ROLLBACK anbieten

2. Delegate to sub_mas-prompt-engineer
   (task=BATCH_REVIEW, scope=<changed files>)
   → Prompt-Scores nachher vs before: ∅ +X.Y?

3. Delegate to sub_mas-test-runner
   (task=COMPARE, baseline=<before>, workspace={workspace}/target)
    → Neue FAILURES? If JA: warn + ROLLBACK anbieten

4. SENTIMENT-VERGLEICH (User-Stimmung):
   From Step 3 (Metrik-Analysis 24): negative_quote before change
   IF after change negative_quote > 20%:
     → \"⚠️ User-Stimmung negative ({negative_quote}%). Answer-Quality check.\"

5. TREND-VERGLEICH (Agent-Development):
   From Step 3 (Metrik-Analysis 25): trend_prozent before change
   IF after change Agent-Trend falln:
     → \"⚠️ Agent-Trend negative — change has Agenten worsened?\"
  
6. RECOVERY-VERGLEICH:
   From Step 3 (Metrik-Analysis 29): recovery_trend before change
   IF recovery_trend > 0:
     → \"⚠️ Recovery is slower — change has Stability impaired?\"

7. DAUER-VERGLEICH:
   From Step 3 (Metrik-Analysis 31): dauer_trend before change
   IF dauer_trend > +20%:
     → \"⚠️ Randen are longer (+{pct}%) — to muche Analysis?\"
8. SPEICHER-VERGLEICH (OOM/Token):
   From Step 3 (TA 32): OOM-eventse before/after
   IF after Change more OOM → \"⚠️ Change has Memoryproblem verursacht\"
9. MCP-VERGLEICH (Tool-Health):
   From Step 3 (TA 33): MCP-Errors before/after
   IF after Change more MCP-Error → \"⚠️ Change has Tool-Konflikt verursacht\"
10. CONFIG-DRIFT-VERGLEICH:
   From Step 3 (MA 32): config-drift before/after
   IF after Change more Drift → \"⚠️ Change has Config inkonsistent gemacht\"
11. PROMPT-EROSIONS-VERGLEICH:
   From Step 3 (MA 33): Erosions-Score before/after
   IF Score falln → \"⚠️ Change has Prompt-Qualitaet worsened\"
12. BACKUP-BLOAT-VERGLEICH:
   From Step 3 (MA 34): Backup-Number before/after
   IF >5 newe Backups → \"ℹ️ Backup-Bloat: {N} newe Backups\"
  
8. FRAMEWORK-RUN-TEST:
   IF Changes an {workspace}/framework/ vorgenommen were:
     Delegate an MAS entry point
     (workspace={workspace}/framework)
     → Execute COMPLETE Target-RUN:
        MAS → Sub-Agents → Analysis → Result
     → Timeout: 120s
     → EXPECTED:
       - MAS: \"✅ READY\"
       - Planer: \"✅ Plan created\"
       - execution: \"✅ completed\"
       - Result: Signal RESULT
     IF SUCCESSFUL:
       → \"✅ Integrationtest passed — framework runs with Changes\"
     IF FAILED
→ \"🔴 framework-Test failed: {framework_error}\"
             → \"ROLLBACK EMPFOHLEN! (j/N)\"
   ELSE (no Target-Changes):
     → \"ℹ️ No framework-Changes — framework-Test uebersprungen\"

6. GIT-DIFF-SCORE (Code-Quality):
   git -C {workspace} diff HEAD~1 --numstat
   Berechne Score (-10 bis +10):
     added = Sum allr addeden Lines
     deleted = Sum allr deleteden Lines
     score = min(10, deleted - added) / max(1, added) × 5
   IF score < 0: \"⚠️ Code bloated (+{added}/-{deleted}, Score {score}). Quality gesunken.\"
   IF score > 5: \"✅ Code reduziert (+{added}/-{deleted}, Score {score}). Quality improved.\"
   ELSE: \"✅ Code-Quality stable (Score {score}).\"

5. DRIFT-beforeHER (Baseline):
   Delegate to sub_mas-agent-guardian
   (task=CHECK, last_result=<baseline-changes>)
   → Drift-Status before meinen changes save

5. DRIFT-NACHHER (after Patch):
   Delegate to sub_mas-agent-guardian
   (task=CHECK, last_result=<patch-result>)
   → Drift-Status NACH meinen changes save

6. DRIFT-VERGLEICH:
   IF NACHHER more Drifts as beforeHER:
     → \"⚠️ {N} newe Drifts through changes. ROLLBACK? (j/N)\"
   IF NACHHER equal/less Drifts:
     → \"✅ No newen Drifts through changes\"

7. HEALTH-VERGLEICH:
   Delegate to sub_mas-agent-guardian
   (task=HEALTH_REPORT, state_path={workspace}/mas-engineer/.state/guardian.yaml)
   → Health-Score NACH changes vs Baseline
   → If GEFALLEN: \"⚠️ Health gesunken (∅ {before}→{nachher}). ROLLBACK? (j/N)\"

8. ANOMALIE-VERGLEICH:
   Delegate to sub_mas-session-analyst
   (task=ANOMALY_DETECT, workspace={workspace}/framework, days=30)
   → anomalies NACH changes vs Baseline
   → If MEHR: \"⚠️ {N} newe anomalies. ROLLBACK? (j/N)\"

9. DOC-VERGLEICH:
   Delegate to sub_mas-doc-generator
   (task=CHECK, workspace={workspace}, scope=all)
   → Gibt es newe outdatede Docs through meine changes?
   → If JA: \"⚠️ {N} Docs through changes outdated. ROLLBACK? (j/N)\"

10. RECIPE-VERGLEICH:
    Delegate to sub_mas-recipe-manager
    (task=LIST)
    → Gibt es newe Recipe-Inkonsistenzen?
    → If JA: \"⚠️ {N} Recipe-Inkonsistenzen. ROLLBACK? (j/N)\"



6. CONFIG-VERGLEICH (Config-Drift via MA 32):
   From Step 3 (Metrik-Analysis 32): config_drift_score before change
   IF after change config_drift_score > before: ⚠️ \"Config weicht further ab. ROLLBACK? (j/N)\"

7. PROMPT-VERGLEICH (Prompt-Erosion via MA 33):
   From Step 3 (Metrik-Analysis 33): erosions_score before change
   IF after change erosions_score < before: ⚠️ \"Prompt-Quality gesunken. ROLLBACK? (j/N)\"

8. INSTALL-VERGLEICH (Install-Drift via MA 36):
   From Step 3 (Metrik-Analysis 36): install_drift_score before change
   IF after change install_drift_score > before: ⚠️ \"Installation drift. update.sh --mas recommended\"

9. BACKUP-VERGLEICH (Backup-Health via MA 34):
   From Step 3 (Metrik-Analysis 34): backup_score before change
   IF after change backup_score < before: ⚠️ \"Backup-Health gesunken. checkpoint recommended\"
### Edge Cases — STEP 9
- config-auditor: newe ❌ → \"⚠️ {N} newe Inkonsistenzen. ROLLBACK? (j/N)\"
- prompt-engineer: Score GESUNKEN → \"⚠️ Prompt schlechter. ROLLBACK? (j/N)\"
- test-runner: newe FAILURES → \"⚠️ {N} newe Failures. ROLLBACK? (j/N)\"
- guardian CHECK timeout (before) → \"⚠️ No Drift-Baseline — fahre without fort\"
- guardian CHECK timeout (nachher) → \"⚠️ No Drift-Comparison possible\"
- guardian HEALTH_REPORT timeout → \"⚠️ Health-Comparison oversprungen\"
- session-analyst ANOMALY_DETECT timeout → \"⚠️ Anomaly-Comparison oversprungen\"
- doc-generator CHECK timeout → \"⚠️ Doc-Comparison oversprungen\"
- recipe-manager LIST timeout → \"⚠️ Recipe-Comparison oversprungen\"
- User lehnt rollback ab → changes bleiben, Warning documented

```
╔══════════════════════════════════════════════════════════════╗
║  
### Edge Cases
- Vorher-Data not existing → \"⚠️ No Baseline-Comparison — Validation without Vorher/Nachher\"
- All Checks failed → \"❗ System instable — ROLLBACK EMPFOHLEN\"
- Partsrgebnis (manche Checks gehen, manche not) → DEGRADED + was geht
- user lehnt rollback ab → document + furthermachen

