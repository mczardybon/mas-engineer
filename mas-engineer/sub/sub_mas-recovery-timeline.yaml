# sub_mas-recovery-timeline — Time Travel-System

MAS-Engineer-internal. Analyzed ALLE Checkpoints on YAML-Gueltigkeit.
Findt the BESTEN (juengsten validen) Checkpoint automatisch.
Kombineverrt Checkpoint-Data + changes.json + YAML-Health.

## Input
```yaml
timeline_intake:
  signal: ''
  request_id: string
  from: 'dev-mas-engineer'
  to: 'sub_mas-recovery-timeline'
  task: 'FIND_BEST|RESTORE_BEST|SHOW_PATH|ANALYZE'
  workspace: string
```

## Output
```yaml
mas_result:
  signal: ''|''|''
  observations:
    - severity: 'P1'|'P2'|'P3'
      title: string
      description: string
  best_checkpoint: string
  score: int
```

## Task FIND_BEST — Automatisch besten Checkpoint

STEP 1 — All Checkpoints test (juengster zufirst):
  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints
  beste=''
  for d in $(ls -t $checkpoint_dir 2>/dev/null); do
    python3 -c \"import yaml; yaml.safe_load(open('$checkpoint_dir/$d/recipe/dev-mas-engineer.yaml'))\" 2>/dev/null
    if [ $? -eq 0 ]; then
      beste=$d
      break
    fi
  done

STEP 2 — Result:
  if [ -n \"$beste\" ]; then
    label=$(cat $checkpoint_dir/$beste/.label 2>/dev/null || echo 'without Label')
    signal='': 'Bester Checkpoint: $beste — $label'
  else
    signal='': 'No valider Checkpoint — Suche in .backups/'
    # Fallback: Backups search
    for d in $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do
      for f in {workspace}/mas-engineer/.backups/$d/*dev-mas-engineer*; do
        python3 -c \"import yaml; yaml.safe_load(open('$f'))\" 2>/dev/null && echo \"$f\" && break 2
      done
    done
  fi

### Edge Cases FIND_BEST
- No Checkpoints → '' info + Backup-Suche
- All Checkpoints korrupt → '' error + Defib recommended
- checkpoint_dir missing → mkdir + '' info

## Task RESTORE_BEST — Restore

STEP 1 — Besten find (siehe FIND_BEST)
STEP 2 — Restore:
  rm -rf {workspace}/mas-engineer/recipe
  rm -rf {workspace}/mas-engineer/tools
  rm -rf {workspace}/mas-engineer/docs
  cp -r {workspace}/mas-engineer/.state/checkpoints/$beste/recipe {workspace}/mas-engineer/
  cp -r {workspace}/mas-engineer/.state/checkpoints/$beste/tools  {workspace}/mas-engineer/
  cp -r {workspace}/mas-engineer/.state/checkpoints/$beste/docs   {workspace}/mas-engineer/

STEP 3 — Validation + Snapshot:
  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\"
  delegate to sub_mas-recovery-checkpoint (task=SNAPSHOT, label='nach_restore_best')
  signal='': 'Wiederhergestellt on $beste — Neuer Snapshot: nach_restore_best'

### Edge Cases RESTORE_BEST
- No bester Checkpoint → '' error + 'Defib recommended'
- restoration failed → '' error + manual rollback vorschlagen

## Task SHOW_PATH — Du bist here

STEP 1 — Timeline display:
  echo '=== ZEITSTRAHL ==='
  for d in $(ls -t {workspace}/mas-engineer/.state/checkpoints 2>/dev/null); do
    label=$(cat {workspace}/mas-engineer/.state/checkpoints/$d/.label 2>/dev/null || echo '?')
    status=$(python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$d/recipe/dev-mas-engineer.yaml'))\" 2>/dev/null && echo '' || echo '')
    echo '$status $d — $label'
  done

STEP 2 — Current Position:
  current=$(python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\" 2>/dev/null && echo '' || echo '')
  echo '$current AKTUELL (here)'
  if echo \"$current\" | grep -q ''; then
    echo 'Recommendation: recovery --restore-best'
  else
    echo 'System laeuft — Checkpoint for naechste Change recommended'
  fi

## Task ANALYZE — damagesAnalysis

STEP 1 — 7-Fragen-Diagnose:
  Q1: [ -d {workspace} ]                         || echo 'XX Workspace missing'
  Q2: [ -d {workspace}/mas-engineer ]             || echo 'XX MAS missing'
  Q3: [ -f {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml ] || echo 'XX Main-Rezept missing'
  Q4: [ -d {workspace}/mas-engineer/recipe/sub ]  || echo 'XX Sub-Rezepte missing'
  Q5: [ -d {workspace}/mas-engineer/tools ]       || echo 'XX Tools missing'
  Q6: [ -d {workspace}/mas-engineer/.state ]      || echo 'XX State missing'
  Q7: python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\" 2>&1 || echo 'XX Main korrupt'

STEP 2 — Damage Level:
  0 Error: '' — 'No Damage'
  1-3 Error: '' — 'Partkorruption — restore-best'
  4-5 Error: '' — 'Schwerer Damage — resurrect'
  6-7 Error: '' — 'Total Damage — defib + --init'

STEP 3 — Recommendation:
  signal='' or '' or '' je after Damage Level
  'Diagnose: {error}/7 Error — Recommendation: {action}'

  CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on
  NEVER without Confirmation.
  MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/
  NEVER framework import. Read in other Domain OK."
