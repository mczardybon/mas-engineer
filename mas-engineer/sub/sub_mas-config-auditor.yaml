instructions: "⛔ INVENTORY-check:
  → check whether Sub-Agent/Tool/Function already exists
  → Use existing, build ONLY if nothing matching exists
# sub_mas-config-auditor — 📐 Config-Consistency

MAS-ENGINEER-internal. leads 16 Cross-Reference-Checks through.
Findt contradictions between config.yaml, core Docs, Recipes and Runtime.

## Input (from MAS-Engineer)

```yaml
config_auditor_intake:
  signal: \"🟣 HANDOVER\"
  request_id: string
  from: \"dev-mas-engineer\"
  to: \"sub_mas-config-auditor\"
  task: \"CROSS_REF|CHECK_VALUE|CHECK_DRIFT\"
  workspace: \"/path/to/workspace\"
  value: null                      # Only at CHECK_VALUE: z.B. \"hard_cap\"
```

## ⛔ STEP 0 — STRUKTUR ENTDECKEN
Ich entdecke the framework-Structure dynamisch — no hardkodierten Paths.
find {workspace} -name \"config.yaml\" -not -path \"*_framework*\" → CONFIG_PATH
find {workspace} -name \"*.yaml\" -not -path \"*_framework*\" → RECIPE_FILES
find {workspace} -name \"*.md\" → DOC_FILES
All Checks nutzen dynamisch entdeckte Paths — no hardkodierten Assumptions.

## 15 CROSS-REFERENCE CHECKS

### CHECK 1 — Tier-Names
config.yaml `models:` (5 Tiers: fast, balanced, powerful, reasoning, code)
GEGEN: All Recipes `settings:` Fields `goose_model:`
check: Each Recipe-Tier-Name exists in config.yaml

### CHECK 2 — Provider-Consistency
config.yaml `providers.openai.enabled: true`
GEGEN: All Recipes `goose_provider:`
check: All Recipes nutzen `openai` (the einzigen enabled Provider)

### CHECK 3 — mode names
config.yaml `canonical_modes:` (14 Modi)
GEGEN: find {workspace} -name \"*.md\" -path \"*docs*\" | head -10
check: Each Mode-Name in config has Documentation (dynamisch via docs/*.md)

### CHECK 4 — max_parallel_agents ≤ hard_cap
config.yaml `dispatch_control.safe_parallelism.hard_cap: 8`
GEGEN: config.yaml `canonical_modes.*.max_parallel_agents`
check: NO mode has max_parallel_agents > 8

### CHECK 5 — MAS-Sub-Agent-List: config vs Disk
config.yaml `conflict_resolver.MAS-Sub-Agent_priority_order:` (47 Names)
GEGEN: find {workspace} -name \"MAS-Sub-Agent_*.yaml\"
check: 1:1 Match beider Lists

### CHECK 6 — Lane-Zuordnung: each MAS-Sub-Agent in exactly 1 Lane
config.yaml `routing_segmentation.lanes.*.MAS-Sub-Agents`
GEGEN: config.yaml `conflict_resolver.MAS-Sub-Agent_priority_order`
check: Sum the Lane-MAS-Sub-Agents == 47, no MAS-Sub-Agent doppelt

### CHECK 7 — Token-Budgets ≤ Model-Max-Tokens
config.yaml `token_budgets.per_tier.<tier>.max_output`
GEGEN: config.yaml `models.<tier>.max_tokens`
check: max_output + 25% buffer <= max_tokens

### CHECK 8 — context_window vs max_tokens (Semantik-Check)
config.yaml `token_budgets.per_tier.<tier>.context_window`
GEGEN: config.yaml `models.<tier>.max_tokens`
check: context_window > max_tokens is dokumentierbar (differente Semantik)

### CHECK 9 — max_input + max_output ≤ context_window
config.yaml `token_budgets.per_tier.<tier>.max_input + max_output`
GEGEN: config.yaml `token_budgets.per_tier.<tier>.context_window`
check: Sum passt ins Contextfenster

### CHECK 10 — Retry-Status-Consistency
config.yaml `graceful_degradation.retryable_errors:`
GEGEN: config.yaml `adaptive_tier_gate.upward_retry_on_statuses:`
check: No contradictory Status-Codes

### CHECK 11 — Memory-Path-Existenz
config.yaml `memory_scope_index.store_path:` — Path from Config read
GEGEN: Existenz the Paths im Workspace
check: Directory exists or can created are

### CHECK 12 — Docs-References Existenz
config.yaml commente referenceieren core Docs
GEGEN: find {workspace} -name \"<file>.md\"
check: Each referenceierte File exists

### CHECK 13 — Recipe timeout/max_steps Consistency
All 47 MAS-Sub-Agents + 43 Sub-Agents + 4 Main Agenten
check: outliers document (Min=300, Max=6000, Recovery=50)

### CHECK 14 — Slash-Commands: only Main Agents have sie
check: Only /analyze, /plan, /execute, /fw-monitor have slash_command
check: 47 MAS-Sub-Agents and 43 Sub-Agents have NO slash_command

### CHECK 15 — Version-Consistency
config.yaml Header: \"v1.0.0\"
GEGEN: All Rezepte `description:` Field + all core Docs
check: All Files referenceieren equale Version

### CHECK 16 — framework-Governance existing
<workspace>/docs/framework-governance.md
check:
  a) Existiert the File?
  b) contains sie \"Rule 1 — MAS-Maintenance: Python-First\"?
  c) contains sie the Python-First-priority table (⛔ 1: Python-Tools)?
  d) contains sie \"Rule 2 — framework-Agenten: Goose-First\"?
  e) contains sie the Goose-First-priority table (⛔ 1: Goose-Bordmsgtel)?
ERWARTUNG: File exists with BEIDEN Rule-Levels.
FEHLEND: ⚠️ WARNUNG — framework has no Developments-Governance.

