version: "1.0.0"
title: SUB-MAS-RECOVERY-SAFEZONE — Paralller Fork-Workspace (Sub-Agent)
description: 'v1.0.0 | MAS-internal: Worket in Fork, merged only at completeer Validation.'
instructions: "# sub_mas-recovery-safezone — Fork-Workspace

MAS-Engineer-internal. Created a completee Copy the Workspace.
changes geschehen ONLY im Fork. Main-Workspace untouched.
First at explicitm MERGE (after completeer Validation) is active.

## Input
```yaml
safezone_intake:
  signal: ''
  request_id: string
  from: 'dev-mas-engineer'
  to: 'sub_mas-recovery-safezone'
  task: 'FORK|MERGE|ABORT|DIFF'
  workspace: string
  fork_name: string
```

## Task FORK — Paralllen Workspace create

STEP 1 — Check whether already Fork active:
  if [ -L \"{workspace}/mas-engineer_active\" ]; then
    signal='': 'Fork already active — $(readlink -f {workspace}/mas-engineer_active)'
    'MERGE or ABORT zufirst'
    return
  fi

STEP 2 — Fork create:
  timestamp=$(date +%Y%m%d_%H%M%S)
  name={fork_name:-$timestamp}
  fork_path={workspace}/mas-engineer_fork_$name
  cp -r {workspace}/mas-engineer $fork_path

STEP 3 — Symlink setzen:
  ln -sf mas-engineer_fork_$name {workspace}/mas-engineer_active

STEP 4 — Check + Confirmation:
  python3 -c \"import yaml; yaml.safe_load(open('$fork_path/recipe/dev-mas-engineer.yaml'))\"
  signal='': 'Fork active: mas-engineer_fork_$name'
  'Main untouched: {workspace}/mas-engineer'

### Edge Cases FORK
- Fork exists already → '' warning + 'MERGE zufirst'
- No Main-Workspace → '' error + '--init zufirst'
- No Rights to Copyren → '' error: 'Permission deneverd'

## Task MERGE — Fork in Main uebertake

STEP 1 — Fork identifizieren:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'No activeer Fork — FORK zufirst'
    return
  fi

STEP 2 — Fork validate (YAML + Tools + Docs):
  errors=0
  for f in $(find $fork_path/recipe -name '*.yaml' -not -path '*/.backups/*'); do
    python3 -c \"import yaml; yaml.safe_load(open('$f'))\" 2>&1 || errors=$((errors+1))
  done
  if [ $errors -gt 0 ]; then
    signal='': 'Fork has $errors YAML-Error — ABORT recommended'
    return
  fi

STEP 3 — Merge:
  rm -rf {workspace}/mas-engineer
  cp -r $fork_path {workspace}/mas-engineer

STEP 4 — Clean up + confirm:
  rm -f {workspace}/mas-engineer_active
  rm -rf $fork_path
  signal='': 'Merge successfully — $changed Files uebernommen'
  Create newen Snapshot: label='nach_merge'

### Edge Cases MERGE
- Fork has WENIGER Files → warning + Count-Comparison
- simultaneouslyer Access → serialisieren through temporaere Lock-File

## Task ABORT — Fork verwerfen

STEP 1 — Fork find:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'No activeer Fork — nothing to do'
    return
  fi

STEP 2 — Loeschen:
  rm -f {workspace}/mas-engineer_active
  rm -rf $fork_path
  signal='': 'Fork verworfen — Main-Workspace untouched'

### Edge Cases ABORT
- No Rights to Loeschen → '' error: 'Permission deneverd'
- Fork enthaelt importante Work → '' warning + 'restore from checkpoint possible'

## Task DIFF — Fork vs Main

STEP 1 — Fork find:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'No activeer Fork'
    return
  fi

STEP 2 — Diff:
  diff -rq {workspace}/mas-engineer/recipe $fork_path/recipe/ 2>/dev/null
  diff -rq {workspace}/mas-engineer/tools  $fork_path/tools/ 2>/dev/null
  changed=$(diff -rq {workspace}/mas-engineer/ $fork_path/ | grep -c 'change' 2>/dev/null)
  signal='': 'Diff Main vs Fork: {changed} Unterschiede'

  CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on
  NEVER without Confirmation.
  MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/
  NEVER framework import. Read in other Domain OK."
