version: "1.0.0"
title: SUB-MAS-RECOVERY-CHECKPOINT — Git-like Snapshots (Sub-agent)
description: 'v1.0.0 | MAS-internal: Created Snapshots before each Change. Erpossiblet precise positioning.'
instructions: "⛔ INVENTORY-check:
  → check whether Sub-Agent/Tool/Function already exists
  → Use existing, build ONLY if nothing matching exists
# sub_mas-recovery-checkpoint — Snapshot-System

MAS-Engineer-internal. Created komplette Workspace-Snapshots before Changes.
Memoryt recipe/ + tools/ + docs/ + state/ in .state/checkpoints/{timestamp}/.
Erpossiblet: \"Position State from before 3 Stepsn again her.\"

## Input
```yaml
checkpoint_intake:
  signal: ''
  request_id: string
  from: 'dev-mas-engineer'
  to: 'sub_mas-recovery-checkpoint'
  task: 'SNAPSHOT|LIST|RESTORE|DIFF'
  workspace: string
  label: string
  id: int
```


## Procedure AUTO_COMMIT — Automatisch after each change
1. git add -A && git commsg -m \"[MAS] {action}\"
2. checkpoint .state/checkpoints/{ts}/
3. changes.json + {timestamp, action}
4. todo__todoWwrite(\"✅ {action}\")
## Output
```yaml
mas_result:
  signal: ''|''|''
  observations:
    - severity: 'P3'
      title: 'Checkpoint {id}: {label}'
      description: '{N} Files, {size}, {timestamp}'
```

## Task SNAPSHOT — State sichern

STEP 1 — Timestamp + Directory:
  timestamp=$(date +%Y%m%d_%H%M%S)
  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints/$timestamp
  mkdir -p $checkpoint_dir

STEP 2 — Backup the 4 Kernbereiche:
  cp -r {workspace}/mas-engineer/recipe $checkpoint_dir/
  cp -r {workspace}/mas-engineer/tools  $checkpoint_dir/
  cp -r {workspace}/mas-engineer/docs   $checkpoint_dir/
  cp {workspace}/mas-engineer/.state/changes.json       $checkpoint_dir/ 2>/dev/null || true
  cp {workspace}/mas-engineer/.state/best-practices.yaml $checkpoint_dir/ 2>/dev/null || true

STEP 3 — Metadaten writen:
  echo '{label}' > $checkpoint_dir/.label
  echo $(find $checkpoint_dir -type f | wc -l) > $checkpoint_dir/.file_count
  du -sh $checkpoint_dir/ | cut -f1 > $checkpoint_dir/.size
  date -Iseconds > $checkpoint_dir/.created

STEP 4 — Confirmation:
  signal=''
  'Checkpoint $timestamp created: {label}, $(cat $checkpoint_dir/.file_count) Files, $(cat $checkpoint_dir/.size)'

### Edge Cases SNAPSHOT
- No recipe/ existing → warning + only tools+docs+state sichern
- Schreibrights missing → signal='' error: 'Permission deneverd on {dir}'
- Disk voll (OSError) → signal='' error: 'No Memoryplatz — Checkpoint not created'
- Label >80 characters → on 80 kuerzen

## Task LIST — last 10 Checkpoints

STEP 1 — Check Existenz:
  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints
  if [ ! -d \"$checkpoint_dir\" ] || [ -z \"$(ls -A $checkpoint_dir 2>/dev/null)\" ]; then
    signal='': 'No Checkpoints existing — Create firsten with SNAPSHOT'
    return
  fi

STEP 2 — Formatierte List:
  echo '=== LETZTE 10 CHECKPOINTS ==='
  echo ' #  Timestamp          Label                        Files  Groesse'
  ls -t $checkpoint_dir | head -10 | while read d; do
    label=$(cat $checkpoint_dir/$d/.label 2>/dev/null || echo '?')
    files=$(cat $checkpoint_dir/$d/.file_count 2>/dev/null || echo '?')
    size=$(cat $checkpoint_dir/$d/.size 2>/dev/null || echo '?')
    echo \"  $d  $label  ${files}  ${size}\"
  done

### Edge Cases LIST
- No checkpoints/-Directory → 'INFO: No Checkpoints'
- Kaputtes .label or .size → '?' display + nevertheless auflistn

## Task RESTORE — Checkpoint restore

STEP 1 — Checkpoint identifizieren:
  target=$(ls -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{id}p')
  if [ -z \"$target\" ]; then
    signal='': 'Checkpoint #{id} not gefanden'
    return
  fi

STEP 2 — YAML-Check:
  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$target/recipe/dev-mas-engineer.yaml'))\"
  if [ $? -ne 0 ]; then
    signal='': 'Checkpoint #{id} has YAML-Error'
    return
  fi

STEP 3 — Restore:
  rm -rf {workspace}/mas-engineer/recipe
  rm -rf {workspace}/mas-engineer/tools
  rm -rf {workspace}/mas-engineer/docs
  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/recipe {workspace}/mas-engineer/
  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/tools  {workspace}/mas-engineer/
  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/docs   {workspace}/mas-engineer/

STEP 4 — completion:
  signal='': 'Checkpoint #{id} ($target) againhergestellt'
  Create newen Snapshot: task=SNAPSHOT, label='nach_restore_$target'

### Edge Cases RESTORE
- id=0 → 'ID 0 unvalid — firste ID is 1'
- Checkpoint uncomplete → signal='': 'Checkpoint uncomplete — recipe/ missing'
- simultaneouslyer Access → temporaere Files nutzen

## Task DIFF — Unterschied between Checkpoints

STEP 1 — IDs aufloesen:
  from_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{from_id}p')
  to_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{to_id}p')

STEP 2 — Comparisonen:
  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/recipe/ {workspace}/mas-engineer/.state/checkpoints/$to_cp/recipe/
  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/tools/  {workspace}/mas-engineer/.state/checkpoints/$to_cp/tools/

STEP 3 — Summary:
  changed=$(diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/ {workspace}/mas-engineer/.state/checkpoints/$to_cp/ | grep -c 'change')
  signal='': 'Diff {from_id}..{to_id}: {changed} Changes'

### Edge Cases DIFF
- IDs equal → 'INFO: same Checkpoint — no Diff'
- from_id > to_id → automatisch tauschen

  CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on
  NEVER without Confirmation.
  MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/
  NEVER framework import. Read in other Domain OK."
