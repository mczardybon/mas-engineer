—📖 SYSTEM-HEALTH (3 newe Analysis)—

📖 Depthn-Analysis 32 — SPEICHER-HEALTH (via dev_goose_db.py + guardian):
  1. dev_goose_db.py --anomalies: duration > 3sigma detect
  2. CHECK: guardian.yaml on OOM/MemoryError Eintraege
  3. CHECK: grep MemoryError session_log 2>/dev/null
  4. BERECHNE: Token-Trend (cost/session over the last 10 sessions)
  → Findings: Type CC1 (OOM), CC2 (max_turns), CC3 (Timeout), CC4 (Token)

📖 Depthn-Analysis 33 — MCP/TOOL-HEALTH (via Session-DB Messages):
  1. dev_goose_db.py: messages with error or not foand or MCP
  2. CHECK: Haeufigkeit the Error (>3 equale Error = Pattern)
  3. CHECK: Tool-Name extrahieren (regex: tool.*failed or extension.*error)
  → Findings: Type DD1-DD4 (Tool/Plugin/Extension/Syntax-Error)

📖 Depthn-Analysis 34 — SESSION-KORRUPTION (via sqlite3 direkt):
  1. python3 -c \"import sqlite3; sqlite3.connect('~/.local/share/goose/sessions/sessions.db').execute('SELECT 1')\"
  2. CHECK: Exit-Code = 0? → DB OK
  3. CHECK: SELECT count(*) FROM sessions → > 0?
  4. IF Error: chmod + Backup from changes.json
  → Findings: Type EE1 (readonly), EE2 (table), EE3 (corrupt), EE4 (empty)
  
—📊 METRIK-ANALYSEN (newe Qualitysmetriken)—

📊 Metrik-Analysis 21 — AGENT-KALIBRIERUNG (via Session-DB + Settings):
  For EVERYN the 14 Sub-Agents:
    1. From Session-DB: ∅ Turns pro Delegation, ∅ Duration pro Delegation
    2. From Settings: max_steps, timeout
    3. BERECHNE: Auslasdog_steps = ∅ Turns / max_steps
                Auslasdog_timeout = ∅ Duration / timeout
    4. KLASSIFIZIERE:
       Auslasdog < 20% → \"⚠️ overdimensioneverrt — max_steps/timeout um 50% senken\" → Q1
       Auslasdog 20-80% → \"✅ Gut eingestellt\" → Q3
       Auslasdog > 80% → \"⚠️ Tightly sized — max_steps/timeout um 50% increase\" → Q2
       Auslasdog > 100% → \"🔴 regularly cancelled — max_steps verdoppeln\" → Q2
    5. Trend: Verbessert sich the Calibration about the last 10 Sessions?
  → Findings: Type Q1 (overdimensioneverrt), Q2 (knapp), Q3 (optimal)

📊 Metrik-Analysis 22 — GIT-DIFF-Quality (via git diff):
  1. git -C {workspace} diff HEAD~1 --stat →  changed Files
  2. git -C {workspace} diff HEAD~1 --numstat → added/deleted Lines pro File
  3. for EVERY changed File:
     a) Type detect: .yaml (Recipe), .py (Tool), .md (Doc), .sh (Shell)
     b) Lines-Bilanz: added - deleted (negative = Code reduziert ✅)
     c) ⛔-Rules gecounts: grep \"⛔\" before/nachher
     d) prompt-length: if prompt:-Block changed, length compare
  4. GESAMT-SCORE (-10 bis +10):
     +2 Code reduziert (more deleted as added)
     +2 ⛔-Rules vermehrt
     +1 Prompt shortened
     -2 Code bloated (more added as deleted)
     -2 Neue File added (Complexity)
  5. Trend: last 10 changes → Verbessert sich the Score?
  → Findings: Type R1-R5

📊 Metrik-Analysis 23 — AGENT-RANKING (via Session-DB + Guardian + Prompt):
  For EVERYN the 14 Sub-Agents:
    1. Successsrate = (calls - failures - timeouts) / calls  (from Session-DB/dev_goose_db)
    2. Efficiency-Score = Successsrate × min(1, max_steps / ∅ Turns) × (1 / (∅ Costs + 0.01))
    3. Quality-Score = Guardian-Health-Score × Prompt-Engineer-Score / 100
    4. Gesamt = Efficiency × 0.4 + Quality × 0.6
    5. RANKING: sortiert abincreased after Gesamt
    6. for DEN SCHLECHTESTEN: Improvementsvorschlag generate
       → Type S1 (lowster Score)
    7. for strongest GEFALLENEN: Comparison with lastm Ranking
       → Type S2 (Score falln)
  → Findings: Type S1 (lowster), S2 (falln)

—📊 WEITERE METRIKEN (5 newe Analysis)—

📊 Metrik-Analysis 24 — SESSION-CONTENT-Quality (via User-Messages):
  For EVERY MAS-Session from Step 2:
    1. last 3 User-Messages analyzen via grep:
       positiveee: \"ja\", \"further\", \"ok\", \"thanks toe\", \"mach further\", \"continue\", \"gut\"
       negativeee: \"nein\", \"wrong\", \"not\", \"stopp\", \"halt\", \"vergessen\"
       Nachfragen: \"was?\", \"like?\", \"clarify\", \"again\", \"warum\", \"exactlyer\"
    2. count: positivee, negativee, nachfragen
    3. BERECHNE:
       negative_quote = negativee / (positivee + negativee + nachfragen) × 100
       nachfragen_quote = nachfragen / (positivee + negativee + nachfragen) × 100
    4. KLASSIFIZIERE:
       negative_quote > 20% → \"⚠️ {N}% negativee Answers — Communication worsened\" → T1
       nachfragen_quote > 10% → \"⚠️ {N}% Nachfragen — Answers unclear\" → T2
       negative_quote < 10% UND nachfragen_quote < 5% → \"✅ Gute User-Stimmung\" → T3
    5. Trend: Verbessert sich the Stimmung about the last 10 Sessions?
  → Findings: Type T1 (negative), T2 (Nachfragen), T3 (positive)

📊 Metrik-Analysis 25 — ERFOLGSRATE-TREND (via Session-DB about Time):
  For EVERYN the 14 Sub-Agents:
    1. Sessions after Date gruppieren (weekly, last 5 Weekn)
    2. Pro Week: successe = count success, total = count calls
    3. BERECHNE Trend: (∅ last 2 Weekn) - (∅ firste 2 Weekn)
    4. KLASSIFIZIERE:
       trend > +5% → \"✅ {agent} is besser (∅ {before}% → {nachher}%)\" → U2
       trend < -5% → \"⚠️ {agent} is schlechter (∅ {before}% → {nachher}%)\" → U1
       otherwise → \"ℹ️ {agent} stable ({current}%)\" → U3
    5. IF U1: check whether in the last 5 Weekn a prompt/settings-Change instead offand
  → Findings: Type U1 (fallnd), U2 (increased), U3 (stable)

📊 Metrik-Analysis 26 — TEST-COVERAGE (via tests/-Directory):
  1. ls {workspace}/tests/ → Test-Files
  2. For EVERYS dev_*.py Tool in {tools_dir}:
     a) toole_name = basename without .py (z.B. \"dev_observer\")
     b) grep -c \"{tool_name}\" {workspace}/tests/*.py 2>/dev/null
     c) IF 0 → \"🔴 No Test for {tool_name}\" → V1
     d) IF 1-2 → \"⚠️ Only {N} Tests for {tool_name}\" → V2
     e) IF 3+ → \"✅ {tool_name} gut getestet ({N} Tests)\" → V3
  3. Instotal: X/Y Tools getestet (X%)
  → Findings: Type V1 (no Test), V2 (low), V3 (voll)

📊 Metrik-Analysis 27 — GOOSE-Compatibility (via goose --version + goose-docs.ai):
  1. WELCHE Version runs?
     python3 -c \"import subprocess; print(subprocess.run(['goose', '--version'], capture_output=True, text=True).stdout.strip())\" 2>/dev/null
     → If Error: \"⚠️ Goose not gefanden — Path check\"
  2. WELCHE Version is current?
     https://goose-docs.ai → Startseite → after \"latest version\" suchen
  3. VERGLEICH:
     current == latest → \"✅ MAS runs on currentster Goose-Version ({current})\" → W3
     current < latest → \"⚠️ Goose {current} — latest is {latest}. Upgrade?\" → W1
  4. IF W1: check changelog on Breaking Changes:
     https://goose-docs.ai/docs/changelog → after \"breaking\" suchen
     IF Breaking Changes the MAS betreffen:
       → \"🔴 Breaking Changes gefanden ({N}). Migration plan.\" → W2
     ELSE:
       → \"ℹ️ No Breaking Changes — Upgrade sicher.\"
  → Findings: Type W1 (Update), W2 (Breaking), W3 (current)

📊 Metrik-Analysis 28 — change-HISTORIE-AUDIT (via changes.json vs git log):
  1. cat {workspace}/mas-engineer/.state/changes.json 2>/dev/null
  2. git -C {workspace} log --oneline -30 → last 30 commsgs
  3. VERGLEICH:
     a) count changes.json-entries: change_count
     b) count git-commsgs with MAS-changes: mas_commsg_count
     (MAS-changes = path contains \"mas-engineer/\")
     c) gap = mas_commsg_count - change_count
  4. BERECHNE:
     gap / mas_commsg_count × 100 = missinge_doku_prozent
  5. KLASSIFIZIERE:
     missinge_doku_prozent > 20% → \"⚠️ {N}% the MAS-changes not documented\" → X1
     otherwise → \"✅ {N}% allr MAS-changes documented\" → X3
     (gap abs > 5 → X1)
  6. TYPEN-VERTEILUNG (only at changes.json existing):
     gruppiere after type (patch, prompt, settings, instructions, docs)
     type_max = frequentster, type_min = raremainderer
     IF type_max / (type_max + type_min) > 0.7:
       → \"ℹ️ {type_max} domineverrt ({type_max}%) — {type_min} neglected\" → X2
  → Findings: Type X1 (missinge Doku), X2 (unausgewogen), X3 (complete)



📊 Metrik-Analysis 29 — REGEL-KONFIGURATION (via cat .state/rules/):
  IF mode == mas:
    PATH = .state/rules/harde_rulen.yaml
  IF mode == generic:
    PATH = .state/rules/rulen.yaml
  1. cat {path} 2>/dev/null -> Rules load
  2. CHECK:
     a) Gibt es User-defineverrte Rules?
     b) Haerte-Levels verteilt? (to muche 5er?)
     c) Referenceieren blocked_files existde Files?
  3. RECOMMENDATION:
     IF Rules missing: No User-Rules - Template in rules/
     IF >5 blocked_files: To muche geschuetzte Files
  -> Findings: REGEL_FEHLT, REGEL_KONFLIKT, REGEL_BLOAT

### Edge Cases — STEP 3 (Depthn-Analysis + Metriken)
- Sub-Agent-YAML missing → \"⚠️ {file} exists not\"
- dev-mas-engineer.yaml missing → \"❌ Main-Recipe not gefanden\"
- tools/ Directory empty → \"⚠️ No Tools gefanden\"
- tools/ dev_*.py Syntax-Error → \"🔴 {file} has Syntax-Error\"
- tools/ dev_*.sh Syntax-Error → \"🔴 {file} has Bash-Syntax-Error\"
- No .md Docs → \"⚠️ No MAS-Documentation\"
- guardian.yaml missing or empty → \"ℹ️ Guardian-State still not active\"
- cat on a File dauert >10s (to gross) → \"⚠️ {file} to gross — overspringe\"
- cat scheitert (missinge permission) → \"⚠️ {file} not lesbar\"
- Analysis 16-20 >5min total → ⚠️ \"Only {N} from 5 Depthn-Analysis completed\"
- No Session-Data for Calibration (newer Agent?) → \"ℹ️ Agent {name} has still no Sessions — Calibration oversprungen\"
- max_steps in Settings not gefanden → \"⚠️ {file} has no max_steps — overspringen\"
- timeout in Settings not gefanden → \"⚠️ {file} has no timeout — overspringen\"
- Git-Diff fails fehl (< 2 commsgs) → \"ℹ️ Only 1 commsg — Git-Diff-Analysis oversprungen\"
- git diff HEAD~1 liefert nothing → \"ℹ️ No changes seit lastm commsg\"
- Dev_goose_db.py has no Turn-Data → \"ℹ️ No Turn-Data — Calibration without ∅ Turns\"
- Dev_goose_db.py has no Costs-Data → \"ℹ️ No Costs-Data — Ranking without Costs-Faktor\"
- Guardian-Health not available → \"ℹ️ Guardian-Health missing — Ranking without Health\"
- Prompt-Scores not available → \"ℹ️ Prompt-Scores missing — Ranking without Quality\"
- Metrik-Analysis 21-23 >3min total → ⚠️ \"Only {N} from 3 Metrik-Analysis completed\"
- No MAS-Sessions → \"⚠️ No Sessions — Sentiment-Analysis (24) oversprungen\"
- Only 1 Session → \"ℹ️ Only 1 Session — Trend-Analysis (25) oversprungen (bralsot ≥2)\"
- No changes.json → \"ℹ️ No changes.json — Historie-Audit (28) oversprungen\"
- Git-Log empty → \"ℹ️ No Git-History — change-Historie (28) oversprungen\"
- goose --version error → \"⚠️ Goose not gefanden — compatibility-Analysis (27) oversprungen\"
- goose-docs.ai not erreichbar → \"⚠️ goose-docs.ai offline — Compatibility without Online-Check\"
- No tests/-Directory → \"ℹ️ No Tests — Coverage-Analysis (26) oversprungen\"
- No entries in changes.json (empty) → \"ℹ️ No Changes — Typees-Verteilung (X2) not possible\"
- Metrik-Analysis 24-28 >5min total → ⚠️ \"Only {N} from 5 newen Metrik-Analysis completed\"
- All 5 newen Metriken failed → ⚠️ \"Only Kern + Depthn-Analysis available\"
- TA 32-34 (System-Health) >3min total → \"⚠️ Only {N} from 3 System-Analysis completed\"
- MA 32-39 (System-Metriken) >5min total → \"⚠️ Only {N} from 8 System-Metriken completed\"
- Type CC-JJ Findings gefanden → Neue Errorclassn in Optimizationsplan auftake

—📊 WEITERE METRIKEN (3 newe Analysis)—

📊 Metrik-Analysis 29 — RECOVERY-EFFIZIENZ (via Session-DB + Guardian):
  1. In Session-DB after \"guardian\" or \"retry\" in the Messages suchen
  2. For EVERYS Errorevent (erkennbar an 🔴 ERROR or ⏱️ TIMEOUT):
     a) Timepunkt the Errors (timestamp from Session-DB)
     b) Timepunkt the next successfullyen Session the equalen Agenten
     c) Duration = recovery - failure (in Sekanden)
     d) Number Error the Agenten in the last 24h
  3. TREND-BERECHNUNG:
     last_5_∅ = ∅ the last 5 Recovery-Durationn
     before_5_∅ = ∅ the 5 before
     trend = last_5_∅ - before_5_∅ (negative = schneller ✅)
  4. KLASSIFIZIERE:
     trend < 0 → \"✅ Recovery schneller (∅ {before}s → {last}s)\" → Y2
     trend > 0 → \"⚠️ Recovery slower (∅ {before}s → {last}s)\" → Y1
     to few Data → \"ℹ️ Weniger as 3 Recovery-eventse — no Trend\"
  → Findings: Type Y1 (slower), Y2 (schneller)

📊 Metrik-Analysis 30 — PROMPT-CHURN (via changes.json + git log):
  1. cat {workspace}/mas-engineer/.state/changes.json 2>/dev/null
  2. For EVERY changes.json with type in [prompt, instructions]:
     a) Wann was sie gemacht? (timestamp extrahieren)
     b) Welche File? (file extrahieren)
     c) Only last 30 Days betrachten
  3. PRO DATEI: Number changes count
  4. KLASSIFIZIERE:
     changes per file > 5 → \"⚠️ {file}: {N}× in 30 Daysn — to much Churn!\" → Z1
     3 <= changes per file <= 5 → \"ℹ️ {file}: {N}× in 30 Daysn — moderat\"
     changes per file < 3 → \"✅ {file}: stable ({N}× in 30 Daysn)\" → Z2
  5. IF Z1: \"Stabilisiere {file} — in the next 30 Daysn no Prompt-changes\"

📊 Metrik-Analysis 31 — DAUER-beforeHERSAGE (via Session-DB):
  1. From Session-DB: Find Sessions with \"FULL_IMPROVEMENT\" im Names
  2. For EVERY this Sessions: duration_sec = closed_at - created_at (from DB)
  3. BERECHNE:
     avg_dauer = ∅ allr duration_sec
     min_dauer = minimum
     max_dauer = maximum
     last_5 = ∅ the last 5
     before_5 = ∅ the 5 before
  4. PROGNOSE:
     \"⏱ estimated runtime: ∅ {avg}s (min {min}s, max {max}s)\"
  5. TREND:
     last_5 / before_5 > 1.2 → \"⚠️ Randen are longer (+{pct}%)\" → AA1
     last_5 / before_5 < 0.8 → \"✅ Randen are shorter (-{pct}%)\" → AA2
     otherwise → \"ℹ️ Randen stable ({pct}% Deviation)\"
  → Findings: Type AA1 (longer), AA2 (shorter)

—📊 SYSTEM-HEALTH-METRIKEN (8 newe Analysis)—

📊 Metrik-Analysis 32 — CONFIG-DRIFT (via diff sub/ vs best-practices.yaml):
  1. FOR EVERYN the 19 Sub-Agents:
     a) grep timeout settings/$agent.yaml vs best-practices.yaml
     b) grep max_steps settings/$agent.yaml vs best-practices.yaml
     c) grep goose_provider settings/$agent.yaml vs best-practices.yaml
  2. BERECHNE: Deviations-Quote = abweichend / total * 100
  → Findings: Type FF1 (timeout), FF2 (max_steps), FF3 (provider), FF4 (model)

📊 Metrik-Analysis 33 — PROMPT-EROSION (via grep on sub/*.yaml):
  1. FOR EVERYN the 19 Sub-Agents:
     a) prompt has ⛔? → grep \"⛔\"
     b) prompt has (v1.0.0)? → grep v1\\.0\\.0
     c) prompt has Emoji? → grep -P [🌀-🧿]
     d) prompt-Laenge < 100 characters?
     e) instructions > 2000 characters?
  2. BERECHNE: Erosions-Score = 100 - (missing / total * 100)
  → Findings: Type GG1-GG5 (Boandary/Version/Emoji/Laenge/Ueberladung)

📊 Metrik-Analysis 34 — BACKUP-BLOAT (via find):
  1. find .backups -type d | wc -l
  2. find recipe/sub -name \"*.bak*\" | wc -l
  3. CHECK: changes.json last backup-entry < 7 Days?
  4. find .state/checkpoints -type d | wc -l > 10?
  → Findings: Type HH1 (dirs), HH2 (bak-Flut), HH3 (no-backup), HH4 (old)

📊 Metrik-Analysis 36 — INSTALLATIONS-DRIFT (via diff workspace vs goose):
  1. diff -rq recipe ~/.config/goose/recipes/dev-mas-engineer
  2. diff -rq recipe/sub ~/.config/goose/recipes/sub/ | grep -v .bak
  3. diff -rq tools ~/.config/goose/recipes/mas-engineer-tools/
  4. diff -rq docs ~/.config/goose/docs/mas-engineer/
  → Findings: Type JJ1 (YAML), JJ2 (Subs), JJ3 (Tools), JJ4 (Docs)

📊 Metrik-Analysis 37 — SPEICHER-TREND (via dev_goose_db.py):
  1. dev_goose_db.py --costs: ∅ Costs pro Session (last 10)
  2. BERECHNE: Steigung (linear regression) the Costs
  3. IF Steigung > 0.05: \"⚠️ Token-Verbralso steigt\"
  → Findings: Type CC4 (Token increased)

📊 Metrik-Analysis 38 — SESSION-ANOMALIE-RATE (via guardian):
  1. From guardian.yaml: failure_count / total_calls * 100
  2. From guardian.yaml: loop_count (last 10 Sessions)
  3. BERECHNE: Anomaly-Quote = (failures + loops) / calls
  → Findings: Type CC1 (failures >10%), CC3 (loops >0)

📊 Metrik-Analysis 39 — SUB-AGENT-ENDPUNKT-VALIDIERUNG (via check sub_recipes):
  1. FOR EVERYN entry in sub_recipes:
     a) Existiert the YAML-File?
     b) YAML-Syntax valid?
     c) name stimmt with filename?
  2. CHECK: Each entry has description + path?
  → Findings: Type O2 (tote Reference)
  
