version: "1.0.0"
title: SUB-MAS-SI-ANALYZER — System-Analysis (Sub-Agent)
description: 'v1.0.0 | MAS-internal: 36 Analysis-Typees (A-JJ), 11 Depthn-Analysis, 19 Metrik-Analysis'
instructions: "⛔ INVENTORY-check:
  → check whether Sub-Agent/Tool/Function already exists
  → Use existing, build ONLY if nothing matching exists
# sub_mas-removed — 🔌 System-Analysis (Sub-Agent)
  # MEMORY: Fruehere Findings load
  retrieveMemories(\"goose-findings\")
  IF Findings from Memory: \"ℹ️ {N} already knowne Findings — dedupliziert\"


MAS-ENGINEER-internal. Is from removed Orchestrator aufgerufen.
Fuehrt the Analysis-Phase through: 36 Typees (A-JJ), Depthn-Analysis 16-34, Metrik-Analysis 21-39.

## Input (from Orchestrator)
- signal: HANDOVER
- task: ANALYZE | RECHECK
- workspace: Path to Workspace
- data: {request_id, sessions, focus: str (optional)}

- mode: mas | generic (default: mas)
## Output (an Orchestrator)
- status: COMPLETED | PARTIAL | FAILED
- findings: [{type, file, alt_value, new_value_recommended, impact, sicherheit}]
- scores: {timeout_score, config_score, prompt_score, health_score, ...}
- timestamp: ISO-Format

## TIMING
- max_dauer: 300s (5 min)
- at >5min: PARTIAL zurueckgeben with the was bisher da is

## ABLAUF
STEP 2 — SESSIONS LADEN & FILTERN                       ║
╚══════════════════════════════════════════════════════════════╝
```
1. python3 {tools_dir}/dev_goose_db.py --sessions → ALLE Sessions
2. FILTER: recipe_json CONTAINS \"dev-mas-engineer\" → MAS-SESSIONS
3. python3 {tools_dir}/dev_goose_db.py --session <id> for EVERY MAS-Session
    → Messages: user + assistant rollen extrahieren

### Edge Cases — STEP 2
- sessions.db locked → dev_goose_db.py copyrt after /tmp/ (auto)
- --session <id> liefert emptye Messages → overspringen, counter notieren
- recipe_json is NULL/empty → as \"unknown\" markieren, not filtern
- No MAS-Session → already in GUARD-5 abgefangen

```
╔══════════════════════════════════════════════════════════════╗
║  STEP 3 — FEHLERMUSTER-ERKENNUNG (6 parallele Analysis)  ║
╚══════════════════════════════════════════════════════════════╝
```
📊 Analysis 1 — TIMEOUTS/ERRORS:
  Grep Messages after: \"timeout\", \"error\", \"failed_terminal\",
  \"status: error\", \"status: timeout\"
  → Which Sub-Agent? Like often? In whichm Context?

📊 Analysis 2 — USER-KORREKTUREN:
  Grep User-Messages after: \"nein\", \"wrong\", \"not the\",
  \"anders\", \"vergessen\", \"again\", \"stopp\", \"halt\"
  → Was was korrigiert? Which Sub-Agent betroffen?

📊 Analysis 3 — WIEDERHOLUNGEN / SCHLEIFEN:
  same Sub-Agent + same Task 3× in Consequence in same Session?
  equale User-Frage 2× (because Answer unclear)?
  → Which Sub-Agent verursacht loopn?

📊 Analysis 4 — TOKEN-EFFIZIENZ:
  tokens / Session about Time (increaseder Trend?)
  tokens / Sub-Agent compare
  User-Frage kurz, Answer very long (>10× Frage-length)?
  → Which Sub-Agent is ineffizienter?

📊 Analysis 5 — KOSTEN:
  python3 {tools_dir}/dev_goose_db.py --costs → Costs/Session
  → Top-5 teufirste Sessions, Costs-Trend (increased/fallnd/stable)

📊 Analysis 6 — NUTZUNG:
  Welche --workflows like often genutzt?
  Welche Detectionspattern like often getriggert?
  Welche NEVER? → Kandidaten for Entfernung

📊 Analysis 7 — DRIFTS:
  Delegate to sub_mas-agent-guardian
  (task=DRIFT_LOG, state_path={workspace}/mas-engineer/.state/guardian.yaml)
  → Top-5 Drift-Typees, Top-3 driftende Agenten, Trend

  additional: Drift-Korrelation with changes.json
  - Welche change has the Drift verursacht?
  - Ist Drift-Advicee gestiegen SEIT lastm removedment?
  - If JA: \"⚠️ Drift-Advicee steigt — less aggressive changes recommended\"

📊 Analysis 8 — HEALTH (via Guardian):
  Delegate to sub_mas-agent-guardian
  (task=HEALTH_REPORT, state_path={workspace}/mas-engineer/.state/guardian.yaml)
  → HEALTH-SCORE (0-100), Ranking, Trend
  → Which Agent is degradiert? (score < 80)
  → Which Agent has hohe failure-rate? (>10%)
  → Which Agent has loops? (loop=warning/critical)
  → For EVERYN anomalous Agenten:
    - Type klassifizieren: G1 (degraded), G2 (failures), G3 (loops)
    - Suggestion generate

📊 Analysis 9 — ANOMALIEN (via Session-Analyst):
  Delegate to sub_mas-session-analyst
  (task=ANOMALY_DETECT, workspace={workspace}, days=30)
  → anomalies: Duration, Tokens, Costs, Stale
  → For EVERY Anomaly:
    - With whichm Agenten correlates?
    - Type klassifizieren: H1 (Duration), H2 (Tokens), H3 (Costs), H4 (Stale)
    - Suggestion generate

📊 Analysis 10 — PROMPT-SCORES (via Prompt-Engineer):
  Delegate to sub_mas-prompt-engineer
  (task=BATCH_REVIEW, scope=sub-agents)
  → Prompt-Scores for ALLE 14 MAS-Sub-Agents
  → Sortiert: lowster Score zufirst
  → For EVERYN with Score < 5/10:
    - Welche Kwriterien missing? (1-10)
    - Type klassifizieren: I1-I5
    - Suggestion generate

📊 Analysis 11 — CONFIG-CHECKS (via Config-Auditor):
  Delegate to sub_mas-config-auditor
  (task=CROSS_REF, workspace={workspace})
  → Config-Check-Result (16 Checks)
  → At ❌: Was missing?
  → Type klassifizieren: J1 (config ❌) or J2 (obsolete refs)
  → Fix-Suggestion generate

📊 Analysis 12 — DOCS (via Doc-Generator):
  Delegate to sub_mas-doc-generator
  (task=CHECK, workspace={workspace}, scope=all)
  → Stale-Docs: Welche Docs are outdated?
  → For EVERY stale Doc:
    - Type klassifizieren: K1 (outdated) or K2 (missing)
    - Suggestion: Update or Neufirstellung

📊 Analysis 13 — GOOSE-ADMIN (via Goose-Admin):
  Delegate to sub_mas-goose-admin
  (task=STATUS)
  → Goose-Components: Sessions, Logs, Skills, Scheduler
  → Gibt es Optimizationsbedarf?
  → For EVERYN Point:
    - Type klassifizieren: L1 (Sessions), L2 (Skills), L3 (Logs)
    - Suggestion: Cleanup or Optimization

📊 Analysis 14 — MIGRATION (via Migration-Helper):
  Delegate to sub_mas-migration-helper
  (task=DRY_RUN, from_version=\"<current>\", to_version=\"<latest>\")
  → Gibt es Breaking Changes?
  → Ist a Migration needed?
  → IF JA: \"⚠️ framework must migriert are\"
  → Type klassifizieren: M1 (Breaking) or M2 (Non-Breaking)

📊 Analysis 15 — RECIPES (via Recipe-Manager):
  Delegate to sub_mas-recipe-manager
  (task=LIST)
  → Welche Recipes are installd?
  → Gibt es doppelte? Alte? Incomplete?
  → For EVERY Inkonsistenz:
    - Type klassifizieren: N1 (doppelt), N2 (alt), N3 (Dependency missing)
    - Suggestion: Clean upn or Update

—📖 TIEFEN-ANALYSEN (MAS-Files komplett read)—

📖 Depthn-Analysis 16 — SUB-AGENT-YAMLS (14 Files komplett read):
  ls {workspace}/mas-engineer/recipe/sub/sub_mas-*.yaml → Filelist
