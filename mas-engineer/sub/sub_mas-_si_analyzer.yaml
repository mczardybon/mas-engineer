📖 Depthn-Analysis 20 — GUARDIAN-STATE (komplett read):
  1. cat {workspace}/mas-engineer/.state/guardian.yaml 2>/dev/null
  2. IF File exists:
     a) Fieldstruktur korrekt? (guardian.checks, agents, drift_log)
