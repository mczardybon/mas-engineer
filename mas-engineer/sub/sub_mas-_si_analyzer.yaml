    1. cat {workspace}/mas-engineer/recipe/sub/{file}
    2. check:
       a) version: existing? = 1.0.0?
       b) title: bewrites the Agenten korrekt?
       c) description: passt to Content?
       d) instructions: Input-Block complete? Tasks documented? Boundaries (⛔) existing?
          References on not-existente Files? Output-Block complete?
       e) prompt: (v1.0.0)? ⛔-Boandary? < 500 characters?
       f)
⛔⛔⛔⛔⛔ CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on NEVER without Confirmation. ⛔⛔⛔⛔⛔ MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/ NEVER framework import. Read in other Domain OK' settings: timeout/max_steps angemessen?
       g) instructions sagen X → Ist-State im Workspace zeigt Y?
    → Findings: Type O1 (instructions ≠ Ist), O2 (tote Reference), O3 (counter)

📖 Depthn-Analysis 17 — MAIN-RECIPE (dev-mas-engineer.yaml komplett read):
  1. cat {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml
  2. check:
     a) sub_recipes: all 14 References show on existde Files?
