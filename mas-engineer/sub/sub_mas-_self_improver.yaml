## 12 FEATURE-TYPEN (was the MAS improve can)

### Type A — Settings-Optimization
- A1: timeout to low → 2+ timeouts in 10 calls → timeout ×1.5
- A2: max_steps to low → max_steps erreicht before completion → ×1.5
- A3: timeout to high → ∅-Duration <20% timeout → ∅×3
- A4: max_steps to high → ∅-Steps <30% max → ∅×3

### Type B — Prompt improvement
- B1: Prompt to vage → User fragt 3× \"whas are you doing?\" → Role clarify
- B2: Prompt to long → >500 characters → on ≤300 shorten
- B3: Prompt missing Context → Agent fragt after Infos from Intake → add
- B4: Prompt-Contradiction → Prompt ≠ instructions → abequalen

### Type C — Instructions improvement
- C1: Missing ⛔-Rule → Agent tut Prohibitionsnes without ⛔ → Rule insert
- C2: Unclearer Procedure → Agent fragt after Order → numberieren
- C3: Missing Boundaries → Agent overschreitet Scope → Boundaries add
- C4: Veraltete Reference → References on not-existente Files → updaten

### Type D — Workflow-Optimization (dev-mas-engineer.yaml)
- D1: Step-Order wrong → User korrigiert 3× → umsort
- D2: Missingr Step → User sagt 3× \"du have X vergessen\" → insert
- D3: redundant step → 80% skipped → remove/optional
- D4: Uncleare Frage → User antwortet \"?\" → clarify

### Type E — Detectionspattern
- E1: Missing Detection → User nutzt Command without Match → Pattern hinzu
- E2: Falsee Detection → Pattern matcht wrong → adjust
- E3: Tote Detection → 50+ Sessions no Match → remove

### Type F — Prompt-Block
- F1: Missingr Command → Workflow without Prompt-entry → add
- F2: Sortierung → frequentste not above → after Usage sort
- F3: Uncleare Description → User fragt \"was macht --X?\" → clarify
- F4: ⛔ MISSING MODE-GUARD → prompt has no \"⛔⛔⛔ MODE-check\" or no MAS/FRAMEWORK distinction → mode-Guard add

### Type G — Health-basierte Optimization (via Guardian HEALTH_REPORT)
- G1: Degraded agent → score < 80 → Settings/Prompt/Instructions optimize
- G2: High failure rate → >10% failures/calls → timeout increase or prompt clarify
- G3: Loops detected → loop=warning or critical → instructions clarify (missinge ⛔-Rule?)
- G4: Agent dead → resurrect failed → durchgehen: is Agent obsolet? replace?

### Type H — Anomaly-basierte Optimization (via Session-Analyst)
- H1: Duration-Anomaly → Session >2x ∅-Duration → timeout or max_steps check
- H2: Token-Anomaly → Tokens >3x ∅ → prompt to long / instructions to detailed
- H3: Costs-Anomaly → Costs >5x ∅ → teuren Agenten optimize (prompt shorten)
- H4: Stale session → idle >60min → recipe-Detection check (incompleteer Task?)

### Type I — Prompt-basierte Optimization (via Prompt-Engineer REVIEW)
- I1: Insufficient score → <5/10 Points → prompt new writen
- I2: Missing identity → Kwriterium 1=0 → \"Wer am ich\"-Sentence missing → add
- I3: No ⛔-Boundaries → Kwriterium 3=0 → Prohibitions from instructions extrahieren
- I4: To long → >500 characters → on ≤300 shorten (Kwriterium 7=0)
- I5: Not allinstehend → Kwriterium 8=0 → prompt without instructions cumbersome

### Type J — Config-basierte Optimization (via Config-Auditor)
- J1: Config ❌ gefanden → automatischen Fix-Suggestion generate
- J2: Config-Value obsolete → References stimmen not → updaten

### Type K — Doc-basierte Optimization (via Doc-Generator)
- K1: Doc outdated → instructions or prompt spiegeln not the current Implementation
- K2: Doc missing → Sub-Agent without Documentation → add

### Type L — Goose-Infrastructure (via Goose-Admin)
- L1: To muche Sessions → Starttime slow → goose session rm
- L2: To muche Skills → Overhead → Skills bereinigen
- L3: Logs to large → Disknplatz → Logs rotieren

### Type M — Migration (via Migration-Helper)
- M1: Breaking Changes → Migration before nextm Build einplan
- M2: Non-Breaking → Optional, can wait

### Type N — Recipe-Management (via Recipe-Manager)
- N1: Doppelte Recipes → Clean upn
- N2: Alte Version → Update recommended
- N3: Missing Dependencies → add

### Type O — Depthn-Fande (via cat the MAS-Files)
- O1: Instructions ≠ Ist-State → instructions sagen X (z.B. \"16 Checks\"), but ls/exec zeigt Y (z.B. 15 Checks)
- O2: Reference on not-existente File → grep finds import/file/path not im Workspace
- O3: Veralteter counter → \"14 Sub-Agents\" in manifixed.md, but find zeigt 13 or 15
- O4: Hardcodierter Path → /home/marius/... or absoluter Path im instructions-Block

### Type P — Tool-Quality (via cat the dev_*.py/dev_*.sh)
- P1: Syntax-Error → python3 -c \"compile(...)\" fails fehl
- P2: Hardcodierte Paths im Code → /home/marius/... im Python/Shell-Script
- P3: Import-Error → import or dependency not installd

### Type Q — Agent-Calibration (via Session-DB + Settings-Comparison)
- Q1: overdimensioneverrt → max_steps or timeout < 20% Auslasdog → senken (spart Tokens)
- Q2: Tightly sized → max_steps or timeout > 80% Auslasdog → increase (verhindert Cancel)
- Q3: Calibration optimal → 20-80% Auslasdog → ✅ Nots do

### Type R — Git-Diff-Quality (via git diff HEAD~1)
- R1: Code reduziert → Lines removed > Lines added → ✅ positivee
- R2: Code bloated → Lines added > Lines removed → ⚠️ negativee
- R3: ⛔-Rules vermehrt → More ⛔ as before → ✅ Safety improved
- R4: Prompt shortened → prompt:-Block shorter geworden → ✅ Token-Efficiency
- R5: Complexity increased → Neue File added → ⚠️ Only if needed

### Type S — Agent-Ranking (via Session-DB + Guardian + Prompt)
- S1: Neverdrigster Score → ∅ allr Metriken am schlechtest → optimize
- S2: Score falln → Ranking-Absteiger → untersuchen warum

### Type T — Session-Content-Quality (via User-Message-Analysis)
- T1: Hohe negativee-Quote → >20% User-Answers are negative (\"nein\", \"wrong\", \"stopp\") → Answer-Quality untersuchen
- T2: Muche Nachfragen → >10% User fragt after (\"was?\", \"like?\", \"again\") → Answers clarify
- T3: positiveee Stimmung → meist \"ja\", \"further\", \"thanks toe\" → ✅ Quality gut

### Type U — Success rate trend (via Session-DB about Weekn)
- U1: Fallnder Trend → Agent is schlechter → eingreifen
- U2: Steigender Trend → Agent is besser → Optimizationen wirken
- U3: Stabiler Trend → ✅ No action needed

### Type V — Test-Coverage (via tests/-Directory-Analysis)
- V1: No Tests → Tool has 0 Tests im tests/-Directory → Test retrofit
- V2: Insufficient coverage → <50% getestet → Tests add
- V3: Volle Coverage → ✅ All Tools getestet

### Type W — Goose-Compatibility (via goose --version + goose-docs.ai)
- W1: Neue Version available → current < latest → Upgrade check
- W2: Breaking Change gefanden → MAS-Adjustment needed → Migration plan
- W3: Currentste Version → ✅ MAS runs on latestr Goose-Version

### Type X — change-Historie (via changes.json vs git log)
- X1: Missing Documentation → commsg without changes.json-entry → nachtragen
- X2: Unausgewogene Verteilung → to muche Patches, to few Prompts → Fokus move
- X3: Complete documented → ✅ All changes traceable

### Type Y — Recovery-Efficiency (via Session-DB + Guardian-Log)
- Y1: Recovery slower → Erholung after Error dauert longer → Timeout/Retry-Logik check
- Y2: Recovery schneller → ✅ Erholung optimized sich

### Type Z — Prompt-Churn (via changes.json + git log)
- Z1: Hoher Prompt-Churn → >5 changes/30 Days an a File → Prompt stableisieren
- Z2: Insufficient churn → ✅ Weniger as 3 changes/30 Days

### Type AA — Duration-Vorhersage (via Session-DB + Verlauf)
- AA1: Randen are longer → >20% more Time as before 5 Randen → Analysis reduzieren
- AA2: Randen are shorter → ✅ Efficiency steigt

### Type FW — framework-Agent-Optimization (via dev_agent_doctor.py)
- FW1: Prompt faulty → tier-Marking, kuerzen, Stop-Rules add
- FW2: Settings wrong → timeout/max_steps adjust (BP-Konform)
- FW3: Structure inkonsistent → Input/Output, Constitution-Reference add
- FW4: Tests missing → pytest-Test create

### Type BB — framework-Test (via MAS entry point)
- BB1: framework-Test failed → Changes framework incompatible → ROLLBACK
- BB2: framework-Test passed → ✅ Changes framework-compatible
- BB3: framework slow (>120s) → Performance-Optimization check

### Type CC — Memory/Resource-Optimization (via Session-DB + Guardian)
- CC1: OOM/MemoryError detected → Sub-Agent cancelled → timeout reduzieren OR Task splitten
- CC2: max_turns uebfirstepen (>3 Sessions) → max_steps erhoehen (+20)
- CC3: Timeout-Anomaly (>2 Sigma) → timeout adjust (current * 1.5)
- CC4: Token-Verbralso increased (>5%/Session) → Prompt optimize or max_steps reduzieren

### Type DD — MCP/tool health (via Session-DB Messages)
- DD1: Tool not foand in Session → Extension/Tool register
- DD2: Plugin-Konflikt in Session → Konflikt aufloesen
- DD3: Extension-Error in Session → Extension updaten/deactivate
- DD4: Tool-Syntax-Error in Session → Tool-call correct

### Type EE — Session corruption (via sqlite3 + changes.json)
- EE1: DB read-only → chmod + Backup from changes.json
- EE2: Missing Table → Migration or DB newbauen
- EE3: DB besch.damaged → Backup from changes.json restore
- EE4: No Sessions (0 rows) → Goose newstart or Path check

### Type FF — Config-Drift (via diff recipe/ vs best-practices.yaml)
- FF1: timeout weicht ab from best-practices.yaml → adjust
- FF2: max_steps weicht ab from best-practices.yaml → adjust
- FF3: goose_provider weicht ab → vereinheitlichen
- FF4: goose_model weicht ab → vereinheitlichen

### Type GG — Prompt erosion (via grep on Sub-Agent-YAMLs)
- GG1: ⛔ missing im prompt → ⛔ {NAME} (v1.0.0) add
- GG2: Version (v1.0.0) missing im prompt → add
- GG3: Emoji missing im prompt → add
- GG4: prompt to kurz (<100 characters) → extend
- GG5: instructions to long (>2000 characters) → auslagern

### Type HH — Backup bloat (via find .backups)
- HH1: >50 Backup-Directoryse in .backups/ → Marius fragen: Backups bereinigen?
- HH2: >100 .bak-Files in recipe/sub/ → Marius fragen: Alte .bak loeschen?
- HH3: No Backup before last Change → dev_editor.py --backup nutzen
- HH4: lasts Backup >30 Days alt → checkpoint --snapshot recommend

###  — Version-Drift (via diff version: in recipe/ vs framework/)
-  MAS-Version != framework-Version → Kompatibilitaet check
-  Sub-Agent-Versionen uneinheitlich in sub/ → Vereinheitlichen
-  framework config.yaml has no version:-Field → add

### Type JJ — Installation drift (via diff workspace vs ~/.config/goose/recipes/)
- JJ1: dev-mas-engineer.yaml different → update.sh --mas execute
- JJ2: Sub-Agent missing in ~/.config/goose/recipes/sub/ → copy
- JJ3: Tool missing in ~/.config/goose/recipes/mas-engineer-tools/ → dev_build.sh + install
- JJ4: Doc missing in ~/.config/goose/docs/mas-engineer/ → copy
  
