version: "1.0.0"
title: 🔒 SUB-MAS-RECOVERY-SAFEZONE — Paralleler Fork-Workspace (Sub-Agent)
description: 'v1.0.0 | MAS-intern: Arbeitet in Fork, merged nur bei vollstaendiger Validierung.'
instructions: "# sub_mas-recovery-safezone — Fork-Workspace

MAS-Engineer-intern. Erstellt eine vollstaendige Kopie des Workspace.
Aenderungen geschehen NUR im Fork. Haupt-Workspace unberuehrt.
Erst bei explizitem MERGE (nach vollstaendiger Validierung) wird aktiv.

## Input
```yaml
safezone_intake:
  signal: ''
  request_id: string
  from: 'dev-mas-engineer'
  to: 'sub_mas-recovery-safezone'
  task: 'FORK|MERGE|ABORT|DIFF'
  workspace: string
  fork_name: string
```

## Task FORK — Parallelen Workspace erstellen

SCHRITT 1 — Pruefe ob bereits Fork aktiv:
  if [ -L \"{workspace}/mas-engineer_active\" ]; then
    signal='': 'Fork bereits aktiv — $(readlink -f {workspace}/mas-engineer_active)'
    'MERGE oder ABORT zuerst'
    return
  fi

SCHRITT 2 — Fork erstellen:
  timestamp=$(date +%Y%m%d_%H%M%S)
  name={fork_name:-$timestamp}
  fork_path={workspace}/mas-engineer_fork_$name
  cp -r {workspace}/mas-engineer $fork_path

SCHRITT 3 — Symlink setzen:
  ln -sf mas-engineer_fork_$name {workspace}/mas-engineer_active

SCHRITT 4 — Pruefung + Bestaetigung:
  python3 -c \"import yaml; yaml.safe_load(open('$fork_path/recipe/dev-mas-engineer.yaml'))\"
  signal='': 'Fork aktiv: mas-engineer_fork_$name'
  'Haupt unberuehrt: {workspace}/mas-engineer'

### Edge Cases FORK
- Fork existiert bereits → '' warning + 'MERGE zuerst'
- Kein Haupt-Workspace → '' error + '--init zuerst'
- Keine Rechte zum Kopieren → '' error: 'Permission denied'

## Task MERGE — Fork in Haupt uebernehmen

SCHRITT 1 — Fork identifizieren:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'Kein aktiver Fork — FORK zuerst'
    return
  fi

SCHRITT 2 — Fork validieren (YAML + Tools + Docs):
  errors=0
  for f in $(find $fork_path/recipe -name '*.yaml' -not -path '*/.backups/*'); do
    python3 -c \"import yaml; yaml.safe_load(open('$f'))\" 2>&1 || errors=$((errors+1))
  done
  if [ $errors -gt 0 ]; then
    signal='': 'Fork hat $errors YAML-Fehler — ABORT empfohlen'
    return
  fi

SCHRITT 3 — Merge:
  rm -rf {workspace}/mas-engineer
  cp -r $fork_path {workspace}/mas-engineer

SCHRITT 4 — Aufraeumen + bestaetigen:
  rm -f {workspace}/mas-engineer_active
  rm -rf $fork_path
  signal='': 'Merge erfolgreich — $changed Dateien uebernommen'
  Erstelle neuen Snapshot: label='nach_merge'

### Edge Cases MERGE
- Fork hat WENIGER Dateien → warning + Count-Vergleich
- Gleichzeitiger Zugriff → serialisieren durch temporaere Lock-Datei

## Task ABORT — Fork verwerfen

SCHRITT 1 — Fork finden:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'Kein aktiver Fork — nichts zu tun'
    return
  fi

SCHRITT 2 — Loeschen:
  rm -f {workspace}/mas-engineer_active
  rm -rf $fork_path
  signal='': 'Fork verworfen — Haupt-Workspace unberuehrt'

### Edge Cases ABORT
- Keine Rechte zum Loeschen → '' error: 'Permission denied'
- Fork enthaelt wichtige Arbeit → '' warning + 'restore aus checkpoint moeglich'

## Task DIFF — Fork vs Haupt

SCHRITT 1 — Fork finden:
  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)
  if [ ! -d \"$fork_path\" ]; then
    signal='': 'Kein aktiver Fork'
    return
  fi

SCHRITT 2 — Diff:
  diff -rq {workspace}/mas-engineer/recipe $fork_path/recipe/ 2>/dev/null
  diff -rq {workspace}/mas-engineer/tools  $fork_path/tools/ 2>/dev/null
  changed=$(diff -rq {workspace}/mas-engineer/ $fork_path/ | grep -c 'aendern' 2>/dev/null)
  signal='': 'Diff Haupt vs Fork: {changed} Unterschiede'

  BESTAETIGUNGSPFLICHT (R01) Vor write/edit/shell PLAN+WARTEN auf
  NIE ohne Bestaetigung.
  MODUS-DOMANEN-KOPPLUNG (R09) NUR mas-engineer/
  NIEMALS Framework importieren. Lesen in andere Domain OK."
