```

## Scope-spezifische Checks

### config.yaml
- Kennt Goose diesen Key?
- Welche Werte sind erlaubt?
- Gibt es Defaults die Goose selbst setzt?

### Recipes
- Wie resolved Goose Recipe-Dateien?
- Werden Unterordner in RECIPE_PATH durchsucht?
- Wie funktioniert slash_command-Sichtbarkeit?

### Extensions
- Welche extension-Types gibt es?
- Was bedeutet \"bundled: true\"?
- Wie werden MCP extensions konfiguriert?

### .goosehints
- Datei: ~/.config/goose/.goosehints (global) ODER <projekt>/.goosehints (projekt)
- Format: Reines Markdown (KEIN JSON, KEIN YAML)
- Zweck: Entwickler-Hinweise für ALLE Goose-Agenten
- Wird von Goose-Agenten vor Arbeitsbeginn automatisch gelesen
- Inhalt: Build-Befehle, Coding-Styles, Projekt-Regeln, Tabus
- MAS-Nutzung: cat zum Lesen, write/edit zum Schreiben (Goose-Bordmittel!)
- KEIN Python-Tool nötig — Bordmittel reichen

### tool_permissions.json
- Datei: ~/.config/goose/permissions/tool_permissions.json
- Format: JSON (wird von Goose automatisch geschrieben)
- Zweck: Laufzeit-Entscheidungen des Users im \"Approve-Modus\"
- Welche MCP-Tools/Befehle sind dauerhaft freigegeben/blockiert?
- MAS-Nutzung: NUR LESEN (dev_goose_manager.py --status zeigt es)
- ⛔ NIE SCHREIBEN — Goose managed die Datei selbst

### Subagents
- Sub-Agenten haben default 25 max_turns und 5min timeout
- Extension inheritance: Sub-Agenten erben alle Extensions vom Parent
  → FEHLERQUELLE: Wenn Recipe `extensions:` definiert, muss `summon`
    explizit gelistet sein, sonst kein delegate/load-Tool verfügbar
- Sub_recipes haben summon auto-injected (nicht nötig zu listen)
- Return mode: full (default, alle Tool-Calls sichtbar) vs summary (nur Ergebnis)
- Parallel: \"parallel\", \"simultaneously\", \"at the same time\" triggert Parallel
- Sequential: \"first...then\", \"after\" (default)
- GOOSE_SUBAGENT_MAX_TURNS env var setzt globales Default für max_turns
- MAS-Relevanz: settings.max_turns in Recipe-YAML setzen (parallel zu max_steps)
- MAS-Relevanz: Alle MAS-Sub-Agent-Recipes müssen `summon` in extensions listen
  wenn sie selbst Sub-Agenten spawnen wollen

### Recipe Advanced — Erweiterte Recipe-Felder
- `retry.max_retries` (int): Automatische Wiederholung bei Misserfolg
  → Goose führt Recipe erneut aus bis max_retries erreicht
- `retry.checks` (array): Shell-commands die Erfolg validieren
  → Exit code 0 = success, sonst retry
- `retry.on_failure` (string): Cleanup-Command vor Retry
- `response.json_schema` (object): JSON-Schema für finalen Output
  → Goose validiert Output gegen Schema, bei Fehler: korrigieren
  → Perfekt für MAS-Sub-Agent_result-Validierung
- `parameters` (array): Jinja-Template-Variablen (var_name)
  → input_type: string|number|boolean|date|file|select
  → requirement: required|optional|user_prompt
  → default: Pflicht bei optional
- `sub_recipes` (array): Unter-Recipes mit name, path, values
  → summon wird auto-injected bei sub_recipes
- `activities` (array): Klickbare Buttons im Desktop
  → \"message: ...\" für Info-Box, sonst Button-Text
- `settings.max_turns` (int): Max Turns für Recipe + Sub-Agenten
  → Überschreibt GOOSE_SUBAGENT_MAX_TURNS
  → Precedence: tool_call > recipe.settings > env var > default
- MAS-Relevanz: retry kann test-runner nach --harden ersetzen
- MAS-Relevanz: response.json_schema validiert MAS-Sub-Agent_result automatisch

### Hooks — Plugin-basierte Lifecycle-Events
- 12 Events: SessionStart, SessionEnd, Stop, UserPromptSubmit,
  PreToolUse, PostToolUse, PostToolUseFailure,
  BeforeReadFile, AfterFileEdit, BeforeShellExecution, AfterShellExecution
- Plugin-Verzeichnis: ~/.agents/plugins/<name>/
  → plugin.json + hooks/hooks.json + scripts/
- hooks.json: Event → Matcher (regex) → Command
- Command läuft als sh -c, erhält Event-Payload als JSON auf stdin
- Payload-Felder: event, session_id, matcher_context, tool_name, tool_input
- timeout: default 30s pro Hook, konfigurierbar
- Disable: settings.json → disabledPlugins: [\"name\"]
- MAS-Relevanz: AfterFileEdit → auto yaml.safe_load nach jedem Edit
- MAS-Relevanz: PreToolUse mit matcher \"text_editor\" → BLOCK self-edit
- MAS-Relevanz: PostToolUseFailure → Benachrichtigung bei Sub-Agent-Crash

### Security — Adversary Mode + Prompt Injection Detection
- Adversary Mode: Silent Agent Reviewer vor jedem Tool-Call
  → Datei: ~/.config/goose/adversary.md
  → Existiert die Datei = Mode aktiv
  → Block-Regeln in natürlicher Sprache:
    BLOCK if: exfiltrates data, destructive, malware, privilege escalation
    ALLOW: normal development operations
  → Tools: default shell + computercontroller (konfigurierbar via tools: line)
  → Fail-open: Wenn Reviewer fehlschlägt, Tool-Call wird erlaubt
- Prompt Injection Detection: Pattern-basierte Erkennung
  → Immer aktiv wenn enabled, komplementär zu Adversary Mode
- MAS-Relevanz: adversary.md für Framework-Entwicklung anlegen
  → BLOCK: rm -rf außerhalb workspace/, curl auf unbekannte URLs
  → ALLOW: python3, git, pytest, ls, cat, grep innerhalb workspace/

### CLI Commands — goose Kommandozeilen-Befehle
- `goose recipe validate <file>`: Validiert Recipe-YAML
  → Prüft: required fields, parameter definitions, extensions, Syntax
  → Besser als python3 yaml.safe_load (prüft auch Semantik)
- `goose recipe deeplink <file>`: Generiert shareable Link
  → --param key=value für vorausgefüllte Parameter
- `goose schedule add`: Recipe zeitgesteuert ausführen
  → --schedule-id <name> --cron \"<expr>\" --recipe-source <path>
  → Cron: 5-7 digits (seconds minutes hours day month weekday year)
- `goose configure`: Interaktive Konfiguration
  → Provider, Extensions, Settings, Recipe GitHub Repo
- `goose run --recipe <file>`: Recipe ausführen
  → --params key=value, --interactive, --explain
- MAS-Relevanz: `goose recipe validate` vor Install statt python3 yaml.safe_load
- MAS-Relevanz: `goose schedule add` für automatisierte Framework-Checks

### Templates — Recipe-Template-Engine (Jinja-Style)
- Jinja extends: Basis-Recipe vererben (Parent-Template)
- Jinja block: Ueberschreibbare Bloecke (block name / endblock)
- Jinja literal: Template-Syntax escapen (single quotes)
- indent Filter: Fuer multi-line Werte (var | indent(2))
- Built-in: recipe_dir = Pfad zum Recipe-Verzeichnis
- MAS-Relevanz: Framework-Recipes könnten von Basis-Recipe erben
- MAS-Relevanz: recipe_dir fuer relative Pfade in Recipes

### Sandbox & Enhanced Editing
- developer__text_editor: Diff-basierter Code-Editor (nicht nur write)
- goose Desktop Sandbox: Isolierte Ausführung, schützt Host-System
- gooseignore: Dateien/Ordner von goose ausschließen (.gooseignore)
- Persistent Instructions: ~/.config/goose/persistent_instructions.md
  → Wird VOR jedem Prompt geladen (wie .goosehints aber für Agent-Verhalten)
- MAS-Relevanz: persistent_instructions.md für MAS-Verhalten nutzbar

### TLS / Apps
- ~/.config/goose/tls/: TLS-Zertifikate (server.key, server.pem)
- ~/.local/share/goose/apps/: HTML-Dashboards (clock, performance, etc.)
- MAS-Nutzung: Nur Status anzeigen, nie ändern

