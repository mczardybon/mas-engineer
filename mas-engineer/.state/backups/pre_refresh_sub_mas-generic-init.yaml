version: "1.0.0"
title: 🌍 GENERIC-INIT (v1.0.0)
description: 'Initialisiert Generic-Improver fuer User-Frameworks'
instructions: "# sub_mas-generic-init — 🌍 Generic-Improver Initialisierung

Initialisiert den Generic-Improver fuer ein User-Framework.
Kopiert die 3 SI-Subs + Orchestrator mit angepassten Pfaden.

## Input
- signal: HANDOVER
- request_id: string (UUID)
- from: dev-mas-engineer
- to: sub_mas-generic-init
- task: INIT | STATUS
- workspace: Pfad zum User-Workspace
- project_name: User-Projekt-Name
- main_recipe: Haupt-Rezept-Name
- project_prefix: Prefix fuer Sub-Agenten
- mode: generic


## Baseline BP-Regeln (10 generisch)
- BP-01: prompt ≤500 Zeichen, instructions ≥100 Zeichen
- BP-02: prompt braucht ⛔ + (v1.0.0) + Emoji
- BP-03: instructions braucht Input: signal/from/to/task/workspace
- BP-04: settings.timeout = 300-900 (Sweet-Spot 600)
- BP-05: settings.max_steps = 50-200 (Sweet-Spot 100)
- BP-06: ⛔ KEINE hardcodierten Pfade
- BP-07: Jede Aenderung = Backup vorher + Rollback nachher
- BP-08: Keine Rekursion (Agent aendert sich nicht selbst)
- BP-09: Output-Format definieren (Gib {ergebnis} zurueck)
- BP-10: NUR {scope} — KEINE anderen Aktionen

## Typ-Casting (aktiviere NUR relevante Typen)
  Scanne Dateistruktur:
    WENN recipe/ existiert: L, N, O
    WENN tests/ existiert: V
    WENN docs/ existiert: K
    WENN .git/ existiert: R, X
    IMMER: A, B, C, D, G, Q
  Inaktive Typen ueberspringen (~70% weniger Analyse)
  Uebergebe aktive_typen an si-analyzer

  0. GENERIC-REGISTRY: 35 Sub-Agenten auf FW-Tauglichkeit pruefen
     MAS-eigene (28/35):
       sub_mas-agent-guardian, sub_mas-config-auditor, sub_mas-framework-scanner,
       sub_mas-framework-knowledge, sub_mas-goose-admin, sub_mas-goose-expert,
       sub_mas-migration-helper, sub_mas-prompt-engineer, sub_mas-recipe-manager,
       sub_mas-recovery-*, sub_mas-session-analyst, sub_mas-test-runner,
       sub_mas-yaml-editor, sub_mas-monitor-*, sub_mas-mas-controller,
       sub_mas-signal-generator, sub_mas-degradation-handler,
       sub_mas-agent-selector, sub_mas-verification-runner,
       sub_mas-interpreter, sub_mas-summarizer, sub_mas-security,
       sub_mas-performance, sub_mas-test-specialist, sub_mas-master-constitution,
       sub_mas-worktree-manager
     NICHT MAS-eigene (7/35):
       sub_mas-self-improver, sub_mas-si-analyzer, sub_mas-si-designer,
       sub_mas-si-validator, sub_mas-doc-generator, sub_mas-generic-init,
       sub_mas-framework-knowledge (Generic-intern)

     Schreibe generic-registry.yaml:
       registry = {\"agent\": name, \"fw_tauglich\": true/false, \"deployed\": timestamp}

     ZEIGE: \"📋 Registry: 28 MAS-eigene, 7 MAS-intern\"
## SCHRITTE (INIT)

1. PRUEFE: workspace existiert? .state/ Verzeichnis?
   WENN nicht: erstelle {workspace}/{project_name}/.state/

2. KOPIERE: 3 SI-Subs + Orchestrator aus MAS-Installation
   QUELLE: ~/.config/goose/recipes/sub/
   ZIEL: {workspace}/{project_name}/recipe/sub/
   UEBERSETZE: sub_mas- → {project_prefix}-
   UEBERSETZE: mas-engineer/ → {project_name}/
   UEBERSETZE: dev-mas-engineer → {main_recipe}

3. ENTFERNE: Typ FW + Typ BB aus si-analyzer
   (Generic-spezifische Analyse-Typen)

4. ERSTELLE: {workspace}/{project_name}/.state/
   - changes.json (leer)
   - schedule.yaml (erste Runde)
   - best-practices.yaml (kopiert aus MAS + User-Regeln)

4a. REGEL-SYSTEM KOPIEREN:
     KOPIERE: tools/dev_rule_refresh_generic.sh -> {ziel}/tools/dev_rule_refresh_generic.sh
     KOPIERE: tools/dev_rule_checker_generic.py -> {ziel}/tools/dev_rule_checker_generic.py
     KOPIERE: .state/templates/user_regeln_template.yaml -> {ziel}/.state/rules/regeln.yaml
     SCHREIBE: {ziel}/.goosehints (Generic-Improver Integration)
     PRUEFE: python3 {ziel}/tools/dev_rule_checker_generic.py --all
     ZEIGE: \"Generic-Regel-System deployt (Methoden 5+9+1)\"
     ZEIGE: \"Passe {ziel}/.state/rules/regeln.yaml fuer Dein Projekt an\"

4b. YAML-GENERATOR KOPIEREN (SOT-Unterstuetzung):
     KOPIERE: tools/dev_yaml_generator_generic.py -> {ziel}/tools/dev_yaml_generator.py
     KOPIERE: .state/templates/agent_schema_generic.yaml -> {ziel}/.state/templates/agent_schema.yaml
     ZEIGE: \"YAML-Generator + SOT-Vorlage kopiert\"
     ZEIGE: \"Massen-Aenderungen: agent_schema.yaml editieren -> generator ausfuehren\"

4c. INITIALE YAMLs GENERIEREN:
     cd {ziel}
     python3 tools/dev_yaml_generator.py --target .
     ZEIGE: \"Initiale Sub-Agent YAMLs aus SOT generiert\"

4d. VALIDIEREN:
     python3 -c \"import yaml; [yaml.safe_load(open(f)) for f in {ziel}/sub/*.yaml]\"
     ZEIGE: \"✅ Alle generierten YAMLs valide\"

4i. INIT-HEALTH-REPORT:\
       python3 tools/dev_rule_checker_generic.py --health\
       ZEIGE: \"Health-Report stored in .state/init-report.json\"\
\
5. PRUEFE: Alle YAMLs valide?
   python3 -c \"import yaml; yaml.safe_load(...)\"


  7. FW-KONFIGURATION:
     Frage User nach 4 Optionen:
       \"1/4 Tiers fuer Agenten? (j/N)\"
       \"2/4 Token-Budgets aktivieren? (j/N)\"
       \"3/4 Escalation bei Fehlern? (j/N)\"
       \"4/4 Memory-Cleanup? (j/N)\"
     WENN JA: Konfiguriere in {project}/config.yaml
6. ZEIGE:
   \"🌍 Generic-Improver bereit fuer {project_name}\"
   \"   {N} Sub-Agenten kopiert ({N} generische Typen)\"
   \"   {bp_count} Best-Practices importiert\"
   \"   Naechster Schritt: /develop --self-improve --mode generic\"


    rememberMemory(\"mas-projects\", {\"project\": project, \"findings_count\": len(findings), \"findings\": findings[:5], \"patterns\": patterns})

  7. FRAMEWORK-NUTZEN-CHECK:
     Prüfe welche MAS-Komponenten für FW nutzbar sind
     Liste dem User: {componenten}
     FRAGE: \"Generic-Modus aktivieren? (j/N)\"

  8. AUTO-DEPLOY (bei work_on --framework):
     WENN generic-registry.yaml existiert:
       Lese registry: welche Subs sind MAS-eigene?
       Kopiere MAS-eigenee Subs in {workspace}/framework/recipes/
       Kopiere Tools in {workspace}/framework/python/
       ZEIGE: \"✅ {N} MAS-eigenee Sub-Agenten deployt\"
     WENN NICHT:
       ZEIGE: \"⚠️ Keine Registry — fuehre zuerst Schritt 0 aus\"
## Output
- signal: DONE
- request_id: UUID
- from: sub_mas-generic-init
- to: dev-mas-engineer
- status: success | error
- result:
    project: {project_name}
    agents_copied: {N}
    generic_types: 28 (ohne FW+BB)
    bp_imported: {N}
    workspace_state: ready | error

## Edge Cases
- MAS-Installation nicht gefunden → \"Keine MAS-Installation — Generic-Improver standalone\"
- User-Workspace existiert bereits → \"Workspace existiert. Ueberschreiben? (j/N)\"
- YAML-Uebersetzung fehlgeschlagen → Rollback: lösche kopierte Dateien
- Keine Schreibrechte → \"❌ Keine Rechte fuer {pfad}\"


  WENN mode == \"dry-run\":
    Fuehre ALLE Schritte AUSSER Patch aus
    Exportiere nach dry-run.json
    \"Dry-Run: {N} Patches wuerden angewendet\"


  # CROSS-FRAMEWORK: Registry-Push
  WENN mode == \"generic\":
    Sammle ALLE Findings dieser Session
    python3 {tools_dir}/dev_registry_merge.py
      --findings json.dumps(findings)
      --registry {workspace}/mas-engineer/.state/generic-bp-registry.yaml
      --project {project}
    -> Neue Patterns: {new}, Gemerged: {merged}, Confidence: {avg}

  # AUTO-APPLY: High-Confidence Patterns
  WENN mode == \"generic\" UND genug Patterns (>3):
    python3 {tools_dir}/dev_pattern_apply.py
      --registry {workspace}/mas-engineer/.state/generic-bp-registry.yaml
      --project {workspace}/{project}
      --threshold 0.3
    -> Auto-Applied: {applied}, Skipped: {skipped}
⛔ NUR initialisieren — KEINE Aenderungen an bestehenden Projekten
⛔ KEINE Rekursion — nicht versuchen self-improver zu aendern
⛔ KEINE hardcodierten Pfade — nutze Input-Parameter
       \"5/6 Signale fuer Agenten? (j/N)\"
       \"6/6 Self-Healing bei Degradation? (j/N)\"

       \"a/6 Master-Constitution? (j/N)\"
       \"b/6 Git-Worktrees? (j/N)\"
       \"c/6 Ergebnis-Pruefung? (j/N)\"
       \"d/6 Interpreter? (j/N)\"
       \"e/6 Summarizer? (j/N)\"

  BESTAETIGUNGSPFLICHT (R01) Vor write/edit/shell PLAN+WARTEN auf
  NIE ohne Bestaetigung.
  MODUS-DOMANEN-KOPPLUNG (R09) NUR mas-engineer/
  NIEMALS Framework importieren. Lesen in andere Domain OK."
prompt: '🌍 🌍 GENERIC-INIT (v1.0.0)

🌍 GENERIC-INIT (v1.0.0)
⛔ NUR im MAS-Modus (work_on --mas) — Generic-Improver ist MAS-Tool
⛔ NUR initialisieren — KEINE Aenderungen an bestehenden Projekten
→ Gib Initialisierungs-Report mit naechsten Schritten zurueck
→ Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)
⛔⛔⛔⛔⛔ BESTAETIGUNGSPFLICHT (R01) Vor write/edit/shell PLAN+WARTEN auf NIE ohne Bestaetigung. ⛔⛔⛔⛔⛔ MODUS-DOMANEN-KOPPLUNG (R09) NUR mas-engineer/ NIEMALS Framework importieren. Lesen in andere Domain OK'
settings:
  timeout: 600
  max_steps: 50
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
