version: 1.0.0
configs:
  mas-self:
    type: main-agent
    version: 1.0.0
    first_session:
      steps:
      - 'load(source: ''sub_mas-system-knowledge'')'
      - cat mas-engineer/.state/workflows.yaml → configs.mas-self.restrictions
      - cat .state/knowledge/{thema}.md (bei Bedarf)
      dann: 'Frage: Was soll ich tun?'
    restrictions:
      r01_bestaetigung:
        level: extrem
        description: 'Vor JEDER write/edit/shell: Pruefe ob Bestaetigung noetig'
        details:
        - 'WENN Aktion YAML/Code aendert: ZEIGE Plan + WARTE auf ✅'
        - 'WENN Aktion nur liest/analysiert: KEINE Bestaetigung'
      r09_domain:
        level: extrem
        description: MODUS-DOMAENEN-KOPPLUNG
        details:
        - MAS arbeitet IN Framework-Dateien (OK)
        - MAS importiert NIEMALS Framework-Komponenten (BLOCKED)
        - Framework weiss NICHTS vom MAS (BLOCKED)
        - Jedes Framework ist fuer sich autark (BLOCKED)
        - 'future domains: gleiche Isolation (BLOCKED)'
        - 'Beim Lesen: .mas-mode pruefen (MAS vs FRAMEWORK)'
      r02_bestand:
        level: extrem
        description: BESTAND vor NEUBAU — Pruefe ob Tool/Agent/Funktion bereits existiert
      r04_self_improver:
        level: extrem
        description: NIEMALS self-improver.yaml editieren
      r05_auto_commit:
        level: stark
        description: AUTO-COMMIT nach Aenderung — git+checkpoint+changes.json+todo
        details:
        - git add -A && git commit -m '[MAS] ...'
        - checkpoint .state/checkpoints/{timestamp}/
        - changes.json + {timestamp, action, description} — NIEMALS leere description
        - todo.todoWrite('✅ ...')
      r06_sub_agent:
        level: stark
        description: Sub-Agent = NUR Analyse — Shell selbst ausfuehren
      r07_signal:
        level: normal
        description: CP_DONE nach Checkpoint senden
      r08_token:
        level: normal
        description: Self-Improver max 50K Tokens — sonst User fragen
      r10_coronashield:
        level: extrem
        description: JEDE YAML vor Speicherung via sub_mas-recovery-immune CHECK_YAML
          validieren
      verbote:
      - self-improver.yaml editieren
      - Framework-Komponenten importieren
      - Framework-Konzepte als MAS-Konzepte bezeichnen
      - MAS-Tools in Framework-Verzeichnisse kopieren
      - Niemals aufgeben — immer Alternative suchen (Retry Stufen 1-4)
      - Immer Backup vor Aenderungen (dev_editor.py task=BACKUP)
      - Immer YAML validieren nach Edit (python3 -c 'yaml.safe_load(...)')
      verstoesse:
        level: extrem
        description: VERSTOSS = SCHWERER FEHLER — ROLLBACK ERZWINGEN
    enforcement:
      methode_5_reaktivierung:
        alle: 5 schritte
        ausfuehren: bash tools/dev_rule_refresh.sh
        schritt_counter: schritt_counter
        bei_counter_5: schritt_counter = 0
      methode_6_propagation:
        bei: delegate
        ausfuehren: python3 tools/dev_haerte_propagation.py {agent_name}
        output: in agent_intake.haerte_regeln einfuegen
      methode_9_regeltest:
        vor: write/edit/shell
        ausfuehren: python3 tools/dev_rule_checker.py --all --action {aktion}
        bei_exit_0: Aktion freigegeben
        bei_exit_1: AKTION BLOCKIERT → User informieren + WARTEN
        hinweis: Nur nach explizitem 'weiter' oder neuer Bestaetigung freigeben
        bestaetigung_gueltig: 5 Minuten (.state/.last_bestaetigung)
      methode_10_multiprompt:
        nutze: prompt_1 + prompt_2 + prompt_3
      methode_1_multiplikator:
        optional: true
        beschreibung: 5⛔ = 5× Gewicht
      session_cleanup:
        bei: JEDER NEUEN SESSION
        ausfuehren: bash tools/dev_session_cleanup.sh --exec
        beschreibung: Entfernt automatische Sessions. Behaelt echte User-Chats.
    recovery:
      5_stufen:
        immune:
          befehl: recovery --immune
          beschreibung: YAML-Praevention vor jedem Edit (sub_mas-recovery-immune)
          detail: → YAML-Syntax, Python-Syntax, Shell-Syntax + Gesamt-Zustand vor
            Aenderung
        checkpoint:
          befehl: recovery --checkpoint
          beschreibung: Snapshot erstellen (vor Aenderung) (sub_mas-recovery-checkpoint)
          subbefehle:
          - recovery --list → Letzte 10 Checkpoints anzeigen
          - recovery --restore <id> → Checkpoint wiederherstellen
          - recovery --diff <a>..<b> → Unterschied zwischen Checkpoints
        safezone:
          befehl: recovery --safezone
          beschreibung: In Fork arbeiten (sub_mas-recovery-safezone)
          subbefehle:
          - recovery --merge → Fork in Haupt uebernehmen
          - recovery --abort → Fork verwerfen
        timeline:
          befehl: recovery --timeline
          beschreibung: Besten Checkpoint automatisch finden (sub_mas-recovery-timeline)
          subbefehle:
          - recovery --restore-best → Automatisch wiederherstellen
          - recovery --analyze → Schaden systematisch analysieren
        defib:
          befehl: recovery --defib
          beschreibung: 'Notfall: Minimal-Config + Wiederbelebung (sub_mas-recovery-defib)'
          subbefehle:
          - recovery --diagnose → Totalschaden-Analyse
          - recovery --resurrect → Aus letztem guten Backup wiederbeleben
    tools:
      hardening:
      - tool: dev_rule_refresh.sh
        beschreibung: Reaktivierungs-Anker (alle 5 Schritte)
      - tool: dev_rule_checker.py
        beschreibung: Regel-Test (vor jeder Aktion)
      - tool: dev_haerte_propagation.py
        beschreibung: Haerte-Propagation (bei delegate)
      alle_tools:
        beschreibung: 42 Tools in tools/ und mas-engineer/tools/
        detail: Siehe .state/knowledge/06-tools.md
    sub_agents:
      analyse:
      - sub_mas-framework-knowledge
      - sub_mas-framework-scanner
      - sub_mas-prompt-engineer
      - sub_mas-config-auditor
      - sub_mas-session-analyst
      - sub_mas-si-analyzer
      - sub_mas-si-designer
      - sub_mas-si-validator
      - sub_mas-goose-expert
      recovery:
      - sub_mas-recovery-checkpoint
      - sub_mas-recovery-defib
      - sub_mas-recovery-immune
      - sub_mas-recovery-safezone
      - sub_mas-recovery-timeline
      - sub_mas-migration-helper
      monitoring:
      - sub_mas-agent-guardian
      - sub_mas-monitor-health
      - sub_mas-monitor-recovery
      - sub_mas-monitor-runtime
      - sub_mas-monitor-session
      - sub_mas-mas-controller
      verwaltung:
      - sub_mas-goose-admin
      - sub_mas-goose-expert
      - sub_mas-recipe-manager
      - sub_mas-yaml-editor
      - sub_mas-worktree-manager
      - sub_mas-verification-runner
      - sub_mas-summarizer
      - sub_mas-interpreter
      self_improve:
      - sub_mas-self-improver
      - sub_mas-dashboard-live
      - sub_mas-generic-init
      - sub_mas-master-constitution
      - sub_mas-performance
      - sub_mas-security
      - sub_mas-test-runner
      - sub_mas-test-specialist
      generierung:
      - sub_mas-doc-generator
      - sub_mas-signal-generator
      - sub_mas-degradation-handler
      workflow:
      - sub_mas-workflow-engine
      intention:
      - sub_mas-intention-parser
    tier_system:
      fast:
        beschreibung: Kurze Analyse (<5K Tokens)
        agent: session-analyst
      balanced:
        beschreibung: Normale Aufgaben (5-20K)
        agent: config-auditor, guardian
      powerful:
        beschreibung: Komplexe Analyse (20-50K)
        agent: test-runner, prompt-engineer
      reasoning:
        beschreibung: Deep-Dive (>50K)
        agent: self-improver, scanner
      code:
        beschreibung: Code-Generierung (>100K)
        agent: yaml-editor
    token_budgets:
      self_improver: 50000
      session_analyst: 30000
      gesamt_session: 1000000
      warnung_bei: 80% — Zeige Warnung + Frage User Weiter?
    signals:
      typen:
      - signal: CP_DONE
        nach: checkpoint
        via: sub_mas-signal-generator (task=SIGNAL, typ=CP_DONE)
      - signal: ERROR
        bei: fehler
        via: sub_mas-signal-generator (task=SIGNAL, typ=ERROR)
      - signal: SESSION_END
        am: session-ende
        via: sub_mas-signal-generator (task=SIGNAL, typ=SESSION_END)
agents:
  _schema: 'sot_schema.yaml v1.0.0 — Pflichtfelder: name, type, task'
  _hinweis: Agenten werden vom intention-parser automatisch eingetragen. Manuelle
    Aenderungen jederzeit moeglich.
workflows:
  build-test:
    desc: Build + ZIP entpacken + Inhalt prüfen
    params:
      VERSION:
        type: string
        default: 2.42.0
    steps:
    - id: preflight
      action: shell
      cmd: python3 tools/dev_rule_checker.py --all --action build
      on_error: abort
    - id: build
      action: shell
      cmd: bash tools/dev_build.sh --full
      depends_on:
      - preflight
      timeout: 120
    - id: extract
      action: shell
      cmd: 'ZIP=$(ls -t dist/*.zip | head -1)

        rm -rf /tmp/wf_build_test

        unzip -q "$ZIP" -d /tmp/wf_build_test

        echo "OK: $(find /tmp/wf_build_test -type f | wc -l) files"

        '
      depends_on:
      - build
    - id: validate
      action: shell
      cmd: 'cd /tmp/wf_build_test

        echo "YAMLs: $(find . -name ''*.yaml'' | wc -l)"

        [ -f installer.sh ] && echo "installer.sh: OK" || echo "installer.sh: FEHLT"

        [ -f update.sh ] && echo "update.sh: OK" || echo "update.sh: FEHLT"

        [ -f .mas-mode ] && echo ".mas-mode: OK" || echo ".mas-mode: FEHLT"

        [ -f mas-engineer/recipe/dev-mas-engineer.yaml ] && echo "main-recipe: OK"
        || echo "main-recipe: FEHLT"

        [ -d framework/dev-team ] && echo "framework: OK" || echo "framework: FEHLT"

        '
      depends_on:
      - extract
    - id: cleanup
      action: shell
      cmd: rm -rf /tmp/wf_build_test
      depends_on:
      - validate
  si-analyse:
    desc: Self-Improver Vollanalyse + Report
    steps:
    - id: checkpoint
      action: shell
      cmd: mkdir -p .state/checkpoints/si_$(date +%Y%m%d_%H%M%S)
    - id: scan_recipes
      action: shell
      cmd: python3 ~/.config/goose/recipes/mas-engineer-tools/dev_agent_doctor.py
        --all 2>&1 | tail -30
      timeout: 120
    - id: scan_tools
      action: shell
      cmd: "echo \"=== Tools mit hardcodierten Pfaden ===\"\nfor f in tools/*.py tools/*.sh;\
        \ do\n  c=$(grep -c '/home/marius/' \"$f\" 2>/dev/null || echo 0)\n  [ \"\
        $c\" -gt 0 ] && echo \"  $f: $c\"\ndone\necho \"=== max_steps-Check ===\"\n\
        grep -rn 'max_steps:' mas-engineer/recipe/sub/ | grep -v '.bak' | sort\n"
      depends_on:
      - checkpoint
    - id: report
      action: shell
      cmd: 'echo "### SI $(date ''+%Y-%m-%d %H:%M'')" >> .state/todo.md

        tail -5 .state/guardian.yaml 2>/dev/null >> .state/todo.md

        '
      depends_on:
      - scan_recipes
      - scan_tools
  knowledge-refresh:
    desc: Liest alle 8 Wissen-Dateien und validiert Aktualität
    steps:
    - id: check_files
      action: shell
      cmd: 'for f in .state/knowledge/*.md; do [ -f "$f" ] && echo "OK: $(basename
        $f) ($(wc -c < $f) bytes)" || echo "FEHLT: $f"; done; echo ; echo "Sub-Recipe:
        $(grep max_steps mas-engineer/recipe/sub/sub_mas-system-knowledge.yaml)"'
