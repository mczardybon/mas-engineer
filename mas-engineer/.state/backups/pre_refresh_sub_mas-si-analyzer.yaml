  min_dauer = minimum max_dauer = maximum letzte_5 = ∅ der letzten 5 davor_5 = ∅ der
  5 davor 4. PROGNOSE: "⏱ Geschätzte Laufzeit: ∅ {avg}s (min {min}s, max {max}s)"
  5. TREND: letzte_5 / davor_5 > 1.2 → "⚠️ Runden werden länger (+{pct}%)" → AA1 letzte_5
  / davor_5 < 0.8 → "✅ Runden werden kürzer (-{pct}%)" → AA2 sonst → "ℹ️ Runden stabil
