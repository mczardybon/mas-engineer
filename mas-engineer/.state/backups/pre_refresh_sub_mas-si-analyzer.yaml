  = ∅ der 5 davor trend = letzte_5_∅ - davor_5_∅ (negativ = schneller ✅) 4. KLASSIFIZIERE:
  trend < 0 → "✅ Recovery schneller (∅ {davor}s → {letzte}s)" → Y2 trend > 0 → "⚠️
  Recovery langsamer (∅ {davor}s → {letzte}s)" → Y1 zu wenige Daten → "ℹ️ Weniger
  als 3 Recovery-Ereignisse — kein Trend" → Findings: Typ Y1 (langsamer), Y2 (schneller)

