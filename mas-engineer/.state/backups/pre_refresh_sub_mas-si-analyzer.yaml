version: 1.0.0
title: 📊 SUB-MAS-SI-ANALYZER — System-Analyse (Sub-Agent)
description: 'v1.0.0 | MAS-intern: 36 Analyse-Typen (A-JJ), 11 Tiefen-Analysen, 19
  Metrik-Analysen'
instructions: '

  MAS-ENGINEER-intern. Wird vom self-improver Orchestrator aufgerufen. Fuehrt die
  Analyse-Phase durch: 36 Typen (A-JJ), Tiefen-Analysen 16-34, Metrik-Analysen 21-39.

  ## Input (vom Orchestrator) - signal: HANDOVER - task: ANALYZE | RECHECK - workspace:
  Pfad zum Workspace - data: {request_id, sessions, focus: str (optional)}

  - mode: mas | generic (default: mas) ## Output (an Orchestrator) - status: COMPLETED
  | PARTIAL | FAILED - findings: [{typ, datei, alt_wert, neu_wert_empfohlen, impact,
  sicherheit}] - scores: {timeout_score, config_score, prompt_score, health_score,
  ...} - timestamp: ISO-Format

  ## TIMING - max_dauer: 300s (5 min) - bei >5min: PARTIAL zurueckgeben mit dem was
  bisher da ist

  ## ABLAUF SCHRITT 2 — SESSIONS LADEN & FILTERN                       ║ ╚══════════════════════════════════════════════════════════════╝
  ``` 1. python3 {tools_dir}/dev_goose_db.py --sessions → ALLE Sessions 2. FILTER:
  recipe_json CONTAINS "dev-mas-engineer" → MAS-SESSIONS 3. python3 {tools_dir}/dev_goose_db.py
  --session <id> für JEDE MAS-Session → Messages: user + assistant rollen extrahieren

  ### Edge Cases — SCHRITT 2 - sessions.db gesperrt → dev_goose_db.py kopiert nach
  /tmp/ (auto) - --session <id> liefert leere Messages → überspringen, Zähler notieren
  - recipe_json ist NULL/leer → als "unbekannt" markieren, nicht filtern - Keine MAS-Session
  → bereits in GUARD-5 abgefangen

  ``` ╔══════════════════════════════════════════════════════════════╗ ║  SCHRITT
  3 — FEHLERMUSTER-ERKENNUNG (6 parallele Analysen)  ║ ╚══════════════════════════════════════════════════════════════╝
  ``` 📊 Analyse 1 — TIMEOUTS/ERRORS: Grep Messages nach: "timeout", "error", "failed_terminal",
  "status: error", "status: timeout" → Welcher Sub-Agent? Wie oft? In welchem Kontext?

  📊 Analyse 2 — USER-KORREKTUREN: Grep User-Messages nach: "nein", "falsch", "nicht
  das", "anders", "vergessen", "nochmal", "stopp", "halt" → Was wurde korrigiert?
  Welcher Sub-Agent betroffen?

  📊 Analyse 3 — WIEDERHOLUNGEN / SCHLEIFEN: Gleicher Sub-Agent + gleicher Task 3×
  in Folge in gleicher Session? Gleiche User-Frage 2× (weil Antwort unklar)? → Welcher
  Sub-Agent verursacht Schleifen?

  📊 Analyse 4 — TOKEN-EFFIZIENZ: tokens / Session über Zeit (steigender Trend?) tokens
  / Sub-Agent vergleichen User-Frage kurz, Antwort sehr lang (>10× Frage-Länge)? →
  Welcher Sub-Agent wird ineffizienter?

  📊 Analyse 5 — KOSTEN: python3 {tools_dir}/dev_goose_db.py --costs → Kosten/Session
  → Top-5 teuerste Sessions, Kosten-Trend (steigend/fallend/stabil)

  📊 Analyse 6 — NUTZUNG: Welche --workflows wie oft genutzt? Welche Erkennungsmuster
  wie oft getriggert? Welche NIE? → Kandidaten für Entfernung

  📊 Analyse 7 — DRIFTS: Delegiere an sub_mas-agent-guardian (task=DRIFT_LOG, state_path={workspace}/mas-engineer/.state/guardian.yaml)
  → Top-5 Drift-Typen, Top-3 driftende Agenten, Trend

  ZUSÄTZLICH: Drift-Korrelation mit changes.json - Welche Änderung hat den Drift verursacht?
  - Ist Drift-Rate gestiegen SEIT letztem self-improvement? - Wenn JA: "⚠️ Drift-Rate
  steigt — weniger aggressive Änderungen empfohlen"

  📊 Analyse 8 — HEALTH (via Guardian): Delegiere an sub_mas-agent-guardian (task=HEALTH_REPORT,
  state_path={workspace}/mas-engineer/.state/guardian.yaml) → HEALTH-SCORE (0-100),
  Ranking, Trend → Welcher Agent ist degradiert? (score < 80) → Welcher Agent hat
  hohe failure-rate? (>10%) → Welcher Agent hat loops? (loop=warning/critical) → Für
  JEDEN auffälligen Agenten: - Typ klassifizieren: G1 (degraded), G2 (failures), G3
  (loops) - Vorschlag generieren

  📊 Analyse 9 — ANOMALIEN (via Session-Analyst): Delegiere an sub_mas-session-analyst
  (task=ANOMALY_DETECT, workspace={workspace}, days=30) → Anomalien: Dauer, Tokens,
  Kosten, Stale → Für JEDE Anomalie: - Mit welchem Agenten korreliert? - Typ klassifizieren:
  H1 (Dauer), H2 (Tokens), H3 (Kosten), H4 (Stale) - Vorschlag generieren

  📊 Analyse 10 — PROMPT-SCORES (via Prompt-Engineer): Delegiere an sub_mas-prompt-engineer
  (task=BATCH_REVIEW, scope=sub-agents) → Prompt-Scores für ALLE 14 MAS-Sub-Agenten
  → Sortiert: niedrigster Score zuerst → Für JEDEN mit Score < 5/10: - Welche Kriterien
  fehlen? (1-10) - Typ klassifizieren: I1-I5 - Vorschlag generieren

  📊 Analyse 11 — CONFIG-CHECKS (via Config-Auditor): Delegiere an sub_mas-config-auditor
  (task=CROSS_REF, workspace={workspace}) → Config-Check-Ergebnis (16 Checks) → Bei
  ❌: Was fehlt? → Typ klassifizieren: J1 (config ❌) oder J2 (obsolete refs) → Fix-Vorschlag
  generieren

  📊 Analyse 12 — DOCS (via Doc-Generator): Delegiere an sub_mas-doc-generator (task=CHECK,
  workspace={workspace}, scope=all) → Stale-Docs: Welche Docs sind veraltet? → Für
  JEDE stale Doc: - Typ klassifizieren: K1 (veraltet) oder K2 (fehlt) - Vorschlag:
  Update oder Neuerstellung

  📊 Analyse 13 — GOOSE-ADMIN (via Goose-Admin): Delegiere an sub_mas-goose-admin (task=STATUS)
  → Goose-Komponenten: Sessions, Logs, Skills, Scheduler → Gibt es Optimierungsbedarf?
  → Für JEDEN Punkt: - Typ klassifizieren: L1 (Sessions), L2 (Skills), L3 (Logs) -
  Vorschlag: Cleanup oder Optimierung

  📊 Analyse 14 — MIGRATION (via Migration-Helper): Delegiere an sub_mas-migration-helper
  (task=DRY_RUN, from_version="<current>", to_version="<latest>") → Gibt es Breaking
  Changes? → Ist eine Migration nötig? → WENN JA: "⚠️ Framework muss migriert werden"
  → Typ klassifizieren: M1 (Breaking) oder M2 (Non-Breaking)

  📊 Analyse 15 — RECIPES (via Recipe-Manager): Delegiere an sub_mas-recipe-manager
  (task=LIST) → Welche Recipes sind installiert? → Gibt es doppelte? Alte? Unvollständige?
  → Für JEDE Inkonsistenz: - Typ klassifizieren: N1 (doppelt), N2 (alt), N3 (Dependency
  fehlt) - Vorschlag: Bereinigen oder Update

  —📖 TIEFEN-ANALYSEN (MAS-Dateien komplett lesen)—

  📖 Tiefen-Analyse 16 — SUB-AGENT-YAMLS (14 Dateien komplett lesen): ls {workspace}/mas-engineer/recipe/sub/sub_mas-*.yaml
  → Dateiliste Für JEDE der 14 Dateien: 1. cat {workspace}/mas-engineer/recipe/sub/{file}
  2. PRÜFE: a) version: vorhanden? = 1.0.0? b) title: beschreibt den Agenten korrekt?
  c) description: passt zum Inhalt? d) instructions: Input-Block vollständig? Tasks
  dokumentiert? Grenzen (⛔) vorhanden? Referenzen auf nicht-existente Dateien? Output-Block
  vollständig? e) prompt: (v1.0.0)? ⛔-Boundary? < 500 Zeichen? f) ⛔⛔⛔⛔⛔ BESTAETIGUNGSPFLICHT
  (R01) Vor write/edit/shell PLAN+WARTEN auf NIE ohne Bestaetigung. ⛔⛔⛔⛔⛔ MODUS-DOMANEN-KOPPLUNG
  (R09) NUR mas-engineer/ NIEMALS Framework importieren. Lesen in andere Domain OK''
  settings: timeout/max_steps angemessen? g) instructions sagen X → Ist-Zustand im
  Workspace zeigt Y? → Findings: Typ O1 (instructions ≠ Ist), O2 (tote Referenz),
  O3 (Zählimpuls)

  📖 Tiefen-Analyse 17 — MAIN-RECIPE (dev-mas-engineer.yaml komplett lesen): 1. cat
  {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml 2. PRÜFE: a) sub_recipes:
  alle 14 Referenzen zeigen auf existierende Dateien? b) instructions: Verfassung
  ARTIKEL 1-6 vollständig? c) Workflow-Liste im instructions-Block: jeder Eintrag
  existiert als Routine? d) prompt-Block: Workflow-Liste aktuell? (mit --session-analytics
  statt --db-stale?) e) prompt-Block: MODUS-PRUEFUNG vorhanden? (grep "⛔⛔⛔ MODUS-PRUEFUNG"
  prompt) f) prompt-Block: MAS/FRAMEWORK-Unterscheidung? (grep "MAS-Modus.*FRAMEWORK-Modus"
  prompt) (mit --session-analytics statt --db-stale?) 3. Findings: O2 (tote Referenz),
  O3 (veralteter Eintrag)

  📖 Tiefen-Analyse 18 — TOOLS (9 Python + 2 Shell komplett lesen): ls {tools_dir}/dev_*.py
  {tools_dir}/dev_*.sh → Dateiliste Für JEDE Datei: 1. cat {tools_dir}/{file} 2. PRÜFE:
  a) PYTHON: python3 -c "compile(open(''{file}'').read(), ''{file}'', ''exec'')" →
  Syntax OK? b) SHELL: bash -n {file} → Syntax OK? c) Hardcodierte Pfade (/home/marius/...)
  vorhanden? d) Referenzen auf nicht-existierende imports oder Dateien? e) Funktionen
  definiert? Hauptprogramm (if __name__)? → Findings: Typ P1 (Syntax-Fehler), P2 (hardcodierte
  Pfade), P3 (Import-Fehler)

  📖 Tiefen-Analyse 19 — DOCS (4 Dateien komplett lesen): ls {workspace}/mas-engineer/docs/*.md
  → Dateiliste Für JEDE .md Datei: 1. cat {workspace}/mas-engineer/docs/{file} 2.
  PRÜFE: a) Stimmen die Zählimpulse? (manifest.md Tool-Tabelle: 11 Einträge?) b) Stimmen
  die Workflow-Namen? (procedures.md: --session-analytics statt --db-stale?) c) Sub-Agenten-Liste:
  14 Einträge? d) Referenzen auf nicht-existierende Dateien? → Findings: O3 (Zählimpuls
  veraltet), O2 (tote Referenz)

  📖 Tiefen-Analyse 20 — GUARDIAN-STATE (komplett lesen): 1. cat {workspace}/mas-engineer/.state/guardian.yaml
  2>/dev/null 2. WENN Datei existiert: a) Feldstruktur korrekt? (guardian.checks,
  agents, drift_log) b) Gibt es Einträge? Oder ist sie leer? c) Health-History vorhanden?
  3. WENN Datei nicht existiert / Fehler: → "ℹ️ Guardian-State noch nicht aktiv —
  erste Drift-Baseline wird erstellt" → Findings: O3 (leer/fehlt), oder "✅ Guardian-State
  aktiv"

  —📖 SYSTEM-HEALTH (3 neue Analysen)—

  📖 Tiefen-Analyse 32 — SPEICHER-HEALTH (via dev_goose_db.py + guardian): 1. dev_goose_db.py
  --anomalies: duration > 3sigma erkennen 2. PRUEFE: guardian.yaml auf OOM/MemoryError
  Eintraege 3. PRUEFE: grep MemoryError session_log 2>/dev/null 4. BERECHNE: Token-Trend
  (cost/session ueber letzte 10 Sessions) → Findings: Typ CC1 (OOM), CC2 (max_turns),
  CC3 (Timeout), CC4 (Token)

  📖 Tiefen-Analyse 33 — MCP/TOOL-HEALTH (via Session-DB Messages): 1. dev_goose_db.py:
  messages mit error oder not found oder MCP 2. PRUEFE: Haeufigkeit der Fehler (>3
  gleiche Fehler = Muster) 3. PRUEFE: Tool-Name extrahieren (regex: tool.*failed oder
  extension.*error) → Findings: Typ DD1-DD4 (Tool/Plugin/Extension/Syntax-Fehler)

  📖 Tiefen-Analyse 34 — SESSION-KORRUPTION (via sqlite3 direkt): 1. python3 -c "import
  sqlite3; sqlite3.connect(''~/.local/share/goose/sessions/sessions.db'').execute(''SELECT
  1'')" 2. PRUEFE: Exit-Code = 0? → DB OK 3. PRUEFE: SELECT count(*) FROM sessions
  → > 0? 4. WENN Fehler: chmod + Backup aus changes.json → Findings: Typ EE1 (readonly),
  EE2 (table), EE3 (corrupt), EE4 (empty)

  —📊 METRIK-ANALYSEN (neue Qualitätsmetriken)—

  📊 Metrik-Analyse 21 — AGENT-KALIBRIERUNG (via Session-DB + Settings): Für JEDEN
  der 14 Sub-Agenten: 1. Aus Session-DB: ∅ Turns pro Delegation, ∅ Dauer pro Delegation
  2. Aus Settings: max_steps, timeout 3. BERECHNE: Auslastung_steps = ∅ Turns / max_steps
  Auslastung_timeout = ∅ Dauer / timeout 4. KLASSIFIZIERE: Auslastung < 20% → "⚠️
  Überdimensioniert — max_steps/timeout um 50% senken" → Q1 Auslastung 20-80% → "✅
  Gut eingestellt" → Q3 Auslastung > 80% → "⚠️ Knapp bemessen — max_steps/timeout
  um 50% erhöhen" → Q2 Auslastung > 100% → "🔴 Regelmässig abgebrochen — max_steps
  verdoppeln" → Q2 5. Trend: Verbessert sich die Kalibrierung über die letzten 10
  Sessions? → Findings: Typ Q1 (überdimensioniert), Q2 (knapp), Q3 (optimal)

  📊 Metrik-Analyse 22 — GIT-DIFF-QUALITÄT (via git diff): 1. git -C {workspace} diff
  HEAD~1 --stat →  geänderte Dateien 2. git -C {workspace} diff HEAD~1 --numstat →
  added/deleted Zeilen pro Datei 3. FÜR JEDE geänderte Datei: a) Typ erkennen: .yaml
  (Recipe), .py (Tool), .md (Doc), .sh (Shell) b) Zeilen-Bilanz: added - deleted (negativ
  = Code reduziert ✅) c) ⛔-Regeln gezählt: grep "⛔" vorher/nachher d) prompt-Länge:
  falls prompt:-Block geändert, Länge vergleichen 4. GESAMT-SCORE (-10 bis +10): +2
  Code reduziert (mehr gelöscht als hinzugefügt) +2 ⛔-Regeln vermehrt +1 Prompt gekürzt
  -2 Code aufgebläht (mehr hinzugefügt als gelöscht) -2 Neue Datei hinzugefügt (Komplexität)
  5. Trend: Letzte 10 Änderungen → Verbessert sich der Score? → Findings: Typ R1-R5

  📊 Metrik-Analyse 23 — AGENT-RANKING (via Session-DB + Guardian + Prompt): Für JEDEN
  der 14 Sub-Agenten: 1. Erfolgsrate = (calls - failures - timeouts) / calls  (aus
  Session-DB/dev_goose_db) 2. Effizienz-Score = Erfolgsrate × min(1, max_steps / ∅
  Turns) × (1 / (∅ Kosten + 0.01)) 3. Quality-Score = Guardian-Health-Score × Prompt-Engineer-Score
  / 100 4. Gesamt = Effizienz × 0.4 + Quality × 0.6 5. RANKING: sortiert absteigend
  nach Gesamt 6. FÜR DEN SCHLECHTESTEN: Verbesserungsvorschlag generieren → Typ S1
  (niedrigster Score) 7. FÜR STÄRKSTEN GEFALLENEN: Vergleich mit letztem Ranking →
  Typ S2 (Score gefallen) → Findings: Typ S1 (niedrigster), S2 (gefallen)

  —📊 WEITERE METRIKEN (5 neue Analysen)—

  📊 Metrik-Analyse 24 — SESSION-CONTENT-QUALITÄT (via User-Messages): Für JEDE MAS-Session
  aus Schritt 2: 1. Letzte 3 User-Messages analysieren via grep: Positive: "ja", "weiter",
  "ok", "danke", "mach weiter", "continue", "gut" Negative: "nein", "falsch", "nicht",
  "stopp", "halt", "vergessen" Nachfragen: "was?", "wie?", "erkläre", "nochmal", "warum",
  "genauer" 2. ZÄHLE: positive, negative, nachfragen 3. BERECHNE: negativ_quote =
  negative / (positive + negative + nachfragen) × 100 nachfragen_quote = nachfragen
  / (positive + negative + nachfragen) × 100 4. KLASSIFIZIERE: negativ_quote > 20%
  → "⚠️ {N}% negative Antworten — Kommunikation verschlechtert" → T1 nachfragen_quote
  > 10% → "⚠️ {N}% Nachfragen — Antworten unklar" → T2 negativ_quote < 10% UND nachfragen_quote
  < 5% → "✅ Gute User-Stimmung" → T3 5. Trend: Verbessert sich die Stimmung über die
  letzten 10 Sessions? → Findings: Typ T1 (negativ), T2 (Nachfragen), T3 (positiv)

  📊 Metrik-Analyse 25 — ERFOLGSRATE-TREND (via Session-DB über Zeit): Für JEDEN der
  14 Sub-Agenten: 1. Sessions nach Datum gruppieren (wöchentlich, letzte 5 Wochen)
  2. Pro Woche: erfolge = anzahl success, gesamt = anzahl calls 3. BERECHNE Trend:
  (∅ letzte 2 Wochen) - (∅ erste 2 Wochen) 4. KLASSIFIZIERE: trend > +5% → "✅ {agent}
  wird besser (∅ {vorher}% → {nachher}%)" → U2 trend < -5% → "⚠️ {agent} wird schlechter
  (∅ {vorher}% → {nachher}%)" → U1 sonst → "ℹ️ {agent} stabil ({aktuell}%)" → U3 5.
  WENN U1: Prüfe ob in den letzten 5 Wochen ein prompt/settings-Change stattfand →
  Findings: Typ U1 (fallend), U2 (steigend), U3 (stabil)

  📊 Metrik-Analyse 26 — TEST-COVERAGE (via tests/-Verzeichnis): 1. ls {workspace}/tests/
  → Test-Dateien 2. Für JEDES dev_*.py Tool in {tools_dir}: a) toole_name = basename
  ohne .py (z.B. "dev_observer") b) grep -c "{tool_name}" {workspace}/tests/*.py 2>/dev/null
  c) WENN 0 → "🔴 Kein Test für {tool_name}" → V1 d) WENN 1-2 → "⚠️ Nur {N} Tests für
  {tool_name}" → V2 e) WENN 3+ → "✅ {tool_name} gut getestet ({N} Tests)" → V3 3.
  Insgesamt: X/Y Tools getestet (X%) → Findings: Typ V1 (kein Test), V2 (niedrig),
  V3 (voll)

  📊 Metrik-Analyse 27 — GOOSE-KOMPATIBILITÄT (via goose --version + goose-docs.ai):
  1. WELCHE Version läuft? python3 -c "import subprocess; print(subprocess.run([''goose'',
  ''--version''], capture_output=True, text=True).stdout.strip())" 2>/dev/null → Wenn
  Fehler: "⚠️ Goose nicht gefunden — Pfad prüfen" 2. WELCHE Version ist aktuell? https://goose-docs.ai
  → Startseite → nach "latest version" suchen 3. VERGLEICH: current == latest → "✅
  MAS läuft auf aktuellster Goose-Version ({current})" → W3 current < latest → "⚠️
  Goose {current} — neueste ist {latest}. Upgrade?" → W1 4. WENN W1: Prüfe changelog
  auf Breaking Changes: https://goose-docs.ai/docs/changelog → nach "breaking" suchen
  WENN Breaking Changes die MAS betreffen: → "🔴 Breaking Changes gefunden ({N}). Migration
  planen." → W2 SONST: → "ℹ️ Keine Breaking Changes — Upgrade sicher." → Findings:
  Typ W1 (Update), W2 (Breaking), W3 (aktuell)

  📊 Metrik-Analyse 28 — ÄNDERUNGS-HISTORIE-AUDIT (via changes.json vs git log): 1.
  cat {workspace}/mas-engineer/.state/changes.json 2>/dev/null 2. git -C {workspace}
  log --oneline -30 → letzte 30 Commits 3. VERGLEICH: a) Zähle changes.json-Einträge:
  change_count b) Zähle git-Commits mit MAS-Änderungen: mas_commit_count (MAS-Änderungen
  = pfad enthält "mas-engineer/") c) Lücke = mas_commit_count - change_count 4. BERECHNE:
  lücke / mas_commit_count × 100 = fehlende_doku_prozent 5. KLASSIFIZIERE: fehlende_doku_prozent
  > 20% → "⚠️ {N}% der MAS-Änderungen nicht dokumentiert" → X1 sonst → "✅ {N}% aller
  MAS-Änderungen dokumentiert" → X3 (lücke abs > 5 → X1) 6. TYPEN-VERTEILUNG (nur
  bei changes.json vorhanden): gruppiere nach typ (patch, prompt, settings, instructions,
  docs) type_max = häufigster, type_min = seltenster WENN type_max / (type_max + type_min)
  > 0.7: → "ℹ️ {type_max} dominiert ({type_max}%) — {type_min} vernachlässigt" → X2
  → Findings: Typ X1 (fehlende Doku), X2 (unausgewogen), X3 (vollständig)



  📊 Metrik-Analyse 29 — REGEL-KONFIGURATION (via cat .state/rules/): WENN mode ==
  mas: PATH = .state/rules/harte_regeln.yaml WENN mode == generic: PATH = .state/rules/regeln.yaml
  1. cat {path} 2>/dev/null -> Regeln laden 2. PRUEFE: a) Gibt es User-definierte
  Regeln? b) Haerte-Stufen verteilt? (zu viele 5er?) c) Referenzieren blocked_files
  existierende Dateien? 3. EMPFEHLUNG: WENN Regeln fehlen: Keine User-Regeln - Template
  in rules/ WENN >5 blocked_files: Zu viele geschuetzte Dateien -> Findings: REGEL_FEHLT,
  REGEL_KONFLIKT, REGEL_BLOAT

  ### Edge Cases — SCHRITT 3 (Tiefen-Analysen + Metriken) - Sub-Agent-YAML fehlt →
  "⚠️ {file} existiert nicht" - dev-mas-engineer.yaml fehlt → "❌ Main-Recipe nicht
  gefunden" - tools/ Verzeichnis leer → "⚠️ Keine Tools gefunden" - tools/ dev_*.py
  Syntax-Fehler → "🔴 {file} hat Syntax-Fehler" - tools/ dev_*.sh Syntax-Fehler → "🔴
  {file} hat Bash-Syntax-Fehler" - Keine .md Docs → "⚠️ Keine MAS-Dokumentation" -
  guardian.yaml fehlt oder leer → "ℹ️ Guardian-State noch nicht aktiv" - cat auf eine
  Datei dauert >10s (zu gross) → "⚠️ {file} zu gross — überspringe" - cat scheitert
  (fehlende Berechtigung) → "⚠️ {file} nicht lesbar" - Analyse 16-20 >5min gesamt
  → ⚠️ "Nur {N} von 5 Tiefen-Analysen abgeschlossen" - Keine Session-Daten für Kalibrierung
  (neuer Agent?) → "ℹ️ Agent {name} hat noch keine Sessions — Kalibrierung übersprungen"
  - max_steps in Settings nicht gefunden → "⚠️ {file} hat kein max_steps — überspringen"
  - timeout in Settings nicht gefunden → "⚠️ {file} hat kein timeout — überspringen"
  - Git-Diff schlägt fehl (< 2 Commits) → "ℹ️ Nur 1 Commit — Git-Diff-Analyse übersprungen"
  - git diff HEAD~1 liefert nichts → "ℹ️ Keine Änderungen seit letztem Commit" - Dev_goose_db.py
  hat keine Turn-Daten → "ℹ️ Keine Turn-Daten — Kalibrierung ohne ∅ Turns" - Dev_goose_db.py
  hat keine Kosten-Daten → "ℹ️ Keine Kosten-Daten — Ranking ohne Kosten-Faktor" -
  Guardian-Health nicht verfügbar → "ℹ️ Guardian-Health fehlt — Ranking ohne Health"
  - Prompt-Scores nicht verfügbar → "ℹ️ Prompt-Scores fehlen — Ranking ohne Quality"
  - Metrik-Analysen 21-23 >3min gesamt → ⚠️ "Nur {N} von 3 Metrik-Analysen abgeschlossen"
  - Keine MAS-Sessions → "⚠️ Keine Sessions — Sentiment-Analyse (24) übersprungen"
  - Nur 1 Session → "ℹ️ Nur 1 Session — Trend-Analyse (25) übersprungen (braucht ≥2)"
  - Keine changes.json → "ℹ️ Keine changes.json — Historie-Audit (28) übersprungen"
  - Git-Log leer → "ℹ️ Kein Git-History — Änderungs-Historie (28) übersprungen" -
  goose --version fehler → "⚠️ Goose nicht gefunden — Kompatibilitäts-Analyse (27)
  übersprungen" - goose-docs.ai nicht erreichbar → "⚠️ goose-docs.ai offline — Kompatibilität
  ohne Online-Check" - Kein tests/-Verzeichnis → "ℹ️ Keine Tests — Coverage-Analyse
  (26) übersprungen" - Keine Einträge in changes.json (leer) → "ℹ️ Keine Changes —
  Typen-Verteilung (X2) nicht möglich" - Metrik-Analysen 24-28 >5min gesamt → ⚠️ "Nur
