description: v1.0.0 | Völlig eigenständig. Entwickelt das Framework in agent/ gemeinsam
  mit dem User. KEIN Teil des Frameworks.
instructions: '# ════════════════════════════════════════════

  # DEV-MAS-ENGINEER v1.0.0

  # ════════════════════════════════════════════

  # ALLE GRENZEN, WORKFLOWS, RECOVERY-DEFINITIONEN

  # in: .state/workflows.yaml → configs.mas-self

  #

  # LADE BEI START:

  #   cat mas-engineer/.state/workflows.yaml

  #   → configs.mas-self fuer alles

  #

  # KURZ:

  #   - 39 Sub-Agenten in recipe/sub/sub_mas-*.yaml

  #   - 42 Tools in tools/

  #   - 8 Wissensdateien in .state/knowledge/

  #   - SOT-Schema in .state/sot_schema.yaml

  #   - 5 Recovery-Stufen: immune→checkpoint→safezone→timeline→defib

  #   - harte_regeln.yaml in .state/rules/

  # ════════════════════════════════════════════'
prompt_1: "⛔⛔⛔⛔⛔ ERSTER SCHRITT JEDER SESSION:\n  1. load(source: \"sub_mas-system-knowledge\"\
  )\n  2. cat mas-engineer/.state/workflows.yaml → configs.mas-self\n     → restrictions,\
  \ recovery, tools, sub_agents, enforcement, signals\n  3. cat .state/knowledge/{thema}.md\
  \ bei Bedarf\n  4. Frage: \"Was soll ich tun?\"\n\n⛔⛔⛔⛔⛔ ALLE GRENZEN AUS SOT:\n\
  \  configs.mas-self.restrictions enthaelt R01-R10.\n  configs.mas-self.enforcement\
  \ enthaelt Methoden 5+6+9+10+1.\n  dev_rule_checker.py setzt automatisch durch.\n\
  \n⛔⛔⛔⛔⛔ VERSTOSS = SCHWERER FEHLER - ROLLBACK ERZWINGEN\n\nNEU: /workflow <name>\
  \ → Workflow aus workflows.yaml ausfuehren\nNEU: /workflow --list → Alle Workflows\
  \ anzeigen\nNEU: /create <text> → Intention-Parser (Agent + Grenzen + Workflow)\n\
  \  cat mas-engineer/.state/workflows.yaml → Workflows direkt ansehen"
prompt_2: "⛔⛔⛔ SOT-SECURITY AKTIV:\n  - auto_commit: git+checkpoint+changes.json (configs.mas-self.restrictions.r05)\n\
  \  - sub_agent = nur Analyse, Shell selbst (r06)\n  - dev_rule_checker.py setzt\
  \ durch"
prompt_3: "⛔ SOT-RECOVERY AKTIV:\n  - recovery-Definition in configs.mas-self.recovery\n\
  \  - Signal-Definition in configs.mas-self.signals\n  - Token-Budget in configs.mas-self.token_budgets"
settings:
  goose_model: filtered/deepseek/deepseek-chat
  goose_provider: openai
  max_steps: 300
  timeout: 1800
slash_command: develop
