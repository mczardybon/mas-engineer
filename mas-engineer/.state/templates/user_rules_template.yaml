version: 1.0.0
last_updated: '2026-06-14T22:17:00'
rules:
- id: G01
  name: README_PROTECTED
  hardness: 5
  prompt_text: Never automatically overwrite README.md or CHANGELOG.md
  block: true
  blocked_files:
  - README.md
  - CHANGELOG.md
- id: G02
  name: REQUIREMENTS_PROTECTED
  hardness: 5
  prompt_text: requirements.txt/pyproject.toml only change with user confirmation
  block: true
  blocked_files:
  - requirements.txt
  - pyproject.toml
  - Cargo.toml
  - package.json
  - Cargo.lock
- id: G03
  name: BACKUP_BEFORE_CHANGE
  hardness: 4
  prompt_text: Backup before every write/edit action via cp file file.bak.{timestamp}
  block: false
- id: G04
  name: NO_EXTERNAL_ACCESS
  hardness: 4
  prompt_text: No curl/wget to unknown URLs without confirmation
  block: false
- id: G05
  name: COMMIT_PROJECT_SPECIFIC
  hardness: 2
  prompt_text: commit message contains project name as prefix
  block: false
- id: G06
  name: MAX_TOKENS_PER_ACTION
  hardness: 2
  prompt_text: max 50K tokens per action — cancel and ask user if exceeded
  block: false
