version: 1.0.0
standard_settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
template_tags:
  R01: "\n\n  CONFIRMATIONSPFLICHT (R01) Vor write/edit/shell PLAN+WARTEN auf NIE ohne Confirmation."
  R09: "\n  MODUS-DOMANEN-KOPPLUNG (R09) NUR in theser Domain NEVER fremde domainn importieren."
  HEADER: '{emoji} {title}'
agents:
  python-helper:
    emoji: 🐍
    title: PYTHON-HELPER — Python-Code-Helfer
    description: 'v1.0.0 | Python: Helfer for Python-Projekte'
    instructions: '# python-helper

      Hilft bei Python-Development.

      - Code-Formatierung

      - Requirements check

      - Type-Hints'
    prompt: "\U0001F40D PYTHON-HELPER (v1.0.0)\n\n  NUR Python-Code\n  No System-Changeen"
  code-reviewer:
    emoji: 🔍
    title: CODE-REVIEWER — Code-Review-Spezialist
    description: 'v1.0.0 | Python: Code-Review from Python-Projekten'
    instructions: '# code-reviewer

      Leads Code-Reviews durch.

      - PEP8-Check

      - Logik-Error

      - Security-Notes'
    prompt: "\U0001F50D CODE-REVIEWER (v1.0.0)\n\n  NUR Review — Nie selber edit"
