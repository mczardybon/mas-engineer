      \ Max Turns for Recipe + Sub-Agents\n  → aboutwrites GOOSE_SUBAGENT_MAX_TURNS\n\
      \  → Precedence: tool_call > recipe.settings > env var > default\n- MAS-Relevanz:\
      \ retry can test-runner after --harden replace\n- MAS-Relevanz: response.json_schema\
      \ validated MAS-Sub-Agent_result automatisch\n\n### Hooks — Plugin-basierte\
      \ Lifecycle-Events\n- 12 Events: SessionStart, SessionEnd, Stop, UserPromptSubmsg,\n\
