      - indent Filter: For multi-line Values (var | indent(2))\n- Built-in: recipe_dir\
      \ = Path to Recipe-Directory\n- MAS-Relevanz: framework-Recipes couldn from\
      \ Basis-Recipe erben\n- MAS-Relevanz: recipe_dir for relative Paths in Recipes\n\
      \n### Sandbox & Enhanced Editing\n- developer__text_editor: Diff-basierter Code-Editor\
