  migration-helper:
    category: migration
    emoji: 🔄
    title: SUB-MAS-MIGRATION-HELPER — framework Migration (Sub-agent)
    description: 'v1.0.0 | MAS-internal: Analyzed Breaking Changes between framework-Versionen,
