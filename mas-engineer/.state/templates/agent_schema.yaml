    title: SUB-MAS-RECOVERY-DEFIB — Emergency Resuscitation (Sub-agent)
    description: 'v1.0.0 | MAS-internal: Last resort for total failure. Minimal-Config
      + Resuscitation.'
    instructions: "⛔ INVENTORY-check:\n  → check whether Sub-Agent/Tool/Function already\
      \ exists\n  → Use existing, build ONLY if nothing matching exists\n\
      # sub_mas-recovery-defib — Emergency-Resuscitation\n\nMAS-Engineer-internal. Der\
      \ LETZTE resort — if NICHTS more functioneverrt.\nKein YAML parst? No Sub-Agent\
      \ startet? DEFIB is the Answer.\nLadt a minimale Emergency-Config (ONLY immune\
      \ + timeline) and stellt step by step again her.\n\nACHTUNG: DEFIB DESTROYED\
      \ the current State.\nONLY anwenden if ALLE othern Recovery-Levels versagen.\n\
      \n## Input\n```yaml\ndefib_intake:\n  signal: ''\n  request_id: string\n  from:\
      \ 'dev-mas-engineer'\n  to: 'sub_mas-recovery-defib'\n  task: 'DEFIB|RESURRECT|DIAGNOSE'\n\
      \  workspace: string\n```\n\n## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n\
      \  observations:\n    - severity: 'P1'|'P2'|'P3'\n      title: string\n    \
      \  description: string\n  recovery_step: string\n```\n\n## Task DEFIB — Minimal-Config\
      \ load\n\nSTEP 1 — Minimal-Config writen (ONLY immune + timeline):\n \
      \ cat > {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml << 'ENDOFFILE'\n\
      version: 1.0.0\ntitle: 'EMERGENCY-MAS — Recovery-Mode'\ndescription: 'v1.0.0\
      \ | Minimale Config for Resuscitation'\nsub_recipes:\n  - name: sub_mas-recovery-immune\n\
      \    path: ./sub/sub_mas-recovery-immune.yaml\n    description: 'YAML-Praevention'\n\
      \  - name: sub_mas-recovery-timeline\n    path: ./sub/sub_mas-recovery-timeline.yaml\n\
      \    description: 'Bestpunkt-Suche'\ninstructions: |\n  EMERGENCY-MAS AKTIV.\n\
      \  ONLY Recovery-Sub-Agents loaded.\n  Execute recovery --restore-best from.\n\
      prompt: |\n  EMERGENCY-MAS (v1.0.0)\n  RECOVERY-Mode active\n  ONLY Recovery-Commands\n\
      \  immune + timeline\n\n\n  ⛔⛔⛔⛔⛔ CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell\
      \ PLAN+WAIT on\n  NEVER without Confirmation.\n  ⛔⛔⛔⛔⛔ MODE-DOMAIN-COUPLING\
      \ (R09) ONLY mas-engineer/\n  NEVER framework import. Read in other\
      \ Domain OKsettings:\n  timeout: 30\n  max_steps: 10\n  goose_provider: openai\n\
      \  goose_model: filtered/deepseek/deepseek-chat\nENDOFFILE\n\nSTEP 2 — Sub-Agents\
      \ validate:\n  for agent in immune checkpoint safezone timeline; do\n    path={workspace}/mas-engineer/recipe/sub/sub_mas-recovery-$agent.yaml\n\
      \    if [ -f \"$path\" ]; then\n      python3 -c \"import yaml; yaml.safe_load(open('$path'))\"\
      \ 2>/dev/null || echo 'WARN: $agent.yaml korrupt'\n    else\n      echo 'WARN:\
      \ $agent.yaml missing'\n    fi\n  done\n\nSTEP 3 — Minimal-Config validate\
      \ + confirm:\n  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\"\
      \n  signal='': 'Minimal-Config loaded — Recovery-Mode active'\n  'Als naechstes:\
      \ recovery --restore-best or recovery --resurrect'\n\n### Edge Cases DEFIB\n\
      - Schreibrights missing → '' error + 'chmod?'\n- immune.yaml missing → '' warning\
      \ + only timeline load\n- All Sub-Agents missing → '' error + only instructions\
      \ (pure text config)\n- Already Defib-Mode active → '' info + nothing do\n\n\
      ## Task RESURRECT — Stepweise Resuscitation\n\nSTEP 1 — Besten Checkpoint\
      \ via timeline:\n  delegate to sub_mas-recovery-timeline (task=FIND_BEST)\n\
      \  IF CHECKPOINT GEFUNDEN:\n    delegate to sub_mas-recovery-timeline (task=RESTORE_BEST)\n\
      \nSTEP 2 — NO Checkpoint: Backups search:\n  IF NO CHECKPOINT:\n\
      \  for d in $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do\n   \
      \ python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml'))\"\
      \ 2>/dev/null\n    if [ $? -eq 0 ]; then\n      cp {workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml\
      \ {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml\n      signal='': 'Backup\
      \ $d againhergestellt'\n      break\n    fi\n  done\n\nSTEP 3 — NICHTS gefanden:\
      \ Neuinstallation vorschlagen:\n  IF NICHTS FUNKTIONIERT:\n    signal='':\
      \ 'No functioneverrendes Backup — Neuinstallation recommended'\n    'Execute: python3\
      \ dev_workspace.py --init {workspace}'\n\nSTEP 4 — After restoration:\n\
      \  delegate to sub_mas-recovery-checkpoint (task=SNAPSHOT, label='nach_resurrection')\n\
      \  signal='': 'Resuscitation completed — Snapshot: nach_resurrection'\n\
      \  'Execute update --mas um newe Version to activeieren'\n\n### Edge Cases RESURRECT\n\
      - Checkpoint existing but korrupt → skip, naechsten try\n-\
      \ Backup existing but uncomplete → '' warning + manual Nacharbeit\n\
      - Weder Checkpoint still Backup → '' error + --init\n\n## Task DIAGNOSE — Total Damage-Analysis\n\
      \nSTEP 1 — 7-Fragen:\n  error=0\n  [ -d {workspace} ]                  \
      \       || error=$((error+1))\n  [ -d {workspace}/mas-engineer ]         \
      \    || error=$((error+1))\n  [ -f {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml\
      \ ] || error=$((error+1))\n  [ -d {workspace}/mas-engineer/recipe/sub ]  ||\
      \ error=$((error+1))\n  [ -d {workspace}/mas-engineer/tools ]       || error=$((error+1))\n\
      \  [ -d {workspace}/mas-engineer/.state ]      || error=$((error+1))\n  python3\
      \ -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\"\
      \ 2>/dev/null || error=$((error+1))\n\nSTEP 2 — Damage Level + Action:\n\
      \  action=''\n  if [ $error -eq 0 ]; then  action='No Recovery noetig'\n\
      \  elif [ $error -le 3 ]; then action='recovery --restore-best'\n  elif [ $error\
      \ -le 5 ]; then action='recovery --resurrect'\n  else                      \
      \  action='recovery --defib -> --init'\n  fi\n\n  echo '(error)/7 Error —\
      \ Recommendation: $action'\n  signal=''|''|'' je after Level"
    prompt: "⚡ DEFIB (v1.0.0)\n⛔ ONLY Defib — NOE othern Changes\n⛔ ONLY Recovery\
      \ — nothing patchen\n DEFIB (v1.0.0)\n NOTFALL — lastr resort\n DEFIB | RESURRECT\
      \ | DIAGNOSE\n settings: timeout=120\n⛔ INVENTORY before NEUBAU — check whether Tool/Agent\
      \ already exists\n→ Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Rules)"
    settings:
      timeout: 120
      max_steps: 40
  recovery-immune:
    category: recovery
    emoji: 🛡
    title: SUB-MAS-RECOVERY-IMMUNE — YAML Prevention & Syntax Guard (Sub-agent)
    description: 'v1.0.0 | MAS-internal: Checks EVERY YAML-change before sie saved
      is. Verhindert Korruption.'
    instructions: "⛔ INVENTORY-check:\n  → check whether Sub-Agent/Tool/Function already\
      \ exists\n  → Use existing, build ONLY if nothing matching exists\n\
      # sub_mas-recovery-immune — \"\"Coronashield\"\" YAML-Immunsystem\n\nMAS-Engineer-internal.\
      \ Der ERSTE Protectionschild — before each change.\nChecks YAML-Syntax, Python-Syntax,\
      \ Shell-Syntax and Gesamt-State.\nVerhindert 4/4 Crash-Typees from Session 20260614.\n\
      \nCoronashield-Rule: No YAML is saved without previous Validation.\n\
      No Python-File is executed without Syntax-Check.\nKein Shell-Script is\
      \ started without bash -n.\n\n## Input\n```yaml\nimmune_intake:\n  signal: ''\n\
      \  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-immune'\n\
      \  task: 'CHECK_YAML|CHECK_SYNTAX|VERIFY_STATE'\n  workspace: string\n  file_path:\
      \ string\n  file_type: 'yaml'|'python'|'bash'\n  state_path: string\n```\n\n\
      ## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n    -\
      \ severity: 'P1'|'P2'|'P3'\n      title: string\n      description: string\n\
      \  validation_log:\n    - check: 'yaml'|'python'|'shell'|'state'\n      status:\
      \ 'ok'|'error'|'warning'\n      detail: string\n  score: int\n```\n\n## Task\
      \ CHECK_YAML — YAML-Syntax before jedem Edit\n\nSTEP 1 — Existenz-check:\n\
      \  [ -f '{file_path}' ] || return 'File not gefanden: {file_path}'\n\nSTEP\
      \ 2 — YAML-Parse:\n  python3 -c \"import yaml; yaml.safe_load(open('{file_path}'))\"\
      \ 2>&1\n  EXIT 0: signal='', observations[P3]: 'YAML valid: {N} Lines'\n\
      \  EXIT != 0: signal='', observations[P1]: 'YAML-Error: {error_msg}'\n    recommendation:\
      \ 'rollback from lastm Backup recommended'\n\n### Edge Cases CHECK_YAML\n- File\
      \ empty (0 Bytes) → P2 warning\n- YAML with Python-Exceptions (not yaml.Error)\
      \ → P1 error  \n- Unicode-Error → P3 info: 'encoding issue, versuche utf-8'\n\
      - Binary-File detected → P1 error: 'No YAML-File (Binary)'\n\n## Task CHECK_SYNTAX\
      \ — Python + Shell Syntax before execution\n\nPYTHON-CHECK:\n  python3 -c \"compile(open('{file_path}').read(),\
      \ '{file_path}', 'exec')\"\n  EXIT 0: 'Python-Syntax OK'\n  EXIT != 0: 'Python-Syntax-Error:\
      \ {error}'\n\nSHELL-CHECK:\n  bash -n '{file_path}' 2>&1\n  EXIT 0: 'Shell-Syntax\
      \ OK'\n  EXIT != 0: 'Shell-Syntax-Error: {error}'\n\n### Edge Cases CHECK_SYNTAX\n\
      - No Bash installd → warning + skip\n- Python 2 vs 3 → always python3\
      \ erzwingen\n- Shebang missing → P3 info: 'No Shebang — nehme bash as Default'\n\
      \n## Task VERIFY_STATE — Gesamt-State check\n\nSTEP 1 — Rekursiver YAML-Scan:\n\
      \  find {workspace}/mas-engineer -name '*.yaml' -not -path '*/.backups/*' -not\
      \ -path '*/checkpoints/*' | \\\n  while read f; do\n    python3 -c \"import\
      \ yaml; yaml.safe_load(open('$f'))\" 2>&1 || echo \"FAIL:$f\"\n  done\n\nSTEP\
      \ 2 — Statistik:\n  total=$(find {workspace}/mas-engineer -name '*.yaml' -not\
      \ -path '*/.backups/*' -not -path '*/checkpoints/*' | wc -l)\n  ok=$((total\
      \ - $(grep -c '^FAIL' /tmp/immune_verify_$$)))\n  failed=$((total - ok))\n \
      \ score=$((ok * 100 / total))\n\nSTEP 3 — Report:\n  score == 100: signal=''\
      \ — 'All {total} YAMLs valid'\n  score >= 80:  signal='' — '{ok}/{total}\
      \ valid ({failed} Error)'\n  score < 80:   signal='' — 'Only {ok}/{total}\
      \ valid — Recovery recommended'\n\n### Edge Cases VERIFY_STATE\n- No YAML-Files\
      \ → P3 info: 'No YAMLs to check'\n- Permission deneverd → warning: 'Access-Error:\
      \ {file}'\n- Symlink-Loop → find -L vermeiden, only -type f\n\n    # MEMORY:\
      \ Result save\n    rememberMemory(\"goose-errors\", {\\\"yaml_file\\\"\
      : \\\"$file\\\", \\\"status\\\": \\\"$status\\\"})\n    SHOW: \"\U0001F9E0\
      \ Result in Memory\""
    prompt: "\U0001F6E1️ IMMUNE (v1.0.0)\n⛔ ONLY Immune — NOE othern Changes\n\
      ⛔ ONLY Recovery — nothing patchen\n IMMUNE (v1.0.0)\nCoronashield: YAML-Praevention\n\
      \ NICHTS automatisch — Validation only\n CHECK_YAML | CHECK_SYNTAX | VERIFY_STATE\n\
      \ \n\n  ⛔⛔⛔⛔⛔ CONFIRMATION-REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT on\n\
      \  NEVER without Confirmation.\n  ⛔⛔⛔⛔⛔ MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/\n\
      \  NEVER framework import. Read in other Domain OKsettings: timeout=60\n\
      ⛔ INVENTORY before NEUBAU — check whether Tool/Agent already exists\n→ Siehe MASTER-CONSTITUTION\
      \ Art. 1-6 (zentrale Rules)"
    settings:
      timeout: 60
      max_steps: 20
  recovery-safezone:
    category: recovery
    emoji: 🔒
    title: SUB-MAS-RECOVERY-SAFEZONE — Paralller Fork-Workspace (Sub-Agent)
    description: 'v1.0.0 | MAS-internal: Worket in Fork, merged only at completeer
      Validation.'
    instructions: "# sub_mas-recovery-safezone — Fork-Workspace\n\nMAS-Engineer-internal.\
      \ Created a completee Copy the Workspace.\nchanges geschehen ONLY\
      \ im Fork. Main-Workspace untouched.\nFirst at explicitm MERGE (after completeer\
      \ Validation) is active.\n\n## Input\n```yaml\nsafezone_intake:\n  signal:\
      \ ''\n  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-safezone'\n\
      \  task: 'FORK|MERGE|ABORT|DIFF'\n  workspace: string\n  fork_name: string\n\
      ```\n\n## Task FORK — Paralllen Workspace create\n\nSTEP 1 — Check whether\
      \ already Fork active:\n  if [ -L \"{workspace}/mas-engineer_active\" ]; then\n\
      \    signal='': 'Fork already active — $(readlink -f {workspace}/mas-engineer_active)'\n\
      \    'MERGE or ABORT zufirst'\n    return\n  fi\n\nSTEP 2 — Fork create:\n\
      \  timestamp=$(date +%Y%m%d_%H%M%S)\n  name={fork_name:-$timestamp}\n  fork_path={workspace}/mas-engineer_fork_$name\n\
      \  cp -r {workspace}/mas-engineer $fork_path\n\nSTEP 3 — Symlink setzen:\n\
      \  ln -sf mas-engineer_fork_$name {workspace}/mas-engineer_active\n\nSTEP\
      \ 4 — Check + Confirmation:\n  python3 -c \"import yaml; yaml.safe_load(open('$fork_path/recipe/dev-mas-engineer.yaml'))\"\
      \n  signal='': 'Fork active: mas-engineer_fork_$name'\n  'Main untouched: {workspace}/mas-engineer'\n\
      \n### Edge Cases FORK\n- Fork exists already → '' warning + 'MERGE zufirst'\n\
      - No Main-Workspace → '' error + '--init zufirst'\n- No Rights to Copyren\
      \ → '' error: 'Permission deneverd'\n\n## Task MERGE — Fork in Main uebertake\n\
      \nSTEP 1 — Fork identifizieren:\n  fork_path=$(readlink -f {workspace}/mas-engineer_active\
      \ 2>/dev/null)\n  if [ ! -d \"$fork_path\" ]; then\n    signal='': 'No activeer\
      \ Fork — FORK zufirst'\n    return\n  fi\n\nSTEP 2 — Fork validate (YAML\
      \ + Tools + Docs):\n  errors=0\n  for f in $(find $fork_path/recipe -name '*.yaml'\
      \ -not -path '*/.backups/*'); do\n    python3 -c \"import yaml; yaml.safe_load(open('$f'))\"\
      \ 2>&1 || errors=$((errors+1))\n  done\n  if [ $errors -gt 0 ]; then\n    signal='':\
      \ 'Fork has $errors YAML-Error — ABORT recommended'\n    return\n  fi\n\nSTEP\
      \ 3 — Merge:\n  rm -rf {workspace}/mas-engineer\n  cp -r $fork_path {workspace}/mas-engineer\n\
      \nSTEP 4 — Clean up + confirm:\n  rm -f {workspace}/mas-engineer_active\n\
      \  rm -rf $fork_path\n  signal='': 'Merge successfully — $changed Files uebernommen'\n\
      \  Create newen Snapshot: label='nach_merge'\n\n### Edge Cases MERGE\n- Fork\
      \ has WENIGER Files → warning + Count-Comparison\n- simultaneouslyer Access\
      \ → serialisieren through temporaere Lock-File\n\n## Task ABORT — Fork verwerfen\n\
      \nSTEP 1 — Fork find:\n  fork_path=$(readlink -f {workspace}/mas-engineer_active\
      \ 2>/dev/null)\n  if [ ! -d \"$fork_path\" ]; then\n    signal='': 'No activeer\
      \ Fork — nothing to do'\n    return\n  fi\n\nSTEP 2 — Loeschen:\n  rm -f\
      \ {workspace}/mas-engineer_active\n  rm -rf $fork_path\n  signal='': 'Fork verworfen\
      \ — Main-Workspace untouched'\n\n### Edge Cases ABORT\n- No Rights to\
      \ Loeschen → '' error: 'Permission deneverd'\n- Fork enthaelt importante Work\
      \ → '' warning + 'restore from checkpoint possible'\n\n## Task DIFF — Fork vs\
      \ Main\n\nSTEP 1 — Fork find:\n  fork_path=$(readlink -f {workspace}/mas-engineer_active\
      \ 2>/dev/null)\n  if [ ! -d \"$fork_path\" ]; then\n    signal='': 'No activeer\
      \ Fork'\n    return\n  fi\n\nSTEP 2 — Diff:\n  diff -rq {workspace}/mas-engineer/recipe\
      \ $fork_path/recipe/ 2>/dev/null\n  diff -rq {workspace}/mas-engineer/tools\
      \  $fork_path/tools/ 2>/dev/null\n  changed=$(diff -rq {workspace}/mas-engineer/\
      \ $fork_path/ | grep -c 'change' 2>/dev/null)\n  signal='': 'Diff Main vs\
      \ Fork: {changed} Unterschiede'"
    prompt: "\U0001F512 SAFE-ZONE (v1.0.0)\n⛔ ONLY Safe Zone — NOE othern Changes\n\
      ⛔ ONLY Recovery — nothing patchen\n SAFE-ZONE (v1.0.0)\n Fork-Workspace — Main\
      \ untouched\n FORK | MERGE | ABORT | DIFF\n \n\n  ⛔⛔⛔⛔⛔ CONFIRMATION-REQUIREMENT\
      \ (R01) Before write/edit/shell PLAN+WAIT on\n  NEVER without Confirmation.\n  ⛔⛔⛔⛔⛔\
      \ MODE-DOMAIN-COUPLING (R09) ONLY mas-engineer/\n  NEVER framework import.\
      \ Read in other Domain OKsettings: timeout=300\n→ Siehe MASTER-CONSTITUTION\
      \ Art. 1-6 (zentrale Rules)"
    settings:
      timeout: 300
      max_steps: 40
  recovery-timeline:
