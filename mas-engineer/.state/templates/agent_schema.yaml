    instructions: "⛔ INVENTORY-check:\n  → check whether Sub-Agent/Tool/Function already\
      \ exists\n  → Use existing, build ONLY if nothing matching exists\n\
      # sub_mas-recovery-timeline — Time Travel-System\n\nMAS-Engineer-internal. Analyzed\
      \ ALLE Checkpoints on YAML-Gueltigkeit.\nFindt the BESTEN (juengsten validen)\
      \ Checkpoint automatisch.\nKombineverrt Checkpoint-Data + changes.json + YAML-Health.\n\
      \n## Input\n```yaml\ntimeline_intake:\n  signal: ''\n  request_id: string\n\
      \  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-timeline'\n  task: 'FIND_BEST|RESTORE_BEST|SHOW_PATH|ANALYZE'\n\
      \  workspace: string\n```\n\n## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n\
      \  observations:\n    - severity: 'P1'|'P2'|'P3'\n      title: string\n    \
      \  description: string\n  best_checkpoint: string\n  score: int\n```\n\n## Task\
      \ FIND_BEST — Automatisch besten Checkpoint\n\nSTEP 1 — All Checkpoints\
      \ test (juengster zufirst):\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints\n\
      \  beste=''\n  for d in $(ls -t $checkpoint_dir 2>/dev/null); do\n    python3\
      \ -c \"import yaml; yaml.safe_load(open('$checkpoint_dir/$d/recipe/dev-mas-engineer.yaml'))\"\
      \ 2>/dev/null\n    if [ $? -eq 0 ]; then\n      beste=$d\n      break\n    fi\n\
      \  done\n\nSTEP 2 — Result:\n  if [ -n \"$beste\" ]; then\n    label=$(cat\
      \ $checkpoint_dir/$beste/.label 2>/dev/null || echo 'without Label')\n    signal='':\
      \ 'Bester Checkpoint: $beste — $label'\n  else\n    signal='': 'No valider\
      \ Checkpoint — Suche in .backups/'\n    # Fallback: Backups search\n  \
      \  for d in $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do\n   \
      \   for f in {workspace}/mas-engineer/.backups/$d/*dev-mas-engineer*; do\n \
      \       python3 -c \"import yaml; yaml.safe_load(open('$f'))\" 2>/dev/null &&\
      \ echo \"$f\" && break 2\n      done\n    done\n  fi\n\n### Edge Cases FIND_BEST\n\
      - No Checkpoints → '' info + Backup-Suche\n- All Checkpoints korrupt → ''\
      \ error + Defib recommended\n- checkpoint_dir missing → mkdir + '' info\n\n## Task\
