      \n2. KOPIERE: 3 SI-Subs + Orchestrator from MAS-Installation\n   QUELLE: ~/.config/goose/recipes/sub/\n\
      \   ZIEL: {workspace}/{project_name}/recipe/sub/\n   UEBERSETZE: sub_mas- →\
