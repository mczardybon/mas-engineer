    emoji: 📦
    title: SUB-MAS-RECOVERY-TIMELINE — Automatische Bestpunkt-Suche (Sub-Agent)
    description: 'v1.0.0 | MAS-internal: Findt automatisch the besten Checkpoint, stellt
