      \ grep, wc, find, head, file, cd\n- `glob`: $HOME/.config/goose/recipes/**/*.yaml\
      \  (installde Rezepte)\n- `glob`: $HOME/.config/goose/docs/core/*.md, $HOME/.config/goose/docs/executor/*.md,\
      \ $HOME/.config/goose/docs/planner/*.md\n- `read`: $HOME/.config/goose/config.yaml,\
      \ $HOME/.config/goose/docs/core/scope.md, $HOME/.config/goose/docs/core/governance.md\n\
      - INPUT: codebase_path (Target-Repo) (installde Docs $HOME/.config/goose/docs/)\n\
      \n## Procedure\n\n### Phase 1 — YAML-Integrity (STICHPROBE: 5 YAMLs, not all\
      \ 95)\n- Vorher: glob(\".../**/*.yaml\") → 95 YAMLs = 95 LLM-Calls\n- Nachher:\
      \ Only 5 Stichprabove (core + 2 specialists + 2 sub)\n- samples = [\"executor.yaml\"\
      , \"specialist_security.yaml\", \"specialist_backend.yaml\", \"sub_dispatcher.yaml\"\
      , \"sub_fw-monitor-health.yaml\"]\n- For p in samples: python3: yaml.safe_load(f\"\
      $HOME/.config/goose/recipes/{p}\")\n- → Parse-Error → CRITICAL \"YAML-Error\
      \ in {p}\"\n- → required fields check: version, title, description\n\n### Phase\
      \ 2 — INVARIANTEN (ONLY 1 check)\n- Existiert framework-governance.md?\n- if\
      \ not os.path.exists(\"$HOME/.config/goose/docs/framework-governance.md\"):\n\
      \    findings[] += CRITICAL \"INV: framework-governance.md missing\"\n\n### Phase\
      \ 3 — GOVERNANCE (ONLY 1 Stichprobe)\n- 1 schnelle grep-check\n- bash(\"grep\
      \ -rn 'sk-[A-Za-z0-9]' $HOME/.config/goose/recipes/ 2>/dev/null | head -5\"\
      )\n- → Treffer >0? findings[] += CRITICAL \"GOV-4: Hardcodierte Credentials\"\
      \n\n### Phase 4 — STRUKTUR-CHECKS (1 bash-Call)\n- cd $HOME/.config/goose/recipes\n\
      - spec=$(ls specialist_*.yaml 2>/dev/null | wc -l)\n- sub=$(ls sub_*.yaml 2>/dev/null\
      \ | wc -l)\n- main=$(ls executor.yaml planner.yaml framework-controller.yaml\
      \ framework-starter.yaml 2>/dev/null | wc -l)\n- phantom=$(grep -rn 'agent/dev-team'\
      \ $HOME/.config/goose/docs/ 2>/dev/null | wc -l)\n- → spec!=47 or sub!=44\
      \ or main!=4? findings[] += CRITICAL \"STRUKTUR: Counts wrong\"\n- → phantom>0?\
      \ findings[] += CRITICAL \"STRUKTUR: Phantom-Paths\"\n\n## Result\n- signal:\
      \ \"\U0001F7E2 DONE\"\n- from: \"fw-monitor-health\"\n- to: \"framework-controller\"\
      \n- status: \"success\"\n- checks_total: N\n- checks_passed: N\n- invariablent_violations:\
      \ N\n- governance_violations: N\n\n## Boundaries\n- Only statische File-Analysis\
      \ (no Runtime-Session-check)\n- No Schreiben ausser findings[] im Result\n\
      - No automatischen Correctionen — only Melden an framework-controller"
    prompt: "\U0001FA7A MONITOR-HEALTH (v1.0.0)\n⛔ ONLY framework-Health check — NOE\
