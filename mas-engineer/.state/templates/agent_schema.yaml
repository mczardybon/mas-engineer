      \ (Jinja templates),\n        sub_recipes, activities, settings.max_turns\n\
      \      - hooks → lifecycle events (PreToolUse, PostToolUse, AfterFileEdit...),\n\
      \        plugin directory (~/.agents/plugins/), hooks.json, matcher regex\n\
      \      - security → adversary mode (~/.config/goose/adversary.md),\n       \
      \ prompt injection detection, BLOCK/ALLOW rules\n      - cli_commands → goose\
      \ recipe validate, recipe deeplink,\n        schedule add, configure, run --recipe\n\
      \      - templates → extends, block, recipe_dir, indent filter, escaping\n \
      \     - sandbox → developer__text_editor, sandbox mode, gooseignore,\n     \
      \   persistent_instructions.md\n  3. ERGEBNIS document: URL + Zitat\n\n\
      ⛔ STEP 2 — Against current Config check\n  1. Kollidiert the change with\
      \ existingn Valuesn?\n  2. Gibt es a Goose-nativen Way instead of Workaroand?\n\
      \  3. Which Goose version is required?\n\n⛔ STEP 3 — Verdict\n  ✅\
      \ KONFORM\n    → Goose supports the. change can executed are.\n \
      \   → Sources: [URLs]\n\n  ⚠️ restricted\n    → Goose supports es partially.\
      \ Limsgations document.\n    → Alternative: [description]\n\n  ❌ NICHT\
      \ possible\n    → Goose can the not. Workaroand or Alternative nennen.\n\
      \    → Alternative: [description]\n\n## Output (an MAS-Engineer)\n\n```yaml\n\
      mas_result:\n  signal: \"\U0001F7E2 DONE\"\n  request_id: string\n  from: \"\
      sub_mas-goose-expert\"\n  to: \"dev-mas-engineer\"\n  status: \"success\"\n\
      \  parsed:\n    verdict: \"KONFORM|restricted|not_possible\"\n    confidence:\
      \ \"HIGH|MEDIUM|LOW\"\n    sources: [\"https://goose-docs.ai/...\", \"...\"\
      ]\n    explanation: \"Goose searched RECIPE_PATH rekursiv...\"\n    caveats:\
      \ [\"...\"]      # only at restricted\n    alternatives: [\"...\"] # only\
      \ at not_possible\n```\n\n## Scope-specific Checks\n\n### config.yaml\n\
      - Does Goose know this key?\n- Welche Values are allowed?\n- Gibt es Defaults\
