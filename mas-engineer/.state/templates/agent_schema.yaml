      \  → Provider, Extensions, Settings, Recipe GitHub Repo\n- `goose run --recipe\
      \ <file>`: Recipe execute\n  → --params key=value, --interactive, --explain\n\
      - MAS-Relevanz: `goose recipe validate` before Install instead of python3 yaml.safe_load\n\
