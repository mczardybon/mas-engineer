  recovery-checkpoint:
    category: recovery
    emoji: 📸
    title: SUB-MAS-RECOVERY-CHECKPOINT — Git-like Snapshots (Sub-agent)
    description: 'v1.0.0 | MAS-internal: Created Snapshots before each Change. Erpossiblet
      precise positioning.'
    instructions: "⛔ INVENTORY-check:\n  → check whether Sub-Agent/Tool/Function already\
      \ exists\n  → Use existing, build ONLY if nothing matching exists\n\
      # sub_mas-recovery-checkpoint — Snapshot-System\n\nMAS-Engineer-internal. Created\
      \ komplette Workspace-Snapshots before Changes.\nMemoryt recipe/ + tools/\
      \ + docs/ + state/ in .state/checkpoints/{timestamp}/.\nErpossiblet: \"Position\
      \ State from before 3 Stepsn again her.\"\n\n## Input\n```yaml\ncheckpoint_intake:\n\
      \  signal: ''\n  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-checkpoint'\n\
      \  task: 'SNAPSHOT|LIST|RESTORE|DIFF'\n  workspace: string\n  label: string\n\
      \  id: int\n```\n\n\n## Procedure AUTO_COMMIT — Automatisch after each change\n\
      1. git add -A && git commsg -m \"[MAS] {action}\"\n2. checkpoint .state/checkpoints/{ts}/\n\
      3. changes.json + {timestamp, action}\n4. todo__todoWwrite(\"✅ {action}\")\n\
      ## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n    -\
      \ severity: 'P3'\n      title: 'Checkpoint {id}: {label}'\n      description:\
      \ '{N} Files, {size}, {timestamp}'\n```\n\n## Task SNAPSHOT — State sichern\n\
      \nSTEP 1 — Timestamp + Directory:\n  timestamp=$(date +%Y%m%d_%H%M%S)\n\
      \  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints/$timestamp\n \
      \ mkdir -p $checkpoint_dir\n\nSTEP 2 — Backup the 4 Kernbereiche:\n  cp -r\
      \ {workspace}/mas-engineer/recipe $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/tools\
      \  $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/docs   $checkpoint_dir/\n\
      \  cp {workspace}/mas-engineer/.state/changes.json       $checkpoint_dir/ 2>/dev/null\
      \ || true\n  cp {workspace}/mas-engineer/.state/best-practices.yaml $checkpoint_dir/\
      \ 2>/dev/null || true\n\nSTEP 3 — Metadaten writen:\n  echo '{label}'\
      \ > $checkpoint_dir/.label\n  echo $(find $checkpoint_dir -type f | wc -l) >\
      \ $checkpoint_dir/.file_count\n  du -sh $checkpoint_dir/ | cut -f1 > $checkpoint_dir/.size\n\
      \  date -Iseconds > $checkpoint_dir/.created\n\nSTEP 4 — Confirmation:\n\
      \  signal=''\n  'Checkpoint $timestamp created: {label}, $(cat $checkpoint_dir/.file_count)\
      \ Files, $(cat $checkpoint_dir/.size)'\n\n### Edge Cases SNAPSHOT\n- No\
      \ recipe/ existing → warning + only tools+docs+state sichern\n- Schreibrights\
      \ missing → signal='' error: 'Permission deneverd on {dir}'\n- Disk voll (OSError)\
      \ → signal='' error: 'No Memoryplatz — Checkpoint not created'\n- Label\
      \ >80 characters → on 80 kuerzen\n\n## Task LIST — last 10 Checkpoints\n\nSTEP\
      \ 1 — Check Existenz:\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints\n\
      \  if [ ! -d \"$checkpoint_dir\" ] || [ -z \"$(ls -A $checkpoint_dir 2>/dev/null)\"\
      \ ]; then\n    signal='': 'No Checkpoints existing — Create firsten with\
      \ SNAPSHOT'\n    return\n  fi\n\nSTEP 2 — Formatierte List:\n  echo '===\
      \ LETZTE 10 CHECKPOINTS ==='\n  echo ' #  Timestamp          Label         \
      \               Files  Groesse'\n  ls -t $checkpoint_dir | head -10 | while\
      \ read d; do\n    label=$(cat $checkpoint_dir/$d/.label 2>/dev/null || echo\
      \ '?')\n    files=$(cat $checkpoint_dir/$d/.file_count 2>/dev/null || echo '?')\n\
      \    size=$(cat $checkpoint_dir/$d/.size 2>/dev/null || echo '?')\n    echo\
      \ \"  $d  $label  ${files}  ${size}\"\n  done\n\n### Edge Cases LIST\n- No\
      \ checkpoints/-Directory → 'INFO: No Checkpoints'\n- Kaputtes .label or\
      \ .size → '?' display + nevertheless auflistn\n\n## Task RESTORE — Checkpoint\
      \ restore\n\nSTEP 1 — Checkpoint identifizieren:\n  target=$(ls\
      \ -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{id}p')\n  if [ -z\
      \ \"$target\" ]; then\n    signal='': 'Checkpoint #{id} not gefanden'\n  \
      \  return\n  fi\n\nSTEP 2 — YAML-Check:\n  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$target/recipe/dev-mas-engineer.yaml'))\"\
      \n  if [ $? -ne 0 ]; then\n    signal='': 'Checkpoint #{id} has YAML-Error'\n\
      \    return\n  fi\n\nSTEP 3 — Restore:\n  rm -rf {workspace}/mas-engineer/recipe\n\
      \  rm -rf {workspace}/mas-engineer/tools\n  rm -rf {workspace}/mas-engineer/docs\n\
      \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/recipe {workspace}/mas-engineer/\n\
      \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/tools  {workspace}/mas-engineer/\n\
