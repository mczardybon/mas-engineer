version: 1.0.0
agent_schema:
  required:
  - name
  - type
  - task
  optional:
  - desc
  - emoji
  - domain
  - template
  - large_file
  restrictions:
    allowed_paths: []
    forbidden_paths: []
    max_steps: 100
    timeout: 600
    requires_confirmation: true
    requires_coronashield: true
    allowed_actions:
    - shell
    - delegate
    - wwrite
    - edit
    - read
    - signal
    forbidden_actions: []
    allowed_tools: []
    forbidden_tools: []
    allowed_delegates: []
    forbidden_delegates:
    - sub_mas-general-improver
  workflow:
    steps:
    - id: string
      action: shell | delegate | wwrite | edit | signal | rule_check | sub_workflow
      cmd: string
      agent: string
      task: string
      target: string
      depends_on:
      - string
      on_error: abort | continue | retry(3)
      timeout: int
      condition: string
config_schema:
  required:
  - type
  - version
  optional:
  - first_session
  - restrictions
  - enforcement
  - recovery
  - tools
  - sub_agents
  - tier_system
  - token_budgets
  - signals
restrictions_schema:
  fields:
    r01_confirmation:
      required:
      - level
      - description
      optional:
      - details
    r09_domain:
      required:
      - level
      - description
      optional:
      - details
    r02_bestand:
      required:
      - level
      - description
    r04_general_improver:
      required:
      - level
      - description
    r05_auto_commsg:
      required:
      - level
      - description
      optional:
      - details
    r06_sub_agent:
      required:
      - level
      - description
    r07_signal:
      required:
      - level
      - description
    r08_token:
      required:
      - level
      - description
    r10_coronashield:
      required:
      - level
      - description
    verbote:
      required: []
      optional: []
    verstoesse:
      required:
      - level
      - description
