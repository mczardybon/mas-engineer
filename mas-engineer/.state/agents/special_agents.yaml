version: 1.0.0
description: Special agents that are NOT loaded in the sub_recipes of the main recipe
agents:
  sub_mas-dashboard-live:
    type: background_poller
    invoke: task
    description: Dashboard monitor, called every 15 minutes via Cron
    reason: No sub-ref — called via schedule/task
  sub_mas-degradation-handler:
    type: api_handler
    invoke: signal
    description: Degradation recovery via API
    reason: No sub-ref — called from Guardian via API
  sub_mas-signal-generator:
    type: signal_handler
    invoke: signal
    description: Signal generator after checkpoint
    reason: No sub-ref — automatically triggered after checkpoint
types:
  background_poller:
    description: Runs periodically via Cron/Schedule
    invoke: task
  api_handler:
    description: Called via API by other sub-agents
    invoke: signal
  signal_handler:
    description: Reacts to signals (CP_DONE, etc.)
    invoke: signal
