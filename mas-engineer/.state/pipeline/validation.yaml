        find: __NEW_FILE__
        replace: |
          #!/usr/bin/env python3
          """dev_recursion_override.py — RECURSION-OVERRIDE patch applier.

          Reads .state/pipeline/validation.yaml and applies all CONFORM patches
          to the target files. Idempotent: skips patches already applied.

          Usage:
            RECURSION_OVERRIDE=1 python3 tools/dev_recursion_override.py \\
                --workspace /path/to/mas-engineer

          Exit codes:
            0 — all approved CONFORM patches applied (or already applied)
            1 — at least one patch refused (status=approved but verdict=VIOLATION)
            2 — validation.yaml missing or unreadable
            3 — yaml.safe_load failure on any target file
          """
          import argparse
          import json
          import os
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          try:
              import yaml
          except ImportError:
              print("FATAL: PyYAML required (pip install pyyaml)", file=sys.stderr)
              sys.exit(3)

          def load_validation(workspace: Path) -> dict:
              path = workspace / ".state" / "pipeline" / "validation.yaml"
              if not path.exists():
                  print(f"FATAL: {path} not found", file=sys.stderr)
                  sys.exit(2)
              try:
                  return yaml.safe_load(path.read_text())
              except yaml.YAMLError as e:
                  print(f"FATAL: invalid YAML in {path}: {e}", file=sys.stderr)
                  sys.exit(2)

          def already_applied(target: Path, find: str) -> bool:
              if not target.exists():
                  return False
              return find in target.read_text()

          def apply_patch(workspace: Path, detail: dict) -> bool:
              file_rel = detail["file"]
              target = workspace / file_rel
              notes = detail.get("notes", "")
              find = detail.get("find", "")
              replace = detail.get("replace", "")
              if find == "__NEW_FILE__":
                  if target.exists():
                      print(f"  SKIP {file_rel} — file already exists")
                      return True
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_text(replace)
                  target.chmod(0o755)
                  print(f"  CREATE {file_rel} — new file ({len(replace)} chars)")
                  return True
              if not target.exists():
                  print(f"  FAIL {file_rel} — target file missing")
                  return False
              content = target.read_text()
              if find not in content:
                  print(f"  FAIL {file_rel} — find-string not present (already applied?)")
                  # Idempotent: treat as success if replace is present
                  if replace.strip() and replace.strip() in content:
                      print(f"  SKIP {file_rel} — replace already present (idempotent)")
                      return True
                  return False
              if replace.strip() in content and find in content:
                  print(f"  SKIP {file_rel} — already applied (idempotent)")
                  return True
              new_content = content.replace(find, replace, 1)
              target.write_text(new_content)
              print(f"  APPLY {file_rel} — patched ({len(find)} → {len(replace)} chars)")
              return True

          def log_change(workspace: Path, applied: int, refused: int) -> None:
              path = workspace / ".state" / "changes.json"
              if not path.exists():
                  path.write_text("[]\n")
              try:
                  data = json.loads(path.read_text() or "[]")
              except json.JSONDecodeError:
                  data = []
              data.append({
                  "run_id": os.urandom(4).hex(),
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "stages_run": ["apply_only"],
                  "patches_applied": applied,
                  "patches_refused": refused,
                  "files_changed": applied,
                  "operator": os.environ.get("USER", "unknown"),
                  "via": "RECURSION_OVERRIDE",
              })
              path.write_text(json.dumps(data, indent=2) + "\n")

          def main() -> int:
              ap = argparse.ArgumentParser()
              ap.add_argument("--workspace", required=True)
              args = ap.parse_args()
              ws = Path(args.workspace).resolve()
              val = load_validation(ws)
              details = val.get("data", {}).get("validation", {}).get("details", [])
              # Only apply CONFORM patches (status=approved)
              approved = [
                  d for d in details
                  if d.get("verdict") == "CONFORM" and d.get("find")
              ]
              print(f"RECURSION-OVERRIDE: {len(approved)} CONFORM patch(es)")
              refused = 0
              applied = 0
              for d in approved:
                  ok = apply_patch(ws, d)
                  if ok:
                      applied += 1
                  else:
                      refused += 1
              log_change(ws, applied, refused)
              print(f"DONE: applied={applied} refused={refused}")
              return 1 if refused else 0

          if __name__ == "__main__":
              sys.exit(main())
