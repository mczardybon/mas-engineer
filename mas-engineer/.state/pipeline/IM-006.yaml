id: IM-006
title: RECURSION-OVERRIDE mechanism — operator-initiated patch application (no 24h cooldown)
created: '2026-07-22T08:50:00+00:00'
created_by: mas-engineer im-pipeline (FIND→RANK→DESIGN→VALIDATE, this round)
status: designed
priority: high
round: 2026-07-22-IM-006
context: |
  IM-005 was applied by an operator (Hermes Agent) subagent bypassing the
  RECURSION GUARD 24h cooldown. The IM-005 commit message explicitly noted:
  "This violates memory rule: 'mas-engineer IMMER in echtem e2e lauf testen
  wie ein mensch — User → Hermes → mas-engineer verbessert sich SELBST.'
  The proper long-term fix is: make mas-engineer's recursion-guard smarter
  (allow operator-initiated patch application even within 24h) OR make
  mas-engineer run autonomously without an interactive operator."

  This IM-006 implements the FIRST option: a smart RECURSION-OVERRIDE that
  lets the operator (Hermes / human) apply already-approved CONFORM patches
  from validation.yaml without waiting 24h, while still blocking
  self-improvement loops (RUN→FIND→RANK→DESIGN→VALIDATE→APPLY) from running
  more than once per 24h.
problem_statement: |
  Current RECURSION GUARD in sub_mas-general-improver treats ANY
  improvement-pipeline activity (even operator-initiated single-shot apply)
  as a "round" that triggers the 24h cooldown. This forces operators to
  bypass mas-engineer entirely (apply directly with terminal/patch tools),
  which violates the self-improvement contract AND skips Goose-expert
  CONFORM validation.

  Required behavior:
  1. FULL_IMPROVEMENT self-runs (FIND→RANK→DESIGN→VALIDATE→APPLY) are still
     blocked if last run < 24h ago (anti-loop).
  2. APPLY-ONLY operations (operator invokes with `RECURSION_OVERRIDE=1` to
     apply N approved patches from existing validation.yaml) are ALWAYS
     allowed regardless of last-run timestamp.
  3. Self-improvement-loops stay blocked: any operation that triggers
     im-finder (stage 1) within 24h of last FULL_IMPROVEMENT is blocked.
solution_design:
  name: RECURSION-OVERRIDE
  mechanism: |
    Two-flag state in {workspace}/.state/schedule.yaml:
      - last_FULL_IMPROVEMENT_run: ISO-8601 (existing, keeps 24h cooldown
        for self-improvement pipeline)
      - last_APPLY_ONLY_run: ISO-8601 (NEW, no cooldown — purely operational)

    Override env-var: RECURSION_OVERRIDE=1 (or --recursion-override CLI flag
    to sub_mas-general-improver). When set, the agent enters APPLY-ONLY mode:
    - READS .state/pipeline/validation.yaml
    - For each approved patch (status: APPROVE), calls sub_mas-yaml-editor
    - APPENDS to .state/changes.json with stage="apply_only"
    - DOES NOT touch last_FULL_IMPROVEMENT_run timestamp

    Self-improvement-loop guard remains: if RECURSION_OVERRIDE is NOT set
    AND last FULL_IMPROVEMENT < 24h → only ERROR_PATTERN short form allowed.
  affected_components:
    - path: recipe/instructions/sub_mas-general-improver.md
      change: RECURSION GUARD block expanded to two-tier (self-loop blocked,
              apply-only allowed). New STEP 0.5 RECURSION_OVERRIDE_CHECK.
    - path: recipe/sub/sub_mas-general-improver.yaml
      change: prompt extended to acknowledge RECURSION_OVERRIDE workflow;
              settings block notes the new env-var.
    - path: tools/dev_recursion_override.py
      change: NEW. Reads validation.yaml, applies CONFORM patches via
              yaml-editor delegation. Idempotent (skip already-applied).
    - path: .state/workflows.yaml
      change: tasks list adds 'RECURSION_OVERRIDE' (apply-only mode).
    - path: .state/pipeline/IM-006.yaml
      change: this file (ticket documenting the design).
  safety_guards:
    - RECURSION_OVERRIDE only accepts patches from validation.yaml whose
      status == "approved" AND recommendation contains "APPROVE". A patch
      with verdict != CONFORM is REFUSED, even with override.
    - Each applied patch writes to .state/changes.json with operator_id
      field so all overrides are auditable (no silent self-improves).
    - The 24h cooldown on FULL_IMPROVEMENT self-runs is UNCHANGED. Override
      only short-circuits the cooldown for APPLY-ONLY, not for FIND→RANK.
validation_plan:
  - unit: tools/dev_recursion_override.py loads validation.yaml
  - unit: refuses patch with status=approved but verdict=VIOLATION
  - unit: applies patch with status=approved, verdict=CONFORM, idempotent on re-run
  - e2e: IM-006 in autonomous mode applies 5 IM-005 CONFORM patches
         via RECURSION_OVERRIDE=1 (no 24h wait) and produces git diff
         identical to operator-applied IM-005 commit.
  - safety: RECURSION_OVERRIDE=0 (or unset) still blocks APPLY within 24h
    of last FULL_IMPROVEMENT, falling back to ERROR_PATTERN short form.
