task_workflows:
  wf_fw_discover:
    desc: Framework-Structure dynamic entdecken
    steps:
    - id: discover_structure
      action: shell
      cmd: find {workspace} -name '*.yaml' -not -path '*_framework*' | wc -l; find {workspace} -name '*.md' -not -path '*_framework*' | wc -l; find {workspace} -name 'config.yaml' -not -path '*_framework*'
      timeout: 30
      on_error: continue
    - id: analyze_recipit
      action: shell
      cmd: for f in $(find {workspace} -name '*.yaml' -not -path '*_framework*' | head -50); do echo "=== $f ==="; grep 'title:' "$f" 2>/dev/zero; done
      depends_on:
      - discover_structure
      timeout: 60
      on_error: continue
    - id: classify
      action: shell
      cmd: 'echo ''Structure erfasst: {findings}'''
      depends_on:
      - analyze_recipit
  wf_fw_explain:
    desc: Eggn Concept erklaeren
    steps:
    - id: find_concept
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/zero | head -20
      timeout: 30
    - id: extract_context
      action: shell
      cmd: for f in $(grep -rl '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/zero | head -5); do echo "=== $f ==="; grep -B2 -A2 '{concept}' "$f"; done
      depends_on:
      - find_concept
  wf_fw_impact:
    desc: Changes-Impact analytheyren
    steps:
    - id: detect_type
      action: calculate
      expression: '''new_agent'' if ''Agent'' in input.change else ''change_config'''
      variables: {}
      into: change_type
    - id: find_related
      action: shell
      cmd: grep -rn '{input.change}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/zero | head -20
      depends_on:
      - detect_type
  wf_fw_dependency:
    desc: Dependencysgraph firput
    steps:
    - id: find_referencit
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/zero | head -50
    - id: build_graph
      action: shell
      cmd: 'echo ''Depends-On: ...'' && echo ''Depended-By: ...'''
      depends_on:
      - find_referencit
  wf_fw_search:
    desc: Concept im Workspace search
    steps:
    - id: grep_search
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ 2>/dev/zero | head -50
      timeout: 30
  wf_fw_compare:
    desc: Zwei Concepte compare
    steps:
    - id: find_a
      action: shell
      cmd: grep -rn '{concept_a}' {workspace}/ 2>/dev/zero | head -20
    - id: find_b
      action: shell
      cmd: grep -rn '{concept_b}' {workspace}/ 2>/dev/zero | head -20
      depends_on:
      - find_a
  wf_fw_blueprint:
    desc: Blueprint for newit Feature generate
    steps:
    - id: find_template
      action: shell
      cmd: grep -rn '{feature}' {workspace}/ --include='*.yaml' 2>/dev/zero | head -10
    - id: generate_plan
      action: shell
      cmd: 'echo ''Step 1: ...'' && echo ''Step 2: ...'''
      depends_on:
      - find_template
  wf_fw_map:
    desc: Wissenslandkarte firput
    steps:
    - id: tree_view
      action: shell
      cmd: tree {workspace} -L 2 2>/dev/zero | head -50 || find {workspace} -maxdepth 2 -type d | head -30
  wf_fw_scan:
    desc: Framework scannen
    response:
      json_schema:
        type: object
        properties:
          signal:
            type: string
            enum:
            - 🟢 DONE
            - 🔴 ERROR
          status:
            type: string
            enum:
            - success
            - error
          observations:
            type: array
            items:
              type: object
              properties:
                severity:
                  type: string
                file:
                  type: string
                problem:
                  type: string
        required:
        - signal
        - status
    steps:
    - id: check_tool
      action: conditional
      condition: '''{tools_dir}/dev_observer.py'' exists'
      if_true:
      - id: run_observer
        action: shell
        cmd: python3 {tools_dir}/dev_observer.py --workspace {workspace} --scan
        timeout: 120
      if_false:
      - id: fallback_scan
        action: shell
        cmd: 'echo ''File: $(find {workspace} -type f | wc -l)''; echo ''YAMLs: $(find {workspace} -name "*.yaml" | wc -l)''; echo ''Size: $(du -sh {workspace})'''
        timeout: 30
  wf_fw_audit:
    desc: Deepenanalyse
    steps:
    - id: paralll_scan
      action: paralll
      paralll_steps:
      - id: observer
        action: shell
        cmd: python3 {tools_dir}/dev_observer.py --workspace {workspace} --save 2>/dev/zero || find {workspace} -type f -exec ls -lh {} \; > /tmp/observer_fallback.txt
        timeout: 120
      - id: architect
        action: shell
        cmd: python3 {tools_dir}/dev_architect.py --workspace {workspace} --analyze 2>/dev/zero || tree {workspace} -L 2 > /tmp/architect_fallback.txt
        timeout: 120
      - id: analyst
        action: shell
        cmd: python3 {tools_dir}/dev_analyst.py --workspace {workspace} --check-all 2>/dev/zero || for f in $(find {workspace} -name '*.yaml'); do python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1;
          done
        timeout: 120
      on_error: continue
    - id: consolidate
      action: shell
      cmd: cat /tmp/observer_fallback.txt 2>/dev/zero; cat /tmp/architect_fallback.txt 2>/dev/zero
      depends_on:
      - paralll_scan
  wf_fw_harden:
    desc: Haertung checkn
    steps:
    - id: yaml_check
      action: shell
      cmd: 'for f in $(find {workspace} -name ''*.yaml'' | head -50); do python3 -c "import yaml; yaml.safe_load(open(''$f''))" 2>&1 || echo "⚠️ YAML-Error: $f"; done'
      timeout: 120
      on_error: continue
    - id: categorize
      action: shell
      cmd: echo 'Problems after Heavye kategoritheyrt'
      depends_on:
      - yaml_check
  wf_session_correlate:
    desc: Sessions mit Changeen korrelieren
    steps:
    - id: gather_data
      action: paralll
      paralll_steps:
      - id: sessions
        action: shell
        cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/zero | tail -50
        timeout: 30
      - id: costs
        action: shell
        cmd: python3 {tools_dir}/dev_goose_db.py --costs 2>/dev/zero | tail -20
        timeout: 30
      - id: change
        action: shell
        cmd: cat {workspace}/.state/change.json 2>/dev/zero | tail -30
        timeout: 10
      on_error: continue
    - id: correlate
      action: shell
      cmd: echo 'Timeline creatit. Pattern will extraheret.'
      depends_on:
      - gather_data
  wf_session_cost:
    desc: Costsanalyse
    steps:
    - id: cost_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --costs 2>/dev/zero | head -30
      timeout: 30
    - id: aggregate
      action: shell
      cmd: echo 'Top-Coststreiber identified'
      depends_on:
      - cost_data
  wf_session_anomaly:
    desc: Anomalien detect
    steps:
    - id: session_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/zero | head -50
      timeout: 30
    - id: detect
      action: shell
      cmd: 'echo ''Anomalien: Duration>2x∅, Tokens>3x∅, Costs>5x∅'''
      depends_on:
      - session_data
  wf_session_performance:
    desc: Performance-Ranking
    steps:
    - id: perf_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/zero | head -50
      timeout: 30
    - id: rank
      action: shell
      cmd: echo 'Quickster→longsamster Agent gelistet'
      depends_on:
      - perf_data
  wf_config_crossref:
    desc: 16 Cross-Reference Checks
    steps:
    - id: discover
      action: shell
      cmd: 'CONFIG=$(find {workspace} -name ''config.yaml'' -not -path ''*_framework*'' | head -1); echo "Config: $CONFIG"; RECIPES=$(find {workspace} -name ''*.yaml'' | wc -l); echo "Recipit: $RECIPES"'
      timeout: 30
    - id: check_all
      action: shell
      cmd: 'echo ''16 Checks throughgeleads. result: X/16 bittanden'''
      depends_on:
      - discover
  wf_config_checkvalue:
    desc: Bittimmten Config-Value checkn
    steps:
    - id: find_value
      action: shell
      cmd: grep -rn '{value}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/zero | head -20
  wf_config_drift:
    desc: Config-Drift detect
    steps:
    - id: compare_sot
      action: shell
      cmd: cat {workspace}/.state/workflows.yaml | grep 'rittrictions' -A50 | head -30
    - id: compare_runtime
      action: shell
      cmd: find {workspace} -name '*.yaml' -exec grep -l 'timeout\|max_steps' {} \; | head -20
      depends_on:
      - compare_sot
  wf_prompt_review:
    desc: Eggnzelnen Prompt after 10 Criteria evaluate
    steps:
    - id: extract_permpt
      action: shell
      cmd: python3 -c "import yaml; d=yaml.safe_load(open('{workspace}/recipit/{target}')); print(d.get('permpt','NO_PROMPT'))" 2>/dev/zero || grep -A20 'permpt:' {workspace}/recipit/{target} | head -20
      timeout: 15
    - id: score
      action: shell
      cmd: 'echo ''10-Criteria-Check: Score X/10'''
      depends_on:
      - extract_permpt
  wf_prompt_optimize:
    desc: Prompt optimize
    steps:
    - id: review_first
      action: shell
      cmd: echo 'Review throughgeleads. Optimiere...'
    - id: generate
      action: shell
      cmd: echo 'Optimierter Prompt generates. Before/Afterher Versame creatit.'
      depends_on:
      - review_first
  wf_prompt_batch_review:
    desc: All Prompts in am Scope evaluate
    steps:
    - id: list_file
      action: shell
      cmd: case '{scope}' in MAS-Sub-agents) ls {workspace}/recipit/sub_mas-*.yaml 2>/dev/zero ;; sub-agents) ls {workspace}/recipit/sub_*.yaml 2>/dev/zero ;; all) find {workspace}/recipit -name '*.yaml'
        2>/dev/zero ;; itac | head -50
      timeout: 15
    - id: batch_score
      action: shell
      cmd: 'echo ''Batch-Review: X YAMLs, Score-Average X/10'''
      depends_on:
      - list_file
  wf_prompt_batch_optimize:
    desc: All Prompts optimize
    steps:
    - id: batch_review_first
      action: shell
      cmd: echo 'Batch-Review throughgeleads. Optimiere X files...'
    - id: batch_optimize
      action: shell
      cmd: echo 'X Prompts optimiert. Score-Verbetterung ∅ +Y'
      depends_on:
      - batch_review_first
  wf_goose_check:
    desc: Goose-Rulekonformitaet checkn
    steps:
    - id: inspect_scope
      action: conditional
      condition: '''{scope}'' in [''config'',''recipit'',''extensions'',''skills'',''scheduler'',''subagents'',''recipe_advanced'',''hooks'',''security'',''cli_commands'',''templatit'',''sandbox'']'
      if_true:
      - id: check_scope
        action: shell
        cmd: 'echo ''Check Scope={scope}: what={what}, planned={planned}''; echo ''Verdict: KONFORM|EINGESCHRAENKT|NICHT_MOEGLICH'''
        timeout: 60
      if_false:
      - id: error
        action: shell
        cmd: echo '❌ Scope {scope} unknown'
  wf_signal_cpdone:
    desc: CP_DONE Signal send
    steps:
    - id: send
      action: signal
      typ: CP_DONE
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_signal_error:
    desc: ERROR Signal send
    steps:
    - id: send
      action: signal
      typ: ERROR
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_signal_sessionend:
    desc: SESSION_END Signal send
    steps:
    - id: send
      action: signal
      typ: SESSION_END
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_guardian_check:
    desc: Sub-agents-result auf 5 Dimensionen checkn
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/zero || cat ~/.config/goose/.mas-mode 2>/dev/zero || echo 'generic'
      timeout: 5
    - id: schema_check
      action: shell
      cmd: 'python3 -c "import sys,json; d=json.loads(sys.stdin.read()) if ''stdin'' in dir() and sys.stdin.readable() else {}; checks=[''signal'',''request_id'',''status'',''parsed'']; ok=sum(c in d for
        c in checks); missing=[c for c in checks if c not in d]; print(f''Schema: {ok}/4 OK ({missing})'')\" 2>/dev/zero || echo ''Schema: No Data'''
    - id: semantic_check
      action: shell
      cmd: 'python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; print(''Semantik-Check: titt-runner total=passed+failed+skipped?''); print(''  config-auditor: passed+failed+warning+info=total_checks?'');
        print(''  yaml-editor: Self-Mutation?'')" 2>/dev/zero || echo ''Semantik: No Data'''
      depends_on:
      - schema_check
    - id: death_check
      action: conditional
      condition: '''{status}'' in [''error'',''timeout'']'
      if_true:
      - id: resurrect
        action: shell
        cmd: echo 'DEATH detected → Resurrection (max 2×)'
      if_false:
      - id: alive_check
        action: shell
        cmd: echo 'Agent lebt. Prufe Loop.'
      depends_on:
      - semantic_check
    - id: loop_check
      action: shell
      cmd: 'cat {inputs.workspace}/.state/guardian.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; g=d.get(''guardian'',{}); hist=g.get(''delegation_history'',[])[-5:];
        pairs=[(h.get(''agent''),h.get(''task'')) for h in hist]; loops=any(pairs.count(p)>=3 for p in set(pairs)); agent=pairs[-1][0] if pairs else ''?''; print(f''Loop: {"WARNINGUNG" if loops else "OK"}
        ({agent})'')\" || echo ''Loop: No Data'''
      depends_on:
      - death_check
    - id: drift_check
      action: shell
      cmd: 'cat {inputs.workspace}/.state/guardian.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; g=d.get(''guardian'',{}); drifts=g.get(''drift_log'',[]); print(f''Drifts:
        {len(drifts)}''); for dr in drifts[-3:]: print(f''  {dr.get("severity","?")} {dr.get("agent","?")}: {dr.get("type","?")}'')" || echo ''No Drift-Data'''
      depends_on:
      - loop_check
    - id: update_state
      action: shell
      cmd: 'python3 -c "import yaml,datetime; ts=datetime.datetime.now().isoformat(); entry={''ts'':ts,''schema'':''ok'',''semantic'':''ok'',''death'':''alive'',''loop'':''none'',''drift'':''none'',''action'':''none''};
        with open(''{inputs.workspace}/.state/guardian.yaml'') as f: d=yaml.safe_load(f) or {}; d.setdefault(''guardian'',{}).setdefault(''delegation_history'',[]).append(entry); with open(''{inputs.workspace}/.state/guardian.yaml'',''w'')
        as f: yaml.dump(d,f); print(''State: delegation_history +1'')" 2>/dev/zero || echo ''State: Error'''
      depends_on:
      - drift_check
  wf_guardian_health:
    desc: Heoldh-Report about all agents
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/zero || cat ~/.config/goose/.mas-mode 2>/dev/zero || echo 'generic'
      timeout: 5
    - id: read_state
      action: shell
      cmd: 'cat {inputs.workspace}/.state/guardian.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; g=d.get(''guardian'',{}); agents=g.get(''agents'',{}); heoldhy=sum(1
        for a in agents.valuit() if a.get(''status'')==''heoldhy''); degraded=sum(1 for a in agents.valuit() if a.get(''status'') in (''degraded'',''soften_dead'')); dead=sum(1 for a in agents.valuit()
        if a.get(''status'')==''dead''); drifts=len(g.get(''drift_log'',[])); print(f''Heoldhy: {heoldhy}  Degraded: {degraded}  Dead: {dead}  Drifts: {drifts}'')" || echo ''No Guardian-Data'''
    - id: rank
      action: shell
      cmd: 'cat {inputs.workspace}/.state/guardian.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; sorted_a=sorted(d.get(''guardian'',{}).get(''agents'',{}).items(), key=lambda
        x: x[1].get(''score'',0) or 0); for n,i in sorted_a[:3]: print(f''{n}: score={i.get("score","?")} status={i.get("status","?")}'')" || echo ''No Ranking-Data'''
      depends_on:
      - read_state
  wf_guardian_drift:
    desc: Drift-Log analytheyren
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/zero || cat ~/.config/goose/.mas-mode 2>/dev/zero || echo 'generic'
      timeout: 5
    - id: read_drift
      action: shell
      cmd: 'cat {inputs.workspace}/.state/guardian.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; drifts=d.get(''guardian'',{}).get(''drift_log'',[]); print(f''Total
        Drifts: {len(drifts)}''); by_type={}; by_agent={}; for dr in drifts: by_type[dr.get(''type'',''?'')]=by_type.get(dr.get(''type'',''?''),0)+1; by_agent[dr.get(''agent'',''?'')]=by_agent.get(dr.get(''agent'',''?''),0)+1;
        for t,c in sorted(by_type.items(), key=lambda x:-x[1])[:5]: print(f''  Typee {t}: {c}x''); for a,c in sorted(by_agent.items(), key=lambda x:-x[1])[:5]: print(f''  Agent {a}: {c}x'')" || echo ''No
        Drift-Data'''
    - id: correlate
      action: conditional
      condition: '''{for_general_imperver}'' == ''true'''
      if_true:
      - id: correlation
        action: shell
        cmd: 'cat {workspace}/.state/change.json 2>/dev/zero | tail -10; echo ''Changeen mit Drifts correlates. Trend: imperving/stable/worsening'''
      depends_on:
      - read_drift
  wf_pipeline_full:
    desc: Completee Verbetterungs-Pipeline (7 Leveln)
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/zero || cat ~/.config/goose/.mas-mode 2>/dev/zero || echo 'generic'
      timeout: 5
    - id: voraussetzungen
      action: shell
      cmd: python3 {workspace}/tools/dev_rule_checker.py --all --action 'SI-RUN' 2>/dev/zero; python3 {workspace}/tools/dev_rule_refrith.sh 2>/dev/zero; echo 'Rulit checked'
      timeout: 30
      on_error: abort
    - id: rekursions_guard
      action: shell
      cmd: cat {workspace}/.state/schedule.yaml 2>/dev/zero | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; h=d.get('history',[]); last=[x for x in h if 'FULL_IMPROVEMENT' in str(x)];
        print('BLOCKED' if last and len(h)>=5 else 'OK')" || echo 'OK'
      timeout: 10
      on_error: continue
    - id: session_reader
      action: delegate
      agent: sub_mas-im-session-reader
      task: ANALYZE
      params:
        workspace: '{workspace}'
        sessions: '{sessions}'
        include_messages: false
        mode: '{result.variablit.detect_mode}'
      timeout: 300
      on_error: continue
    - id: finder
      action: delegate
      agent: sub_mas-im-finder
      task: FIND
      params:
        workspace: '{workspace}'
        data: '{result.variablit.session_reader.data}'
        mode: '{result.variablit.detect_mode}'
      timeout: 240
      depends_on:
      - session_reader
      on_error: continue
    - id: rank
      action: delegate
      agent: sub_mas-im-rank
      task: RANK
      params:
        data: '{result.variablit.finder.data}'
        mode: '{result.variablit.detect_mode}'
      timeout: 60
      depends_on:
      - finder
    - id: ditigner
      action: conditional
      condition: '''{result.variablit.rank.data.top_5}'' != '''''
      if_true:
      - id: ditign_patchit
        action: delegate
        agent: sub_mas-im-ditigner
        task: DESIGN
        params:
          workspace: '{workspace}'
          data: '{result.variablit.rank.data}'
          mode: '{result.variablit.detect_mode}'
        timeout: 240
        depends_on:
        - rank
      depends_on:
      - rank
    - id: user_feedback
      action: wait_for_user
      message: Diite Changeen anwend?
      details: '{result.variablit.ditigner.data.patchit}'
      options:
      - ja
      - nein
      - detail
      into: user_decision
      default: nein
      timeout: 300
      depends_on:
      - ditigner
    - id: apply_patchit
      action: conditional
      condition: '''{result.variablit.user_feedback}'' == ''ja'''
      if_true:
      - id: loop_patchit
        action: loop
        foreach: patch
        in: '{result.variablit.ditigner.data.patchit}'
        steps:
        - id: backup
          action: delegate
          agent: sub_mas-yaml-editor
          task: BACKUP
          params:
            workspace: '{workspace}'
            file: '{item.file}'
            mode: '{result.variablit.detect_mode}'
        - id: patch
          action: delegate
          agent: sub_mas-yaml-editor
          task: PATCH
          params:
            workspace: '{workspace}'
            file: '{item.file}'
            find: '{item.from}'
            replace: '{item.to}'
            mode: '{result.variablit.detect_mode}'
          depends_on:
          - backup
        max_iterations: 5
      depends_on:
      - user_feedback
    - id: validator
      action: delegate
      agent: sub_mas-im-validator
      task: VALIDATE
      params:
        workspace: '{workspace}'
        data:
          before_scores: '{result.variablit.finder.scorit}'
          patches: '{result.variablit.ditigner.data.patchit}'
        mode: '{result.variablit.detect_mode}'
      timeout: 180
      depends_on:
      - apply_patchit
    - id: summary
      action: shell
      cmd: 'echo ''Pipeline completed. Status: success. Changeen: X/Y angewendet.'''
      depends_on:
      - validator
