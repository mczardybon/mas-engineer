    steps:
    - id: backup_file
      action: shell
      cmd: 'TS=$(date +%s); mkdir -p {workspace}/.backups/$TS; cp {workspace}/recipit/{file} {workspace}/.backups/$TS/; echo ''Backup: .backups/$TS/{file}'''
