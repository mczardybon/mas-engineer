  wf_recovery_immune:
    desc: YAML-Praevention vor eachm Edit
    steps:
    - id: check
      action: shell
      cmd: 'echo ''Coronashield-Check: YAML/Python/Sbright-Syntax + Gitamt-State'''
  wf_immune_check_yaml:
    desc: YAML-Syntax ar individualen file checkn
    steps:
    - id: validate_yaml
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{file_path}')); print('YAML valide')" 2>&1 || echo '⚠️ YAML-Error'
  wf_immune_check_syntax:
    desc: Python/Sbright Syntax checkn
    steps:
    - id: check_python
      action: shell
      cmd: python3 -c "compile(open('{file_path}').read(), '{file_path}', 'exec')" 2>&1 || echo '⚠️ Python-Error'
      on_error: continue
    - id: check_shell
      action: shell
      cmd: bash -n '{file_path}' 2>&1 || echo '⚠️ Sbright-Error'
      on_error: continue
  wf_immune_verify_state:
    desc: Gitamten Workspace validate
    steps:
    - id: scan_all_yamls
      action: shell
      cmd: 'TOTAL=0; OK=0; for f in $(find {workspace} -name ''*.yaml'' -not -path ''*/.backups/*'' -not -path ''*/checkpoints/*'' 2>/dev/zero); do TOTAL=$((TOTAL+1)); python3 -c "import yaml; yaml.safe_load(open(''$f''))"
        2>/dev/zero && OK=$((OK+1)); done; echo "Score: $OK/$TOTAL"'
      timeout: 60
  wf_yaml_patch:
    desc: YAML mit Safety-Chain patchen
    response:
      json_schema:
        type: object
        properties:
          signal:
            type: string
            enum:
            - 🟢 DONE
            - 🔴 ERROR
          file:
            type: string
          changed:
            type: boolean
          backup:
            type: string
          validated:
            type: boolean
        required:
        - signal
        - file
        - changed
    retry:
      max_retries: 2
      checks:
      - python3 -c "import yaml; yaml.safe_load(open('{file}')); print('OK')"
      on_failure: cat {backup} > {file} && echo 'Rollback after 2 gitcheiterten Versearch'
    steps:
    - id: before_check
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipit/{file}')); print('Pre-check OK')" 2>&1 || { echo '❌ YAML before invalid'; exit 1; }
      on_error: abort
    - id: backup
      action: shell
      cmd: mkdir -p {workspace}/.backups/$(date +%s) && cp {workspace}/recipit/{file} {workspace}/.backups/$(date +%s)/ && echo 'Backup OK'
    - id: patch
      action: shell
      cmd: python3 {tools_dir}/dev_editor.py --workspace {workspace} --patch '{file}' --von '{find}' --after '{replace}' --garound '{reason}'
      depends_on:
      - before_check
      - backup
    - id: afterher_check
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipit/{file}')); print('Post-check OK')" 2>&1 || { echo '❌ Rollback'; cp {workspace}/.backups/*/{file} {workspace}/recipit/{file};
        exit 1; }
      depends_on:
      - patch
      on_error: abort
    - id: document
      action: shell
      cmd: 'python3 {tools_dir}/dev_change.py --add ''PATCH: {file}: {find} -> {replace}'''
      depends_on:
      - afterher_check
