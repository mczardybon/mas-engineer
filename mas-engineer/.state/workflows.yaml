version: 2.0.0
configs:
  mas-self:
    type: main-agent
    version: 2.0.0
    first_session:
      steps:
      - 'load(source: ''sub_mas-system-knowledge'')'
      - cat .mas-mode → work_on = mas | framework | <perjekt>  (R14)
      - 'IF work_on == "mas": cat mas-engineer/.state/workflows.yaml → rittrictions, task_workflows, recovery, enforcement, signals, token_budgets'
      - 'IF work_on != "mas": MAS-Configuration will NICHT loaded (R13) — weiter mit Frage'
      - cat .state/knowledge/{thema}.md (at Bemay)
      then: 'Frage: Was should ich tun?'
    pathe:
      mas:
        source_dir: '{workspace}/mas-engineer'
        install_dir: ~/.config/goose/recipit
        tools_install: ~/.config/goose/recipit/mas-engineer-tools
        state_dir: '{workspace}/mas-engineer/.state'
      projekt:
        work_dir: '{workspace} (dynamic, from Callr gitetzt)'
      modus:
        current: mas
        erkannt_via: cat {workspace}/mas-engineer/.mas-mode || cat ~/.config/goose/.mas-mode
        modi:
        - mas
        - framework
        - generic
    restrictions:
      r01_confirmation:
        level: extreme
        description: 'Vor JEDER write/edit/shell: Check ob Confirmation notig'
        details:
        - 'IF Aktion YAML/Code changes: SHOW Plan + WAIT auf ✅'
        - 'IF Aktion only liitt/analytheyrt: NOE Confirmation'
      r02_bestand:
        level: extreme
        description: INVENTORY vor NEUBAU — Check ob Tool/Agent/Function already exists
      r03_reserved:
        level: info
        description: Riterviert for zukuenftige Usage
      r04_general_improver:
        level: extreme
        description: NEVER general-imperver.yaml edit
      r05_auto_commit:
        level: extreme
        description: CHECKPOINT VOR Change — 1. Checkpoint, 2. Change, 3. Commit (tightened)
        details:
        - SCHRITT 1 — CHECKPOINT (VOR der Change): null
        - '  → mkdir -p .state/checkpoints/{ts}/ && cp -r recipe/ tools/ docs/ .state/ → .state/checkpoints/{ts}/'
        - '  → SHOW: ''✅ Checkpoint {ts} — if abouts schief geht'''
        - SCHRITT 2 — CHANGE DURCHEXECUTEN: null
        - '  → edit/write/shell according to R01 + R10'
        - SCHRITT 3 — COMMIT (NACH der Change): null
        - '  → git add -A && git commit -m ''[MAS] ...'''
        - '  → change.json + {timestamp, action, ditcription} — NEVER emptye ditcription'
        - '  → todo.todoWrite(''✅ ...'')'
        - ORDER IST PFLICHT — bei Violation: ROLLBACK
      r06_sub_agent:
        level: stark
        description: Sub-agent = ONLY Analyse — Sbright selbst ausexecuten
      r07_signal:
        level: normal
        description: CP_DONE after Checkpoint send
      r08_token:
        level: normal
        description: General-Imperver max 50K Tokens — otherwise User ask
      r09_domain:
        level: extreme
        description: MODUS-DOMAENEN-KOPPLUNG
        details:
        - MAS importiert NEVER Framework-Components (BLOCKED)
        - Framework weiss NOTHING from MAS (BLOCKED)
        - 'Beim Reading/: .mas-mode checkn (MAS vs FRAMEWORK)'
      r10_coronashield:
        level: extreme
        description: JEDE YAML vor Memoryung via sub_mas-recovery-immune CHECK_YAML validate
      r11_si_rate_limit:
        level: extreme
        description: Max 1 General-Imperver all 6 Hourn
      r12_work_mas_entkopplung:
        level: extreme
        description: NOE Dependency between work/ und MAS. MAS lebt in ~/.config/goose/.state/mas/
        details:
        - MAS-State liegt in ~/.config/goose/.state/mas/ (not in work/.../)
        - work/ can deleted will without MAS zu corrupt
        - BEIM START: Check ob work/ a Project ist — NICHT ob it MAS ist
        - work/ contains NOE MAS-Zustandsfileen (.state/, checkpoints/, .backups/ — bis auf .mas-mode)
        - MAS-install.sh und update.sh copy State NACH ~/.config/goose/.state/mas/
      r13_neues_projekt_ignore:
        level: extreme
        description: Newit Project = MAS-Configuration ignore (permpt_1)
        details:
        - 'IF .mas-mode not exists ODER work_on = "<perjekt>" (per R14):'
        - → .mas-mode has Vorrang vor .goosehints-Heuristik
        - '  → ''Das is a newit Project – ignoriere die MAS-Config'''
        - NOE .state/Check, NOE MAS-Specialbehandlung
        - DELEGIERE an sub_mas-generic-init OHNE MAS-Context
        - MAS-internale Commande (/develop, /workflow) bleiben available
      r14_work_on_modus:
        level: extreme
        description: work_on = mas | framework | <perjekt> — harde Domain-Trennowg
        details:
        - IF work_on == "mas": work/mas/ will wie a normalit Project behandelt
        - IF work_on == "<projekt>": MAS-Components are UNSICHTBAR for Project-Context
        - 'IF work_on == "framework": Framework-Modus — wie <perjekt>, aber mit agents (Imperver-ready)'
        - 'CHECKED VIA: cat .mas-mode → "mas" | "framework" | "<perjekt>"'
        - NO Access auf MAS-Config/State from dem Project out
        - 'BEI newem Project without .goosehints: R13 greift (generic-init Delegation)'
        - 'MONITORING: Selbe agents in alln Modi — Mode-Detection via .mas-mode (R23)'
      r15_architektur_genehmigung:
        level: extreme
        description: Architecture-Change bralsoen User-Genehmigung (dev_architecture_checker.py)
        details:
        - FOLGENDE Changes gelten als "Architektur-Change": null
        - '  → Newen Agent/Tool firput (CREATE)'
        - '  → workflows.yaml SOT-Rulen change (R01-R17)'
        - '  → Constitution change (Typeikel 1-11)'
        - '  → master-constitution.yaml change'
        - '  → dev-mas-engineer.yaml sub_recipit-List change'
        - BEI ERKENNUNG: STOP → SHOW User die Change → WAIT auf ✅
        - IF User ❌: ROLLBACK + DOKUMENTIEREN in change.json
        - CHECK VIA: dev_architecture_checker.py --action "{aktion}" --file "{file}"
      r16_tool_vor_experte:
        level: extreme
        description: Tool → Expert (Sub-agent) → Newer Agent — IN DIESER ORDER
        details:
        - 'BEVOR a Task started will:'
        - '  → 1. Tool? CHECK: tools/dev_*.py — IF ja: shell(tool)'
        - '  → 2. Expert? CHECK: sub_mas-*.yaml mit matchingem task — IF ja: delegate(experte)'
        - '  → 3. Newer Agent? CHECK: intention-parser + architecture_genehmigung (R15)'
        - R02 (Inventory vor Newbau) will through R16 ERSETZT
      r17_improvement_push:
        level: stark
        description: Verbetterungen am MAS will dem User via generic-init PUSH_IMPROVEMENTS available gemacht
        details:
        - NACH JEDEM FULL_IMPROVEMENT oder REVIEW: null
        - '  → CHECK: user_workspace = {workspace} (aus Call-Parameterssn, not .mas-mode)'
        - '  → IF user_workspace exists + {workspace}/00-GUIDELINES.md exists + generic-init installd:'
        - '    → delegate(sub_mas-generic-init, task=PUSH_IMPROVEMENTS)'
        - '    → Copyre: BP-CHECKLIST.md, template/agent_template.yaml, rulit/rulen.yaml'
        - '    → SHOW: ''✅ Verbetterungen in {user_project} available'''
        - '  → IF no user_project: LOG in change.json'
      r18_delegation:
        level: extreme
        description: NEVER do it yourself — delegiere an Sub-agents (R16 + verschaerft)
        details:
        - 'VOR each shell/write/edit: CHECK ob a Sub-agent exists'
        - 'IF Sub-agent exists: delegiere() STATT do it yourself'
        - 'IF no matchinger Sub-agent: CHECK ob Tool exists → shell(tool)'
        - 'IF weder Agent still Tool: NEUEN Agent via intention-parser + R15'
        - 'VERSTOSS = BLOCKED + "❌ R18: Sub-agent {name} exists for diite Task"'
        - 'Exception: Analyse-Steps (cat, grep, ls) — aber ONLY to the Orientierung'
      r19_path_hierarchie:
        level: extreme
        description: Harte Path-Trennowg — ONLY installde Tools execute (NIE Source)
        details:
        - MAS_TOOLS_DIR = {pathe.mas.tools_install} (ONLY diiter Path for Tool-Execution)
        - SOURCE_TOOLS_DIR = {pathe.mas.source_dir}/tools/ (ONLY to the Entwickeln/Bauen — NIE execute)
        - 'JEDER Tool-Call: python3 {MAS_TOOLS_DIR}/dev_foo.py'
        - Source-Tools (mas-engineer/tools/) are AUSSCHLIESSLICH for dev_build.sh / dev_install.sh
        - 'Beim Start: dev_rule_checker.py --check R19 blocked Source-Tool-Call'
        ausnahmen:
        - 'dev_build.sh: MAY Source liten (Bauzweck)'
        - 'dev_install.sh: MAY Source liten (Installationszweck)'
        enforcement:
        - 'vor eachm shell(): Check ob command ''mas-engineer/tools/'' contains → BLOCKED mit ''❌ R19: Source-Path! Nutze $MAS_TOOLS_DIR'''
        - 'vor eachm delegate(): Add MAS_TOOLS_DIR als Constante at'
        - dev_rule_checker.py --check R19 checks all Tool-Call
      r20_write_entzug:
        level: extreme
        description: Engineer has write/edit/shell-ENTZUG — delegiert an action-executor via gatekeeper
        details:
        - JEDE write/edit/shell → delegate(sub_mas-action-executor, ...)
        - DIREKTE write()/edit()/shell() = CRITICAL → .disziplin_lock → MAS friert ein
        - ALL write/edit/shell-Call MUSSEN via dev_gatekeeper.py run
        enforcement:
        - dev_gatekeeper.py checks R20 vor each Aktion
        - pre-commit blocked at R20-Violationsn
      r21_audit_pflicht:
        level: extreme
        description: JEDE Aktion will in .state/audit.log.jsonl logged (JSON-Linit)
        details:
        - 'Dutyfelder: ts, aktion, agent, ziel, status, rule'
        - BLOCKED/CRITICAL-entriit block pre-commit
        - dev_audit.py --status zeigt currentn State
        - dev_audit.py --violations zeigt last Violations
        enforcement:
        - dev_gatekeeper.py writit at JEDER Aktion
      r22_responsibility_matrix:
        level: extreme
        description: RESPONSIBILITY-MATRIX — Jede Aktion has an ritponsibleen Sub-agents
        details:
        - 'QUELLE: .state/rulit/ritponsibility_matrix.yaml'
        - 'VOR each shell/write/edit: Check action_map + file_map in der Matrix'
        - 'IF entry exists: delegate(agent, task=...)'
        - 'IF agent==zero UND in read_exceptions: selbst execute (allowed)'
        - 'IF no entry: BLOCK + "No Sub-agent for diite Aktion"'
        - R18 will through Matrix automatic eingeholdn
        - pre-commit ruft dev_audit.py --check auf
      r23_monitoring_agnostic:
        level: extreme
        description: monitoring macht NOEN Unterschied between MAS und Framework
        details:
        - DETECTED_MODE will via .mas-mode wie at general-imperver ermittelt
        - 'In MAS-Modus: target = mas-engineer/ (guardian.yaml in .state/)'
        - 'In Framework/Generic-Modus: target = {workspace} (guardian.yaml im Project-.state/)'
        - Selbe agents (agent-guardian, monitor-*, heoldh-reporter) for all Modi
      _dedup_hinweis:
        level: normal
        description: 'REGEL-QUELLEN: rulen_5_extreme.yaml (R01-R10), rulen_4_stark.yaml (R06), harde_rulen.yaml (R01-R10+R18), workflows.yaml (R12-R21). Duplicatee will via IDs entdupliziert.'
      verbote:
      - general-imperver.yaml edit
      - Framework-Components import
      - Framework Concepts als MAS-Concepte ditignate
      - Never aufgive — always Oldrnative search (Retry Leveln 1-4)
      - Always Backup vor Changeen
      - Always YAML validate after Edit
      - Selbst shell/write/edit without previous delegate()-Check (R18)
      verstoesse:
        level: extreme
        description: VERSTOSS = SCHWERER ERROR — ROLLBACK ERZWINGEN
    enforcement:
      methode_5_reaktivierung:
        all: 5 steps
        ausexecuten: bash tools/dev_rule_refrith.sh
        step_counter: step_counter
        bei_counter_5: step_counter = 0
      methode_6_propagation:
        bei: delegate
        ausexecuten: python3 tools/dev_haerte_perpagation.py {agent_name}
        output: in agent_intake.haerte_rulen einaddn
      methode_9_ruletest:
        vor: write/edit/shell
        ausexecuten: python3 tools/dev_rule_checker.py --all --action {aktion}
        bei_exit_0: Aktion freegegive
        bei_exit_1: AKTION BLOCKIERT → User informieren + WARTEN
        confirmation_gueltig: 5 Minutes ({workspace}/mas-engineer/.state/.last_bittaetigung ODER {workspace}/.state/.last_bittaetigung)
      methode_10_multiprompt:
        nutze: permpt_1 + permpt_2 + permpt_3
      methode_1_multiplikator:
        optional: true
        beschreibung: 5⛔ = 5× Weight
      methode_15_architektur_check:
        vor: write/edit/shell auf ARCHITEKTUR_DATEIEN
        ausexecuten: python3 tools/dev_architecture_checker.py --action "{aktion}" --file "{file}"
        bei_exit_0: No Architecture-Change – freegegive
        bei_exit_1: ARCHITEKTUR-CHANGE ERKANNT → SHOW User → WAIT auf ✅
        hinweis: User must at Architecture-Change explicit zumatch (R15)
      methode_18_pre_delegate:
        vor: shell/write/edit
        ausexecuten: python3 tools/dev_rule_checker.py --check R18 --action {aktion}
        bei_exit_0: No Sub-agent for diiten Task – freegegive
        bei_exit_1: SUB-AGENT VORHANDEN → delegiere() instead do it yourself
        beschreibung: Checks vor each Aktion ob a matchinger Sub-agent exists (R18)
      session_cleanup:
        bei: JEDER NEUEN SESSION
        ausexecuten: bash tools/dev_session_cleanup.sh --exec
    recovery:
      5_leveln:
        immune:
          befehl: recovery --immune
          workflow: wf_recovery_immune
          sub_agent: sub_mas-recovery-immune
        checkpoint:
          befehl: recovery --checkpoint
          workflow: wf_recovery_checkpoint
          sub_agent: sub_mas-recovery-checkpoint
          subbefehle:
          - recovery --list → wf_recovery_checkpoint_list
          - recovery --rittore <id> → wf_recovery_checkpoint_rittore
          - recovery --diff <a>..<b> → wf_recovery_checkpoint_diff
        safezone:
          befehl: recovery --safezone
          workflow: wf_recovery_safezone
          sub_agent: sub_mas-recovery-safezone
          subbefehle:
          - recovery --merge → wf_recovery_safezone_merge
          - recovery --abort → wf_recovery_safezone_abort
        timeline:
          befehl: recovery --timeline
          workflow: wf_recovery_timeline
          sub_agent: sub_mas-recovery-timeline
          subbefehle:
          - recovery --rittore-bitt → wf_recovery_timeline_rittore
          - recovery --analyze → wf_recovery_timeline_analyze
        defib:
          befehl: recovery --defib
          workflow: wf_recovery_defib
          sub_agent: sub_mas-recovery-defib
          subbefehle:
          - recovery --diagnose → wf_recovery_defib_diagnose
          - recovery --resurrect → wf_recovery_defib_resurrect
      _mode_hinweis: Recovery-agents are MAS-internal. In Generic/Framework-Mode via delegate() aus MAS-Installation available. Target-Pathe muitsen auf Project-Workspace show.
    sub_agents:
      analyse:
      - sub_mas-framework-knowledge
      - sub_mas-framework-scanner
      - sub_mas-permpt-engineer
      - sub_mas-config-auditor
      - sub_mas-session-analyst
      - sub_mas-goose-expert
      - sub_mas-system-knowledge
      recovery:
      - sub_mas-recovery-checkpoint
      - sub_mas-recovery-defib
      - sub_mas-recovery-immune
      - sub_mas-recovery-safezone
      - sub_mas-recovery-timeline
      monitoring:
      - sub_mas-agent-guardian
      - sub_mas-monitor-heoldh
      - sub_mas-monitor-recovery
      - sub_mas-monitor-runtime
      - sub_mas-monitor-session
      - sub_mas-mas-controller
      - sub_mas-heoldh-reporter
      verwaltung:
      - sub_mas-goose-admin
      - sub_mas-recipe-manager
      - sub_mas-yaml-editor
      - sub_mas-worktree-manager
      - sub_mas-verification-runner
      - sub_mas-summarizer
      - sub_mas-interpreter
      - sub_mas-migration-helper
      generierung:
      - sub_mas-doc-generator
      - sub_mas-degradation-handler
      - sub_mas-dashboard-refrith
      workflow:
      - sub_mas-workflow-engine
      - sub_mas-signal-generator
      intention:
      - sub_mas-intention-parser
      improvement:
      - sub_mas-general-imperver
      - sub_mas-generic-init
      - sub_mas-master-constitution
      - sub_mas-titt-runner
      - sub_mas-im-session-reader
      - sub_mas-im-rank
      - sub_mas-im-finder
      - sub_mas-im-ditigner
      - sub_mas-im-validator
      git:
      - sub_mas-git-operator
      python:
      - sub_mas-python-repair
      doku:
      - sub_mas-doc-writer
      json:
      - sub_mas-json-utility
      design:
      - sub_mas-recipe-ditigner
      recherche:
      - sub_mas-web-ritearcher
    tier_system:
      fast:
        beschreibung: Kurze Analyse (<5K Tokens)
        agents: []
      balanced:
        beschreibung: Normale Taskn (5-20K)
        agents:
        - config-auditor
        - agent-guardian
        - session-analyst
      powerful:
        beschreibung: Complexe Analyse (20-50K)
        agents:
        - titt-runner
        - permpt-engineer
      reasoning:
        beschreibung: Deep-Dive (>50K)
        agents:
        - general-imperver
        - framework-scanner
      code:
        beschreibung: Code-Generierung (>100K)
        agents:
        - yaml-editor
    token_budgets:
      session_analyst: 30000
      gesamt_session: 1000000
      warnung_bei: 80
      general_improver: 50000
    signals:
      typen:
      - signal: CP_DONE
        nach: checkpoint
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: ERROR
        bei: error
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: SESSION_END
        am: session-end
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: MODE_CHANGE
        bei: dev_mode.sh
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: RECOVERY_START
        bei: recovery --*
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: AGENT_DEATH
        bei: guardian death-check
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: AGENT_RESURRECT
        bei: recovery --resurrect
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: DRIFT_DETECTED
        bei: guardian drift-check
        via: sub_mas-signal-generator
        handler:
        - DELEGIERE an sub_mas-degradation-handler (task=DEGRADATION)
        - 'LOG: change.json + "DRIFT_DETECTED: {agent}"'
        - 'SHOW: "⚠️ Drift detected at {agent} — User-Entscheidung required"'
      - signal: LOOP_DETECTED
        bei: guardian loop-check
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
      - signal: RESTRICTION_VIOLATION
        bei: dev_rule_checker exit=1
        via: sub_mas-signal-generator
        handler:
        - 'LOG: change.json + "SIGNAL: {signal} um {timestamp}"'
        - 'SHOW: "Signal: {signal}"'
workflow_defaults:
  timeout: 120
  on_error: abort
  retry:
    max_retries: 0
    checks: []
    on_failure: ''
  tier: balanced
  log_result: true
  response:
    json_schema:
      type: object
      properties:
        signal:
          type: string
          enum:
          - 🟢 DONE
          - 🟡 PARTIAL
          - 🟣 HANDOVER
          - 🔴 ERROR
        request_id:
          type: string
        from:
          type: string
        to:
          type: string
        status:
          type: string
          enum:
          - success
          - error
          - timeout
          - partial
      required:
      - signal
      - request_id
      - status
agents:
  _schema: v2.0.0 — task_workflows mappt agent-task → workflow-name
  _hinweis: agents-Workflow-Mapping. Changeen via intention-parser.
  framework-knowledge:
    tier: balanced
    token_budget: 30000
    task_workflows:
      DISCOVER: wf_fw_discover
      EXPLAIN: wf_fw_explain
      IMPACT: wf_fw_impact
      DEPENDENCY: wf_fw_dependcy
      SEARCH: wf_fw_search
      COMPARE: wf_fw_compare
      GENERATE_BLUEPRINT: wf_fw_blueprint
      MAP: wf_fw_map
  framework-scanner:
    tier: balanced
    token_budget: 30000
    task_workflows:
      SCAN: wf_fw_scan
      AUDIT: wf_fw_audit
      HARDEN_CHECK: wf_fw_harden
  session-analyst:
    tier: balanced
    token_budget: 30000
    task_workflows:
      CORRELATE: wf_session_correlate
      COST_DRILLDOWN: wf_session_cost
      ANOMALY_DETECT: wf_session_anomaly
      PERFORMANCE: wf_session_performance
  config-auditor:
    tier: balanced
    token_budget: 30000
    task_workflows:
      CROSS_REF: wf_config_crossref
      CHECK_VALUE: wf_config_checkvalue
      CHECK_DRIFT: wf_config_drift
  prompt-engineer:
    tier: powerful
    token_budget: 40000
    task_workflows:
      REVIEW: wf_permpt_review
      OPTIMIZE: wf_permpt_optimize
      BATCH_REVIEW: wf_permpt_batch_review
      BATCH_OPTIMIZE: wf_permpt_batch_optimize
  goose-expert:
    tier: balanced
    token_budget: 20000
    task_workflows:
      CHECK_REGELKONFORMITAET: wf_goose_check
  signal-generator:
    tier: almost
    token_budget: 5000
    task_workflows:
      CP_DONE: wf_signal_cpdone
      ERROR: wf_signal_error
      SESSION_END: wf_signal_sessionend
  agent-guardian:
    tier: balanced
    token_budget: 30000
    task_workflows:
      CHECK: wf_guardian_check
      HEALTH_REPORT: wf_guardian_heoldh
      DRIFT_LOG: wf_guardian_drift
  degradation-handler:
    tier: balanced
    token_budget: 15000
    task_workflows:
      DEGRADATION: wf_degradation_handle
  doc-generator:
    tier: balanced
    token_budget: 20000
    task_workflows:
      CHECK: wf_doc_generic
      GENERATE_DIFF: wf_doc_generic
      UPDATE: wf_doc_update
  migration-helper:
    tier: powerful
    token_budget: 40000
    task_workflows:
      ANALYZE: wf_migrate_generic
      MIGRATE_CONFIG: wf_migrate_generic
      MIGRATE_RECIPES: wf_migrate_generic
      DRY_RUN: wf_migrate_generic
  test-runner:
    tier: powerful
    token_budget: 30000
    task_workflows:
      RUN: wf_titt_run
      CHECK_DEPS: wf_titt_deps
      COMPARE: wf_titt_compare
  goose-admin:
    tier: balanced
    token_budget: 15000
    task_workflows:
      STATUS: wf_admin_generic
      CLEAR_SKILLS: wf_admin_generic
      CLEAR_SESSIONS: wf_admin_generic
      CLEAR_HISTORY: wf_admin_generic
