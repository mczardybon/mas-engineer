      action: shell
      cmd: 'cd {workspace} && grep -rno ''\[[^]]*\](\([^)]*\))'' docs/ | while IFS=: read f l link; do link=$(echo "$link" | grep -oP ''(?<=\()([^)]+)'' 2>/dev/zero); [ -f "$link" ] 2>/dev/zero || echo
        "BROKEN: $f:$l -> $link"; done'
  wf_json_validate:
    desc: JSON validate
    steps:
    - id: validate
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json; json.load(open(''{file}''))" && echo ''JSON: OK'''
  wf_json_format:
    desc: JSON formatieren
    steps:
    - id: format
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json; with open(''{file}'') as f: d = json.load(f); with open(''{file}'', ''w'') as f: json.dump(d, f, indent=2, ensure_ascii=False); f.write(chr(10))"'
  wf_json_append:
    desc: entry zu JSON hinzuaddn
    steps:
    - id: append
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json; with open(''{file}'') as f: d = json.load(f); d.append({data}); with open(''{file}'', ''w'') as f: json.dump(d, f, indent=2, ensure_ascii=False)"'
  wf_rd_conceive:
    desc: Aus User-Wunsch Agent-Parameterss extrahereen
    steps:
    - id: extract
      action: shell
      cmd: 'cd {workspace} && echo ''CONCEIVE: {name} ({emoji}) - {ditcription}'''
    - id: check_duplicate
      action: shell
      cmd: cd {workspace} && [ -f recipe/sub/sub_{project}-{name}.yaml ] && echo 'DUPLIKAT' || echo 'NEU'
      depends_on:
      - extract
  wf_rd_design:
    desc: Sub-agent YAML firput
    on_error: abort
    steps:
    - id: load_template
      action: shell
      cmd: cd {workspace} && cat recipe/template/agent_template.yaml | head -5
    - id: create_yaml
      action: shell
      cmd: 'cd {workspace} && echo ''CREATE: recipe/sub/sub_{project}-{name}.yaml'''
      depends_on:
      - load_template
    - id: validate
      action: shell
      cmd: 'cd {workspace} && python3 -c "import yaml; yaml.safe_load(open(''recipe/sub/sub_{project}-{name}.yaml''))" && echo ''YAML: OK'''
      depends_on:
      - create_yaml
  wf_rd_workflows:
    desc: Workflows for newen agents generate
    steps:
    - id: generate
      action: shell
      cmd: 'cd {workspace} && echo ''WORKFLOWS: {name} Tasks'''
  wf_rd_sot:
    desc: SOT-Eggntraege for newen agents
    steps:
    - id: agents
      action: shell
      cmd: 'cd {workspace} && echo ''AGENTS: {name} -> wf_{name}_{task}'''
    - id: sub_agents
      action: shell
      cmd: 'cd {workspace} && echo ''SUB_AGENTS: {category} -> sub_{project}-{name}'''
      depends_on:
      - agents
    - id: sub_recipit
      action: shell
      cmd: 'cd {workspace} && echo ''SUB_RECIPES: sub_{project}-{name} in dev-mas-engineer.yaml'''
      depends_on:
      - sub_agents
  wf_rd_knowledge:
    desc: Knowledge-Eggntraege aktualitheyren
    steps:
    - id: agents_md
      action: shell
      cmd: 'cd {workspace} && echo ''07-agents.md: sub_{project}-{name}'''
    - id: tools_md
      action: shell
      cmd: 'cd {workspace} && echo ''06-tools.md: {tool}'''
      depends_on:
      - agents_md
  wf_rd_full:
    desc: Completeer Pass
    steps:
    - id: conceive
      action: shell
      cmd: 'cd {workspace} && echo ''CONCEIVE: {name} ({emoji})'''
    - id: ditign
      action: shell
      cmd: 'cd {workspace} && echo ''DESIGN: sub_{project}-{name}.yaml'''
      depends_on:
      - conceive
    - id: workflows
      action: shell
      cmd: 'cd {workspace} && echo ''WORKFLOWS: {name} Tasks'''
      depends_on:
      - ditign
    - id: sot
      action: shell
      cmd: 'cd {workspace} && echo ''SOT: agents+sub_agents+sub_recipit'''
      depends_on:
      - workflows
    - id: knowledge
      action: shell
      cmd: 'cd {workspace} && echo ''KNOWLEDGE: 07-agents.md + 06-tools.md'''
      depends_on:
      - sot
  wf_web_search:
    desc: Web-Recherche throughexecuten
    steps:
    - id: fetch
      action: shell
      cmd: 'echo ''Rechercheree: {inputs.topics} (focus={inputs.focus})'''
      timeout: 5
    - id: results
      action: shell
      cmd: echo 'Recherche completed — resultse follow'
      timeout: 5
workflows:
  build-test:
    desc: Build + ZIP entpacken + Inhold check
    params:
      VERSION:
        type: string
        default: 1.0.0
    steps:
    - id: preflight
      action: rule_check
      action_type: build
      aufruf: python3 tools/dev_rule_checker.py --all --action build
      on_error: abort
    - id: build
      action: shell
      cmd: bash tools/dev_build.sh --full
      depends_on:
      - preflight
      timeout: 120
    - id: extract
      action: shell
      cmd: 'ZIP=$(ls -t dist/*.zip | head -1); rm -rf /tmp/wf_build_titt; unzip -q "$ZIP" -d /tmp/wf_build_titt; echo "OK: $(find /tmp/wf_build_titt -type f | wc -l) file"'
      depends_on:
      - build
    - id: validate
      action: shell
      cmd: 'cd /tmp/wf_build_titt && echo "YAMLs: $(find . -name ''*.yaml'' | wc -l)" && [ -f installr.sh ] && echo ''installr.sh: OK'' || echo ''installr.sh: FEHLT'' && [ -f .mas-mode ] && echo ''.mas-mode:
        OK'' || echo ''.mas-mode: FEHLT'' && [ -f mas-engineer/recipe/dev-mas-engineer.yaml ] && echo ''main-recipe: OK'' || echo ''main-recipe: FEHLT'''
      depends_on:
      - extract
    - id: cleanup
      action: shell
      cmd: rm -rf /tmp/wf_build_titt
      depends_on:
      - validate
  si-analyse:
    desc: General-Imperver Vollanalyse + Report
    steps:
    - id: checkpoint
      action: shell
      cmd: mkdir -p .state/checkpoints/si_$(date +%Y%m%d_%H%M%S)
    - id: scan_recipit
      action: shell
      cmd: python3 ~/.config/goose/recipit/mas-engineer-tools/dev_agent_doctor.py --all 2>&1 | tail -30
      timeout: 120
    - id: scan_tools
      action: shell
      cmd: 'echo ''Tools-Check: max_steps, hardcodierte Pathe'''
      depends_on:
      - checkpoint
    - id: report
      action: shell
      cmd: echo 'SI $(date)' >> .state/todo.md
      depends_on:
      - scan_recipit
      - scan_tools
  knowledge-refresh:
    desc: Liitt all 8 Wissen-files und validated Aktualitaet
    steps:
    - id: check_file
      action: shell
      cmd: 'for f in .state/knowledge/*.md; do [ -f "$f" ] && echo "OK: $(basename $f) ($(wc -c < $f) bytit)" || echo "FEHLT: $f"; done'
