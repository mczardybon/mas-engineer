best_practices:
  prompt:
  - check: contains
    id: FW-P-001
    rule: prompt contains tier-marker (standard/fast/deep)
    severity: critical
    values:
    - (standard)
    - (fast)
    - (deep)
  - check: prompt_length
    id: FW-P-002
    max: 800
    rule: prompt <= 800 characters (not 2000+)
    severity: important
  settings:
  - check: range
    id: FW-S-001
    max: 600
    min: 300
    path: settings.timeout
    rule: timeout 300-600 (not >900)
    severity: important
  - check: yaml_lte
    id: FW-S-002
    max: 50
    path: settings.max_steps
    rule: max_steps <= 50 (no loops)
    severity: critical
  - check: range
    id: FW-S-003
    max: 120
    min: 60
    path: settings.timeout
    rule: core-agents timeout 60-120 (faster start)
    severity: critical
  structure:
  - check: contains_all
    id: FW-ST-001
    rule: instructions has input-block (signal, request_id, from, to)
    severity: critical
    values:
    - 'signal:'
    - 'request_id:'
    - 'from:'
    - 'to:'
  - check: file_refs_exist
    extensions:
    - .md
    - .yaml
    id: FW-ST-002
    rule: instructions references only existing files
    severity: critical
  - check: contains
    id: FW-ST-003
    rule: instructions has constitution reference
    severity: important
    values:
    - constitution
  tests:
  - check: test_exists
    id: FW-T-001
    prefix: ''
    rule: Agent has pytest in tests/
    severity: important
