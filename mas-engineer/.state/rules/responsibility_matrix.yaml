version: 1.0.0
created: '2026-06-18'
last_check: '2026-06-18'
action_map:
  build:
    agent: sub_mas-recipe-manager
    task: BUILD
    tool: dev_build.sh
    description: Build MAS (ZIP output)
  deploy:
    agent: sub_mas-recipe-manager
    task: INSTALL
    tool: install.sh
    description: Deploy MAS (~/.config/goose/)
  yaml_edit:
    agent: sub_mas-yaml-editor
    task: PATCH
    tool: dev_editor.py
    before_action: sub_mas-recovery-immune → CHECK_YAML
    description: Edit YAML files
  yaml_validate:
    agent: sub_mas-recovery-immune
    task: CHECK_YAML
    tool: python3 -c 'import yaml; yaml.safe_load(...)'
    description: Validate YAML before saving
  py_edit:
    agent: sub_mas-python-repair
    task: FIX
    tool: dev_editor.py
    description: Edit Python tools
  doc_edit:
    agent: sub_mas-doc-writer
    task: UPDATE
    description: Update documentation
  shell_read:
    agent: null
    exception: true
    description: MAS itself allowed (ls, cat, grep, find, echo, tree, pwd, which, head, tail)
  shell_write:
    agent: sub_mas-git-operator
    task: COMMIT
    description: Git operations (commit, add, push)
  git_status:
    agent: sub_mas-git-operator
    task: STATUS
    description: Show git status
  analyze_scan:
    agent: sub_mas-framework-scanner
    task: SCAN
    tool: dev_observer.py
    description: Scan MAS structure
  analyze_audit:
    agent: sub_mas-framework-scanner
    task: AUDIT
    tool: dev_observer.py + dev_architect.py + dev_analyst.py
    description: Deep analysis
  analyze_harden:
    agent: sub_mas-framework-scanner
    task: HARDEN_CHECK
    tool: dev_analyst.py
    description: Hardening check
  test:
    agent: sub_mas-test-runner
    task: RUN
    description: Execute tests
  improve:
    agent: sub_mas-general-improver
    task: FULL_IMPROVEMENT
    rate_limit: max 1x all 6h (R11)
    description: Self-improvement pipeline
  recovery_checkpoint:
    agent: sub_mas-recovery-checkpoint
    task: SNAPSHOT
    description: Snapshot output
  recovery_immune:
    agent: sub_mas-recovery-immune
    task: CHECK_YAML
    description: YAML coronashield
  recovery_safezone:
    agent: sub_mas-recovery-safezone
    task: FORK
    description: Safezone fork
  recovery_timeline:
    agent: sub_mas-recovery-timeline
    task: FIND_BEST
    description: Best checkpoint find
  recovery_defib:
    agent: sub_mas-recovery-defib
    task: DEFIB
    description: Emergency resuscitation
  guardian_check:
    agent: sub_mas-agent-guardian
    task: CHECK
    description: Check agent on 5 dimensions (Schema/Semantics/Death/Loop/Drift)
  guardian_health:
    agent: sub_mas-agent-guardian
    task: HEALTH_REPORT
    description: Health report for all agents
  guardian_drift:
    agent: sub_mas-agent-guardian
    task: DRIFT_LOG
    description: Analyze drift log
  monitor_health:
    agent: sub_mas-monitor-health
    task: CHECK_HEALTH
    description: Health check
  monitor_runtime:
    agent: sub_mas-monitor-runtime
    task: CHECK_RUNTIME
    description: Runtime monitor
  monitor_session:
    agent: sub_mas-monitor-session
    task: LOG_SESSION
    description: Log session
  verify:
    agent: sub_mas-verification-runner
    task: VERIFY
    description: Verification
  knowledge_load:
    agent: sub_mas-system-knowledge
    task: LOAD
    description: Load system knowledge
  framework_discover:
    agent: sub_mas-framework-knowledge
    task: DISCOVER
    description: Discover framework structure
  framework_explain:
    agent: sub_mas-framework-knowledge
    task: EXPLAIN
    description: Clarify concept
  framework_impact:
    agent: sub_mas-framework-knowledge
    task: IMPACT
    description: Analyze change impact
file_map:
  recipe/dev-mas-engineer.yaml:
    edit: sub_mas-yaml-editor
    validate: sub_mas-recovery-immune
  recipe/sub/sub_mas-*.yaml:
    edit: sub_mas-yaml-editor
    validate: sub_mas-recovery-immune
  tools/dev_*.py:
    edit: sub_mas-python-repair
    validate: sub_mas-python-repair
  tools/dev_*.sh:
    edit: sub_mas-python-repair
  .state/workflows.yaml:
    edit: sub_mas-yaml-editor
    validate: sub_mas-recovery-immune
  .state/rules/*.yaml:
    edit: sub_mas-yaml-editor
    validate: sub_mas-recovery-immune
  docs/*.md:
    edit: sub_mas-doc-writer
  .state/guardian.yaml:
    read: sub_mas-agent-guardian
    edit: sub_mas-yaml-editor
    validate: sub_mas-recovery-immune
read_exceptions:
- action: shell
  cmds:
  - ls
  - cat
  - grep
  - find
  - head
  - tail
  - echo
  - tree
  - pwd
  - which
  - date
- action: load
- action: delegate
