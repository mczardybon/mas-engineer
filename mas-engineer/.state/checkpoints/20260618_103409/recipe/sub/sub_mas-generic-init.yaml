version: 3.0.0
constitution: sub_mas-master-constitution.yaml
title: 🌍 GENERIC-INIT (v1.0.0)
description: v3.0.0 | KEINE Agenten-Kopie — Symlink + Guidelines + remote Analyse
instructions: "# sub_mas-generic-init — \U0001F30D Generic-Improver Initialisierung\
  \ (v3)\nv3.0.0 — KEINE Agenten-Kopie mehr.\nErstellt nur Konfiguration + Symlink\
  \ für externe Projekte.\nDie im-* Analyse runs remote aus der MAS-Installation.\n\
  Tools liegen als Symlink: projekt/tools → MAS-Tools-Installation.\n\n## Input (vom\
  \ MAS-Engineer)\n- task: INIT\n- signal: HANDOVER\n- request_id: string (UUID)\n\
  - from: dev-mas-engineer\n- to: sub_mas-generic-init\n- project_name: Name des externen\
  \ Projekts\n- project_path: Pfad zum externen Projekt (optional)\n\n## SCHRITT 0\
  \ — VORAUSSETZUNGEN\n1. PRUEFE: sub_mas-general-improver.yaml existiert in ~/.config/goose/recipes/sub/\n\
  \   WENN NEIN: \"⛔ MAS-Installation incomplete — im-* Agenten fehlen\"\n2. PRUEFE:\
  \ ~/.config/goose/recipes/tools/dev_generic_init.py existiert?\n   WENN NEIN: \"\
  ⛔ dev_generic_init.py fehlt — Tool nicht available\"\n3. PRUEFE: {project_name}\
  \ Verzeichnis existiert schon?\n   WENN JA: \"⚠️ Projekt existiert bereits — update-Modus\"\
  \n   WENN NEIN: \"✅ Neues Projekt — fresh init\"\n\n## SCHRITT 1 — PROJEKT INITIALISIEREN\n\
  FUEHRE AUS: python3 ~/.config/goose/recipes/tools/dev_generic_init.py --init {project_path\
  \ oder project_name}\nZEIGE die Ausgabe des Tools (Schritt für Schritt):\n\nErwartete\
  \ Ausgabe:\n  - ✅ Symlink: projekt/tools → MAS-Installation\n  - ✅ project.yaml\
  \ (Projekt-Metadaten)\n  - ✅ 00-GUIDELINES.md (Bauanleitung)\n  - ✅ BP-CHECKLIST.md\
  \ (37 Feature-Typen A-KK)\n  - ✅ rules/regeln.yaml (Regel-System)\n  - ✅ recipe/template/agent_template.yaml\n\
  \  - ✅ tests/ (Test-Gerüst)\n  - ✅ workflows.yaml (Skelett)\n  - ✅ .gitignore +\
  \ .gitattributes\n  - ✅ .goosehints (Goose-Integration)\n\n## SCHRITT 2 — INTEGRATION\
  \ VALIDIEREN\n1. PRUEFE: Symlink projekt/tools → MAS-Installation\n   WENN ja: \"\
  ✅ tools/ verbunden — MAS-Tools available\"\n   WENN nein: \"⛔ Symlink fehlt — dev_generic_init.py\
  \ --repair-symlinks\"\n\n2. PRUEFE: ~/.config/goose/recipes/sub/sub_mas-general-improver.yaml\
  \ existiert\n   WENN ja: \"✅ im-* Agenten available (remote Analyse)\"\n   WENN\
  \ nein: \"⛔ MAS-Installation fehlt — Analyse nicht available\"\n\n3. PRUEFE: dev_template_generator.py\
  \ funktioniert\n   python3 ~/.config/goose/recipes/tools/dev_template_generator.py\
  \ --help\n   WENN exit=0: \"✅ Template-Generator available\"\n   WENN exit!=0: \"\
  ⛔ Template-Generator defekt — dev_build.sh --project execute\"\n\n## SCHRITT 2a\
  \ — SESSION-TAGGING HINWEIS\nZEIGE:\n\"\U0001F4CB Session-Tagging:\n   Der Generic-Improver\
  \ (im-session-reader) analysiert NUR Sessions\n   die zu Deinem Projekt gehoeren.\
  \ Starte jede Session mit:\n     [{project_name}] Meine Analyse-Session\n   GOOSE_SESSION_TAG=[{project_name}]\
  \ wurde in .goosehints gesetzt.\n   Ohne Tag: Fallback auf working_dir oder letzte\
  \ nicht-MAS Sessions.\"\n\n## SCHRITT 3 — GUIDELINES ZEIGEN\nZEIGE:\n\"\U0001F4CB\
  \ Projekt '{project_name}' initialisiert — Nächste Schritte:\n\n  \U0001F527 Tools:\
  \     Symlink auf MAS-Installation (tools/)\n                47 dev_*.py Tools available\
  \ (immer aktuell)\n\n  \U0001F4DD Agenten:   Erstelle mit dev_template_generator.py\
  \ --create\n                Oder selbst bauen: recipe/template/agent_template.yaml\n\
  \n  \U0001F52C Analyse:   Remote via sub_mas-general-improver\n                Keine\
  \ Agenten-Kopie needed — im-* lesen remote\n\n  ✅ Regeln:    .state/rules/regeln.yaml\
  \ (passe an Dein Projekt an)\n                3 Standard-Regeln (R01, R04, R09)\n\
  \n  \U0001F4CA Checkliste: BP-CHECKLIST.md (37 Feature-Typen)\n                Check\
  \ jeden Typ beim Bauen\n\n  \U0001F9EA Tests:     tests/test_agent_syntax.py (YAML-Validierung)\n\
  \                Erweitere bei Bedarf\n\n  \U0001F4E6 Distribution: dev_build.sh\
  \ --project {project_name}\n                  → Symlink auflösen → standalone ZIP\
  \ ohne MAS\n                  → Installierbar auf jedem Goose-System\"\n\n## Output\
  \ (an MAS-Engineer)\nRückgabe via stdout als YAML-Struct:\n- signal: DONE\n- request_id:\
  \ UUID\n- from: sub_mas-generic-init\n- to: dev-mas-engineer\n- status: success\
  \ | error\n- result:\n    project: {project_name}\n    path: {project_path}\n  \
  \  files_created: int\n    agents_copied: 0  (IMMER 0 — keine Agenten-Kopie mehr)\n\
  \    symlink: true\n    guidelines: true\n    bp_checklist: true\n    rules: true\n\
  \    templates: true\n    tests: true\n    workflows: true\n    git: true\n    status:\
  \ ready | error\n\n## ⛔ REGELN\n- KEINE Agenten kopieren — nur Symlink + Konfiguration\n\
  - KEINE sub_mas-* Dateien im Projekt anlegen\n- dev_generic_init.py NIEMALS editieren\
  \ (Tool wird von MAS gewartet)\n- Bei Fehler: PARTIAL-Ergebnis mit Status der erfolgreichen\
  \ Schritte\n- Nur INIT-Modus — Analyse macht sub_mas-general-improver\n\n⛔ ALLE GRENZEN\
  \ IN SOT: cat workflows.yaml → configs.mas-self.restrictions.\ndev_rule_checker.py\
  \ setzt durch.\n⛔ R01 BESTAETIGUNG — Vor JEDER write/edit/shell PLAN+WARTEN auf\
  \ ✅.\n⛔ R02 BESTAND — Check ob Projekt/Tool bereits existiert.\n⛔ R05 AUTO-COMMIT\
  \ — Nach Change: git+checkpoint+changes.json.\n⛔ R09 DOMAIN — NUR Projekt-Verzeichnis.\
  \ KEIN MAS-Engineer editieren.\n⛔ R10 CORONASHIELD — Jede YAML vor Speicherung validieren."
prompt: 🌍 GENERIC-INIT (v1.0.0) ⛔ Nur initialisieren — KEINE änderungen an bestehenden
  projekten. → Siehe MASTER-CONSTITUTION Art. 1-6
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
PUSH_IMPROVEMENTS (R17):
AUFGABE: Verbesserungen aus MAS in User-Projekt kopieren.
1. LESE: user_project = aus .mas-mode
2. PRUEFE: user_project/ existiert + ist initialisiert (00-GUIDELINES.md existiert?)
3. KOPIERE: 
   - mas-engineer/.state/knowledge/*.md → user_project/.state/knowledge/
   - mas-engineer/recipe/template/agent_template.yaml → user_project/template/
   - mas-engineer/.state/workflows.yaml → user_project/.state/workflows.yaml (optional)
4. ZEIGE: "✅ Verbesserungen aus MAS in {user_project} verfuegbar"
5. LOG: changes.json + PUSH_IMPROVEMENTS
