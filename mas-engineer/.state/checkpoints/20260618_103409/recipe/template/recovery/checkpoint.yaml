version: 1.0.0
title: SUB-MAS-RECOVERY-CHECKPOINT — Git-aehnliche Snapshots (Sub-Agent)
description: 'v1.0.0 | MAS-intern: Erstellt Snapshots vor jeder Aenderung. Ermoeglicht
  Punktlandung.'
instructions: "# sub_mas-recovery-checkpoint — Snapshot-System\n\nMAS-Engineer-intern.\
  \ Erstellt komplette Workspace-Snapshots vor Aenderungen.\nSpeichert recipe/ + tools/\
  \ + docs/ + state/ in .state/checkpoints/{timestamp}/.\nErmoeglicht: \"Stelle Zustand\
  \ von vor 3 Schritten wieder her.\"\n\n## Input\n```yaml\ncheckpoint_intake:\n \
  \ signal: ''\n  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-checkpoint'\n\
  \  task: 'SNAPSHOT|LIST|RESTORE|DIFF'\n  workspace: string\n  label: string\n  id:\
  \ int\n```\n\n## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n\
  \    - severity: 'P3'\n      title: 'Checkpoint {id}: {label}'\n      description:\
  \ '{N} Dateien, {size}, {timestamp}'\n```\n\n## Task SNAPSHOT — Zustand sichern\n\
  \nSCHRITT 1 — Timestamp + Verzeichnis:\n  timestamp=$(date +%Y%m%d_%H%M%S)\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints/$timestamp\n\
  \  mkdir -p $checkpoint_dir\n\nSCHRITT 2 — Backup der 4 Kernbereiche:\n  cp -r {workspace}/mas-engineer/recipe\
  \ $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/tools  $checkpoint_dir/\n \
  \ cp -r {workspace}/mas-engineer/docs   $checkpoint_dir/\n  cp {workspace}/mas-engineer/.state/changes.json\
  \       $checkpoint_dir/ 2>/dev/null || true\n  cp {workspace}/mas-engineer/.state/best-practices.yaml\
  \ $checkpoint_dir/ 2>/dev/null || true\n\nSCHRITT 3 — Metadaten schreiben:\n  echo\
  \ '{label}' > $checkpoint_dir/.label\n  echo $(find $checkpoint_dir -type f | wc\
  \ -l) > $checkpoint_dir/.file_count\n  du -sh $checkpoint_dir/ | cut -f1 > $checkpoint_dir/.size\n\
  \  date -Iseconds > $checkpoint_dir/.created\n\nSCHRITT 4 — Bestaetigung:\n  signal=''\n\
  \  'Checkpoint $timestamp erstellt: {label}, $(cat $checkpoint_dir/.file_count)\
  \ Dateien, $(cat $checkpoint_dir/.size)'\n\n### Edge Cases SNAPSHOT\n- Kein recipe/\
  \ vorhanden → warning + nur tools+docs+state sichern\n- Schreibrechte fehlen → signal=''\
  \ error: 'Permission denied auf {dir}'\n- Platte voll (OSError) → signal='' error:\
  \ 'Kein Speicherplatz — Checkpoint nicht erstellt'\n- Label >80 Zeichen → auf 80\
  \ kuerzen\n\n## Task LIST — Letzte 10 Checkpoints\n\nSCHRITT 1 — Pruefe Existenz:\n\
  \  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints\n  if [ ! -d \"$checkpoint_dir\"\
  \ ] || [ -z \"$(ls -A $checkpoint_dir 2>/dev/null)\" ]; then\n    signal='': 'Keine\
  \ Checkpoints vorhanden — Erstelle ersten mit SNAPSHOT'\n    return\n  fi\n\nSCHRITT\
  \ 2 — Formatierte Liste:\n  echo '=== LETZTE 10 CHECKPOINTS ==='\n  echo ' #  Timestamp\
  \          Label                        Dateien  Groesse'\n  ls -t $checkpoint_dir\
  \ | head -10 | while read d; do\n    label=$(cat $checkpoint_dir/$d/.label 2>/dev/null\
  \ || echo '?')\n    files=$(cat $checkpoint_dir/$d/.file_count 2>/dev/null || echo\
  \ '?')\n    size=$(cat $checkpoint_dir/$d/.size 2>/dev/null || echo '?')\n    echo\
  \ \"  $d  $label  ${files}  ${size}\"\n  done\n\n### Edge Cases LIST\n- Kein checkpoints/-Verzeichnis\
  \ → 'INFO: Keine Checkpoints'\n- Kaputtes .label oder .size → '?' anzeigen + trotzdem\
  \ auflisten\n\n## Task RESTORE — Checkpoint wiederherstellen\n\nSCHRITT 1 — Checkpoint\
  \ identifizieren:\n  target=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
  \ | sed -n '{id}p')\n  if [ -z \"$target\" ]; then\n    signal='': 'Checkpoint #{id}\
  \ nicht gefunden'\n    return\n  fi\n\nSCHRITT 2 — YAML-Pruefung:\n  python3 -c\
  \ \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$target/recipe/dev-mas-engineer.yaml'))\"\
  \n  if [ $? -ne 0 ]; then\n    signal='': 'Checkpoint #{id} hat YAML-Fehler'\n \
  \   return\n  fi\n\nSCHRITT 3 — Wiederherstellen:\n  rm -rf {workspace}/mas-engineer/recipe\n\
  \  rm -rf {workspace}/mas-engineer/tools\n  rm -rf {workspace}/mas-engineer/docs\n\
  \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/recipe {workspace}/mas-engineer/\n\
  \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/tools  {workspace}/mas-engineer/\n\
  \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/docs   {workspace}/mas-engineer/\n\
  \nSCHRITT 4 — Abschluss:\n  signal='': 'Checkpoint #{id} ($target) wiederhergestellt'\n\
  \  Erstelle neuen Snapshot: task=SNAPSHOT, label='nach_restore_$target'\n\n### Edge\
  \ Cases RESTORE\n- id=0 → 'ID 0 ungueltig — erste ID ist 1'\n- Checkpoint unvollstaendig\
  \ → signal='': 'Checkpoint unvollstaendig — recipe/ fehlt'\n- Gleichzeitiger Zugriff\
  \ → temporaere Dateien nutzen\n\n## Task DIFF — Unterschied zwischen Checkpoints\n\
  \nSCHRITT 1 — IDs aufloesen:\n  from_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
  \ | sed -n '{from_id}p')\n  to_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
  \ | sed -n '{to_id}p')\n\nSCHRITT 2 — Vergleichen:\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/recipe/\
  \ {workspace}/mas-engineer/.state/checkpoints/$to_cp/recipe/\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/tools/\
  \  {workspace}/mas-engineer/.state/checkpoints/$to_cp/tools/\n\nSCHRITT 3 — Zusammenfassung:\n\
  \  changed=$(diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/ {workspace}/mas-engineer/.state/checkpoints/$to_cp/\
  \ | grep -c 'aendern')\n  signal='': 'Diff {from_id}..{to_id}: {changed} Aenderungen'\n\
  \n### Edge Cases DIFF\n- IDs gleich → 'INFO: Gleicher Checkpoint — kein Diff'\n\
  - from_id > to_id → automatisch tauschen\n"
prompt: " CHECKPOINT (v1.0.0)\n Snapshots vor jeder Aenderung\n SNAPSHOT | LIST |\
  \ RESTORE | DIFF\n settings: timeout=120"
settings:
  timeout: 120
  max_steps: 40
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
