version: 1.0.0
title: SUB-MAS-RECOVERY-SAFEZONE — Paralleler Fork-Workspace (Sub-Agent)
description: 'v1.0.0 | MAS-intern: Arbeitet in Fork, merged nur bei vollstaendiger
  Validierung.'
instructions: "# sub_mas-recovery-safezone — Fork-Workspace\n\nMAS-Engineer-intern.\
  \ Erstellt eine vollstaendige Kopie des Workspace.\nAenderungen geschehen NUR im\
  \ Fork. Haupt-Workspace unberuehrt.\nErst bei explizitem MERGE (nach vollstaendiger\
  \ Validierung) wird aktiv.\n\n## Input\n```yaml\nsafezone_intake:\n  signal: ''\n\
  \  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-safezone'\n\
  \  task: 'FORK|MERGE|ABORT|DIFF'\n  workspace: string\n  fork_name: string\n```\n\
  \n## Task FORK — Parallelen Workspace erstellen\n\nSCHRITT 1 — Pruefe ob bereits\
  \ Fork aktiv:\n  if [ -L \"{workspace}/mas-engineer_active\" ]; then\n    signal='':\
  \ 'Fork bereits aktiv — $(readlink -f {workspace}/mas-engineer_active)'\n    'MERGE\
  \ oder ABORT zuerst'\n    return\n  fi\n\nSCHRITT 2 — Fork erstellen:\n  timestamp=$(date\
  \ +%Y%m%d_%H%M%S)\n  name={fork_name:-$timestamp}\n  fork_path={workspace}/mas-engineer_fork_$name\n\
  \  cp -r {workspace}/mas-engineer $fork_path\n\nSCHRITT 3 — Symlink setzen:\n  ln\
  \ -sf mas-engineer_fork_$name {workspace}/mas-engineer_active\n\nSCHRITT 4 — Pruefung\
  \ + Bestaetigung:\n  python3 -c \"import yaml; yaml.safe_load(open('$fork_path/recipe/dev-mas-engineer.yaml'))\"\
  \n  signal='': 'Fork aktiv: mas-engineer_fork_$name'\n  'Haupt unberuehrt: {workspace}/mas-engineer'\n\
  \n### Edge Cases FORK\n- Fork existiert bereits → '' warning + 'MERGE zuerst'\n\
  - Kein Haupt-Workspace → '' error + '--init zuerst'\n- Keine Rechte zum Kopieren\
  \ → '' error: 'Permission denied'\n\n## Task MERGE — Fork in Haupt uebernehmen\n\
  \nSCHRITT 1 — Fork identifizieren:\n  fork_path=$(readlink -f {workspace}/mas-engineer_active\
  \ 2>/dev/null)\n  if [ ! -d \"$fork_path\" ]; then\n    signal='': 'Kein aktiver\
  \ Fork — FORK zuerst'\n    return\n  fi\n\nSCHRITT 2 — Fork validieren (YAML + Tools\
  \ + Docs):\n  errors=0\n  for f in $(find $fork_path/recipe -name '*.yaml' -not\
  \ -path '*/.backups/*'); do\n    python3 -c \"import yaml; yaml.safe_load(open('$f'))\"\
  \ 2>&1 || errors=$((errors+1))\n  done\n  if [ $errors -gt 0 ]; then\n    signal='':\
  \ 'Fork hat $errors YAML-Fehler — ABORT empfohlen'\n    return\n  fi\n\nSCHRITT\
  \ 3 — Merge:\n  rm -rf {workspace}/mas-engineer\n  cp -r $fork_path {workspace}/mas-engineer\n\
  \nSCHRITT 4 — Aufraeumen + bestaetigen:\n  rm -f {workspace}/mas-engineer_active\n\
  \  rm -rf $fork_path\n  signal='': 'Merge erfolgreich — $changed Dateien uebernommen'\n\
  \  Erstelle neuen Snapshot: label='nach_merge'\n\n### Edge Cases MERGE\n- Fork hat\
  \ WENIGER Dateien → warning + Count-Vergleich\n- Gleichzeitiger Zugriff → serialisieren\
  \ durch temporaere Lock-Datei\n\n## Task ABORT — Fork verwerfen\n\nSCHRITT 1 — Fork\
  \ finden:\n  fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null)\n\
  \  if [ ! -d \"$fork_path\" ]; then\n    signal='': 'Kein aktiver Fork — nichts\
  \ zu tun'\n    return\n  fi\n\nSCHRITT 2 — Loeschen:\n  rm -f {workspace}/mas-engineer_active\n\
  \  rm -rf $fork_path\n  signal='': 'Fork verworfen — Haupt-Workspace unberuehrt'\n\
  \n### Edge Cases ABORT\n- Keine Rechte zum Loeschen → '' error: 'Permission denied'\n\
  - Fork enthaelt wichtige Arbeit → '' warning + 'restore aus checkpoint moeglich'\n\
  \n## Task DIFF — Fork vs Haupt\n\nSCHRITT 1 — Fork finden:\n  fork_path=$(readlink\
  \ -f {workspace}/mas-engineer_active 2>/dev/null)\n  if [ ! -d \"$fork_path\" ];\
  \ then\n    signal='': 'Kein aktiver Fork'\n    return\n  fi\n\nSCHRITT 2 — Diff:\n\
  \  diff -rq {workspace}/mas-engineer/recipe $fork_path/recipe/ 2>/dev/null\n  diff\
  \ -rq {workspace}/mas-engineer/tools  $fork_path/tools/ 2>/dev/null\n  changed=$(diff\
  \ -rq {workspace}/mas-engineer/ $fork_path/ | grep -c 'aendern' 2>/dev/null)\n \
  \ signal='': 'Diff Haupt vs Fork: {changed} Unterschiede'\n"
prompt: " SAFE-ZONE (v1.0.0)\n Fork-Workspace — Haupt unberuehrt\n FORK | MERGE |\
  \ ABORT | DIFF\n settings: timeout=300"
settings:
  timeout: 300
  max_steps: 40
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
