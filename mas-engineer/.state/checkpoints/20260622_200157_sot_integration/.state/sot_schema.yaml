# ════════════════════════════════════════════
# SOT-SCHEMA v1.0.0 — Source of Truth für Agenten + Configs
# ════════════════════════════════════════════
# Definiert welche Felder ein Agenten-Eintrag in workflows.yaml haben kann.
# Validierung: dev_intention_parser.py --validate
# ════════════════════════════════════════════

version: "1.0.0"

agent_schema:
  required:
    - name          # Eindeutiger Name (sub_mas-{name} oder {name})
    - type          # sub | voll | intern
    - task          # Kernaufgabe (1 Satz)
  optional:
    - desc          # Beschreibung (2-3 Saetze)
    - emoji         # Charakter-Emoji
    - domain        # mas | framework | generic (default: mas)
    - template      # Pfad zum Template (default: recipe/template/agent_template.yaml)
    - large_file    # Tool fuer Dateien >1000 Zeilen (default: dev_editor_large.py)

  restrictions:     # Grenzen
    allowed_paths: []    # Nur diese Pfade lesen/schreiben
    forbidden_paths: []  # Diese Pfade tabu
    max_steps: 100       # Maximale Schritte
    timeout: 600         # Sekunden
    requires_bestaetigung: true
    requires_coronashield: true
    allowed_actions: [shell, delegate, write, edit, read, signal]
    forbidden_actions: []
    allowed_tools: []
    forbidden_tools: []
    allowed_delegates: []
    forbidden_delegates: ["sub_mas-general-improver"]

  workflow:
    steps:
      - id: string
        action: shell | delegate | write | edit | signal | rule_check | sub_workflow
        cmd: string
        agent: string
        task: string
        target: string
        depends_on: [string]
        on_error: abort | continue | retry(3)
        timeout: int
        condition: string

config_schema:
  required:
    - type           # main-agent | sub-agent | framework-agent
    - version        # semver
  optional:
    - first_session  # Liste von Start-Schritten
    - restrictions   # R01-R10 Definitionen
    - enforcement    # Methoden 5+6+9+10+1
    - recovery       # 5-Stufen-System
    - tools          # Tool-Referenzen
    - sub_agents     # Agenten-Registry
    - tier_system    # 5 Tier-Stufen
    - token_budgets  # Token-Limits
    - signals        # Signal-Definitionen

restrictions_schema:
  fields:
    r01_bestaetigung:
      required: [level, description]
      optional: [details]
    r09_domain:
      required: [level, description]
      optional: [details]
    r02_bestand:
      required: [level, description]
    r04_general_improver:
      required: [level, description]
    r05_auto_commit:
      required: [level, description]
      optional: [details]
    r06_sub_agent:
      required: [level, description]
    r07_signal:
      required: [level, description]
    r08_token:
      required: [level, description]
    r10_coronashield:
      required: [level, description]
    verbote:
      required: []
      optional: []
    verstoesse:
      required: [level, description]
