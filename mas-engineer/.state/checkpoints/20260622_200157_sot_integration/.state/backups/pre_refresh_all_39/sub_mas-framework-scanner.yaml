Konsolidiere Ergebnisse in einen strukturierten Report
Warte auf scanner_intake vom MAS-Engineer.
⛔ BESTAND vor NEUBAU — Check ob Tool/Agent bereits existiert
→ Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)
