# sub_mas-recovery-immune — \"\"Coronashield\"\" YAML-Immunsystem

MAS-Engineer-intern. Der ERSTE Schutzschild — VOR jeder Change.
Checks YAML-Syntax, Python-Syntax, Shell-Syntax und Gesamt-Zustand.
Verhindert 4/4 Crash-Typen aus Session 20260614.

Coronashield-Regel: Keine YAML wird gespeichert ohne vorherige Validierung.
Keine Python-Datei wird ausgeführt ohne Syntax-Check.
Kein Shell-Script wird gestartet ohne bash -n.

## Input
```yaml
immune_intake:
  signal: ''
  request_id: string
  from: 'dev-mas-engineer'
  to: 'sub_mas-recovery-immune'
  task: 'CHECK_YAML|CHECK_SYNTAX|VERIFY_STATE'
  workspace: string
  file_path: string
  file_type: 'yaml'|'python'|'bash'
  state_path: string
```

## Output
```yaml
mas_result:
  signal: ''|''|''
  observations:
    - severity: 'P1'|'P2'|'P3'
      title: string
      description: string
  validation_log:
    - check: 'yaml'|'python'|'shell'|'state'
      status: 'ok'|'error'|'warning'
      detail: string
  score: int
```

## Task CHECK_YAML — YAML-Syntax vor jedem Edit

SCHRITT 1 — Existenz-Prüfung:
  [ -f '{file_path}' ] || return 'Datei nicht gefunden: {file_path}'

SCHRITT 2 — YAML-Parse:
  python3 -c \"import yaml; yaml.safe_load(open('{file_path}'))\" 2>&1
  EXIT 0: signal='', observations[P3]: 'YAML gueltig: {N} Zeilen'
  EXIT != 0: signal='', observations[P1]: 'YAML-Fehler: {error_msg}'
    recommendation: 'Rollback aus letztem Backup empfohlen'

### Edge Cases CHECK_YAML
- Datei leer (0 Bytes) → P2 warning
- YAML mit Python-Exceptions (nicht yaml.Error) → P1 error  
- Unicode-Fehler → P3 info: 'encoding issue, versuche utf-8'
- Binary-Datei erkannt → P1 error: 'Keine YAML-Datei (Binary)'

## Task CHECK_SYNTAX — Python + Shell Syntax vor Execution

PYTHON-CHECK:
  python3 -c \"compile(open('{file_path}').read(), '{file_path}', 'exec')\"
  EXIT 0: 'Python-Syntax OK'
  EXIT != 0: 'Python-Syntax-Fehler: {error}'

SHELL-CHECK:
  bash -n '{file_path}' 2>&1
  EXIT 0: 'Shell-Syntax OK'
  EXIT != 0: 'Shell-Syntax-Fehler: {error}'

### Edge Cases CHECK_SYNTAX
- Kein Bash installiert → warning + ueberspringen
- Python 2 vs 3 → immer python3 erzwingen
- Shebang fehlt → P3 info: 'Kein Shebang — nehme bash als Default'

## Task VERIFY_STATE — Gesamt-Zustand check

SCHRITT 1 — Rekursiver YAML-Scan:
  find {workspace}/mas-engineer -name '*.yaml' -not -path '*/.backups/*' -not -path '*/checkpoints/*' | \\
  while read f; do
    python3 -c \"import yaml; yaml.safe_load(open('$f'))\" 2>&1 || echo \"FAIL:$f\"
  done

SCHRITT 2 — Statistik:
  total=$(find {workspace}/mas-engineer -name '*.yaml' -not -path '*/.backups/*' -not -path '*/checkpoints/*' | wc -l)
  ok=$((total - $(grep -c '^FAIL' /tmp/immune_verify_$$)))
  failed=$((total - ok))
  score=$((ok * 100 / total))

SCHRITT 3 — Report:
  score == 100: signal='' — 'Alle {total} YAMLs gueltig'
  score >= 80:  signal='' — '{ok}/{total} gueltig ({failed} Fehler)'
  score < 80:   signal='' — 'Nur {ok}/{total} gueltig — Recovery empfohlen'

### Edge Cases VERIFY_STATE
- Keine YAML-Dateien → P3 info: 'Keine YAMLs zu pruefen'
- Permission denied → warning: 'Access-Fehler: {file}'
- Symlink-Loop → find -L vermeiden, nur -type f

