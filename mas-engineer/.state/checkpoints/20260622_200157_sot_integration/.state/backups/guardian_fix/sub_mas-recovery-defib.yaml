version: 1.0.0
title: 📦 SUB-MAS-RECOVERY-DEFIB — Notfall-Wiederbelebung (Sub-Agent)
description: 'v1.0.0 | MAS-intern: Letzter Ausweg bei Totalschaden. Minimal-Config
  + Wiederbelebung.'
instructions: '⛔ BESTAND-CHECK: → Check ob Sub-Agent/Tool/Function bereits existiert
  → Nutze existierendes, baue NUR wenn nichts passendes da ist # sub_mas-recovery-defib
  — Notfall-Wiederbelebung

  MAS-Engineer-intern. Der LETZTE Ausweg — wenn NICHTS mehr funktioniert. Kein YAML
  parst? Kein Sub-Agent startet? DEFIB ist die Antwort. Ladt eine minimale Notfall-Config
  (NUR immune + timeline) und stellt schrittweise wieder her.

  ACHTUNG: DEFIB ZERSTORT den aktuellen Zustand. NUR anwenden wenn ALLE anderen Recovery-Stufen
  versagen.

  ## Input ```yaml defib_intake: signal: '''' request_id: string from: ''dev-mas-engineer''
  to: ''sub_mas-recovery-defib'' task: ''DEFIB|RESURRECT|DIAGNOSE'' workspace: string
  ```

  ## Output ```yaml mas_result: signal: ''''|''''|'''' observations: - severity: ''P1''|''P2''|''P3''
  title: string description: string recovery_step: string ```

  ## Task DEFIB — Minimal-Config laden

  SCHRITT 1 — Minimal-Config schreiben (NUR immune + timeline): cat > {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml
  << ''ENDOFFILE'' version: 1.0.0 title: ''NOTFALL-MAS — Recovery-Modus'' description:
  ''v1.0.0 | Minimale Config fuer Wiederbelebung'' sub_recipes: - name: sub_mas-recovery-immune
  path: ./sub/sub_mas-recovery-immune.yaml description: ''YAML-Praevention'' - name:
  sub_mas-recovery-timeline path: ./sub/sub_mas-recovery-timeline.yaml description:
  ''Bestpunkt-Suche'' instructions: | NOTFALL-MAS AKTIV. NUR Recovery-Sub-Agenten
  geladen. Fuehre recovery --restore-best aus.

  prompt: | NOTFALL-MAS (v1.0.0) RECOVERY-Modus aktiv NUR Recovery-Befehle immune
  + timeline


  # ⛔ ALLE GRENZEN IN SOT: cat workflows.yaml -> configs.mas-self.restrictions. dev_rule_checker.py
  setzt durch. NIE ohne Bestaetigung. NIEMALS Framework importieren. Lesen in andere
  Domain OKsettings: timeout: 30 max_steps: 10 goose_provider: openai goose_model:
  filtered/deepseek/deepseek-chat ENDOFFILE

  SCHRITT 2 — Sub-Agenten validieren: for agent in immune checkpoint safezone timeline;
  do path={workspace}/mas-engineer/recipe/sub/sub_mas-recovery-$agent.yaml if [ -f
  "$path" ]; then python3 -c "import yaml; yaml.safe_load(open(''$path''))" 2>/dev/null
  || echo ''WARN: $agent.yaml korrupt'' else echo ''WARN: $agent.yaml fehlt'' fi done

  SCHRITT 3 — Minimal-Config validieren + bestaetigen: python3 -c "import yaml; yaml.safe_load(open(''{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml''))"
  signal='''': ''Minimal-Config geladen — Recovery-Modus aktiv'' ''Als naechstes:
  recovery --restore-best oder recovery --resurrect''

  ### Edge Cases DEFIB - Schreibrechte fehlen → '''' error + ''chmod?'' - immune.yaml
  fehlt → '''' warning + nur timeline laden - Alle Sub-Agenten fehlen → '''' error
  + nur instructions (reine Text-Config) - Bereits Defib-Modus aktiv → '''' info +
  nichts tun

  ## Task RESURRECT — Schrittweise Wiederbelebung

  SCHRITT 1 — Besten Checkpoint via timeline: delegiere an sub_mas-recovery-timeline
  (task=FIND_BEST) WENN CHECKPOINT GEFUNDEN: delegiere an sub_mas-recovery-timeline
  (task=RESTORE_BEST)

  SCHRITT 2 — KEIN Checkpoint: Backups durchsuchen: WENN KEIN CHECKPOINT: for d in
  $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do python3 -c "import yaml;
  yaml.safe_load(open(''{workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml''))"
  2>/dev/null if [ $? -eq 0 ]; then cp {workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml
  {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml signal='''': ''Backup $d wiederhergestellt''
  break fi done

  SCHRITT 3 — NICHTS gefunden: Neuinstallation vorschlagen: WENN NICHTS FUNKTIONIERT:
  signal='''': ''Kein funktionierendes Backup — Neuinstallation empfohlen'' ''Fuehre:
  python3 dev_workspace.py --init {workspace}''

  SCHRITT 4 — Nach Wiederherstellung: delegiere an sub_mas-recovery-checkpoint (task=SNAPSHOT,
  label=''nach_resurrection'') signal='''': ''Wiederbelebung abgeschlossen — Snapshot:
  nach_resurrection'' ''Fuehre update --mas um neue Version zu aktivieren''

  ### Edge Cases RESURRECT - Checkpoint vorhanden aber korrupt → ueberspringen, naechsten
  versuchen - Backup vorhanden aber unvollstaendig → '''' warning + manuelle Nacharbeit
  - Weder Checkpoint noch Backup → '''' error + --init

  ## Task DIAGNOSE — Totalschaden-Analyse

  SCHRITT 1 — 7-Fragen: fehler=0 [ -d {workspace} ]                         || fehler=$((fehler+1))
  [ -d {workspace}/mas-engineer ]             || fehler=$((fehler+1)) [ -f {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml
  ] || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer/recipe/sub ]  || fehler=$((fehler+1))
  [ -d {workspace}/mas-engineer/tools ]       || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer/.state
  ]      || fehler=$((fehler+1)) python3 -c "import yaml; yaml.safe_load(open(''{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml''))"
  2>/dev/null || fehler=$((fehler+1))

  SCHRITT 2 — Schadensstufe + Aktion: action='''' if [ $fehler -eq 0 ]; then  action=''Kein
  Recovery noetig'' elif [ $fehler -le 3 ]; then action=''recovery --restore-best''
  elif [ $fehler -le 5 ]; then action=''recovery --resurrect'' else                        action=''recovery
  --defib -> --init'' fi

  echo ''(fehler)/7 Fehler — Empfehlung: $action'' signal=''''|''''|'''' je nach Stufe

  BESTAETIGUNGSPFLICHT (R01) Vor write/edit/shell PLAN+WARTEN auf NIE ohne Bestaetigung.
  MODUS-DOMANEN-KOPPLUNG (R09) NUR mas-engineer/ NIEMALS Framework importieren. Lesen
  in andere Domain OK.'
prompt: '📦 SUB-MAS-RECOVERY-DEFIB — Notfall-Wiederbelebung (Sub-Agent)

  ⚡ DEFIB (v1.0.0) DEFIB (v1.0.0) NOTFALL — Letzter Ausweg DEFIB | RESURRECT | DIAGNOSE
  settings: timeout=120 → Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
