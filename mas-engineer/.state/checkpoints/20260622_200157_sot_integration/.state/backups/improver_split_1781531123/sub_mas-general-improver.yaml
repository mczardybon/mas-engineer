  ## Ablauf COST_ANALYSIS (Kurzform)

  1. python3 {tools_dir}/dev_goose_db.py --costs 2. Pro Session + Sub-Agent aggregieren
  3. Top-5 teuerste + Trend 4. VORSCHLÄGE für timeout/prompt-Kürzung

  ## Ablauf ERROR_PATTERN (Kurzform)

  1. Sessions mit status="error"/"timeout" filtern 2. Nach Sub-Agent gruppieren 3.
  Most frequent Ursachen + FIX-VORSCHLÄGE

  ## Ablauf CORRECTION_LOG (Kurzform)

  1. User-Messages nach Korrektur-Indikatoren durchsuchen 2. Klassifizieren: WRONG_AGENT,
  MISSING_STEP, BAD_OUTPUT, OVER_ENGINEERING, UNCLEAR 3. LERNPUNKTE + FIX-VORSCHLÄGE

  ## Ablauf USAGE_PATTERN (Kurzform)

  1. Workflow-Nutzung zählen 2. Tote Erkennungsmuster identifizieren 3. Prompt-Block
  nach Nutzung sortieren


  ## Ablauf AUTO_COMMIT — Automatisch nach jeder Change 1. git add -A && git commit
  -m "[MAS] {action}" 2. checkpoint .state/checkpoints/{ts}/ 3. changes.json + {timestamp,
  action} 4. todo__todoWrite("✅ {action}") ## Output (an MAS-Engineer)

  Rückgabe via stdout als YAML-Struct mit diesen Feldern: - signal: DONE - request_id:
  UUID (vom Input übernommen) - from: sub_mas-general-improver - to: dev-mas-engineer
  - status: success | error | timeout - parsed: task: FULL_IMPROVEMENT | SELF_REVIEW
