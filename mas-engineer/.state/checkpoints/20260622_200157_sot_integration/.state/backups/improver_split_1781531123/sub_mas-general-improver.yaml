  SCHRITT 5-7 — Goose-Check + Priorisierung + A/B (in si-designer)


  # Incremental Mode WENN mode == "incremental": git diff --name-only HEAD~1 Lese
  generic-cache.yaml: cached_findings NUR geaenderte Dateien analysieren Ueberspringe
  Kosten + Session-Health SONST (full): SCHRITT 1 — WORKSPACE-VORBEREITUNG                         ║
  ╚══════════════════════════════════════════════════════════════╝ ``` 1. python3
  {tools_dir}/dev_workspace.py --status {workspace} → Existiert mas-engineer/? Welche
