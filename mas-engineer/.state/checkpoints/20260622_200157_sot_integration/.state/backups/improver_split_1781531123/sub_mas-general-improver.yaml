  setzt durch. ## Ablauf SELF_REVIEW (Kurzform: nur Schritte 2+3+7)

  Wie FULL_IMPROVEMENT aber NUR: - SCHRITT 2: Sessions laden - SCHRITT 3: Fehlermuster
  erkennen - SCHRITT 7: User-Bestätigung (Keine Changes, keine Goose-Checks, keine
