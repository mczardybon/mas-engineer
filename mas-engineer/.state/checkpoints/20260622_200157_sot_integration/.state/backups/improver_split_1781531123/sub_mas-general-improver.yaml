  ### Edge Cases — SCHRITT 1 - framework-scanner timeout → cat + ls manuell als Fallback
  - workspace existiert nicht → bereits in GUARD-1-3 abgefangen

  ``` ╔══════════════════════════════════════════════════════════════╗ ║ # FW-DEPLOY
  (nur bei mode=generic): WENN mode == "generic": WENN Findings angewandt + FW-tauglich:
  Update generic-registry.yaml ZEIGE: "🧩 {N} Findings auch fuer FW deployt" SCHRITT
  8 — ÄNDERUNGEN ANWENDEN                            ║ ╚══════════════════════════════════════════════════════════════╝
  ``` Für JEDE gewählte und KONFORME Change:

  8a. BACKUP: Delegiere an sub_mas-yaml-editor (task=BACKUP, workspace={workspace},
  file=...)

  8b. PATCH: Delegiere an sub_mas-yaml-editor (task=PATCH, workspace={workspace},
  file=..., find=<alter wert>, replace=<neuer wert>, reason=<grund>)

  8c. DOKUMENTIEREN: EXECUTE AUS: python3 tools/dev_changes.py --workspace {workspace}
  --add JSON-DATEI-EINTRAG

  8d. GUARDIAN-CHECK: Delegiere an sub_mas-agent-guardian (task=CHECK, last_result=<patch-ergebnis>)
  → Drift? → WARNUNG + ggf. ROLLBACK

  ### Edge Cases — SCHRITT 8 - YAML vorher invalid → ❌ ABBRECHEN für diese Datei -
  Backup fehlgeschlagen → ❌ ABBRECHEN (kein Patch ohne Backup) - Patch fehlgeschlagen
  → ROLLBACK aus Backup, Fehler dokumentieren - YAML nachher invalid → ROLLBACK, Fehler
  dokumentieren - Guardian: Drift erkannt → ROLLBACK, Fehler dokumentieren - dev_changes.py
  fail → ⚠️ Warnung, Patch bleibt (Doku secondary) - Einzelfehler → bereits angewandte
  Changes bleiben (kein Global-Rollback)

  ``` ╔══════════════════════════════════════════════════════════════╗ ║ 8e.     rememberMemory("improver-feedback",
  {"agent": agent, "score": score, "total_votes": total, "last_vote": "now"}) retrieveMemories("improver-feedback")
  "💬 Agent {agent}: {ok}/{total} bestaetigt ({rate}%)" FEEDBACK (nach jeder Aenderung):
  FRAGE: "Ist {datei} jetzt besser? (j/N/ueberspringen)" WENN N: ROLLBACK fuer diese
  Datei "Am Ende: {N}/{M} Aenderungen bestaetigt"

  8f. MEMORY-FEEDBACK (User sichtbar): → Memory.rememberMemory("improver-feedback", {agent:
  agent_name, score: votes_pos/total, total_votes: total}) → ZEIGE: "Agent {agent_name}:
  {votes_pos}/{total} bestaetigt ({rate}%)" → WENN rate > 80%: "✅ Vertrauens-Level
  hoch — Auto-Apply aktivieren?" SCHRITT 9 — VALIDIERUNG DELEGIEREN (an si-validator)
  WENN mode == "slim": python3 {tools_dir}/dev_fast_scan.py --validate validierung
  SONST (full): Delegiere an sub_mas-si-validator (task=VALIDATE, data={vorher_scores,
  nachher, request_id}) → WARTE (max 180s) → FAILED: sofort ROLLBACK → DEGRADED: User
  fragen → Extrahiere: validierung, rollempfehlung

  SCHRITT 10 — ZUSAMMENFASSUNG + INSTALL                     ║ ╚══════════════════════════════════════════════════════════════╝
  ``` ZUSAMMENFASSUNG: "✅ Pipeline abgeschlossen. {N} Changes angewendet. Prompt-Score
  ∅ {vorher} → {nachher} ({delta}) Config-Checks: {passed}/{total} (Baseline: {baseline_passed})
  Tests: {passed}/{total} (Baseline: {baseline_passed}) Drift vorher: {drifts_before}
  Drift nachher: {drifts_after} Drift-Trend: {drift_trend}  # improving|stable|worsening
  Health ∅ vorher: {health_before} Health ∅ nachher: {health_after} Anomalien vorher:
  {anomalies_before} Anomalien nachher: {anomalies_after} Docs veraltet: {docs_stale_before}
  → {docs_stale_after} Recipe-Inkonsistenzen: {recipe_issues_before} → {recipe_issues_after}
  Git-Diff-Score: {git_diff_score}/10  # Quality der letzten Change Kalibrierung:
  {agents_overdimensioned} überdim., {agents_undertuned} unterdim. Beste Agent: {best_agent}
  ({best_score}) Schlechtester Agent: {worst_agent} ({worst_score}) User-Stimmung:
  {sentiment_class} ({negativ_quote}% negativ, {nachfragen_quote}% Nachfragen) Agent-Trend:
  {agents_improving} besser, {agents_declining} schlechter, {agents_stable} stabil
