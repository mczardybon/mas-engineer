  - type: FINDING_TYPE (FREQUENT_TIMEOUT | ERROR_PATTERN | CORRECTION_LOG | USAGE_PATTERN
  | DRIFT_PATTERN | HEALTH_ISSUE | STALE_DOC | GOOSE_OVERHEAD | MIGRATION_NEEDED |
  RECIPE_ISSUE) - feature: Typ-Key (A1-J2, K1-N3) - agent: betroffener Agent - fix:
  file, field, from, to, reason

  pipeline_result: total_suggestions, goose_approved, user_selected, applied, rolled_back
  prompt_score_before, prompt_score_after config_checks_before, config_checks_after
  tests_before, tests_after drifts_before, drifts_after, drift_trend health_before,
