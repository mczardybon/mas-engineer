version: 1.0.0
description: Spezial-Agents die NICHT im sub_recipes der Main-Recipe aufgefuehrt sind
agents:
  sub_mas-dashboard-live:
    type: background_poller
    invoke: task
    description: Dashboard-Monitor, alle 15 Minuten per Cron
    reason: Kein Sub-Ref — wird per Schedule/Task aufgerufen
  sub_mas-degradation-handler:
    type: api_handler
    invoke: signal
    description: Degradation-Recovery via API
    reason: Kein Sub-Ref — wird vom Guardian per API aufgerufen
  sub_mas-signal-generator:
    type: signal_handler
    invoke: signal
    description: Signal-Generator nach Checkpoint
    reason: Kein Sub-Ref — wird nach Checkpoint automatisch getriggert
types:
  background_poller:
    description: Laeuft periodisch per Cron/Schedule
    invoke: task
  api_handler:
    description: Wird per API von anderen Sub-Agents aufgerufen
    invoke: signal
  signal_handler:
    description: Reagiert auf Signale (CP_DONE, etc.)
    invoke: signal
