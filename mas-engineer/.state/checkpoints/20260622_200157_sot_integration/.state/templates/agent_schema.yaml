    instructions: "# sub_mas-generic-init — \U0001F30D Generic-Improver Initialisierung\n\
      \nInitialisiert den Generic-Improver fuer ein User-Framework.\nKopiert die 3\
      \ SI-Subs + Orchestrator mit angepassten Pfaden.\n\n## Input\n- signal: HANDOVER\n\
