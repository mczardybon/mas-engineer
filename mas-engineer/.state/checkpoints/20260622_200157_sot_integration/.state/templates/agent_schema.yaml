      \ (aktiviere NUR relevante Typen)\n  Scanne Dateistruktur:\n    WENN recipe/\
      \ existiert: L, N, O\n    WENN tests/ existiert: V\n    WENN docs/ existiert:\
      \ K\n    WENN .git/ existiert: R, X\n    IMMER: A, B, C, D, G, Q\n  Inaktive\
      \ Typen ueberspringen (~70% weniger Analyse)\n  Uebergebe aktive_typen an entfernt\n\
      \n  0. GENERIC-REGISTRY: 35 Sub-Agenten auf FW-Tauglichkeit pruefen\n     MAS-eigene\
      \ (28/35):\n       sub_mas-agent-guardian, sub_mas-config-auditor, sub_mas-framework-scanner,\n\
      \       sub_mas-framework-knowledge, sub_mas-goose-admin, sub_mas-goose-expert,\n\
      \       sub_mas-migration-helper, sub_mas-prompt-engineer, sub_mas-recipe-manager,\n\
      \       sub_mas-recovery-*, sub_mas-session-analyst, sub_mas-test-runner,\n\
      \       sub_mas-yaml-editor, sub_mas-monitor-*, sub_mas-mas-controller,\n  \
      \     sub_mas-signal-generator, sub_mas-degradation-handler,\n       sub_mas-agent-selector,\
      \ sub_mas-verification-runner,\n       sub_mas-interpreter, sub_mas-summarizer,\
