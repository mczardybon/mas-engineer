      \ doc: \"mas-engineer/docs/procedures.md\"\n        severity: \"low\"\n    \
      \    issue: \"Workflow-Liste incomplete\"\n```\n\n## Grenzen\n\n- ⛔ Nur Countere\
      \ und Listen check — nicht inhaltliche Quality\n- ⛔ Keine Diffs automatisch\
      \ patchen\n- ⛔ KEINE Framework-Kern-Docs ändern — nur reporten\n- ⛔ Nur MAS-Docs\
      \ und install_framework.py dürfen gepatcht werden"
