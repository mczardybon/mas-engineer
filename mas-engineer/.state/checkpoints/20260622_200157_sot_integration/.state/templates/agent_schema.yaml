  recovery-checkpoint:
    category: recovery
    emoji: 📸
    title: SUB-MAS-RECOVERY-CHECKPOINT — Git-aehnliche Snapshots (Sub-Agent)
    description: 'v1.0.0 | MAS-intern: Erstellt Snapshots vor jeder Aenderung. Ermoeglicht
      Punktlandung.'
    instructions: "⛔ BESTAND-CHECK:\n  → Check ob Sub-Agent/Tool/Function bereits\
      \ existiert\n  → Nutze existierendes, baue NUR wenn nichts passendes da ist\n\
      # sub_mas-recovery-checkpoint — Snapshot-System\n\nMAS-Engineer-intern. Erstellt\
      \ komplette Workspace-Snapshots vor Aenderungen.\nSpeichert recipe/ + tools/\
      \ + docs/ + state/ in .state/checkpoints/{timestamp}/.\nErmoeglicht: \"Stelle\
      \ Zustand von vor 3 Schritten wieder her.\"\n\n## Input\n```yaml\ncheckpoint_intake:\n\
      \  signal: ''\n  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-checkpoint'\n\
      \  task: 'SNAPSHOT|LIST|RESTORE|DIFF'\n  workspace: string\n  label: string\n\
      \  id: int\n```\n\n\n## Ablauf AUTO_COMMIT — Automatisch nach jeder Change\n\
      1. git add -A && git commit -m \"[MAS] {action}\"\n2. checkpoint .state/checkpoints/{ts}/\n\
      3. changes.json + {timestamp, action}\n4. todo__todoWrite(\"✅ {action}\")\n\
      ## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n    -\
      \ severity: 'P3'\n      title: 'Checkpoint {id}: {label}'\n      description:\
      \ '{N} Dateien, {size}, {timestamp}'\n```\n\n## Task SNAPSHOT — Zustand sichern\n\
      \nSCHRITT 1 — Timestamp + Verzeichnis:\n  timestamp=$(date +%Y%m%d_%H%M%S)\n\
      \  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints/$timestamp\n \
      \ mkdir -p $checkpoint_dir\n\nSCHRITT 2 — Backup der 4 Kernbereiche:\n  cp -r\
      \ {workspace}/mas-engineer/recipe $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/tools\
      \  $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/docs   $checkpoint_dir/\n\
      \  cp {workspace}/mas-engineer/.state/changes.json       $checkpoint_dir/ 2>/dev/null\
      \ || true\n  cp {workspace}/mas-engineer/.state/best-practices.yaml $checkpoint_dir/\
      \ 2>/dev/null || true\n\nSCHRITT 3 — Metadaten schreiben:\n  echo '{label}'\
      \ > $checkpoint_dir/.label\n  echo $(find $checkpoint_dir -type f | wc -l) >\
      \ $checkpoint_dir/.file_count\n  du -sh $checkpoint_dir/ | cut -f1 > $checkpoint_dir/.size\n\
      \  date -Iseconds > $checkpoint_dir/.created\n\nSCHRITT 4 — Bestaetigung:\n\
      \  signal=''\n  'Checkpoint $timestamp erstellt: {label}, $(cat $checkpoint_dir/.file_count)\
      \ Dateien, $(cat $checkpoint_dir/.size)'\n\n### Edge Cases SNAPSHOT\n- Kein\
      \ recipe/ vorhanden → warning + nur tools+docs+state sichern\n- Schreibrechte\
      \ fehlen → signal='' error: 'Permission denied auf {dir}'\n- Platte voll (OSError)\
      \ → signal='' error: 'Kein Speicherplatz — Checkpoint nicht erstellt'\n- Label\
      \ >80 Zeichen → auf 80 kuerzen\n\n## Task LIST — Letzte 10 Checkpoints\n\nSCHRITT\
      \ 1 — Pruefe Existenz:\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints\n\
      \  if [ ! -d \"$checkpoint_dir\" ] || [ -z \"$(ls -A $checkpoint_dir 2>/dev/null)\"\
      \ ]; then\n    signal='': 'Keine Checkpoints vorhanden — Erstelle ersten mit\
      \ SNAPSHOT'\n    return\n  fi\n\nSCHRITT 2 — Formatierte Liste:\n  echo '===\
      \ LETZTE 10 CHECKPOINTS ==='\n  echo ' #  Timestamp          Label         \
      \               Dateien  Groesse'\n  ls -t $checkpoint_dir | head -10 | while\
      \ read d; do\n    label=$(cat $checkpoint_dir/$d/.label 2>/dev/null || echo\
      \ '?')\n    files=$(cat $checkpoint_dir/$d/.file_count 2>/dev/null || echo '?')\n\
      \    size=$(cat $checkpoint_dir/$d/.size 2>/dev/null || echo '?')\n    echo\
      \ \"  $d  $label  ${files}  ${size}\"\n  done\n\n### Edge Cases LIST\n- Kein\
      \ checkpoints/-Verzeichnis → 'INFO: Keine Checkpoints'\n- Kaputtes .label oder\
      \ .size → '?' anzeigen + trotzdem auflisten\n\n## Task RESTORE — Checkpoint\
      \ wiederherstellen\n\nSCHRITT 1 — Checkpoint identifizieren:\n  target=$(ls\
      \ -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{id}p')\n  if [ -z\
      \ \"$target\" ]; then\n    signal='': 'Checkpoint #{id} nicht gefunden'\n  \
      \  return\n  fi\n\nSCHRITT 2 — YAML-Pruefung:\n  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$target/recipe/dev-mas-engineer.yaml'))\"\
      \n  if [ $? -ne 0 ]; then\n    signal='': 'Checkpoint #{id} hat YAML-Fehler'\n\
      \    return\n  fi\n\nSCHRITT 3 — Wiederherstellen:\n  rm -rf {workspace}/mas-engineer/recipe\n\
      \  rm -rf {workspace}/mas-engineer/tools\n  rm -rf {workspace}/mas-engineer/docs\n\
      \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/recipe {workspace}/mas-engineer/\n\
      \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/tools  {workspace}/mas-engineer/\n\
      \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/docs   {workspace}/mas-engineer/\n\
      \nSCHRITT 4 — Abschluss:\n  signal='': 'Checkpoint #{id} ($target) wiederhergestellt'\n\
      \  Erstelle neuen Snapshot: task=SNAPSHOT, label='nach_restore_$target'\n\n\
      ### Edge Cases RESTORE\n- id=0 → 'ID 0 ungueltig — erste ID ist 1'\n- Checkpoint\
      \ unvollstaendig → signal='': 'Checkpoint unvollstaendig — recipe/ fehlt'\n\
      - Gleichzeitiger Zugriff → temporaere Dateien nutzen\n\n## Task DIFF — Unterschied\
      \ zwischen Checkpoints\n\nSCHRITT 1 — IDs aufloesen:\n  from_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
      \ | sed -n '{from_id}p')\n  to_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
      \ | sed -n '{to_id}p')\n\nSCHRITT 2 — Vergleichen:\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/recipe/\
      \ {workspace}/mas-engineer/.state/checkpoints/$to_cp/recipe/\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/tools/\
      \  {workspace}/mas-engineer/.state/checkpoints/$to_cp/tools/\n\nSCHRITT 3 —\
      \ Zusammenfassung:\n  changed=$(diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/\
      \ {workspace}/mas-engineer/.state/checkpoints/$to_cp/ | grep -c 'aendern')\n\
      \  signal='': 'Diff {from_id}..{to_id}: {changed} Aenderungen'\n\n### Edge Cases\
      \ DIFF\n- IDs gleich → 'INFO: Gleicher Checkpoint — kein Diff'\n- from_id >\
      \ to_id → automatisch tauschen"
    prompt: "\U0001F4F8 CHECKPOINT (v1.0.0)\n⛔ NUR Checkpoint — KEINE anderen Aenderungen\n\
      ⛔ NUR Recovery — nichts patchen\n CHECKPOINT (v1.0.0)\n Snapshots vor jeder\
      \ Aenderung\n SNAPSHOT | LIST | RESTORE | DIFF\n \n\n  ⛔⛔⛔⛔⛔ BESTAETIGUNGSPFLICHT\
      \ (R01) Vor write/edit/shell PLAN+WARTEN auf\n  NIE ohne Bestaetigung.\n  ⛔⛔⛔⛔⛔\
      \ MODUS-DOMANEN-KOPPLUNG (R09) NUR mas-engineer/\n  NIEMALS Framework importieren.\
      \ Lesen in andere Domain OKsettings: timeout=120\n⛔ BESTAND vor NEUBAU — Check\
      \ ob Tool/Agent bereits existiert\n→ Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale\
      \ Regeln)"
    settings:
      timeout: 120
      max_steps: 40
  recovery-defib:
    category: recovery
    emoji: 📦
    title: SUB-MAS-RECOVERY-DEFIB — Notfall-Wiederbelebung (Sub-Agent)
    description: 'v1.0.0 | MAS-intern: Letzter Ausweg bei Totalschaden. Minimal-Config
      + Wiederbelebung.'
    instructions: "⛔ BESTAND-CHECK:\n  → Check ob Sub-Agent/Tool/Function bereits\
      \ existiert\n  → Nutze existierendes, baue NUR wenn nichts passendes da ist\n\
      # sub_mas-recovery-defib — Notfall-Wiederbelebung\n\nMAS-Engineer-intern. Der\
      \ LETZTE Ausweg — wenn NICHTS mehr funktioniert.\nKein YAML parst? Kein Sub-Agent\
      \ startet? DEFIB ist die Antwort.\nLadt eine minimale Notfall-Config (NUR immune\
      \ + timeline) und stellt schrittweise wieder her.\n\nACHTUNG: DEFIB ZERSTORT\
      \ den aktuellen Zustand.\nNUR anwenden wenn ALLE anderen Recovery-Stufen versagen.\n\
      \n## Input\n```yaml\ndefib_intake:\n  signal: ''\n  request_id: string\n  from:\
      \ 'dev-mas-engineer'\n  to: 'sub_mas-recovery-defib'\n  task: 'DEFIB|RESURRECT|DIAGNOSE'\n\
      \  workspace: string\n```\n\n## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n\
      \  observations:\n    - severity: 'P1'|'P2'|'P3'\n      title: string\n    \
      \  description: string\n  recovery_step: string\n```\n\n## Task DEFIB — Minimal-Config\
      \ laden\n\nSCHRITT 1 — Minimal-Config schreiben (NUR immune + timeline):\n \
      \ cat > {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml << 'ENDOFFILE'\n\
      version: 1.0.0\ntitle: 'NOTFALL-MAS — Recovery-Modus'\ndescription: 'v1.0.0\
      \ | Minimale Config fuer Wiederbelebung'\nsub_recipes:\n  - name: sub_mas-recovery-immune\n\
      \    path: ./sub/sub_mas-recovery-immune.yaml\n    description: 'YAML-Praevention'\n\
      \  - name: sub_mas-recovery-timeline\n    path: ./sub/sub_mas-recovery-timeline.yaml\n\
      \    description: 'Bestpunkt-Suche'\ninstructions: |\n  NOTFALL-MAS AKTIV.\n\
      \  NUR Recovery-Sub-Agenten geladen.\n  Fuehre recovery --restore-best aus.\n\
      prompt: |\n  NOTFALL-MAS (v1.0.0)\n  RECOVERY-Modus aktiv\n  NUR Recovery-Befehle\n\
      \  immune + timeline\n\n\n  ⛔⛔⛔⛔⛔ BESTAETIGUNGSPFLICHT (R01) Vor write/edit/shell\
      \ PLAN+WARTEN auf\n  NIE ohne Bestaetigung.\n  ⛔⛔⛔⛔⛔ MODUS-DOMANEN-KOPPLUNG\
      \ (R09) NUR mas-engineer/\n  NIEMALS Framework importieren. Lesen in andere\
      \ Domain OKsettings:\n  timeout: 30\n  max_steps: 10\n  goose_provider: openai\n\
      \  goose_model: filtered/deepseek/deepseek-chat\nENDOFFILE\n\nSCHRITT 2 — Sub-Agenten\
      \ validieren:\n  for agent in immune checkpoint safezone timeline; do\n    path={workspace}/mas-engineer/recipe/sub/sub_mas-recovery-$agent.yaml\n\
      \    if [ -f \"$path\" ]; then\n      python3 -c \"import yaml; yaml.safe_load(open('$path'))\"\
      \ 2>/dev/null || echo 'WARN: $agent.yaml korrupt'\n    else\n      echo 'WARN:\
      \ $agent.yaml fehlt'\n    fi\n  done\n\nSCHRITT 3 — Minimal-Config validieren\
      \ + bestaetigen:\n  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\"\
      \n  signal='': 'Minimal-Config geladen — Recovery-Modus aktiv'\n  'Als naechstes:\
      \ recovery --restore-best oder recovery --resurrect'\n\n### Edge Cases DEFIB\n\
      - Schreibrechte fehlen → '' error + 'chmod?'\n- immune.yaml fehlt → '' warning\
      \ + nur timeline laden\n- Alle Sub-Agenten fehlen → '' error + nur instructions\
      \ (reine Text-Config)\n- Bereits Defib-Modus aktiv → '' info + nichts tun\n\n\
      ## Task RESURRECT — Schrittweise Wiederbelebung\n\nSCHRITT 1 — Besten Checkpoint\
      \ via timeline:\n  delegiere an sub_mas-recovery-timeline (task=FIND_BEST)\n\
      \  WENN CHECKPOINT GEFUNDEN:\n    delegiere an sub_mas-recovery-timeline (task=RESTORE_BEST)\n\
      \nSCHRITT 2 — KEIN Checkpoint: Backups durchsuchen:\n  WENN KEIN CHECKPOINT:\n\
      \  for d in $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do\n   \
      \ python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml'))\"\
      \ 2>/dev/null\n    if [ $? -eq 0 ]; then\n      cp {workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml\
      \ {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml\n      signal='': 'Backup\
      \ $d wiederhergestellt'\n      break\n    fi\n  done\n\nSCHRITT 3 — NICHTS gefunden:\
      \ Neuinstallation vorschlagen:\n  WENN NICHTS FUNKTIONIERT:\n    signal='':\
      \ 'Kein funktionierendes Backup — Neuinstallation empfohlen'\n    'Fuehre: python3\
      \ dev_workspace.py --init {workspace}'\n\nSCHRITT 4 — Nach Wiederherstellung:\n\
      \  delegiere an sub_mas-recovery-checkpoint (task=SNAPSHOT, label='nach_resurrection')\n\
      \  signal='': 'Wiederbelebung abgeschlossen — Snapshot: nach_resurrection'\n\
      \  'Fuehre update --mas um neue Version zu aktivieren'\n\n### Edge Cases RESURRECT\n\
      - Checkpoint vorhanden aber korrupt → ueberspringen, naechsten versuchen\n-\
      \ Backup vorhanden aber unvollstaendig → '' warning + manuelle Nacharbeit\n\
      - Weder Checkpoint noch Backup → '' error + --init\n\n## Task DIAGNOSE — Totalschaden-Analyse\n\
      \nSCHRITT 1 — 7-Fragen:\n  fehler=0\n  [ -d {workspace} ]                  \
      \       || fehler=$((fehler+1))\n  [ -d {workspace}/mas-engineer ]         \
      \    || fehler=$((fehler+1))\n  [ -f {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml\
      \ ] || fehler=$((fehler+1))\n  [ -d {workspace}/mas-engineer/recipe/sub ]  ||\
      \ fehler=$((fehler+1))\n  [ -d {workspace}/mas-engineer/tools ]       || fehler=$((fehler+1))\n\
      \  [ -d {workspace}/mas-engineer/.state ]      || fehler=$((fehler+1))\n  python3\
      \ -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml'))\"\
      \ 2>/dev/null || fehler=$((fehler+1))\n\nSCHRITT 2 — Schadensstufe + Aktion:\n\
      \  action=''\n  if [ $fehler -eq 0 ]; then  action='Kein Recovery noetig'\n\
      \  elif [ $fehler -le 3 ]; then action='recovery --restore-best'\n  elif [ $fehler\
      \ -le 5 ]; then action='recovery --resurrect'\n  else                      \
      \  action='recovery --defib -> --init'\n  fi\n\n  echo '(fehler)/7 Fehler —\
      \ Empfehlung: $action'\n  signal=''|''|'' je nach Stufe"
    prompt: "⚡ DEFIB (v1.0.0)\n⛔ NUR Defib — KEINE anderen Aenderungen\n⛔ NUR Recovery\
      \ — nichts patchen\n DEFIB (v1.0.0)\n NOTFALL — Letzter Ausweg\n DEFIB | RESURRECT\
      \ | DIAGNOSE\n settings: timeout=120\n⛔ BESTAND vor NEUBAU — Check ob Tool/Agent\
      \ bereits existiert\n→ Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)"
    settings:
      timeout: 120
      max_steps: 40
  recovery-immune:
    category: recovery
    emoji: 🛡
    title: SUB-MAS-RECOVERY-IMMUNE — YAML-Prävention & Syntax-Schutz (Sub-Agent)
    description: 'v1.0.0 | MAS-intern: Checks JEDE YAML-Change bevor sie gespeichert
      wird. Verhindert Korruption.'
    instructions: "⛔ BESTAND-CHECK:\n  → Check ob Sub-Agent/Tool/Function bereits\
      \ existiert\n  → Nutze existierendes, baue NUR wenn nichts passendes da ist\n\
      # sub_mas-recovery-immune — \"\"Coronashield\"\" YAML-Immunsystem\n\nMAS-Engineer-intern.\
      \ Der ERSTE Schutzschild — VOR jeder Change.\
Checks YAML-Syntax, Python-Syntax,\
      \ Shell-Syntax und Gesamt-Zustand.\nVerhindert 4/4 Crash-Typen aus Session 20260614.\n\
      \nCoronashield-Regel: Keine YAML wird gespeichert ohne vorherige Validierung.\n\
      Keine Python-Datei wird ausgeführt ohne Syntax-Check.\nKein Shell-Script wird\
      \ gestartet ohne bash -n.\n\n## Input\n```yaml\nimmune_intake:\n  signal: ''\n\
      \  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-immune'\n\
      \  task: 'CHECK_YAML|CHECK_SYNTAX|VERIFY_STATE'\n  workspace: string\n  file_path:\
      \ string\n  file_type: 'yaml'|'python'|'bash'\n  state_path: string\n```\n\n\
      ## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n    -\
      \ severity: 'P1'|'P2'|'P3'\n      title: string\n      description: string\n\
      \  validation_log:\n    - check: 'yaml'|'python'|'shell'|'state'\n      status:\
      \ 'ok'|'error'|'warning'\n      detail: string\n  score: int\n```\n\n## Task\
      \ CHECK_YAML — YAML-Syntax vor jedem Edit\n\nSCHRITT 1 — Existenz-Prüfung:\n\
      \  [ -f '{file_path}' ] || return 'Datei nicht gefunden: {file_path}'\n\nSCHRITT\
      \ 2 — YAML-Parse:\n  python3 -c \"import yaml; yaml.safe_load(open('{file_path}'))\"\
      \ 2>&1\n  EXIT 0: signal='', observations[P3]: 'YAML gueltig: {N} Zeilen'\n\
      \  EXIT != 0: signal='', observations[P1]: 'YAML-Fehler: {error_msg}'\n    recommendation:\
      \ 'Rollback aus letztem Backup empfohlen'\n\n### Edge Cases CHECK_YAML\n- Datei\
      \ leer (0 Bytes) → P2 warning\n- YAML mit Python-Exceptions (nicht yaml.Error)\
      \ → P1 error  \n- Unicode-Fehler → P3 info: 'encoding issue, versuche utf-8'\n\
      - Binary-Datei erkannt → P1 error: 'Keine YAML-Datei (Binary)'\n\n## Task CHECK_SYNTAX\
      \ — Python + Shell Syntax vor Execution\n\nPYTHON-CHECK:\n  python3 -c \"compile(open('{file_path}').read(),\
      \ '{file_path}', 'exec')\"\n  EXIT 0: 'Python-Syntax OK'\n  EXIT != 0: 'Python-Syntax-Fehler:\
      \ {error}'\n\nSHELL-CHECK:\n  bash -n '{file_path}' 2>&1\n  EXIT 0: 'Shell-Syntax\
      \ OK'\n  EXIT != 0: 'Shell-Syntax-Fehler: {error}'\n\n### Edge Cases CHECK_SYNTAX\n\
      - Kein Bash installiert → warning + ueberspringen\n- Python 2 vs 3 → immer python3\
      \ erzwingen\n- Shebang fehlt → P3 info: 'Kein Shebang — nehme bash als Default'\n\
      \n## Task VERIFY_STATE — Gesamt-Zustand check\n\nSCHRITT 1 — Rekursiver YAML-Scan:\n\
      \  find {workspace}/mas-engineer -name '*.yaml' -not -path '*/.backups/*' -not\
      \ -path '*/checkpoints/*' | \\\n  while read f; do\n    python3 -c \"import\
      \ yaml; yaml.safe_load(open('$f'))\" 2>&1 || echo \"FAIL:$f\"\n  done\n\nSCHRITT\
      \ 2 — Statistik:\n  total=$(find {workspace}/mas-engineer -name '*.yaml' -not\
      \ -path '*/.backups/*' -not -path '*/checkpoints/*' | wc -l)\n  ok=$((total\
      \ - $(grep -c '^FAIL' /tmp/immune_verify_$$)))\n  failed=$((total - ok))\n \
      \ score=$((ok * 100 / total))\n\nSCHRITT 3 — Report:\n  score == 100: signal=''\
      \ — 'Alle {total} YAMLs gueltig'\n  score >= 80:  signal='' — '{ok}/{total}\
      \ gueltig ({failed} Fehler)'\n  score < 80:   signal='' — 'Nur {ok}/{total}\
      \ gueltig — Recovery empfohlen'\n\n### Edge Cases VERIFY_STATE\n- Keine YAML-Dateien\
      \ → P3 info: 'Keine YAMLs zu pruefen'\n- Permission denied → warning: 'Access-Fehler:\
      \ {file}'\n- Symlink-Loop → find -L vermeiden, nur -type f\n\n    # MEMORY:\
      \ Ergebnis speichern\n    rememberMemory(\"goose-errors\", {\\\"yaml_file\\\"\
      : \\\"$file\\\", \\\"status\\\": \\\"$status\\\"})\n    ZEIGE: \"\U0001F9E0\
      \ Ergebnis in Memory\""
    prompt: "\U0001F6E1️ IMMUNE (v1.0.0)\n⛔ NUR Immune — KEINE anderen Aenderungen\n\
