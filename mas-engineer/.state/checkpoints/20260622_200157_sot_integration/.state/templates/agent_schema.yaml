      \ | Führt pytest aus |\"\n   ```\n3. User MUSS bestätigen bevor sub_mas-yaml-editor\
      \ patcht\n\n## Ablauf UPDATE\n\n1. GENERATE_DIFF durchführen\n2. User wählt\
