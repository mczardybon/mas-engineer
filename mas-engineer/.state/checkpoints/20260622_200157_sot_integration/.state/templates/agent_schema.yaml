      \ \"0 Sessions\"\n    delta: \"gelöscht: 7 Dateien, 2.5MB\"\n```\n\n## Safety\n\
      \n- ⛔ NIE Framework anfassen (recipes/, docs/, config.yaml)\n- ⛔ NIE MAS-Engineer\
      \ delete (dev-mas-engineer.yaml, mas-engineer-tools/)\n- Vor jeder Löschung:\
      \ Größe anzeigen + Bestätigung"
