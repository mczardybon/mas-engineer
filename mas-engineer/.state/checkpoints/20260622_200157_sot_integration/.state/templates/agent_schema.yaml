      \  Delegiere an sub_mas-prompt-engineer\n  (task=BATCH_REVIEW, scope=sub-agents)\n\
      \  → Prompt-Scores für ALLE 14 MAS-Sub-Agenten\n  → Sortiert: niedrigster Score\
      \ zuerst\n  → Für JEDEN mit Score < 5/10:\n    - Welche Kriterien fehlen? (1-10)\n\
      \    - Typ klassifizieren: I1-I5\n    - Vorschlag generieren\n\n\U0001F4CA Analyse\
      \ 11 — CONFIG-CHECKS (via Config-Auditor):\n  Delegiere an sub_mas-config-auditor\n\
      \  (task=CROSS_REF, workspace={workspace})\n  → Config-Check-Ergebnis (16 Checks)\n\
      \  → Bei ❌: Was fehlt?\n  → Typ klassifizieren: J1 (config ❌) oder J2 (obsolete\
      \ refs)\n  → Fix-Vorschlag generieren\n\n\U0001F4CA Analyse 12 — DOCS (via Doc-Generator):\n\
      \  Delegiere an sub_mas-doc-generator\n  (task=CHECK, workspace={workspace},\
      \ scope=all)\n  → Stale-Docs: Welche Docs sind veraltet?\n  → Für JEDE stale\
