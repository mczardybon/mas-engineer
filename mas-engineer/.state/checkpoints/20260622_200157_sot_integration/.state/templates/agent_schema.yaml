      ╔══════════════════════════════════════════════════════════════╗\n║  SCHRITT\
      \ 3 — FEHLERMUSTER-ERKENNUNG (6 parallele Analysen)  ║\n╚══════════════════════════════════════════════════════════════╝\n\
      ```\n\U0001F4CA Analyse 1 — TIMEOUTS/ERRORS:\n  Grep Messages nach: \"timeout\"\
