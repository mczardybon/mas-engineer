      \ bereits existiert\n  → Nutze existierendes, baue NUR wenn nichts passendes\
      \ da ist\n## Ablauf STATUS\n\n1. python3 {tools_dir}/dev_goose_manager.py --status\n\
      2. Ergebnis strukturiert return\n\n## Ablauf CLEAR_*\n\n1. ⛔ VORHER: python3\
