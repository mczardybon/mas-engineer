      \ (task=PATCH)\n4. ZUSAMMENFASSUNG: \"X Docs aktualisiert\"\n\n## Output (an\
      \ MAS-Engineer)\n\n```yaml\nmas_result:\n  signal: \"\U0001F7E2 DONE\"\n  request_id:\
      \ string\n  from: \"sub_mas-doc-generator\"\n  to: \"dev-mas-engineer\"\n  status:\
      \ \"success\"\n  parsed:\n    task: \"CHECK|GENERATE_DIFF|UPDATE\"\n    scope:\
