      SUMMARIZE: wf_summarize_run
  general-improver:
    tier: reasoning
    token_budget: 50000
    task_workflows:
      FULL_IMPROVEMENT: wf_pipeline_full
      REVIEW: wf_pipeline_review
      COST_ANALYSIS: wf_pipeline_cost
      ERROR_PATTERN: wf_pipeline_errors
      CORRECTION_LOG: wf_pipeline_corrections
      USAGE_PATTERN: wf_pipeline_usage
  im-session-reader:
    tier: balanced
    token_budget: 30000
    task_workflows:
      ANALYZE: wf_im_read_sessions
  im-finder:
    tier: powerful
