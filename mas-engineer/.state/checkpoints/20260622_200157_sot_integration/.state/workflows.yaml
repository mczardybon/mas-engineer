    tier: fast
    token_budget: 8000
    task_workflows:
      REPORT: wf_hr_report
      COMPARE: wf_hr_compare
      MARKDOWN: wf_hr_markdown
      FULL: wf_hr_full
  recipe-designer:
    tier: powerful
    token_budget: 30000
    task_workflows:
      CONCEIVE: wf_rd_conceive
      DESIGN: wf_rd_design
      WORKFLOWS: wf_rd_workflows
      SOT: wf_rd_sot
      KNOWLEDGE: wf_rd_knowledge
      FULL: wf_rd_full
      FORMAT: wf_json_format
      APPEND: wf_json_append
task_workflows:
  wf_fw_discover:
    desc: Framework-Struktur dynamisch entdecken
    steps:
    - id: discover_structure
      action: shell
      cmd: find {workspace} -name '*.yaml' -not -path '*_framework*' | wc -l; find {workspace} -name '*.md' -not -path '*_framework*' | wc -l; find {workspace} -name 'config.yaml' -not -path '*_framework*'
      timeout: 30
      on_error: continue
    - id: analyze_recipes
      action: shell
      cmd: for f in $(find {workspace} -name '*.yaml' -not -path '*_framework*' | head -50); do echo "=== $f ==="; grep 'title:' "$f" 2>/dev/null; done
      depends_on:
      - discover_structure
      timeout: 60
      on_error: continue
    - id: classify
      action: shell
      cmd: 'echo ''Struktur erfasst: {findings}'''
      depends_on:
      - analyze_recipes
  wf_fw_explain:
    desc: Ein Konzept erklaeren
    steps:
    - id: find_concept
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/null | head -20
      timeout: 30
    - id: extract_context
      action: shell
      cmd: for f in $(grep -rl '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/null | head -5); do echo "=== $f ==="; grep -B2 -A2 '{concept}' "$f"; done
      depends_on:
      - find_concept
  wf_fw_impact:
    desc: Aenderungs-Impact analysieren
    steps:
    - id: detect_type
      action: calculate
      expression: '''new_agent'' if ''Agent'' in input.change else ''change_config'''
      variables: {}
      into: change_type
    - id: find_related
      action: shell
      cmd: grep -rn '{input.change}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/null | head -20
      depends_on:
      - detect_type
  wf_fw_dependency:
    desc: Abhaengigkeitsgraph erstellen
    steps:
    - id: find_references
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/null | head -50
    - id: build_graph
      action: shell
      cmd: 'echo ''Depends-On: ...'' && echo ''Depended-By: ...'''
      depends_on:
      - find_references
  wf_fw_search:
    desc: Konzept im Workspace suchen
    steps:
    - id: grep_search
      action: shell
      cmd: grep -rn '{concept}' {workspace}/ 2>/dev/null | head -50
      timeout: 30
  wf_fw_compare:
    desc: Zwei Konzepte vergleichen
    steps:
    - id: find_a
      action: shell
      cmd: grep -rn '{concept_a}' {workspace}/ 2>/dev/null | head -20
    - id: find_b
      action: shell
      cmd: grep -rn '{concept_b}' {workspace}/ 2>/dev/null | head -20
      depends_on:
      - find_a
  wf_fw_blueprint:
    desc: Bauplan fuer neues Feature generieren
    steps:
    - id: find_template
      action: shell
      cmd: grep -rn '{feature}' {workspace}/ --include='*.yaml' 2>/dev/null | head -10
    - id: generate_plan
      action: shell
      cmd: 'echo ''Schritt 1: ...'' && echo ''Schritt 2: ...'''
      depends_on:
      - find_template
  wf_fw_map:
    desc: Wissenslandkarte erstellen
    steps:
    - id: tree_view
      action: shell
      cmd: tree {workspace} -L 2 2>/dev/null | head -50 || find {workspace} -maxdepth 2 -type d | head -30
  wf_fw_scan:
    desc: Framework scannen
    response:
      json_schema:
        type: object
        properties:
          signal:
            type: string
            enum:
            - 🟢 DONE
            - 🔴 ERROR
          status:
            type: string
            enum:
            - success
            - error
          observations:
            type: array
            items:
              type: object
              properties:
                severity:
                  type: string
                file:
                  type: string
                problem:
                  type: string
        required:
        - signal
        - status
    steps:
    - id: check_tool
      action: conditional
      condition: '''{tools_dir}/dev_observer.py'' exists'
      if_true:
      - id: run_observer
        action: shell
        cmd: python3 {tools_dir}/dev_observer.py --workspace {workspace} --scan
        timeout: 120
      if_false:
      - id: fallback_scan
        action: shell
        cmd: 'echo ''Files: $(find {workspace} -type f | wc -l)''; echo ''YAMLs: $(find {workspace} -name "*.yaml" | wc -l)''; echo ''Size: $(du -sh {workspace})'''
        timeout: 30
  wf_fw_audit:
    desc: Tiefenanalyse
    steps:
    - id: parallel_scan
      action: parallel
      parallel_steps:
      - id: observer
        action: shell
        cmd: python3 {tools_dir}/dev_observer.py --workspace {workspace} --save 2>/dev/null || find {workspace} -type f -exec ls -lh {} \; > /tmp/observer_fallback.txt
        timeout: 120
      - id: architect
        action: shell
        cmd: python3 {tools_dir}/dev_architect.py --workspace {workspace} --analyze 2>/dev/null || tree {workspace} -L 2 > /tmp/architect_fallback.txt
        timeout: 120
      - id: analyst
        action: shell
        cmd: python3 {tools_dir}/dev_analyst.py --workspace {workspace} --check-all 2>/dev/null || for f in $(find {workspace} -name '*.yaml'); do python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>&1;
          done
        timeout: 120
      on_error: continue
    - id: consolidate
      action: shell
      cmd: cat /tmp/observer_fallback.txt 2>/dev/null; cat /tmp/architect_fallback.txt 2>/dev/null
      depends_on:
      - parallel_scan
  wf_fw_harden:
    desc: Haertung pruefen
    steps:
    - id: yaml_check
      action: shell
      cmd: 'for f in $(find {workspace} -name ''*.yaml'' | head -50); do python3 -c "import yaml; yaml.safe_load(open(''$f''))" 2>&1 || echo "⚠️ YAML-Fehler: $f"; done'
      timeout: 120
      on_error: continue
    - id: categorize
      action: shell
      cmd: echo 'Probleme nach Schwere kategorisiert'
      depends_on:
      - yaml_check
  wf_session_correlate:
    desc: Sessions mit Aenderungen korrelieren
    steps:
    - id: gather_data
      action: parallel
      parallel_steps:
      - id: sessions
        action: shell
        cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/null | tail -50
        timeout: 30
      - id: costs
        action: shell
        cmd: python3 {tools_dir}/dev_goose_db.py --costs 2>/dev/null | tail -20
        timeout: 30
      - id: changes
        action: shell
        cmd: cat {workspace}/.state/changes.json 2>/dev/null | tail -30
        timeout: 10
      on_error: continue
    - id: correlate
      action: shell
      cmd: echo 'Timeline erstellt. Muster werden extrahiert.'
      depends_on:
      - gather_data
  wf_session_cost:
    desc: Kostenanalyse
    steps:
    - id: cost_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --costs 2>/dev/null | head -30
      timeout: 30
    - id: aggregate
      action: shell
      cmd: echo 'Top-Kostentreiber identifiziert'
      depends_on:
      - cost_data
  wf_session_anomaly:
    desc: Anomalien erkennen
    steps:
    - id: session_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/null | head -50
      timeout: 30
    - id: detect
      action: shell
      cmd: 'echo ''Anomalien: Dauer>2x∅, Tokens>3x∅, Kosten>5x∅'''
      depends_on:
      - session_data
  wf_session_performance:
    desc: Performance-Ranking
    steps:
    - id: perf_data
      action: shell
      cmd: python3 {tools_dir}/dev_goose_db.py --sessions 2>/dev/null | head -50
      timeout: 30
    - id: rank
      action: shell
      cmd: echo 'Schnellster→langsamster Agent gelistet'
      depends_on:
      - perf_data
  wf_config_crossref:
    desc: 16 Cross-Reference Checks
    steps:
    - id: discover
      action: shell
      cmd: 'CONFIG=$(find {workspace} -name ''config.yaml'' -not -path ''*_framework*'' | head -1); echo "Config: $CONFIG"; RECIPES=$(find {workspace} -name ''*.yaml'' | wc -l); echo "Recipes: $RECIPES"'
      timeout: 30
    - id: check_all
      action: shell
      cmd: 'echo ''16 Checks durchgefuehrt. Ergebnis: X/16 bestanden'''
      depends_on:
      - discover
  wf_config_checkvalue:
    desc: Bestimmten Config-Wert pruefen
    steps:
    - id: find_value
      action: shell
      cmd: grep -rn '{value}' {workspace}/ --include='*.yaml' --include='*.md' 2>/dev/null | head -20
  wf_config_drift:
    desc: Config-Drift erkennen
    steps:
    - id: compare_sot
      action: shell
      cmd: cat {workspace}/.state/workflows.yaml | grep 'restrictions' -A50 | head -30
    - id: compare_runtime
      action: shell
      cmd: find {workspace} -name '*.yaml' -exec grep -l 'timeout\|max_steps' {} \; | head -20
      depends_on:
      - compare_sot
  wf_prompt_review:
    desc: Einzelnen Prompt nach 10 Kriterien bewerten
    steps:
    - id: extract_prompt
      action: shell
      cmd: python3 -c "import yaml; d=yaml.safe_load(open('{workspace}/recipes/{target}')); print(d.get('prompt','NO_PROMPT'))" 2>/dev/null || grep -A20 'prompt:' {workspace}/recipes/{target} | head -20
      timeout: 15
    - id: score
      action: shell
      cmd: 'echo ''10-Kriterien-Check: Score X/10'''
      depends_on:
      - extract_prompt
  wf_prompt_optimize:
    desc: Prompt optimieren
    steps:
    - id: review_first
      action: shell
      cmd: echo 'Review durchgefuehrt. Optimiere...'
    - id: generate
      action: shell
      cmd: echo 'Optimierter Prompt generiert. Vorher/Nachher Vergleich erstellt.'
      depends_on:
      - review_first
  wf_prompt_batch_review:
    desc: Alle Prompts in einem Scope bewerten
    steps:
    - id: list_files
      action: shell
      cmd: case '{scope}' in MAS-Sub-Agenten) ls {workspace}/recipes/sub_mas-*.yaml 2>/dev/null ;; sub-agents) ls {workspace}/recipes/sub_*.yaml 2>/dev/null ;; all) find {workspace}/recipes -name '*.yaml'
        2>/dev/null ;; esac | head -50
      timeout: 15
    - id: batch_score
      action: shell
      cmd: 'echo ''Batch-Review: X YAMLs, Score-Durchschnitt X/10'''
      depends_on:
      - list_files
  wf_prompt_batch_optimize:
    desc: Alle Prompts optimieren
    steps:
    - id: batch_review_first
      action: shell
      cmd: echo 'Batch-Review durchgefuehrt. Optimiere X Dateien...'
    - id: batch_optimize
      action: shell
      cmd: echo 'X Prompts optimiert. Score-Verbesserung ∅ +Y'
      depends_on:
      - batch_review_first
  wf_goose_check:
    desc: Goose-Regelkonformitaet pruefen
    steps:
    - id: inspect_scope
      action: conditional
      condition: '''{scope}'' in [''config'',''recipes'',''extensions'',''skills'',''scheduler'',''subagents'',''recipe_advanced'',''hooks'',''security'',''cli_commands'',''templates'',''sandbox'']'
      if_true:
      - id: check_scope
        action: shell
        cmd: 'echo ''Pruefe Scope={scope}: what={what}, planned={planned}''; echo ''Verdict: KONFORM|EINGESCHRAENKT|NICHT_MOEGLICH'''
        timeout: 60
      if_false:
      - id: error
        action: shell
        cmd: echo '❌ Scope {scope} unbekannt'
  wf_signal_cpdone:
    desc: CP_DONE Signal senden
    steps:
    - id: send
      action: signal
      typ: CP_DONE
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_signal_error:
    desc: ERROR Signal senden
    steps:
    - id: send
      action: signal
      typ: ERROR
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_signal_sessionend:
    desc: SESSION_END Signal senden
    steps:
    - id: send
      action: signal
      typ: SESSION_END
      via: sub_mas-signal-generator
      params:
        request_id: '{request_id}'
        from: '{from}'
        to: '{to}'
  wf_guardian_check:
    desc: Sub-Agenten-Ergebnis auf 5 Dimensionen pruefen
    steps:
    - id: schema_check
      action: shell
      cmd: 'echo ''Prufe: signal, request_id, status, parsed vorhanden?'''
    - id: semantic_check
      action: shell
      cmd: 'echo ''Prufe agent-spezifisch: score, self-mutation, findings'''
      depends_on:
      - schema_check
    - id: death_check
      action: conditional
      condition: '''{status}'' in [''error'',''timeout'']'
      if_true:
      - id: resurrect
        action: shell
        cmd: echo 'DEATH erkannt → Resurrection (max 2×)'
      if_false:
      - id: alive_check
        action: shell
        cmd: echo 'Agent lebt. Prufe Loop.'
      depends_on:
      - semantic_check
    - id: loop_check
      action: shell
      cmd: echo 'Letzte 5 delegations prufen. Gleicher agent+task 3×?'
      depends_on:
      - death_check
    - id: drift_check
      action: shell
      cmd: echo 'Framework-Konzepte als MAS bezeichnet? Framwork-Agent delegiert?'
      depends_on:
      - loop_check
    - id: update_state
      action: shell
      cmd: 'echo ''VERDICT: action=none|warn|resurrect|escalate. State in guardan.yaml gespeichert.'''
      depends_on:
      - drift_check
  wf_guardian_health:
    desc: Health-Report ueber alle Agenten
    steps:
    - id: read_state
      action: shell
      cmd: 'cat $HOME/.config/goose/recipes/.state/guardian.yaml 2>/dev/null | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin); print(f''Score: {d.get("health",{}).get("overall_score","?")}'')"
        || echo ''Health-Datei nicht lesbar'''
    - id: rank
      action: shell
      cmd: 'echo ''Agenten gerankt: gesuendester→kraenkster. Trend: besser/schlechter'''
      depends_on:
      - read_state
  wf_guardian_drift:
    desc: Drift-Log analysieren
    steps:
    - id: read_drift
      action: shell
      cmd: echo 'Drift-Log gelesen. Gruppiert nach agent/type/severity.'
    - id: correlate
      action: conditional
      condition: '''{for_general_improver}'' == ''true'''
      if_true:
      - id: correlation
        action: shell
        cmd: 'cat {workspace}/.state/changes.json 2>/dev/null | tail -10; echo ''Aenderungen mit Drifts korreliert. Trend: improving/stable/worsening'''
      depends_on:
      - read_drift
  wf_pipeline_full:
    desc: Vollstaendige Verbesserungs-Pipeline (7 Stufen)
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/null || cat ~/.config/goose/.mas-mode 2>/dev/null || echo 'generic'
      timeout: 5
    - id: voraussetzungen
      action: shell
      cmd: python3 {workspace}/tools/dev_rule_checker.py --all --action 'SI-RUN' 2>/dev/null; python3 {workspace}/tools/dev_rule_refresh.sh 2>/dev/null; echo 'Rules checked'
      timeout: 30
      on_error: abort
    - id: rekursions_guard
      action: shell
      cmd: cat {workspace}/.state/schedule.yaml 2>/dev/null | python3 -c "import sys,yaml; d=yaml.safe_load(sys.stdin) or {}; h=d.get('history',[]); last=[x for x in h if 'FULL_IMPROVEMENT' in str(x)];
        print('BLOCKED' if last and len(h)>=5 else 'OK')" || echo 'OK'
      timeout: 10
      on_error: continue
    - id: session_reader
      action: delegate
      agent: sub_mas-im-session-reader
      task: ANALYZE
      params:
        workspace: '{workspace}'
        sessions: '{sessions}'
        include_messages: false
      timeout: 300
      on_error: continue
    - id: finder
      action: delegate
      agent: sub_mas-im-finder
      task: FIND
      params:
        workspace: '{workspace}'
        data: '{result.variables.session_reader.data}'
      timeout: 240
      depends_on:
      - session_reader
      on_error: continue
    - id: rank
      action: delegate
      agent: sub_mas-im-rank
      task: RANK
      params:
        data: '{result.variables.finder.data}'
      timeout: 60
      depends_on:
      - finder
    - id: designer
      action: conditional
      condition: '''{result.variables.rank.data.top_5}'' != '''''
      if_true:
      - id: design_patches
        action: delegate
        agent: sub_mas-im-designer
        task: DESIGN
        params:
          workspace: '{workspace}'
          data: '{result.variables.rank.data}'
        timeout: 240
        depends_on:
        - rank
      depends_on:
      - rank
    - id: user_feedback
      action: wait_for_user
      message: Diese Aenderungen anwenden?
      details: '{result.variables.designer.data.patches}'
      options:
      - ja
      - nein
      - detail
      into: user_decision
      default: nein
      timeout: 300
      depends_on:
      - designer
    - id: apply_patches
      action: conditional
      condition: '''{result.variables.user_feedback}'' == ''ja'''
      if_true:
      - id: loop_patches
        action: loop
        foreach: patch
        in: '{result.variables.designer.data.patches}'
        steps:
        - id: backup
          action: delegate
          agent: sub_mas-yaml-editor
          task: BACKUP
          params:
            workspace: '{workspace}'
            file: '{item.file}'
        - id: patch
          action: delegate
          agent: sub_mas-yaml-editor
          task: PATCH
          params:
            workspace: '{workspace}'
            file: '{item.file}'
            find: '{item.from}'
            replace: '{item.to}'
          depends_on:
          - backup
        max_iterations: 5
      depends_on:
      - user_feedback
    - id: validator
      action: delegate
      agent: sub_mas-im-validator
      task: VALIDATE
      params:
        workspace: '{workspace}'
        data:
          vorher_scores: '{result.variables.finder.scores}'
          patches: '{result.variables.designer.data.patches}'
      timeout: 180
      depends_on:
      - apply_patches
    - id: summary
      action: shell
      cmd: 'echo ''Pipeline abgeschlossen. Status: success. Aenderungen: X/Y angewendet.'''
      depends_on:
      - validator
  wf_pipeline_review:
    desc: Review-Modus mit Chat-Analyse
    steps:
    - id: detect_mode
      action: shell
      cmd: cat {inputs.workspace}/mas-engineer/.mas-mode 2>/dev/null || cat ~/.config/goose/.mas-mode 2>/dev/null || echo 'generic'
      timeout: 5
    - id: voraussetzungen
      action: shell
      cmd: python3 {workspace}/tools/dev_rule_checker.py --all --action REVIEW 2>/dev/null; echo 'Rules OK'
      timeout: 15
    - id: session_reader
      action: delegate
      agent: sub_mas-im-session-reader
      task: ANALYZE
      params:
        workspace: '{workspace}'
        sessions: '{sessions}'
        include_messages: true
      timeout: 300
      on_error: continue
    - id: finder
      action: delegate
      agent: sub_mas-im-finder
      task: FIND
      params:
        workspace: '{workspace}'
        data: '{result.variables.session_reader.data}'
      timeout: 240
      depends_on:
      - session_reader
      on_error: continue
    - id: rank
      action: delegate
      agent: sub_mas-im-rank
      task: RANK
      params:
        data: '{result.variables.finder.data}'
      timeout: 60
      depends_on:
      - finder
    - id: designer
      action: delegate
      agent: sub_mas-im-designer
      task: DESIGN
      params:
        workspace: '{workspace}'
        data: '{result.variables.rank.data}'
      timeout: 240
      depends_on:
      - rank
    - id: user_feedback
      action: wait_for_user
      message: Diese Verbesserungen aus der Chat-Analyse anwenden?
      details: '{result.variables.designer.data.patches}'
      options:
      - ja
      - nein
      - detail
      into: user_decision
      default: nein
      timeout: 300
      depends_on:
      - designer
    - id: apply_patches
      action: conditional
      condition: '''{result.variables.user_feedback}'' == ''ja'''
      if_true:
      - id: loop_patches
        action: loop
        foreach: patch
        in: '{result.variables.designer.data.patches}'
        steps:
        - id: backup
          action: delegate
          agent: sub_mas-yaml-editor
          task: BACKUP
          params:
            workspace: '{workspace}'
            file: '{item.file}'
        - id: patch
          action: delegate
          agent: sub_mas-yaml-editor
          task: PATCH
          params:
            workspace: '{workspace}'
            file: '{item.file}'
            find: '{item.from}'
            replace: '{item.to}'
          depends_on:
          - backup
        max_iterations: 5
      depends_on:
      - user_feedback
    - id: validator
      action: delegate
      agent: sub_mas-im-validator
      task: VALIDATE
      params:
        workspace: '{workspace}'
        data:
          vorher_scores: '{result.variables.finder.scores}'
          patches: '{result.variables.designer.data.patches}'
      timeout: 180
      depends_on:
      - apply_patches
  wf_pipeline_cost:
    desc: Kostenanalyse
    steps:
    - id: cost_data
      action: shell
      cmd: python3 {workspace}/tools/dev_goose_db.py --costs 2>/dev/null | head -30
      timeout: 30
  wf_pipeline_errors:
    desc: Fehlermuster erkennen
    steps:
    - id: error_data
      action: shell
      cmd: python3 {workspace}/tools/dev_goose_db.py --sessions 2>/dev/null | grep -E 'error|timeout' | head -20
      timeout: 30
  wf_pipeline_corrections:
    desc: Korrektur-Log analysieren
    steps:
    - id: corrections
      action: shell
      cmd: echo 'User-Messages nach Korrektur-Indikatoren durchsucht'
      timeout: 30
  wf_pipeline_usage:
    desc: Nutzungsmuster analysieren
    steps:
    - id: usage
      action: shell
      cmd: echo 'Workflow-Nutzung gezaehlt. Tote Muster identifiziert.'
      timeout: 30
  wf_recovery_immune:
    desc: YAML-Praevention vor jedem Edit
    steps:
    - id: check
      action: shell
      cmd: 'echo ''Coronashield-Check: YAML/Python/Shell-Syntax + Gesamt-Zustand'''
  wf_immune_check_yaml:
    desc: YAML-Syntax einer einzelnen Datei pruefen
    steps:
    - id: validate_yaml
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{file_path}')); print('YAML valide')" 2>&1 || echo '⚠️ YAML-Fehler'
  wf_immune_check_syntax:
    desc: Python/Shell Syntax pruefen
    steps:
    - id: check_python
      action: shell
      cmd: python3 -c "compile(open('{file_path}').read(), '{file_path}', 'exec')" 2>&1 || echo '⚠️ Python-Fehler'
      on_error: continue
    - id: check_shell
      action: shell
      cmd: bash -n '{file_path}' 2>&1 || echo '⚠️ Shell-Fehler'
      on_error: continue
  wf_immune_verify_state:
    desc: Gesamten Workspace validieren
    steps:
    - id: scan_all_yamls
      action: shell
      cmd: 'TOTAL=0; OK=0; for f in $(find {workspace} -name ''*.yaml'' -not -path ''*/.backups/*'' -not -path ''*/checkpoints/*'' 2>/dev/null); do TOTAL=$((TOTAL+1)); python3 -c "import yaml; yaml.safe_load(open(''$f''))"
        2>/dev/null && OK=$((OK+1)); done; echo "Score: $OK/$TOTAL"'
      timeout: 60
  wf_yaml_patch:
    desc: YAML mit Safety-Kette patchen
    response:
      json_schema:
        type: object
        properties:
          signal:
            type: string
            enum:
            - 🟢 DONE
            - 🔴 ERROR
          file:
            type: string
          changed:
            type: boolean
          backup:
            type: string
          validated:
            type: boolean
        required:
        - signal
        - file
        - changed
    retry:
      max_retries: 2
      checks:
      - python3 -c "import yaml; yaml.safe_load(open('{file}')); print('OK')"
      on_failure: cat {backup} > {file} && echo 'Rollback nach 2 gescheiterten Versuchen'
    steps:
    - id: vorher_check
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipes/{file}')); print('Pre-check OK')" 2>&1 || { echo '❌ YAML vorher invalid'; exit 1; }
      on_error: abort
    - id: backup
      action: shell
      cmd: mkdir -p {workspace}/.backups/$(date +%s) && cp {workspace}/recipes/{file} {workspace}/.backups/$(date +%s)/ && echo 'Backup OK'
    - id: patch
      action: shell
      cmd: python3 {tools_dir}/dev_editor.py --workspace {workspace} --patch '{file}' --von '{find}' --nach '{replace}' --grund '{reason}'
      depends_on:
      - vorher_check
      - backup
    - id: nachher_check
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipes/{file}')); print('Post-check OK')" 2>&1 || { echo '❌ Rollback'; cp {workspace}/.backups/*/{file} {workspace}/recipes/{file};
        exit 1; }
      depends_on:
      - patch
      on_error: abort
    - id: dokumentieren
      action: shell
      cmd: 'python3 {tools_dir}/dev_changes.py --add ''PATCH: {file}: {find} -> {replace}'''
      depends_on:
      - nachher_check
  wf_yaml_validate:
    desc: YAML validieren
    steps:
    - id: validate
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipes/{file}')); print('✅ Valide')" 2>&1
  wf_yaml_backup:
    desc: Backup einer Datei erstellen
    steps:
    - id: backup_file
      action: shell
      cmd: 'TS=$(date +%s); mkdir -p {workspace}/.backups/$TS; cp {workspace}/recipes/{file} {workspace}/.backups/$TS/; echo ''Backup: .backups/$TS/{file}'''
  wf_yaml_multi_patch:
    desc: Mehrere Dateien gleichzeitig patchen
    steps:
    - id: multi_backup
      action: shell
      cmd: echo 'Multi-Backup gestartet...'
    - id: multi_patch
      action: shell
      cmd: 'echo ''Multi-Patch: X/Y Dateien erfolgreich'''
  wf_yaml_clone:
    desc: Neuen Agenten aus Template klonen
    steps:
    - id: generate
      action: shell
      cmd: python3 {workspace}/tools/dev_template_generator.py --create --name '{new_name}' --emoji '{emoji}' --task '{task}' --output recipe/sub/sub_mas-{new_name}.yaml 2>&1
    - id: validate
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipe/sub/sub_mas-{new_name}.yaml')); print('✅ Valide')" 2>&1
      depends_on:
      - generate
    - id: register
      action: shell
      cmd: 'python3 {workspace}/tools/dev_changes.py --add ''CLONE: {new_name} erstellt'''
      depends_on:
      - validate
  wf_yaml_log:
    desc: Git-Commit + changes.json
    steps:
    - id: git_commit
      action: shell
      cmd: cd {workspace} && git add -A && git commit -m '{message}' 2>/dev/null || echo 'Keine Aenderungen'
    - id: changes_log
      action: shell
      cmd: 'python3 {workspace}/tools/dev_changes.py --add ''LOG: {message}'''
      depends_on:
      - git_commit
  wf_checkpoint_snapshot:
    desc: Snapshot erstellen
    steps:
    - id: create_snapshot
      action: shell
      cmd: 'TS=$(date -u +%Y%m%d_%H%M%S); mkdir -p {workspace}/.state/checkpoints/$TS; cp -r {workspace}/recipe {workspace}/.state/checkpoints/$TS/ 2>/dev/null; cp -r {workspace}/tools {workspace}/.state/checkpoints/$TS/
        2>/dev/null; cp {workspace}/.state/changes.json {workspace}/.state/checkpoints/$TS/ 2>/dev/null; echo "Checkpoint: $TS"'
      timeout: 60
  wf_checkpoint_list:
    desc: Letzte 10 Snapshots anzeigen
    steps:
    - id: list
      action: shell
      cmd: ls -1t {workspace}/.state/checkpoints/ 2>/dev/null | head -10 | nl
  wf_checkpoint_restore:
    desc: Snapshot wiederherstellen
    steps:
    - id: pre_validate
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/.state/checkpoints/{checkpoint_id}/recipe/dev-mas-engineer.yaml'))" 2>/dev/null || { echo 'Kein gueltiger Checkpoint'; exit 1; }
    - id: restore
      action: shell
      cmd: 'rm -rf {workspace}/recipe {workspace}/tools; cp -r {workspace}/.state/checkpoints/{checkpoint_id}/recipe {workspace}/; cp -r {workspace}/.state/checkpoints/{checkpoint_id}/tools {workspace}/;
        echo ''Wiederhergestellt: {checkpoint_id}'''
      depends_on:
      - pre_validate
  wf_checkpoint_diff:
    desc: Unterschied zwischen Checkpoints
    steps:
    - id: diff
      action: shell
      cmd: diff -rq {workspace}/.state/checkpoints/{from_id} {workspace}/.state/checkpoints/{to_id} 2>/dev/null | head -50 || echo 'Keine Unterschiede oder ID fehlt'
  wf_safezone_fork:
    desc: Fork-Workspace erstellen
    steps:
    - id: check_fork
      action: shell
      cmd: '[ -L {workspace}/mas-engineer_active ] && echo ''Fork aktiv'' || echo ''Kein Fork'''
    - id: create_fork
      action: shell
      cmd: 'cp -r {workspace} {workspace}__{fork_name} && ln -sf {workspace}__{fork_name} {workspace}/mas-engineer_active && echo ''Fork: {fork_name}'''
      depends_on:
      - check_fork
  wf_safezone_merge:
    desc: Fork in Haupt uebernehmen
    steps:
    - id: validate_fork
      action: shell
      cmd: 'FORK=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null); for f in $(find $FORK/recipe -name ''*.yaml'' 2>/dev/null); do python3 -c "import yaml; yaml.safe_load(open(''$f''))" 2>/dev/null
        || echo "Invalid: $f"; done'
    - id: merge
      action: shell
      cmd: FORK=$(readlink -f {workspace}/mas-engineer_active); rm -rf {workspace}/recipe {workspace}/tools; cp -r $FORK/recipe $FORK/tools {workspace}/; rm $FORK; rm {workspace}/mas-engineer_active; echo
        'Merge OK'
      depends_on:
      - validate_fork
  wf_safezone_abort:
    desc: Fork verwerfen
    steps:
    - id: abort
      action: shell
      cmd: FORK=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null); [ -n "$FORK" ] && { rm -rf "$FORK"; rm {workspace}/mas-engineer_active; echo 'Fork verworfen'; } || echo 'Kein Fork aktiv'
  wf_safezone_diff:
    desc: Unterschied Fork vs Haupt
    steps:
    - id: show_diff
      action: shell
      cmd: FORK=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null); [ -n "$FORK" ] && diff -rq {workspace} $FORK 2>/dev/null | grep -v '.git/' | head -30 || echo 'Kein Fork aktiv'
  wf_timeline_findbest:
    desc: Besten Checkpoint finden
    steps:
    - id: scan_checkpoints
      action: shell
      cmd: for d in $(ls -1t {workspace}/.state/checkpoints/ 2>/dev/null); do python3 -c "import yaml; yaml.safe_load(open('{workspace}/.state/checkpoints/$d/recipe/dev-mas-engineer.yaml'))" 2>/dev/null
        && echo "✅ $d"; done | head -1
      timeout: 60
  wf_timeline_restore:
    desc: Besten Checkpoint wiederherstellen
    steps:
    - id: find_best
      action: shell
      cmd: for d in $(ls -1t {workspace}/.state/checkpoints/ 2>/dev/null); do python3 -c "import yaml; yaml.safe_load(open('{workspace}/.state/checkpoints/$d/recipe/dev-mas-engineer.yaml'))" 2>/dev/null
        && echo "$d" && break; done
    - id: restore
      action: shell
      cmd: 'BEST=$(cat /tmp/best_checkpoint 2>/dev/null); [ -n "$BEST" ] && { rm -rf {workspace}/recipe {workspace}/tools; cp -r {workspace}/.state/checkpoints/$BEST/recipe {workspace}/; cp -r {workspace}/.state/checkpoints/$BEST/tools
        {workspace}/; echo ''Restored: $BEST''; }'
      depends_on:
      - find_best
  wf_timeline_showpath:
    desc: Timeline-Baum anzeigen
    steps:
    - id: show
      action: shell
      cmd: for d in $(ls -1t {workspace}/.state/checkpoints/ 2>/dev/null | head -10); do python3 -c "import yaml; yaml.safe_load(open('{workspace}/.state/checkpoints/$d/recipe/dev-mas-engineer.yaml'))"
        2>/dev/null && echo "✅ $d" || echo "❌ $d"; done
  wf_timeline_analyze:
    desc: Schaden systematisch analysieren
    steps:
    - id: diagnose
      action: shell
      cmd: 'SCHADEN=0; [ -f {workspace}/recipe/dev-mas-engineer.yaml ] || SCHADEN=$((SCHADEN+1)); python3 -c "import yaml; yaml.safe_load(open(''{workspace}/recipe/dev-mas-engineer.yaml''))" 2>/dev/null
        || SCHADEN=$((SCHADEN+1)); for f in {workspace}/recipe/sub/sub_mas-*.yaml; do python3 -c "import yaml; yaml.safe_load(open(''$f''))" 2>/dev/null || SCHADEN=$((SCHADEN+1)); done; echo "Schadensstufe:
        $SCHADEN/7"'
  wf_defib_execute:
    desc: Notfall-Wiederbelebung
    steps:
    - id: write_minimal
      action: shell
      cmd: 'echo ''⚠️ DEFIB: Minimal-Config wird geschrieben (NUR immune + timeline)...'''
      timeout: 30
    - id: validate
      action: shell
      cmd: python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipe/sub/sub_mas-recovery-immune.yaml'))" 2>/dev/null && python3 -c "import yaml; yaml.safe_load(open('{workspace}/recipe/sub/sub_mas-recovery-timeline.yaml'))"
        2>/dev/null && echo '✅ Minimal-Config valide' || echo '⚠️ Korrupt'
      depends_on:
      - write_minimal
      on_error: continue
  wf_defib_resurrect:
    desc: Aus letztem Backup wiederbeleben
    steps:
    - id: try_timeline
      action: shell
      cmd: 'echo ''Timeline: besten Checkpoint suchen...''; for d in $(ls -1t {workspace}/.state/checkpoints/ 2>/dev/null); do python3 -c "import yaml; yaml.safe_load(open(''{workspace}/.state/checkpoints/$d/recipe/dev-mas-engineer.yaml''))"
        2>/dev/null && echo "Best: $d" && break; done'
    - id: try_backups
      action: shell
      cmd: ls -1t {workspace}/.backups/ 2>/dev/null | head -5; echo 'Backup-Suche...'
      depends_on:
      - try_timeline
      on_error: continue
    - id: reinstall
      action: shell
      cmd: 'echo ''Letzter Ausweg: Neuinstallation empfohlen'''
      depends_on:
      - try_backups
  wf_defib_diagnose:
    desc: Totalschaden-Analyse
    steps:
    - id: diagnosis
      action: shell
      cmd: 'SCHADEN=0; [ -d {workspace}/recipe/sub ] || SCHADEN=$((SCHADEN+1)); [ -f {workspace}/tools/dev_rule_checker.py ] || SCHADEN=$((SCHADEN+1)); [ -f {workspace}/.state/workflows.yaml ] || SCHADEN=$((SCHADEN+1));
        for f in {workspace}/recipe/sub/sub_mas-*.yaml; do [ -f "$f" ] || SCHADEN=$((SCHADEN+1)); done; [ -d {workspace}/.state/knowledge ] || SCHADEN=$((SCHADEN+1)); [ -f {workspace}/recipe/dev-mas-engineer.yaml
        ] || SCHADEN=$((SCHADEN+1)); [ -d {workspace}/docs ] || SCHADEN=$((SCHADEN+1)); echo "Schadensstufe: $SCHADEN/7"; [ "$SCHADEN" -le 2 ] && echo ''Leicht'' || [ "$SCHADEN" -le 4 ] && echo ''Mittel''
        || [ "$SCHADEN" -le 6 ] && echo ''Schwer'' || echo ''TOTALSCHADEN'''
  wf_im_read_sessions:
    desc: Session-DB lesen mit 3-Ebenen-Filter
    steps:
    - id: copy_db
      action: shell
      cmd: cp ~/.local/share/goose/sessions/sessions.db /tmp/im_session_copy.db 2>/dev/null || sqlite3 ~/.local/share/goose/sessions/sessions.db '.clone /tmp/im_session_copy.db' 2>/dev/null; [ -f /tmp/im_session_copy.db
        ] || echo 'DB_NOT_FOUND'
      on_error: continue
    - id: three_level_filter
      action: shell
      cmd: 'echo ''3-Ebenen-Filter: TAG → working_dir → Fallback''; echo ''Sessions gefunden: N'''
      depends_on:
      - copy_db
    - id: chat_extraction
      action: conditional
      condition: '''{include_messages}'' == ''true'''
      if_true:
      - id: extract_messages
        action: shell
        cmd: 'echo ''Chat-Inhalte extrahiert. Muster: corrections/confusions/praises/abandons/requests'''
        timeout: 30
      depends_on:
      - three_level_filter
  wf_im_find_features:
    desc: 48 Feature-Typen erkennen (A-MM + LL)
    response:
      json_schema:
        type: object
        properties:
          signal:
            type: string
            enum:
            - 🟢 DONE
          status:
            type: string
            enum:
            - success
            - error
          findings:
            type: array
          scores:
            type: object
          scan_duration:
            type: integer
          agents_scanned:
            type: integer
        required:
        - signal
        - status
        - findings
    retry:
      max_retries: 1
      checks:
      - test -n '{data.sessions}' && echo 'sessions OK'
      on_failure: 'echo ''Fallback: dev_fast_scan.py'''
    steps:
    - id: check_data
      action: shell
      cmd: '[ -n ''{data.sessions}'' ] && echo ''Sessions OK'' || echo ''Fallback: dev_fast_scan.py'''
    - id: detect_types
      action: shell
      cmd: echo 'Feature-Typen A-MM + LL (48) erkannt'
      depends_on:
      - check_data
  wf_im_rank_findings:
    desc: Findings priorisieren
    steps:
    - id: dedup
      action: shell
      cmd: 'echo ''Duplikate entfernt: gruppiert nach (typ+datei+detail)'''
    - id: check_articles
      action: shell
      cmd: echo 'Art.1-6 geprueft. sub_mas-general-improver → BLOCKED (R04)'
    - id: memory_check
      action: shell
      cmd: 'echo ''Memory-Check: bereits gesehene Findings markiert'''
    - id: top5
      action: shell
      cmd: 'echo ''Top 5: Severity DESC, Impact DESC, Aufwand ASC'''
  wf_im_design_patches:
    desc: Patches aus Findings entwerfen
    steps:
    - id: design
      action: shell
      cmd: 'echo ''Patches entworfen. Typ-Logik pro Feature-Typ: A1=×1.5, B1=Prompt, LL1=Klarstellung...'''
  wf_im_validate_changes:
    desc: Aenderungen validieren
    steps:
    - id: yaml_syntax
      action: shell
      cmd: 'for f in {patches[*].file}; do python3 -c "import yaml; yaml.safe_load(open(''{workspace}/$f''))" 2>/dev/null && echo "$f: OK" || echo "$f: FAILED"; done'
    - id: compare_scores
      action: shell
      cmd: 'echo ''Vorher/Nachher-Vergleich: prompt/settings/structure/health'''
    - id: verdict
      action: shell
      cmd: 'echo ''Verdict: ALL_GREEN | DEGRADED | FAILED (bei FAILED: SOFORT Rollback)'''
  wf_engine_execute:
    desc: Workflow aus SOT ausfuehren
    steps:
    - id: load_wf
      action: shell
      cmd: echo 'Workflow {workflow} aus SOT geladen. Steps topologisch sortiert.'
  wf_im_read_sessions_with_messages:
    desc: Session-DB lesen MIT Chat-Extraktion
    steps:
    - id: copy_db
      action: shell
      cmd: cp ~/.local/share/goose/sessions/sessions.db /tmp/im_session_copy.db 2>/dev/null || sqlite3 ~/.local/share/goose/sessions/sessions.db '.clone /tmp/im_session_copy.db' 2>/dev/null
      on_error: continue
    - id: filter_sessions
      action: shell
      cmd: 'echo ''3-Ebenen-Filter: TAG → working_dir → Fallback'''
      depends_on:
      - copy_db
    - id: extract_messages
      action: shell
      cmd: 'echo ''Messages extrahiert aus messages-Tabelle. Muster: corrections, confusions, praises, abandons, requests'''
      depends_on:
      - filter_sessions
  wf_test_run:
    desc: pytest ausfuehren
    retry:
      max_retries: 2
      checks:
      - python3 -m pytest --version 2>/dev/null && echo 'pytest OK'
      on_failure: echo '⚠️ pytest nicht installiert — Abbruch'
    steps:
    - id: check_tests
      action: shell
      cmd: '[ -d {workspace}/tests ] && echo ''tests/ OK'' || { echo ''Kein tests/ Verzeichnis''; exit 1; }'
      on_error: abort
    - id: run_pytest
      action: shell
      cmd: cd {workspace} && python3 -m pytest -v --tb=short --no-header -q 2>&1 | tail -30
      timeout: 120
  wf_test_deps:
    desc: Dependencies pruefen
    steps:
    - id: check_pytest
      action: shell
      cmd: python3 -m pytest --version 2>/dev/null && echo '✅ pytest' || echo '⚠️ pytest fehlt'
    - id: check_tests_dir
      action: shell
      cmd: ls {workspace}/tests/ 2>/dev/null | head -10 || echo 'Keine Tests'
  wf_test_compare:
    desc: Vorher/Nachher vergleichen
    steps:
    - id: run_current
      action: shell
      cmd: cd {workspace} && python3 -m pytest -v --tb=short --no-header -q 2>&1 | tail -30
      timeout: 120
    - id: compare
      action: shell
      cmd: 'echo ''Delta: neue Failures, behobene Failures'''
      depends_on:
      - run_current
  wf_generic_init_run:
    desc: Projekt initialisieren + ersten Agenten erstellen
    tier: balanced
    on_error: abort
    steps:
    - id: scaffold
      action: shell
      cmd: python3 ~/.config/goose/recipes/mas-engineer-tools/dev_generic_init.py --init {inputs.project_name} 2>&1
      timeout: 120
    - id: validate_scaffold
      action: shell
      cmd: test -f {inputs.workspace}/project.yaml && test -d {inputs.workspace}/tools && echo '✅ Scaffold OK' || echo '❌ Scaffold fehlt'
      timeout: 10
      depends_on:
      - scaffold
    - id: create_base_agent
      action: delegate
      agent: sub_mas-recipe-designer
      task: CONCEIVE
      params:
        name: '{inputs.project_name}-analyzer'
        emoji: 🔍
        category: analyse
        tasks: '["ANALYZE","SCAN","REPORT"]'
        workspace: '{inputs.workspace}'
        mode: generic
      timeout: 120
      depends_on:
      - validate_scaffold
    - id: init_rules
      action: shell
      cmd: bash {inputs.workspace}/tools/dev_rule_refresh.sh 2>/dev/null || echo 'ℹ️ dev_rule_refresh.sh nicht available — Regeln manuell setzen'
      timeout: 15
      depends_on:
      - scaffold
      on_error: continue
    - id: done_signal
      action: signal
      cmd: CP_DONE
      depends_on:
      - create_base_agent
      - init_rules
  wf_generic_push:
    desc: MAS-Verbesserungen in User-Projekt pushen (R17)
    tier: balanced
    on_error: continue
    steps:
    - id: detect_project
      action: shell
      cmd: cat {inputs.workspace}/.goosehints 2>/dev/null | grep GOOSE_SESSION_TAG | cut -d= -f2 | tr -d ' ' || echo 'unknown'
      timeout: 5
    - id: verify_project
      action: shell
      cmd: test -f {inputs.workspace}/00-GUIDELINES.md && echo 'OK' || echo 'MISSING'
      timeout: 5
      depends_on:
      - detect_project
    - id: copy_knowledge
      action: shell
      cmd: mkdir -p {inputs.workspace}/.state/knowledge && cp {inputs.workspace}/mas-engineer/.state/knowledge/*.md {inputs.workspace}/.state/knowledge/ 2>/dev/null && echo '✅ Wissen kopiert' || echo '⚠️
        Wissen nicht kopierbar'
      timeout: 10
      depends_on:
      - verify_project
      on_error: continue
    - id: copy_template
      action: shell
      cmd: mkdir -p {inputs.workspace}/recipe/template && cp {inputs.workspace}/mas-engineer/recipe/template/agent_template.yaml {inputs.workspace}/recipe/template/ 2>/dev/null && echo '✅ Template kopiert'
        || echo '⚠️ Template nicht kopierbar'
      timeout: 10
      depends_on:
      - verify_project
      on_error: continue
    - id: push_done
      action: signal
      cmd: CP_DONE
      depends_on:
      - copy_knowledge
workflows:
  build-test:
    desc: Build + ZIP entpacken + Inhalt check
    params:
      VERSION:
        type: string
        default: 2.42.0
    steps:
    - id: preflight
      action: rule_check
      action_type: build
      aufruf: python3 tools/dev_rule_checker.py --all --action build
      on_error: abort
    - id: build
      action: shell
      cmd: bash tools/dev_build.sh --full
      depends_on:
      - preflight
      timeout: 120
    - id: extract
      action: shell
      cmd: 'ZIP=$(ls -t dist/*.zip | head -1); rm -rf /tmp/wf_build_test; unzip -q "$ZIP" -d /tmp/wf_build_test; echo "OK: $(find /tmp/wf_build_test -type f | wc -l) files"'
      depends_on:
      - build
    - id: validate
      action: shell
      cmd: 'cd /tmp/wf_build_test && echo "YAMLs: $(find . -name ''*.yaml'' | wc -l)" && [ -f installer.sh ] && echo ''installer.sh: OK'' || echo ''installer.sh: FEHLT'' && [ -f .mas-mode ] && echo ''.mas-mode:
        OK'' || echo ''.mas-mode: FEHLT'' && [ -f mas-engineer/recipe/dev-mas-engineer.yaml ] && echo ''main-recipe: OK'' || echo ''main-recipe: FEHLT'''
      depends_on:
      - extract
    - id: cleanup
      action: shell
      cmd: rm -rf /tmp/wf_build_test
      depends_on:
      - validate
  si-analyse:
    desc: General-Improver Vollanalyse + Report
    steps:
    - id: checkpoint
      action: shell
      cmd: mkdir -p .state/checkpoints/si_$(date +%Y%m%d_%H%M%S)
    - id: scan_recipes
      action: shell
      cmd: python3 ~/.config/goose/recipes/mas-engineer-tools/dev_agent_doctor.py --all 2>&1 | tail -30
      timeout: 120
    - id: scan_tools
      action: shell
      cmd: 'echo ''Tools-Check: max_steps, hardcodierte Pfade'''
      depends_on:
      - checkpoint
    - id: report
      action: shell
      cmd: echo 'SI $(date)' >> .state/todo.md
      depends_on:
      - scan_recipes
      - scan_tools
  knowledge-refresh:
    desc: Liest alle 8 Wissen-Dateien und validiert Aktualitaet
    steps:
    - id: check_files
      action: shell
      cmd: 'for f in .state/knowledge/*.md; do [ -f "$f" ] && echo "OK: $(basename $f) ($(wc -c < $f) bytes)" || echo "FEHLT: $f"; done'
  wf_git_init:
    desc: Git-Repository initialisieren
    steps:
    - id: git_init
      action: shell
      cmd: cd {workspace} && git init
      on_error: abort
    - id: gitignore
      action: shell
      cmd: 'cd {workspace} && cat > .gitignore << ''EOF''

        .backups/

        .state/checkpoints/

        *.bak.*

        __pycache__/

        *.pyc

        EOF'
      depends_on:
      - git_init
  wf_git_commit:
    desc: Git-Commit durchfuehren
    steps:
    - id: add
      action: shell
      cmd: cd {workspace} && git add -A
    - id: commit
      action: shell
      cmd: cd {workspace} && git commit -m "[MAS] {message}"
      depends_on:
      - add
  wf_git_status:
    desc: Git-Status anzeigen
    steps:
    - id: status
      action: shell
      cmd: cd {workspace} && echo '=== STATUS ===' && git status --short && echo '=== LOG ===' && git log --oneline -5
  wf_git_log:
    desc: Git-Log anzeigen
    steps:
    - id: log
      action: shell
      cmd: cd {workspace} && git log --oneline -10
  wf_git_diff:
    desc: Git-Diff anzeigen
    steps:
    - id: diff
      action: shell
      cmd: cd {workspace} && git diff --stat HEAD~1 HEAD
  wf_py_compile:
    desc: Python-Syntax-Pruefung
    steps:
    - id: compile
      action: shell
      cmd: cd {workspace} && python3 -c "compile(open('{file}').read(), '{file}', 'exec')"
  wf_py_fix:
    desc: Python-Code reparieren
    steps:
    - id: backup
      action: shell
      cmd: cd {workspace} && cp {file} {file}.bak.$(date +%Y%m%d_%H%M%S)
    - id: fix
      action: shell
      cmd: 'cd {workspace} && echo ''Fix: {fix_description} in {file}'''
      depends_on:
      - backup
    - id: validate
      action: shell
      cmd: cd {workspace} && python3 -c "compile(open('{file}').read(), '{file}', 'exec')" && echo 'SYNTAX OK' || { cp {file}.bak.* {file} && echo 'ROLLBACK'; }
      depends_on:
      - fix
  wf_py_analyze:
    desc: Python-Struktur-Analyse
    steps:
    - id: analyze
      action: shell
      cmd: 'cd {workspace} && python3 -c "import ast

        with open(''{file}'') as f: tree = ast.parse(f.read())

        funcs=[n.name for n in ast.walk(tree) if isinstance(n,ast.FunctionDef)]

        classes=[n.name for n in ast.walk(tree) if isinstance(n,ast.ClassDef)]

        print(f''Functions: {funcs}'')

        print(f''Classes: {classes}'')"'
  wf_py_validate:
    desc: Python-Voll-Check
    steps:
    - id: syntax
      action: shell
      cmd: 'cd {workspace} && python3 -c "compile(open(''{file}'').read(), ''{file}'', ''exec'')" && echo ''SYNTAX: OK'''
    - id: debug
      action: shell
      cmd: 'cd {workspace} && grep -n ''print('' ''{file}'' | head -3 || echo ''OK: Kein print-Debugging'''
    - id: hardcode
      action: shell
      cmd: 'cd {workspace} && grep -n ''/home/'' ''{file}'' | head -3 || echo ''OK: Keine harten Pfade'''
  wf_doc_update:
    desc: Markdown-Doku erweitern
    steps:
    - id: update
      action: shell
      cmd: 'cd {workspace} && echo ''Update {file}: {content}'''
  wf_doc_create:
    desc: Neue Markdown-Datei
    steps:
    - id: create
      action: shell
      cmd: 'cd {workspace} && mkdir -p $(dirname {file}) && cat > {file} << ''MDEOF''

        {content}

        MDEOF'
  wf_doc_consistency:
    desc: Querverweise pruefen
    steps:
    - id: links
      action: shell
      cmd: 'cd {workspace} && grep -rno ''\[[^]]*\](\([^)]*\))'' mas-engineer/docs/ | while IFS=: read f l link; do link=$(echo "$link" | grep -oP ''(?<=\()([^)]+)'' 2>/dev/null); [ -f "$link" ] 2>/dev/null
        || echo "BROKEN: $f:$l -> $link"; done'
  wf_json_validate:
    desc: JSON validieren
    steps:
    - id: validate
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json; json.load(open(''{file}''))" && echo ''JSON: OK'''
  wf_json_format:
    desc: JSON formatieren
    steps:
    - id: format
      action: shell
  wf_rd_conceive:
    desc: Aus User-Wunsch Agent-Parameter extrahieren
    steps:
    - id: extract
      action: shell
      cmd: 'cd {workspace} && echo ''CONCEIVE: {name} ({emoji}) - {description}'''
    - id: check_duplicate
      action: shell
      cmd: 'cd {workspace} && [ -f recipe/sub/sub_mas-{name}.yaml ] && echo ''DUPLIKAT: sub_mas-{name}.yaml existiert'' || echo ''NEU: kein Duplikat'''
      depends_on:
      - extract
  wf_rd_design:
    desc: Sub-Agent YAML erstellen
    steps:
    - id: load_template
      action: shell
      cmd: cd {workspace} && cat recipe/template/agent_template.yaml | head -5
    - id: create_yaml
      action: shell
      cmd: 'cd {workspace} && echo ''CREATE: recipe/sub/sub_mas-{name}.yaml'''
    - id: validate
      action: shell
      cmd: 'cd {workspace} && python3 -c "import yaml; yaml.safe_load(open(''recipe/sub/sub_mas-{name}.yaml''))" && echo ''YAML: OK'''
      depends_on:
      - create_yaml
  wf_rd_workflows:
    desc: Workflows fuer neuen Agenten generieren
    steps:
    - id: generate
      action: shell
      cmd: 'cd {workspace} && echo ''WORKFLOWS: {name} mit {tasks} Tasks'''
  wf_rd_sot:
    desc: SOT-Eintraege fuer neuen Agenten
    steps:
    - id: agents
      action: shell
      cmd: 'cd {workspace} && echo ''AGENTS: {name}.{task}: wf_{name}_{task}'''
    - id: sub_agents
      action: shell
      cmd: 'cd {workspace} && echo ''SUB_AGENTS: {category} -> sub_mas-{name}'''
      depends_on:
      - agents
    - id: sub_recipes
      action: shell
      cmd: 'cd {workspace} && echo ''SUB_RECIPES: sub_mas-{name} in dev-mas-engineer.yaml'''
      depends_on:
      - sub_agents
  wf_rd_knowledge:
    desc: Knowledge-Eintraege aktualisieren
    steps:
    - id: agents_md
      action: shell
      cmd: 'cd {workspace} && echo ''07-agents.md: sub_mas-{name} hinzugefuegt'''
    - id: tools_md
      action: shell
      cmd: 'cd {workspace} && echo ''06-tools.md: {tool} hinzugefuegt'''
      depends_on:
      - agents_md
  wf_hr_report:
    desc: Status von Git, Rule-Checker, changes.json, Sub-Agenten sammeln
    steps:
    - id: git_status
      action: shell
      cmd: git log -1 --format='%h %s (%ai)'; git branch --show-current; git status --porcelain | wc -l
      timeout: 15
      on_error: continue
    - id: rule_checker
      action: shell
      cmd: python3 mas-engineer/dev_rule_checker.py --count 2>/dev/null || echo 'N/A'
      timeout: 15
      on_error: continue
    - id: changes_count
      action: shell
      cmd: python3 -c "import json; d=json.load(open('.state/changes.json')); print(len(d))" 2>/dev/null || echo 'N/A'
      timeout: 15
      on_error: continue
    - id: agent_count
      action: shell
      cmd: ls mas-engineer/recipe/sub/sub_mas-*.yaml 2>/dev/null | wc -l
      timeout: 15
      on_error: continue
  wf_hr_compare:
    desc: Aktuelle Werte mit letztem Bericht vergleichen
    steps:
    - id: find_last
      action: shell
      cmd: ls -t mas-engineer/docs/health-report-*.md 2>/dev/null | head -1
      timeout: 15
      on_error: continue
    - id: compare
      action: shell
      cmd: echo 'Trendanalyse — manueller Vergleich erforderlich'
      timeout: 15
      on_error: continue
  wf_hr_markdown:
    desc: Bericht als Markdown formatieren und speichern
    steps:
    - id: format
      action: shell
      cmd: echo '# Gesundheitsbericht' > mas-engineer/docs/health-report-$(date +%Y-%m-%d).md
      timeout: 30
      on_error: continue
  wf_hr_full:
    desc: Kompletten Gesundheitsbericht erstellen
    steps:
    - id: report
      action: workflow
      ref: wf_hr_report
    - id: compare
      action: workflow
      ref: wf_hr_compare
    - id: markdown
      action: workflow
      ref: wf_hr_markdown
  wf_rd_full:
    desc: Kompletter Durchlauf
    steps:
    - id: conceive
      action: shell
      cmd: 'cd {workspace} && echo ''CONCEIVE: {name} ({emoji})'''
    - id: design
      action: shell
      cmd: 'cd {workspace} && echo ''DESIGN: sub_mas-{name}.yaml'''
      depends_on:
      - conceive
    - id: workflows
      action: shell
      cmd: 'cd {workspace} && echo ''WORKFLOWS: {name} Tasks'''
      depends_on:
      - design
    - id: sot
      action: shell
      cmd: 'cd {workspace} && echo ''SOT: agents+sub_agents+sub_recipes'''
      depends_on:
      - workflows
    - id: knowledge
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json

        with open(''{file}'') as f: d = json.load(f)

        with open(''{file}'', ''w'') as f: json.dump(d, f, indent=2, ensure_ascii=False); f.write(chr(10))"'
      depends_on:
      - sot
  wf_json_append:
    desc: Eintrag zu JSON hinzufuegen
    steps:
    - id: append
      action: shell
      cmd: 'cd {workspace} && python3 -c "import json

        with open(''{file}'') as f: d = json.load(f)

        d.append({data})

        with open(''{file}'', ''w'') as f: json.dump(d, f, indent=2, ensure_ascii=False)"'
