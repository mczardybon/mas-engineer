version: 2.0.0
configs:
  mas-self:
    type: main-agent
    version: 2.0.0
    first_session:
      steps:
      - 'load(source: ''sub_mas-system-knowledge'')'
      - cat mas-engineer/.state/workflows.yaml → configs.mas-self.restrictions
      - cat mas-engineer/.state/workflows.yaml → configs.mas-self.task_workflows
      - cat .state/knowledge/{thema}.md (bei Bedarf)
      dann: 'Frage: Was soll ich tun?'
    pfade:
      mas:
        source_dir: /home/marius/agent_new_start/mas-agent/mas-engineer
        install_dir: ~/.config/goose/recipes
        tools_install: ~/.config/goose/recipes/mas-engineer-tools
        state_dir: /home/marius/agent_new_start/mas-agent/mas-engineer/.state
      projekt:
        work_dir: '{workspace} (dynamisch, vom Aufrufer gesetzt)'
      modus:
        aktuell: mas
        erkannt_via: cat {workspace}/mas-engineer/.mas-mode || cat ~/.config/goose/.mas-mode
        modi:
        - mas
        - framework
        - generic
    restrictions:
      r01_bestaetigung:
        level: extrem
        description: 'Vor JEDER write/edit/shell: Pruefe ob Bestaetigung noetig'
        details:
        - 'WENN Aktion YAML/Code aendert: ZEIGE Plan + WARTE auf ✅'
        - 'WENN Aktion nur liest/analysiert: KEINE Bestaetigung'
      r02_bestand:
        level: extrem
        description: BESTAND vor NEUBAU — Pruefe ob Tool/Agent/Funktion bereits existiert
      r04_general_improver:
        level: extrem
        description: NIEMALS general-improver.yaml editieren
      r05_auto_commit:
        level: extrem
        description: CHECKPOINT VOR Change — 1. Checkpoint, 2. Change, 3. Commit (verschärft)
        details:
        - SCHRITT 1 — CHECKPOINT (VOR der Change): null
        - '  → mkdir -p .state/checkpoints/{ts}/ && cp -r recipe/ tools/ docs/ .state/ → .state/checkpoints/{ts}/'
        - '  → ZEIGE: ''✅ Checkpoint {ts} — falls etwas schief geht'''
        - SCHRITT 2 — ÄNDERUNG DURCHEXECUTEN: null
        - '  → edit/write/shell according to R01 + R10'
        - SCHRITT 3 — COMMIT (NACH der Change): null
        - '  → git add -A && git commit -m ''[MAS] ...'''
        - '  → changes.json + {timestamp, action, description} — NIEMALS leere description'
        - '  → todo.todoWrite(''✅ ...'')'
        - REIHENFOLGE IST PFLICHT — bei Verstoss: ROLLBACK
      r06_sub_agent:
        level: stark
        description: Sub-Agent = NUR Analyse — Shell selbst ausfuehren
      r07_signal:
        level: normal
        description: CP_DONE nach Checkpoint senden
      r08_token:
        level: normal
        description: General-Improver max 50K Tokens — sonst User fragen
      r09_domain:
        level: extrem
        description: MODUS-DOMAENEN-KOPPLUNG
        details:
        - MAS importiert NIEMALS Framework-Komponenten (BLOCKED)
        - Framework weiss NICHTS vom MAS (BLOCKED)
        - 'Beim Lesen: .mas-mode pruefen (MAS vs FRAMEWORK)'
      r10_coronashield:
        level: extrem
        description: JEDE YAML vor Speicherung via sub_mas-recovery-immune CHECK_YAML validieren
      r11_si_rate_limit:
        level: extrem
        description: Max 1 General-Improver alle 6 Stunden
      r12_work_mas_entkopplung:
        level: extrem
        description: KEINE Abhängigkeit zwischen work/ und MAS. MAS lebt in ~/.config/goose/.state/mas/
        details:
        - MAS-State liegt in ~/.config/goose/.state/mas/ (nicht in work/.../)
        - work/ kann gelöscht werden ohne MAS zu beschädigen
        - BEIM START: Check ob work/ ein Projekt ist — NICHT ob es MAS ist
        - work/ enthält KEINE MAS-Zustandsdateien (.state/, checkpoints/, .backups/ — bis auf .mas-mode)
        - MAS-install.sh und update.sh kopieren State NACH ~/.config/goose/.state/mas/
      r18_delegation:
        level: extrem
        description: NIEMALS selbst machen — delegiere an Sub-Agenten (R16 + verschärft)
        details:
        - 'VOR jeder shell/write/edit: PRÜFE ob ein Sub-Agent existiert'
        - 'WENN Sub-Agent existiert: delegiere() STATT selbst machen'
        - 'WENN kein passender Sub-Agent: PRÜFE ob Tool existiert → shell(tool)'
        - 'WENN weder Agent noch Tool: NEUEN Agent via intention-parser + R15'
        - 'VERSTOSS = BLOCKED + "❌ R18: Sub-Agent {name} existiert für diese Aufgabe"'
        - 'Ausnahme: Analyse-Schritte (cat, grep, ls) — aber NUR zur Orientierung'
      r13_neues_projekt_ignore:
        level: extrem
        description: Neues Projekt = MAS-Konfiguration ignorieren (prompt_1)
        details:
        - WENN work/ leer ODER kein .goosehints mit GOOSE_SESSION_TAG: null
        - '  → ''Das ist ein neues Projekt – ignoriere die MAS-Config'''
        - KEINE .state/Prüfung, KEINE MAS-Spezialbehandlung
        - DELEGIERE an sub_mas-generic-init OHNE MAS-Kontext
        - MAS-interne Befehle (/develop, /workflow) bleiben available
      r14_work_on_modus:
        level: extrem
        description: work_on = mas | framework | <projekt> — harte Domain-Trennung
        details:
        - WENN work_on == "mas": work/mas/ wird wie ein normales Projekt behandelt
        - WENN work_on == "<projekt>": MAS-Komponenten sind UNSICHTBAR für Projekt-Kontext
        - 'WENN work_on == "framework": Framework-Modus — wie <projekt>, aber mit Agenten (Improver-ready)'
        - 'GEPRÜFT VIA: cat .mas-mode → "mas" | "framework" | "<projekt>"'
        - KEIN Zugriff auf MAS-Config/State aus dem Projekt heraus
      r15_architektur_genehmigung:
        level: extrem
        description: Architektur-Changes brauchen User-Genehmigung (dev_architecture_checker.py)
        details:
        - FOLGENDE Changes gelten als "Architektur-Change": null
        - '  → Neuen Agent/Tool erstellen (CREATE)'
        - '  → workflows.yaml SOT-Regeln ändern (R01-R17)'
        - '  → Constitution ändern (Artikel 1-11)'
        - '  → master-constitution.yaml ändern'
        - '  → dev-mas-engineer.yaml sub_recipes-Liste ändern'
        - BEI ERKENNUNG: STOP → ZEIGE User die Change → WARTE auf ✅
        - WENN User ❌: ROLLBACK + DOKUMENTIEREN in changes.json
        - CHECK VIA: dev_architecture_checker.py --action "{aktion}" --file "{datei}"
      r16_tool_vor_experte:
        level: extrem
        description: Tool → Experte (Sub-Agent) → Neuer Agent — IN DIESER REIHENFOLGE
        details:
        - 'BEVOR ein Task gestartet wird:'
        - '  → 1. Tool? PRUEFE: tools/dev_*.py — WENN ja: shell(tool)'
        - '  → 2. Experte? PRUEFE: sub_mas-*.yaml mit passendem task — WENN ja: delegate(experte)'
        - '  → 3. Neuer Agent? PRUEFE: intention-parser + architecture_genehmigung (R15)'
        - R02 (Bestand vor Neubau) wird durch R16 ERSETZT
      r17_improvement_push:
        level: stark
        description: Verbesserungen am MAS werden dem User via generic-init PUSH_IMPROVEMENTS available gemacht
        details:
        - NACH JEDEM FULL_IMPROVEMENT oder REVIEW: null
        - '  → PRUEFE: user_workspace = {workspace} (aus Aufruf-Parametern, nicht .mas-mode)'
        - '  → WENN user_workspace existiert + {workspace}/00-GUIDELINES.md existiert + generic-init installiert:'
        - '    → delegate(sub_mas-generic-init, task=PUSH_IMPROVEMENTS)'
        - '    → Kopiere: BP-CHECKLIST.md, template/agent_template.yaml, rules/regeln.yaml'
        - '    → ZEIGE: ''✅ Verbesserungen in {user_project} available'''
        - '  → WENN kein user_project: LOG in changes.json'
      r19_pfad_hierarchie:
        level: extrem
        description: Harte Pfad-Trennung — NUR installierte Tools execute (NIE Source)
        details:
        - MAS_TOOLS_DIR = {pfade.mas.tools_install} (NUR dieser Pfad für Tool-Execution)
        - SOURCE_TOOLS_DIR = {pfade.mas.source_dir}/tools/ (NUR zum Entwickeln/Bauen — NIE execute)
        - 'JEDER Tool-Aufruf: python3 {MAS_TOOLS_DIR}/dev_foo.py'
        - Source-Tools (mas-engineer/tools/) sind AUSSCHLIESSLICH für dev_build.sh / dev_install.sh
        - 'Beim Start: dev_rule_checker.py --check R19 blockiert Source-Tool-Aufrufe'
        ausnahmen:
        - 'dev_build.sh: DARF Source lesen (Bauzweck)'
        - 'dev_install.sh: DARF Source lesen (Installationszweck)'
        enforcement:
        - 'vor jedem shell(): Check ob command ''mas-engineer/tools/'' enthält → BLOCKED mit ''❌ R19: Source-Pfad! Nutze $MAS_TOOLS_DIR'''
        - 'vor jedem delegate(): Add MAS_TOOLS_DIR als Konstante bei'
        - dev_rule_checker.py --check R19 prüft alle Tool-Aufrufe
      r20_write_entzug:
        level: extrem
        description: Engineer hat write/edit/shell-ENTZUG — delegiert an action-executor via gatekeeper
        details:
        - JEDE write/edit/shell → delegate(sub_mas-action-executor, ...)
        - DIREKTE write()/edit()/shell() = CRITICAL → .disziplin_lock → MAS friert ein
        - ALLE write/edit/shell-Aufrufe MUSSEN via dev_gatekeeper.py laufen
        enforcement:
        - dev_gatekeeper.py prüft R20 vor jeder Aktion
        - pre-commit blockiert bei R20-Verstössen
      r21_audit_pflicht:
        level: extrem
        description: JEDE Aktion wird in .state/audit.log.jsonl protokolliert (JSON-Lines)
        details:
        - 'Pflichtfelder: ts, aktion, agent, ziel, status, regel'
        - BLOCKED/CRITICAL-Einträge blockieren pre-commit
        - dev_audit.py --status zeigt aktuellen Zustand
        - dev_audit.py --violations zeigt letzte Verstösse
        enforcement:
        - dev_gatekeeper.py schreibt bei JEDER Aktion
      r22_responsibility_matrix:
        level: extrem
        description: RESPONSIBILITY-MATRIX — Jede Aktion hat einen zuständigen Sub-Agenten
        details:
        - 'QUELLE: .state/rules/responsibility_matrix.yaml'
        - 'VOR jeder shell/write/edit: Check action_map + file_map in der Matrix'
        - 'WENN Eintrag existiert: delegate(agent, task=...)'
        - 'WENN agent==null UND in read_exceptions: selbst execute (erlaubt)'
        - 'WENN kein Eintrag: BLOCK + "Kein Sub-Agent für diese Aktion"'
        - R18 wird durch Matrix automatisch eingehalten
        - pre-commit ruft dev_audit.py --check auf
      _dedup_hinweis:
        level: normal
        description: 'REGEL-QUELLEN: regeln_5_extrem.yaml (R01-R10), regeln_4_stark.yaml (R06), harte_regeln.yaml (R01-R10+R18), workflows.yaml (R12-R21). Duplikate werden via IDs entdupliziert.'
      verbote:
      - general-improver.yaml editieren
      - Framework-Komponenten importieren
      - Framework-Konzepte als MAS-Konzepte bezeichnen
      - Niemals aufgeben — immer Alternative suchen (Retry Stufen 1-4)
      - Immer Backup vor Aenderungen
      - Immer YAML validieren nach Edit
      - Selbst shell/write/edit ohne vorherige delegate()-Prüfung (R18)
      verstoesse:
        level: extrem
        description: VERSTOSS = SCHWERER FEHLER — ROLLBACK ERZWINGEN
    enforcement:
      methode_5_reaktivierung:
        alle: 5 schritte
        ausfuehren: bash tools/dev_rule_refresh.sh
        schritt_counter: schritt_counter
        bei_counter_5: schritt_counter = 0
      methode_6_propagation:
        bei: delegate
        ausfuehren: python3 tools/dev_haerte_propagation.py {agent_name}
        output: in agent_intake.haerte_regeln einfuegen
      methode_9_regeltest:
        vor: write/edit/shell
        ausfuehren: python3 tools/dev_rule_checker.py --all --action {aktion}
        bei_exit_0: Aktion freigegeben
        bei_exit_1: AKTION BLOCKIERT → User informieren + WARTEN
        bestaetigung_gueltig: 5 Minuten (.state/.last_bestaetigung)
      methode_10_multiprompt:
        nutze: prompt_1 + prompt_2 + prompt_3
      methode_1_multiplikator:
        optional: true
        beschreibung: 5⛔ = 5× Gewicht
      methode_15_architektur_check:
        vor: write/edit/shell auf ARCHITEKTUR_DATEIEN
        ausfuehren: python3 tools/dev_architecture_checker.py --action "{aktion}" --file "{datei}"
        bei_exit_0: Keine Architektur-Change – freigegeben
        bei_exit_1: ARCHITEKTUR-ÄNDERUNG ERKANNT → ZEIGE User → WARTE auf ✅
        hinweis: User muss bei Architektur-Change explizit zustimmen (R15)
      methode_18_pre_delegate:
        vor: shell/write/edit
        ausfuehren: python3 tools/dev_rule_checker.py --check R18 --action {aktion}
        bei_exit_0: Kein Sub-Agent für diesen Task – freigegeben
        bei_exit_1: SUB-AGENT VORHANDEN → delegiere() statt selbst machen
        beschreibung: Checks vor jeder Aktion ob ein passender Sub-Agent existiert (R18)
      session_cleanup:
        bei: JEDER NEUEN SESSION
        ausfuehren: bash tools/dev_session_cleanup.sh --exec
    recovery:
      5_stufen:
        immune:
          befehl: recovery --immune
          workflow: wf_recovery_immune
          sub_agent: sub_mas-recovery-immune
        checkpoint:
          befehl: recovery --checkpoint
          workflow: wf_recovery_checkpoint
          sub_agent: sub_mas-recovery-checkpoint
          subbefehle:
          - recovery --list → wf_recovery_checkpoint_list
          - recovery --restore <id> → wf_recovery_checkpoint_restore
          - recovery --diff <a>..<b> → wf_recovery_checkpoint_diff
        safezone:
          befehl: recovery --safezone
          workflow: wf_recovery_safezone
          sub_agent: sub_mas-recovery-safezone
          subbefehle:
          - recovery --merge → wf_recovery_safezone_merge
          - recovery --abort → wf_recovery_safezone_abort
        timeline:
          befehl: recovery --timeline
          workflow: wf_recovery_timeline
          sub_agent: sub_mas-recovery-timeline
          subbefehle:
          - recovery --restore-best → wf_recovery_timeline_restore
          - recovery --analyze → wf_recovery_timeline_analyze
        defib:
          befehl: recovery --defib
          workflow: wf_recovery_defib
          sub_agent: sub_mas-recovery-defib
          subbefehle:
          - recovery --diagnose → wf_recovery_defib_diagnose
          - recovery --resurrect → wf_recovery_defib_resurrect
    sub_agents:
      analyse:
      - sub_mas-framework-knowledge
      - sub_mas-framework-scanner
      - sub_mas-prompt-engineer
      - sub_mas-config-auditor
      - sub_mas-session-analyst
      - sub_mas-goose-expert
      - sub_mas-system-knowledge
      recovery:
      - sub_mas-recovery-checkpoint
      - sub_mas-recovery-defib
      - sub_mas-recovery-immune
      - sub_mas-recovery-safezone
      - sub_mas-recovery-timeline
      - sub_mas-migration-helper
      monitoring:
      - sub_mas-agent-guardian
      - sub_mas-monitor-health
      - sub_mas-monitor-recovery
      - sub_mas-monitor-runtime
      - sub_mas-monitor-session
      - sub_mas-mas-controller
      - sub_mas-health-reporter
      verwaltung:
      - sub_mas-goose-admin
      - sub_mas-goose-expert
      - sub_mas-recipe-manager
      - sub_mas-yaml-editor
      - sub_mas-worktree-manager
      - sub_mas-verification-runner
      - sub_mas-summarizer
      - sub_mas-interpreter
      generierung:
      - sub_mas-doc-generator
      - sub_mas-signal-generator
      - sub_mas-degradation-handler
      - sub_mas-dashboard-refresh
      workflow:
      - sub_mas-workflow-engine
      intention:
      - sub_mas-intention-parser
      improvement:
      - sub_mas-general-improver
      - sub_mas-generic-init
      - sub_mas-master-constitution
      - sub_mas-test-runner
      - sub_mas-im-session-reader
      - sub_mas-im-rank
      git:
      - sub_mas-git-operator
      python:
      - sub_mas-python-repair
      doku:
      - sub_mas-doc-writer
      json:
      - sub_mas-json-utility
      design:
      - sub_mas-recipe-designer
    tier_system:
      fast:
        beschreibung: Kurze Analyse (<5K Tokens)
        agents:
        - session-analyst
      balanced:
        beschreibung: Normale Aufgaben (5-20K)
        agents:
        - config-auditor
        - agent-guardian
      powerful:
        beschreibung: Komplexe Analyse (20-50K)
        agents:
        - test-runner
        - prompt-engineer
      reasoning:
        beschreibung: Deep-Dive (>50K)
        agents:
        - general-improver
        - framework-scanner
      code:
        beschreibung: Code-Generierung (>100K)
        agents:
        - yaml-editor
    token_budgets:
      session_analyst: 30000
      gesamt_session: 1000000
      warnung_bei: 80
      general_improver: 50000
    signals:
      typen:
      - signal: CP_DONE
        nach: checkpoint
        via: sub_mas-signal-generator
      - signal: ERROR
        bei: fehler
        via: sub_mas-signal-generator
      - signal: SESSION_END
        am: session-ende
        via: sub_mas-signal-generator
workflow_defaults:
  timeout: 120
  on_error: abort
  retry:
    max_retries: 0
    checks: []
    on_failure: ''
  tier: balanced
  log_result: true
  response:
    json_schema:
      type: object
      properties:
        signal:
          type: string
          enum:
          - 🟢 DONE
          - 🟡 PARTIAL
          - 🟣 HANDOVER
          - 🔴 ERROR
        request_id:
          type: string
        from:
          type: string
        to:
          type: string
        status:
          type: string
          enum:
          - success
          - error
          - timeout
          - partial
      required:
      - signal
      - request_id
      - status
agents:
  _schema: v2.0.0 — task_workflows mappt agent-task → workflow-name
  _hinweis: Agenten-Workflow-Mapping. Aenderungen via intention-parser.
  framework-knowledge:
    tier: balanced
    token_budget: 30000
    task_workflows:
      DISCOVER: wf_fw_discover
