best_practices:
  prompt:
  - check: contains
    id: FW-P-001
    rule: prompt enthaelt tier-Markierung (standard/fast/deep)
    severity: kritisch
    values:
    - (standard)
    - (fast)
    - (deep)
  - check: prompt_length
    id: FW-P-002
    max: 800
    rule: prompt <= 800 Zeichen (nicht 2000+)
    severity: wichtig
  settings:
  - check: range
    id: FW-S-001
    max: 600
    min: 300
    path: settings.timeout
    rule: timeout 300-600 (nicht >900)
    severity: wichtig
  - check: yaml_lte
    id: FW-S-002
    max: 50
    path: settings.max_steps
    rule: max_steps <= 50 (keine Schleifen)
    severity: kritisch
  - check: range
    id: FW-S-003
    max: 120
    min: 60
    path: settings.timeout
    rule: core-Agenten timeout 60-120 (schneller Start)
    severity: kritisch
  structure:
  - check: contains_all
    id: FW-ST-001
    rule: instructions hat Input-Block (signal, request_id, from, to)
    severity: kritisch
    values:
    - 'signal:'
    - 'request_id:'
    - 'from:'
    - 'to:'
  - check: file_refs_exist
    extensions:
    - .md
    - .yaml
    id: FW-ST-002
    rule: instructions referenziert nur existierende Dateien
    severity: kritisch
  - check: contains
    id: FW-ST-003
    rule: instructions hat Constitution-Referenz
    severity: wichtig
    values:
    - constitution
  tests:
  - check: test_exists
    id: FW-T-001
    prefix: ''
    rule: Agent hat pytest in tests/
    severity: wichtig
