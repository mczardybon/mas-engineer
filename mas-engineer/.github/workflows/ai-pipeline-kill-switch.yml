# =============================================================================
#  HARD-KILL: Any workflow run triggered by GitHub Copilot (Cloud) is
#  terminated immediately at the very first step, before any checkout,
#  install, or build is performed.
#
#  This workflow is intentionally minimal: it does no work, and exists only
#  to ensure that whenever GitHub Copilot attempts to run a pipeline, the
#  run ends with a clear "blocked" status.
#
#  Scope: ONLY GitHub Copilot. Other AI tools/agents are not affected.
# =============================================================================

name: 🛑 Hard-Stop GitHub Copilot Pipeline Attempts

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:
  repository_dispatch:
    types: ["*"]
  workflow_call:
  workflow_run:
    workflows: ["*"]
    types: [requested]

# Lock down permissions completely. This workflow must not be able to do
# anything — including reading repository contents.
permissions: {}

concurrency:
  group: block-copilot-pipelines
  cancel-in-progress: true

jobs:
  stop:
    name: Stop pipeline
    runs-on: ubuntu-latest
    if: github.actor != 'mczardybon'
    steps:
      - name: Detect GitHub Copilot
        env:
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          echo "============================================================"
          echo "  Hard-Stop guard — reviewing pipeline attempt"
          echo "============================================================"
          echo "  Actor:         $ACTOR"
          echo "  Triggered by:  $TRIGGERING_ACTOR"
          echo ""

          # ONLY GitHub Copilot (Cloud) is detected. Nothing else.
          if echo "$ACTOR $TRIGGERING_ACTOR" | grep -qiE '^(copilot|copilot-swe-agent|copilot-pull-request-reviewer|github-copilot|copilot-chat)([[:space:]]|$)'; then
            echo "  ⛔ GitHub Copilot detected. Aborting pipeline."
            echo "  ⛔ This repository is closed to GitHub Copilot pipelines."
            echo "  ⛔ See: docs/lessons-learned.md L08"
            exit 1
          fi

          echo "  ✅ No GitHub Copilot detected. Allowing run to continue."
