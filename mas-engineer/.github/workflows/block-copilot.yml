# =============================================================================
#  BLOCK GITHUB COPILOT (and all other AI coding agents) FROM TRIGGERING
#  CI/CD WORKFLOWS ON THIS REPOSITORY.
#
#  Why: On 2026-07-14, after a legitimate push, GitHub Copilot attempted to
#  start a pipeline run on this repo. The user (mczardybon) explicitly
#  forbade this: "der GitHub Copilot soll nicht an dem repo machen".
#
#  This file does NOT define a pipeline to run. It exists purely as a
#  declarative guard that cancels any AI-triggered workflow run before it
#  can execute any step.
# =============================================================================

name: 🚫 Block AI Coding Agents (Copilot, etc.)

on:
  # Trigger on EVERY workflow run, regardless of who started it.
  workflow_run:
    workflows: ["*"]
    types: [requested, in_progress, completed]
  # Also fire when a workflow is queued/started, so we can cancel early.
  workflow_dispatch:

# No permissions — this workflow must not be able to do anything.
permissions: {}

jobs:
  block-ai-agents:
    name: Cancel runs started by AI coding agents
    runs-on: ubuntu-latest
    # This guard only watches; it never produces artifacts or modifies state.
    steps:
      - name: Log and cancel AI-triggered runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          echo "============================================================"
          echo "  AI-Agent Guard — reviewing workflow run"
          echo "============================================================"
          echo "Repository:    $REPO"
          echo "Actor:         $ACTOR"
          echo "Triggered by:  $TRIGGERING_ACTOR"
          echo "Run ID:        $RUN_ID"

          # -------------------------------------------------------------------------
          # 1. The set of identities that are NOT allowed to start a pipeline.
          # -------------------------------------------------------------------------
          FORBIDDEN_ACTORS=(
            "copilot"
            "copilot-swe-agent"
            "copilot-pull-request-reviewer"
            "github-actions[bot]"
          )

          IS_FORBIDDEN=0
          for forbidden in "${FORBIDDEN_ACTORS[@]}"; do
            if [[ "$ACTOR" == *"$forbidden"* ]] || [[ "$TRIGGERING_ACTOR" == *"$forbidden"* ]]; then
              IS_FORBIDDEN=1
              echo "  ⛔ FORBIDDEN actor detected: $forbidden"
              break
            fi
          done

          # -------------------------------------------------------------------------
          # 2. If the actor is forbidden, cancel the run and exit.
          # -------------------------------------------------------------------------
          if [[ $IS_FORBIDDEN -eq 1 ]]; then
            echo "  ⛔ CANCELLING workflow run $RUN_ID started by $TRIGGERING_ACTOR"
            gh run cancel "$RUN_ID" --repo "$REPO" || true
            echo "  ⛔ CANCELLED — pipeline is NOT allowed on this repo."
            exit 0
          fi

          echo "  ✅ Actor $ACTOR is allowed — no action taken."

      - name: Sentinel — workflow intentionally has no other steps
        run: |
          echo "  This workflow has no build/test/deploy steps."
          echo "  Its only purpose is to guard against AI coding agents."
          echo "  See: docs/lessons-learned.md L08"
