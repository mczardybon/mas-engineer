# =============================================================================
#  BLOCK GITHUB COPILOT (Cloud) FROM TRIGGERING CI/CD WORKFLOWS ON THIS REPO.
#
#  Why: On 2026-07-14, after a legitimate push, GitHub Copilot in the cloud
#  attempted to start a pipeline run on this repo. The user (mczardybon)
#  explicitly forbade this: "der GitHub Copilot soll nicht an dem repo machen".
#  Other AI tools/agents are NOT in scope — only GitHub Copilot Cloud.
# =============================================================================

name: 🚫 Block GitHub Copilot (Cloud)

on:
  # Trigger on EVERY workflow run, regardless of who started it.
  workflow_run:
    workflows: ["*"]
    types: [requested, in_progress, completed]
  # Also fire when a workflow is queued/started, so we can cancel early.
  workflow_dispatch:

# No permissions — this workflow must not be able to do anything.
permissions: {}

jobs:
  block-copilot:
    name: Cancel runs started by GitHub Copilot
    runs-on: ubuntu-latest
    steps:
      - name: Log and cancel Copilot-triggered runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          echo "============================================================"
          echo "  GitHub Copilot (Cloud) guard — reviewing workflow run"
          echo "============================================================"
          echo "Repository:    $REPO"
          echo "Actor:         $ACTOR"
          echo "Triggered by:  $TRIGGERING_ACTOR"
          echo "Run ID:        $RUN_ID"

          # ONLY GitHub Copilot (Cloud) is blocked. Nothing else.
          FORBIDDEN_ACTORS=(
            "copilot"
            "copilot-swe-agent"
            "copilot-pull-request-reviewer"
            "github-copilot"
            "copilot-chat"
          )

          IS_FORBIDDEN=0
          for forbidden in "${FORBIDDEN_ACTORS[@]}"; do
            if [[ "$ACTOR" == *"$forbidden"* ]] || [[ "$TRIGGERING_ACTOR" == *"$forbidden"* ]]; then
              IS_FORBIDDEN=1
              echo "  ⛔ FORBIDDEN actor detected: $forbidden"
              break
            fi
          done

          if [[ $IS_FORBIDDEN -eq 1 ]]; then
            echo "  ⛔ CANCELLING workflow run $RUN_ID started by $TRIGGERING_ACTOR"
            gh run cancel "$RUN_ID" --repo "$REPO" || true
            echo "  ⛔ CANCELLED — GitHub Copilot is not allowed on this repo."
            exit 0
          fi

          echo "  ✅ Actor $ACTOR is allowed — no action taken."

      - name: Sentinel — workflow intentionally has no other steps
        run: |
          echo "  This workflow has no build/test/deploy steps."
          echo "  Its only purpose is to guard against GitHub Copilot (Cloud)."
          echo "  See: docs/lessons-learned.md L08"
