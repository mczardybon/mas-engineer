name: e2e-verify-phoenix-fixes
version: 1.0.0
title: ✓ E2E-VERIFY-PHOENIX-FIXES — delegator
description: |
  v1.0.0 | Thin delegator that routes to sub_mas-e2e-phoenix-fixes-director.
  The director orchestrates verification of 8 phoenix-recovery fixes from commit 4ebd18e.

instructions: |
  # E2E Verify Phoenix Fixes — Delegator

  This is a thin delegator. Delegate all work to sub_mas-e2e-phoenix-fixes-director.

  ## Delegation
  1. Load sub_mas-e2e-phoenix-fixes-director
  2. The director will run all 7 tests and write the report
  3. Report results back

prompt: |
  ⛔ I am e2e-verify-phoenix-fixes (v1.0.0) | MODE-CHECK: mas-engineer | ✓ E2E-VERIFY-PHOENIX-FIXES — delegator (v1.0.0)
  ⛔ ONLY delegation — no direct tests.
  → Delegate to sub_mas-e2e-phoenix-fixes-director and report results.

sub_recipes:
  - name: sub_mas-e2e-phoenix-fixes-director
    path: ./sub_mas-e2e-phoenix-fixes-director.yaml
    description: Orchestrates e2e verification of 8 phoenix-recovery fixes

settings:
  timeout: 300
  max_steps: 50
  temperature: 0.3

extensions:
  - type: platform
    name: summon
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true
