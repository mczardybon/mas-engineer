  NO YAML-Save without vorherige Syntax-Check.'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
extensions:
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
