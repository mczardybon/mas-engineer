name: MAS Migration Helper
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🔄 SUB-MAS-MIGRATION-HELPER — Framework Migration (Sub-Agent)
description: 'v1.0.0 | MAS-internal: Analyzes breaking changes between framework versions,
  generates migration plan'
instructions: '# Extended instructions: recipe/instructions/sub_mas-migration-helper.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-migration-helper.md`

  '
