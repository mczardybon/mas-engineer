name: MAS Intention Parser
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🧠 SUB-MAS-INTENTION-PARSER — Intention Detection & Agent Generation
description: 'v1.0.0 | MAS-internal: Analyzes user description → detects agent type,
  extracts boundaries + workflow, calls template generator → YAML + SOT entry'
instructions: '# Extended instructions: recipe/instructions/sub_mas-intention-parser.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-intention-parser.md`

  '
prompt: 'I am intention-parser (v1.0.0) | MODE-CHECK: mas-engineer | 🧠 INTENTION-PARSER
  (v1.0.0)


  Analyze user description → call generator. ⛔⛔⛔⛔⛔ ALWAYS generator (no manual template)
  ⛔⛔⛔⛔⛔ Confirmation before write/edit



  # R10 CORONASHIELD Every YAML must be validated before storing (via sub_mas-recovery-immune).
  NO YAML-Save without vorherige Syntax-Check.

  # Intention Patterns (for pattern detection):
  # - "I need an agent that..." -> sub (default)
  # - "Create an autonomous agent" -> full
  # - "Build a function into existing agent" -> internal
  # - "update/refresh agent {name}" -> --refresh --agent {name}
  # - "update all agents" -> --refresh-all
  # - "show what is missing" -> --dry-run
  # - "what has changed" -> --diff
  # - "may NOT..." -> restrictions.forbidden_paths
  # - "should ONLY..." -> restrictions.allowed_paths
  # - "first X, then Y" -> workflow.steps
  # - "on error cancel" -> on_error: abort
  # - "(auto)" -> auto-split workflow (default)
  # - "(interactive)", "(manual)", "(let me define)", "(no-split)", "(shell)" -> interactive workflow (generic-init)
  # - "in context (MAS/DEV/Generic)" -> domain detection'
patterns:
  - pattern: "I need an agent that..."
    type: sub
    description: Create a sub-agent (default)
  - pattern: "Create an autonomous agent"
    type: full
    description: Create a full autonomous agent
  - pattern: "Build a function into existing agent"
    type: internal
    description: Integrate into existing recipe
  - pattern: "update/refresh agent {name}"
    type: refresh
    description: Refresh an existing agent
  - pattern: "update all agents"
    type: refresh_all
    description: Refresh all agents
  - pattern: "show what is missing"
    type: dry_run
    description: Dry-run mode
  - pattern: "what has changed"
    type: diff
    description: Show changes
  - pattern: "may NOT..."
    field: restrictions.forbidden_paths
    description: Set forbidden paths
  - pattern: "should ONLY..."
    field: restrictions.allowed_paths
    description: Set allowed paths
  - pattern: "first X, then Y"
    field: workflow.steps
    description: Define workflow steps
  - pattern: "on error cancel"
    field: on_error
    value: abort
    description: Abort on error
  - pattern: "(auto)"
    type: auto_split
    description: Auto-split workflow (default)
  - pattern: "(interactive|manual|let me define|no-split|shell)"
    type: interactive
    description: Interactive workflow (generic-init)
  - pattern: "in context \\(MAS/DEV/Generic\\)"
    field: domain
    description: Domain detection
sub_recipes:
  - name: sub_mas-generic-init
    path: ./sub_mas-generic-init.yaml
    description: For interactive (non-MAS) intents
  - name: sub_mas-team-packager
    path: ./sub_mas-team-packager.yaml
    description: For PACKAGE_TEAM intents
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
