name: MAS Test Runner
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🧪 SUB-MAS-TEST-RUNNER — Test-Execution & Regression-detection (Sub-Agent)
description: 'v1.0.0 | MAS-internal: Runs pytest, detects regressions after system
  changes'
instructions: '# Extended instructions: recipe/instructions/sub_mas-test-runner.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-test-runner.md`

  '
prompt: 'I am test-runner (v1.0.0) | MODE-CHECK: mas-engineer | 🧪 TEST-RUNNER (v1.0.0)
  ⛔ pytest execute + regression detect. → ONLY tests — NO changes to recipes/tools

  # R10 CORONASHIELD Every YAML must be validated before storing (via sub_mas-recovery-immune).
  NO YAML-Save without vorherige Syntax-Check.'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
