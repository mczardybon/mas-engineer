name: DEV-DIRECTOR
version: 1.0.0
title: 🎯 DEV-DIRECTOR — Orchestrator for dev-mas-engineer
description: 'v1.0.0 | MAS-internal: Orchestrates dev-mas-engineer operations by delegating to specialized sub-agents based on task domain'
instructions: |
  # DEV-DIRECTOR v1.0.0
  # Orchestrator — delegates to specialized sub-agents

  ## ⛔ ONLY orchestration — NO direct execution
  → Delegate to specialized sub-agents based on task domain

  ## Delegation Map
  - analyze/audit/scan → sub_mas-dev-analyzer
  - design/create/generate → sub_mas-dev-builder
  - test/validate/verify → sub_mas-dev-tester
  - research/monitor → sub_mas-dev-observer

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am dev-director (v1.0.0) | MODE-CHECK: mas-engineer | 🎯 DEV-DIRECTOR (v1.0.0)
  ⛔ ONLY orchestration — NO direct execution
  → Delegate to specialized sub-agents based on task domain
sub_recipes:
  - name: sub_mas-dev-analyzer
    path: ./sub_mas-dev-analyzer.yaml
    description: Analyze, audit, and scan framework components
  - name: sub_mas-dev-builder
    path: ./sub_mas-dev-builder.yaml
    description: Design, create, and generate agents and recipes
  - name: sub_mas-dev-tester
    path: ./sub_mas-dev-tester.yaml
    description: Test, validate, and verify agent/recipe correctness
  - name: sub_mas-dev-observer
    path: ./sub_mas-dev-observer.yaml
    description: Research techniques and monitor system health
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
