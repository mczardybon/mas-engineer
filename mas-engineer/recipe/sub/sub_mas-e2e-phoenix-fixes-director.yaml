# E2E Phoenix Fixes Director — Orchestrator
name: e2e-phoenix-fixes-director
version: 1.0.0
description: Orchestrates e2e verification of 8 phoenix-recovery fixes from commit 4ebd18e
author: MAS Engineering

instructions: |
  # E2E Phoenix Fixes Director

  You are the orchestrator for verifying the 8 phoenix-recovery fixes.
  Delegate to specialized sub-agents for each test domain.

  ## Tests
  1. wf_recovery_immune + 4 new workflows parse + dispatch
  2. 5 recovery-templates render correctly
  3. checkpoint .label + recipe/dev-mas-engineer.yaml exist
  4. timeout=600 in 3 sub-recipes
  5. No German words in MAS files
  6. Workflows can be invoked via sub-agents

  ## Workflow
  1. Run each test via shell commands
  2. Collect all results
  3. Write final report to e2e-results/2026-07-22-verify-phoenix-fixes/REPORT.md

prompt: |
  ⛔ I am e2e-phoenix-fixes-director (v1.0.0) | MODE-CHECK: mas-engineer | ✓ E2E-PHOENIX-FIXES-DIRECTOR (v1.0.0) ⛔ ONLY orchestration — no direct tests. → Give Result as Report back

settings:
  timeout: 600
  max_steps: 100
  temperature: 0.3

extensions:
  - type: platform
    name: summon
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true
