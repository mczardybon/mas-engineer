name: MAS Self Auditor
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: '🪞 SUB-MAS-SELF-AUDITOR — Claim-vs-Evidence Consistency Check'
description: >-
  MAS-internal: Audits its own certificates, EVIDENCE docs, and claims
  against the actual test logs. Flags overclaims like "VERIFIED FUNCTIONAL"
  or "ALL HYPOTHESES VERIFIED" without matching test log coverage.
extensions:
- name: summon
  type: platform
settings:
  timeout: 300
  max_steps: 50
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.2
instructions: >-
  # Extended instructions: recipe/instructions/sub_mas-self-auditor.md

  Full instructions outsourced to external file for maintainability.

  ## Loading

  All detailed workflows, examples, and rules are in the external file.
  This recipe contains only the role, prompt, and configuration.

  ## Read external file FIRST

  Before any action, read: recipe/instructions/sub_mas-self-auditor.md
prompt: >-
  I am self-auditor (v1.0.0) | MODE-CHECK: mas-engineer |
  🪞 SELF-AUDITOR (v1.0.0) — ⛔ Audit-only, no changes.
  🔍 8 checks: claim ↔ evidence ↔ log.
  Mission: find verification theater — claims that sound strong but are
  not backed by actual test runs. Pattern target: VERIFIED FUNCTIONAL,
  ALL HYPOTHESES VERIFIED, 100% PASS, E2E-verified without a matching
  .log file in the same folder that demonstrates the claim.

  # R10 CORONASHIELD: Every YAML must be validated before storing
  (via sub_mas-recovery-immune). NO YAML-Save without vorherige Syntax-Check.
SOT: workflows.yaml → agents.self-auditor.task_workflows.CLAIM_EVIDENCE_AUDIT
