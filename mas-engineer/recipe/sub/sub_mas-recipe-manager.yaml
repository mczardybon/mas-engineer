instructions: "# sub_mas-recipe-manager вЂ” \U0001F4E6 Recipe Management\n\nв•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—\n\
  в•‘  SOT WORKFLOW CONTROL                       в•‘\nв•‘  в†’ workflows.yaml в†’ agents.recipe-manager\
  \  в•‘\nв•‘     .task_workflows.INSTALL                в•‘\nв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ\n\
  \nMAS-Engineer-internal. Wrapper around dev_recipe_manager.py with actual/should\
  \ comparison.\n\n## Input (from MAS-Engineer)\n```yaml\nrecipe_intake:\n  signal:\
  \ \"\U0001F7E3 HANDOVER\"\n  request_id: string\n  from: \"dev-mas-engineer\"\n\
  \  to: \"sub_mas-recipe-manager\"\n  task: \"INSTALL|UNINSTALL|LIST|CLEANUP\"\n\
  \  tools_dir: \"$HOME/.config/goose/recipes/mas-engineer-tools\"\n  spec: \"MAS-Sub-agents\"\
  \  # minimal|core|MAS-Sub-agents|sub-agents|all|<name>\n```\n\n## Procedure INSTALL\n\
  1. BEFORE: python3 {tools_dir}/dev_recipe_manager.py --list\n2. python3 {tools_dir}/dev_recipe_manager.py\
  \ --install {spec}\n3. AFTER: python3 {tools_dir}/dev_recipe_manager.py --list\n\
  4. Calculate delta: what is new?\n\n## Procedure UNINSTALL\n1. python3 {tools_dir}/dev_recipe_manager.py\
  \ --uninstall {spec}\n2. Show result\n\n## Procedure LIST\n1. python3 {tools_dir}/dev_recipe_manager.py\
  \ --list\n2. Structure result\n\n## Output\n```yaml\nmas_result:\n  signal: \"\U0001F7E2\
  \ DONE\"\n  request_id: string\n  from: \"sub_mas-recipe-manager\"\n  to: \"dev-mas-engineer\"\
  \n  status: \"success\"\n  parsed:\n    task: \"INSTALL|UNINSTALL|LIST|CLEANUP\"\
  \n    spec: \"MAS-Sub-agents\"\n    before: (2 visible, 93 framework)\n    after:\
  \ {visible: 2, framework: 140}\n    delta: {installed: 47, updated: 0, skipped:\
  \ 0}\n```\n\nCONFIRMATION REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT for\
  \ NEVER without confirmation.\nMODE-DOMAIN COUPLING (R09) ONLY {target_workspace}\
  \ вЂ” NO domain overreach. Reading in other domain OK.\n\n# в›” ALL BOUNDARIES IN SOT:\
  \ cat workflows.yaml в†’ configs.mas-self.restrictions. dev_rule_checker.py enforces.\n"
