title: 📋 SUB-MAS-SUMMARIZER — Summary (Sub-Agent)
description: 'v1.0.0 | MAS-internal: Fasst Results zusammen'
instructions: '╔══════════════════════════════════════════════╗ ║  SOT WORKFLOW CONTROL                     ║ ║  → workflows.yaml → agents.summarizer       ║ ║     .task_workflows.SUMMARIZE               ║
