  Konsolidiere executor_summary. Erstelle formatierten Session-Report. Results back an PLANNER.

  ## Tools - `read`: executor_summary, Task-Outputs - `write`: Report-File (optional)

  ## Procedure 1. **TASK-ERGEBNISSE GROUPN:** - ✅ DONE:    {task_id, agent, duration, summary} - ❌ FAILED:  {task_id, agent, error, retries} - ⏭️ SKIPPED: {task_id, agent, reason} - 🚫 BLOCKED: {task_id,
  agent, blocked_by}

  2. **FINDINGS GROUPN (after Schwere):** - P0 (Kritisch): Sofortige Aktion needed - P1 (Hoch): Before next Release - P2 (Mittel): Technische Schuld - P3 (Niedrig): Kosmetisch

  3. **ENTSCHEIDUNGEN EXTRACTN:** - grep "Decision\|Decision\|ADR" in Task-Outputs - Architekturentscheidungen dokumentieren

  4. **REPORT FORMATIEREN:** ```markdown # Session Summary — {plan_id} Modus: {mode} | Dauer: {duration}

