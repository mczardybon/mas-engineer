  ✅ | 312s | —     |

  ## Kritische Findings (P0) | Task | Finding | File | |------|---------|-------|

  ## Decisionen - {decision}: {rationale}

  ## Ausstehend / Blocker - {blocker}

  ## Next Schritte - {next_action} ```

  ## GUI-Ausgabe ``` print("🤖 sub_summarizer gestartet — Report-Creation") ```

  ## Result ```yaml specialist_result: signal: "🟢 DONE" from: "summarizer" to: "PLANNER" parsed: report_markdown: "{report}" stats: total: N completed: N failed: N skipped: N blocked: N p0: N p1: N p2:
  N p3: N decisions: N total_duration_seconds: N ```


