name: MAS General Improver
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🤖 SUB-MAS-GENERAL-IMPROVER — Improvements-Pipeline Orchestrator (7 steps, 6
  sub-agents)
description: v3.0.0 | Orchestrates 6 specialized agents in 7 steps — ONLY entry point
  for the Improvement-System
extensions:
- name: summon
  type: platform
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
sub_recipes:
  - name: sub_mas-web-researcher
    path: ./sub_mas-web-researcher.yaml
    description: "Search goose-docs.ai and web (R18)"
  - name: sub_mas-im-session-reader
    path: ./sub_mas-im-session-reader.yaml
    description: "Read past session history (R-recursion-guard)"
  - name: sub_mas-im-finder
    path: ./sub_mas-im-finder.yaml
    description: "Stage 1 - detect findings in recipe/sub/"
  - name: sub_mas-im-rank
    path: ./sub_mas-im-rank.yaml
    description: "Stage 2 - rank findings by impact"
  - name: sub_mas-im-designer
    path: ./sub_mas-im-designer.yaml
    description: "Stage 3 - design patches for top findings"
  - name: sub_mas-im-validator
    path: ./sub_mas-im-validator.yaml
    description: "Stage 4 - validate patches against Goose rules"
  - name: sub_mas-yaml-editor
    path: ./sub_mas-yaml-editor.yaml
    description: "Apply YAML patches (R10 CORONASHIELD)"
  - name: sub_mas-self-auditor
    path: ./sub_mas-self-auditor.yaml
    description: "Self-audit before commit"
  - name: sub_mas-generic-init
    path: ./sub_mas-generic-init.yaml
    description: "Bootstrap new mas-engineer projects"
settings:
  timeout: 300
  max_steps: 50
  temperature: 0.3
  goose_provider: openai
  goose_model: deepseek-chat
instructions: '# Extended instructions: recipe/instructions/sub_mas-general-improver.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-general-improver.md`

  '
prompt: 'I am general-improver (v1.0.0) | MODE-CHECK: mas-engineer | RECURSION-OVERRIDE-AWARE: env RECURSION_OVERRIDE=1 → APPLY-ONLY mode (no 24h cooldown, no FIND/RANK/DESIGN). Self-improvement-loops stay blocked. | 🤖 GENERAL-IMPROVER
  (v3.0.0) 🔬 ONLY entry point for the Improvement-System. Orchestrates 6 specialized
  Agents in 7 stages. ⛔⛔⛔⛔⛔ ONLY orchestrate — change nothing itself. ⛔⛔⛔⛔⛔ NEVER
  edit general-improver.yaml (R04). ⛔⛔⛔⛔⛔ CONFIRMATION before each Change (R01). | RECURSION-GUARD v2: (A) FULL_IMPROVEMENT blocked if last < 24h; (B) APPLY-ONLY allowed when RECURSION_OVERRIDE=1 — READ validation.yaml, APPLY CONFORM patches via sub_mas-yaml-editor, LOG stage=apply_only. Cost limit blocks both tiers.'
SOT: workflows.yaml → configs.mas-self.restrictions (R01, R09, R10).
