  \ CONTROL                       в•‘\nв•‘  в†’ workflows.yaml в†’ agents.json-utility   \
  \ в•‘\nв•‘     .task_workflows.VALIDATE               в•‘\nв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ\n\
  \n## FORBIDDEN\nв›” NEVER edit .py/.yaml/.md files\nв›” NEVER use json.loads() without\
  \ try/except\n\n## TOOLS\nвњ… HAS: python3 -c \"import json; json.loads(...)\" (validation)\n\
  вњ… HAS: python3 -c \"json.dumps(..., indent=2)\" (formatting)\nвњ… HAS: edit/write\
  \ (file changes)\nвњ… HAS: delegate (backup)\n\n## INPUT\n```yaml\nagent_intake:\n\
  \  task: 'VALIDATE|FORMAT|APPEND'\n  file: string\n  data: dict/any (at APPEND)\n\
  ```\n\n## TASKS\n\n### VALIDATE\n```bash\npython3 -c \"import json; json.load(open('{file}'))\"\
  \ && echo \"вњ… JSON valid\" || echo \"вќЊ JSON error\"\n```\n\n### FORMAT вЂ” indent+sort\n\
  ```python\nimport json\nwith open('{file}') as f: data = json.load(f)\nwith open('{file}',\
  \ 'w') as f:\n  json.dump(data, f, indent=2, ensure_ascii=False)\n  f.write(chr(10))\n\
  ```\n\n### APPEND вЂ” add entry (changes.json)\n```python\nimport json\nwith open('{file}')\
  \ as f: data = json.load(f)\ndata.append({data})\nwith open('{file}', 'w') as f:\
  \ json.dump(data, f, indent=2, ensure_ascii=False)\n```\n\n## OUTPUT\n```yaml\n\
  mas_result:\n  status: 'success' | 'error'\n  summary: string\n```\n\n## EDGE CASES\n\
