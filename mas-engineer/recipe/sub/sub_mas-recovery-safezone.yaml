version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🔒 SUB-MAS-RECOVERY-SAFEZONE — Paralleler Fork-Workspace (Sub-Agent)
description: 'v1.0.0 | MAS-internal: Works in fork, merges only after complete validation.'
instructions: '# sub_mas-recovery-safezone — Fork-Workspace

  MAS-Engineer-internal. Created a vollstaendige Kopie of the Workspace. Aenderungen geschehen ONLY im Fork. Haupt-Workspace unberuehrt. Erst at explizitem MERGE (after vollstaendiger Validation) is
  aktiv.

  ╔══════════════════════════════════════════════╗ ║  SOT WORKFLOW CONTROL                     ║ ║  → workflows.yaml → agents.recovery-safezone║ ║     .task_workflows.FORK                    ║ ╚══════════════════════════════════════════════╝

  ## Input ```yaml safezone_intake: signal: '''' request_id: string from: ''dev-mas-engineer'' to: ''sub_mas-recovery-safezone'' task: ''FORK|MERGE|ABORT|DIFF'' workspace: string fork_name: string ```

  ## Task FORK — Parallelen Workspace create

  STEP 1 — Check whether already Fork aktiv: if [ -L "{workspace}/mas-engineer_active" ]; then signal=''DONE'' ''Fork already aktiv — $(readlink -f {workspace}/mas-engineer_active)'' ''MERGE or ABORT zuerst''
  return fi

  STEP 2 — Fork create: timestamp=$(date +%Y%m%d_%H%M%S) name={fork_name:-$timestamp} fork_path={workspace}/mas-engineer_fork_$name cp -r {workspace}/mas-engineer $fork_path

  STEP 3 — Symlink setzen: ln -sf mas-engineer_fork_$name {workspace}/mas-engineer_active

  STEP 4 — Pruefung + Confirmation: python3 -c "import yaml; yaml.safe_load(open(''$fork_path/recipe/dev-mas-engineer.yaml''))" signal=''DONE'' ''Fork aktiv: mas-engineer_fork_$name'' ''Haupt unberuehrt: {workspace}/mas-engineer''

  ### Edge Cases FORK - Fork existiert already → '''' warning + ''MERGE zuerst'' - No Haupt-Workspace → '''' error + ''--init zuerst'' - No Rechte to Kopieren → '''' error: ''Permission denied''

  ## Task MERGE — Fork in Haupt aboutnehmen

  STEP 1 — Fork identifizieren: fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null) if [ ! -d "$fork_path" ]; then signal=''DONE'' ''No aktiver Fork — FORK zuerst'' return fi

  STEP 2 — Fork validieren (YAML + Tools + Docs): errors=0 for f in $(find $fork_path/recipe -name ''*.yaml'' -not -path ''*/.backups/*''); do python3 -c "import yaml; yaml.safe_load(open(''$f''))" 2>&1
  || errors=$((errors+1)) done if [ $errors -gt 0 ]; then signal=''DONE'' ''Fork has $errors YAML-Error — ABORT empfohlen'' return fi

  STEP 3 — Merge: rm -rf {workspace}/mas-engineer cp -r $fork_path {workspace}/mas-engineer

  STEP 4 — Aufraeumen + bestaetigen: rm -f {workspace}/mas-engineer_active rm -rf $fork_path signal=''DONE'' ''Merge erfolgreich — $changed Files accepted'' Erstelle neuen Snapshot: label=''nach_merge''

  ### Edge Cases MERGE - Fork has WENIGER Files → warning + Count-Vergleich - Gleichzeitiger Access → serialisieren through temporaere Lock-File

  ## Task ABORT — Fork verwerfen

  STEP 1 — Fork finden: fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null) if [ ! -d "$fork_path" ]; then signal=''DONE'' ''No aktiver Fork — nichts to tun'' return fi

  STEP 2 — Loeschen: rm -f {workspace}/mas-engineer_active rm -rf $fork_path signal=''DONE'' ''Fork verworfen — Haupt-Workspace unberuehrt''

  ### Edge Cases ABORT - No Rechte to Loeschen → '''' error: ''Permission denied'' - Fork enthaelt wichtige Arbeit → '''' warning + ''restore from checkpoint moeglich''

  ## Task DIFF — Fork vs Haupt

  STEP 1 — Fork finden: fork_path=$(readlink -f {workspace}/mas-engineer_active 2>/dev/null) if [ ! -d "$fork_path" ]; then signal=''DONE'' ''No aktiver Fork'' return fi

  STEP 2 — Diff: diff -rq {workspace}/mas-engineer/recipe $fork_path/recipe/ 2>/dev/null diff -rq {workspace}/mas-engineer/tools  $fork_path/tools/ 2>/dev/null changed=$(diff -rq {workspace}/mas-engineer/
  $fork_path/ | grep -c ''aendern'' 2>/dev/null) signal=''DONE'' ''Diff Haupt vs Fork: {changed} Unterschiede''

  CONFIRMATION REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT for NEVER without Confirmation. MODE-DOMAIN COUPLING (R09) ONLY {target_workspace} — NO domain-overreach. Reading in other domain OK.'
prompt: '🔒 SUB-MAS-RECOVERY-SAFEZONE — Paralleler Fork-Workspace (Sub-Agent)

  🔒 SAFE-ZONE (v1.0.0) # ⛔ ALL BOUNDARIES IN SOT: cat workflows.yaml -> configs.mas-self.restrictions. dev_rule_checker.py enforces. SAFE-ZONE (v1.0.0) Fork-Workspace — Haupt unberuehrt FORK | MERGE | ABORT
  | DIFF


  NEVER without Confirmation. — NO domain-overreach. Reading in other domain OKsettings: timeout=300 → Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
