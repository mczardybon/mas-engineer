version: 1.0.0
title: 🔧 AGENT-NAME (v1.0.0)
description: Task description — BP-compliant sub-agent
prompt: '🔧 AGENT-NAME (v1.0.0)

  ⛔ ONLY {scope} — NO other actions

  → Return result as structured report


  # ⛔ AUTO-COMMIT (optional — remove # to activate):

  #

  # AFTER Change automatically execute:

  #   git add -A && git commsg -m "[{project}] {action}"

  #   checkpoint .state/checkpoints/{timestamp}/

  #   changes.json + todo__todoWwrite("{action}")

  #

  # Remove ALL "# " before this block to activate'
instructions: '# sub_mas-{name} — 🔧 {task}


  {task}


  ## Best Practices


  ### Version

  - version: 1.0.0 (BP-ST-001)

  - title with Emoji + (v1.0.0) (BP-P-001)


  ### Prompt (BP-P-002)

  - ≤500 characters

  - Identity (Emoji + Name + Version)

  - ⛔-Boundary (ONLY-Scope)

  - Output-Format (→ Return)


  ### Settings (BP-S-001, BP-S-002)

  - timeout: 600 (Sweet Spot)

  - max_steps: 100 (Sweet Spot)


  ### No Recursion (BP-SI-001)

  - NEVER edit general-improver.yaml

  - NEVER empty instructions


  ### Paths (BP-T-001)

  - NO hardcoded paths (/home/...)

  - Use {workspace} + {tools_dir}


  ## Input (from MAS-Engineer)


  The MAS-Engineer passes these parameters via delegate():

  - signal: HANDOVER

  - request_id: string (UUID)

  - from: dev-mas-engineer

  - to: sub_mas-{name}

  - task: TASK_NAME

  - workspace: Path to Workspace


  ## Output

  - signal: DONE

  - request_id: UUID (from Input)

  - from: sub_mas-{name}

  - to: dev-mas-engineer

  - status: success | error | timeout


  ## STEPS

  1. Read Input

  2. Load Best Practices (if available)

  3. Execute task

  4. Return result as structured report


  ⛔ ONLY {scope}

  ⛔ NO Recursion

  ⛔ NO changes to other files

  ⛔ NO hardcoded paths'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
