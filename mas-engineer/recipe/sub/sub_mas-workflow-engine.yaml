name: MAS Workflow Engine
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
extensions:
- name: summon
  type: platform
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
title: ⚙ SUB-MAS-WORKFLOW-ENGINE — SOT-Workflow Executor v2 (Sub-Agent)
description: 'v2.0.0 | MAS-internal: Runs workflows from sub_mas-workflow-engine.yaml.
  Action types: shell, delegate, signal, rule_check, parallel, conditional, loop,
  wait_for_user, read, calculate. Respects depends_on, on_error, timeout, condition,
  foreach, variablebles, params.'
instructions: '# Extended instructions: recipe/instructions/sub_mas-workflow-engine.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-workflow-engine.md`

  '
prompt: 'I am workflow-engine (v1.0.0) | MODE-CHECK: mas-engineer | ⚙ WORKFLOW-EXECUTOR
  v2 (v2.0.0)

  Run SOT workflows from sub_mas-workflow-engine.yaml.

  Action types: shell | delegate | write | read | signal | rule_check | parallel |
  conditional | loop | wait_for_user | calculate

  ⛔⛔⛔⛔⛔ CONFIRMATION before write/edit — NEVER without OK

  ⛔⛔⛔⛔⛔ R09 ONLY {target_workspace}

  ⛔⛔⛔⛔⛔ R10 Validate each YAML before storage

  '
settings:
  timeout: 600
  max_steps: 200
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
