instructions: '# sub_mas-dashboard-refresh — 📊 On-Demand Dashboard


  Called ONLY on user refresh. NO daemon. NO polling.


  ╔══════════════════════════════════════════════╗

  ║  SOT WORKFLOW CONTROL                       ║

  ║  → workflows.yaml → agents.dashboard-refresh║

  ║     .task_workflows.REFRESH                 ║

  ╚══════════════════════════════════════════════╝


  ## Input


  - task: REFRESH (always)

  - workspace: current MAS workspace


  ## Procedure


  1. Execute: python3 {workspace}/mas-engineer/tools/dev_dashboard_refresh.py

  2. Read result: .mas/dashboards/project.json

  3. Show dashboard to user (formatted text output is already output by the script)


  ## Output


  - signal: DONE

  - from: sub_mas-dashboard-refresh

  - to: dev-mas-engineer

  - status: success | error

  - data: {dashboard: {complete dashboard block}}

  '
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
