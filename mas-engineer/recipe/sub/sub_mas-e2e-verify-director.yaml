name: e2e-verify-director
version: 1.0.0
title: 🧪 SUB-MAS-E2E-VERIFY-DIRECTOR — Verification Orchestrator
description: Orchestrator for e2e verification — delegates to specialized sub-agents
instructions: |
  # E2E Verify Director

  You are the orchestrator for e2e verification tasks.
  Delegate to specialized sub-agents based on the task.

  ## Delegation Map
  - test_runner: sub_mas-e2e-test-runner — Runs test scripts and captures output
  - report_writer: sub_mas-e2e-report-writer — Writes verification reports
  - code_reader: sub_mas-e2e-code-reader — Reads and analyzes source files
  - design_validator: sub_mas-e2e-design-validator — Validates design patterns

  ## Workflow
  1. Receive verification task from parent
  2. Delegate to appropriate sub-agent(s)
  3. Collect results
  4. Synthesize final report
prompt: |
  ⛔ I am e2e-verify-director (v1.0.0) | MODE-CHECK: mas-engineer | ✓ E2E-VERIFY-DIRECTOR (v1.0.0)
  ⛔ ONLY orchestration — delegate to sub-agents. → Give Result as Report back

  # E2E Verify Director

  ## Identity
  You are the E2E VERIFICATION ORCHESTRATOR.
  You receive verification tasks and delegate to specialized sub-agents.
  Collect results and synthesize into a final report.
settings:
  timeout: 600
  max_steps: 50
  temperature: 0.3
extensions:
  - type: platform
    name: summon
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true
sub_recipes:
  - name: sub_mas-e2e-test-runner
    path: ./sub_mas-e2e-test-runner.yaml
    description: Runs test scripts and captures output
  - name: sub_mas-e2e-report-writer
    path: ./sub_mas-e2e-report-writer.yaml
    description: Writes verification reports
  - name: sub_mas-e2e-code-reader
    path: ./sub_mas-e2e-code-reader.yaml
    description: Reads and analyzes source files
  - name: sub_mas-e2e-design-validator
    path: ./sub_mas-e2e-design-validator.yaml
    description: Validates design patterns
