name: sub_mas-im-session-reader
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
prompt: 📊 SESSION-READER (v1.0.0) Read Session-Database with 3-Levels-Filter. ⛔ ONLY read — no Changes.
description: 📊 Read session database & extract raw data (with 3-level project filter)
settings:
  timeout: 120
  max_steps: 25
  temperature: 0.3
  goose_provider: openai
  goose_model: gpt-4
instructions: "# sub_mas-im-session-reader — \U0001F4CA Session-Database read\nIs from sub_mas-general-improver Orchestrator aufgerufen.\nEinzige Task: Goose-Session-DB read and strukturierte Rohdaten\
  \ return.\n\nENTHLT 3-EDENEN-PROJEKTFILTER:\n  1. GOOSE_SESSION_TAG (exakt, from .goosehints) — empfohlen\n  2. working_dir (automatisch)\n  3. Fallback (last N not-MAS Sessions)\n\n  ╔══════════════════════════════════════════════╗\n\
  \  ║  SOT WORKFLOW CONTROL                     ║\n  ║  → workflows.yaml → agents.im-session-reader║\n  ║     .task_workflows.ANALYZE                 ║\n  ╚══════════════════════════════════════════════╝\n\
  \n  ## Input (from Pipeline-Orchestrator)\n- task: ANALYZE\n- workspace: Pfad to Workspace\n- request_id: string (UUID)\n- sessions: Number to analysierender Sessions (default 20)\n- include_messages:\
  \ boolean (default: false)  # NEU: ONLY at REVIEW-mode aktiv\n\n## ⛔ STEP 0 — VORAUSSETZUNGEN\nCHECK: ~/.local/share/goose/sessions/sessions.db\nIF not exists:\n  \"⛔ No Session-DB found\"\n  →\
  \ Liefere leere Rohdaten: {sessions: [], totals: {sessions: 0, tokens: 0}}\n  → NO ABBRUCH — Pipeline can nevertheless with Framework-Health arbeiten\n\n## STEP 1 — DB KOPIEREN (Goose can sperren)\n1.\
  \ FUEHRE AUS: sqlite3 ~/.local/share/goose/sessions/sessions.db \".clone /tmp/im_session_copy.db\"\n   IF fehlschlaegt: cp ~/.local/share/goose/sessions/sessions.db /tmp/im_session_copy.db\n2. CHECK:\
  \ /tmp/im_session_copy.db exists + lesbar\n\n## STEP 2 — 3-EDENEN-PROJEKTFILTER\n\n### Level 1: GOOSE_SESSION_TAG (exakt)\nREAD: {workspace}/.goosehints\nTAG = grep \"GOOSE_SESSION_TAG=\" {workspace}/.goosehints\
  \ 2>/dev/null | cut -d= -f2\nIF TAG not leer is:\n  FUEHRE AUS: sqlite3 /tmp/im_session_copy.db \"\n    SELECT id, name, session_type, total_tokens, accumulated_cost,\n           created_at, working_dir,\
  \ recipe_json\n    FROM sessions\n    WHERE name LIKE '%' || '{TAG}' || '%'\n    ORDER BY created_at DESC\n    LIMIT {sessions};\n  \" 2>/dev/null\n  SHOW: \"\U0001F4CB Filter Level 1: TAG={TAG}\"\n \
  \ IF Result not leer: → SPRINGE to step 3\n  IF leer: \"⚠️ TAG={TAG} — 0 Sessions found. Fallback on Level 2\"\n\n### Level 2: working_dir (automatisch)\nFUEHRE AUS: sqlite3 /tmp/im_session_copy.db\
  \ \"\n  SELECT id, name, session_type, total_tokens, accumulated_cost,\n         created_at, working_dir, recipe_json\n  FROM sessions\n  WHERE working_dir LIKE '{workspace}%'\n  ORDER BY created_at DESC\n\
  \  LIMIT {sessions};\n\" 2>/dev/null\nSHOW: \"\U0001F4CB Filter Level 2: working_dir={workspace}\"\nIF Result not leer: → SPRINGE to step 3\nIF leer: \"⚠️ working_dir — 0 Sessions found. Fallback\
  \ on Level 3\"\n\n### Level 3: Fallback (last N not-MAS Sessions)\nFUEHRE AUS: sqlite3 /tmp/im_session_copy.db \"\n  SELECT id, name, session_type, total_tokens, accumulated_cost,\n         created_at,\
  \ working_dir, recipe_json\n  FROM sessions\n  WHERE recipe_json IS NULL\n     OR recipe_json = ''\n     OR recipe_json NOT LIKE '%DEV-MAS-ENGINEER%'\n  ORDER BY created_at DESC\n  LIMIT {sessions};\n\
  \" 2>/dev/null\nSHOW: \"\U0001F4CB Filter Level 3: Fallback (no MAS-Sessions)\"\nIF Result leer:\n  SHOW: \"⚠️ 0 Sessions in allen Filter-Levels\"\n  Liefere leere sessions-Liste (NO Error, Pipeline macht\
  \ weiter)\n\n## STEP 3 — SESSIONS PARSEN\nFor EACH Session from the Filterergebnis:\n  1. Extract: id, name, session_type, total_tokens, accumulated_cost, created_at, working_dir\n  2. Aggregiere:\n \
  \    - total_tokens = Gesamt-Tokens\n     - accumulated_cost = Gesamt-Kosten\n  3. Collect in sessions-Liste\n\n## STEP 4 — METRIKEN AGGREGIEREN (about gefilterte Sessions)\n1. Gesamt-Sessions: count\n\
  2. Gesamt-Tokens: sum(total_tokens)\n3. Gesamt-Kosten: sum(accumulated_cost)\n4. Stale-Sessions: python3 {workspace}/tools/dev_goose_db.py --stale 30 2>/dev/null | tail -5\n5. Kosten-Trend: session with\
  \ max(accumulated_cost)\n\n## ⛔ STEP 4.5 — CHAT-INHALTE EXTRACTN (ONLY at include_messages=true)\nIF include_messages == true:\n  1. CHECK: messages-Table exists in the DB?\n     FUEHRE AUS: sqlite3\
  \ /tmp/im_session_copy.db \".tables\" 2>/dev/null | grep -q \"messages\"\n     IF NEIN: \"⚠️ messages-Table not available\" → Skip step 4.5\n\n  2. For EACH Session from step 3:\n     FUEHRE AUS:\
  \ sqlite3 /tmp/im_session_copy.db \"\n       SELECT role, content, created_at\n       FROM messages\n       WHERE session_id = '{session.id}'\n       ORDER BY created_at ASC;\n     \" 2>/dev/null\n\n\
  \  3. For EACH Message:\n     - role = \"user\" → user_prompt count, content (erste 150 Zeichen) merken\n     - role = \"assistant\" → tool_call_count summieren\n     - role = \"tool\" → skip (no Chat-Data)\n\
  \n  4. MUSTER EXTRACTN:\n     a) correction_count: Messages wo content ~\"(?i)(nein|falsch|korrigier|not so|falsch|stimmt not)\"\n     b) confusion_count:  Messages wo content ~\"(?i)(was\\?|like\\?|warum\\\
  ?|explain|versteh ich not)\"\n     c) praise_count:     Messages wo content ~\"(?i)(gut|perfekt|danke|genau|super|klappt)\"\n     d) abandon_count:    Sessions with <5 Messages + last role=user (User\
  \ brach ab)\n     e) feature_request_count: Messages wo content ~\"(?i)(kannst du|add hinzu|mach mal|would need)\"\n\n  5. structureierte Ausgabe vorbereiten:\n     messages:\n       raw: [{session_id,\
  \ role, content_preview: <erste 150ch>, timestamp}]  # NO kompletten Chats\n       patterns:\n         corrections: [{session_id, count, examples: [<erste 3 Korrekturen>]}]\n         confusions: [{session_id,\
  \ count, questions: [<erste 3 Askn>]}]\n         praises: [{session_id, count}]\n         abandoned_sessions: [{session_id, messages_count, last_message_preview}]\n         feature_requests: [{session_id,\
  \ requests: [<erste 3>]}]\n\n  IF sqlite3 Error: \"⚠️ Chat-Extraktion fehlgeschlagen — without Chat-Data fortfahren\"\n\n## STEP 5 — ROHDATEN STRUKTURIEREN\nCreate YAML-Struct with:\n```yaml\nsessions:\n\
  \  - id: str\n    name: str\n    typ: user|sub_agent\n    tokens: int\n    kosten: float\n    created: datetime\n    working_dir: str\ntotals:\n  sessions: int\n  tokens: int\n  kosten: float\n  filter_ebene:\
  \ \"tag|working_dir|fallback|no\"\n  tag: str (only at Level 1)\nstale: [...]\ntop_cost: [...]\n```\n\n## ⛔ STEP 6 — NO CHANGES\n⛔ ONLY READN — No writes, no edits, no Patches\n⛔ No Analyse the gereaden\
  \ Data (macht im-finder)\n⛔ At leerer DB: \"No Sessions\" + leere structure (NO Error)\n⛔ At 0 Sessions after Filter: \"No Sessions fuer dieses project\" (NO Error)\n\n⛔ ALL BOUNDARIES IN SOT: cat workflows.yaml\
  \ → configs.mas-self.restrictions.\ndev_rule_checker.py enforces.\n⛔ R01 CONFIRMATION — Before write/edit/shell PLAN+WAIT on ✅.\n⛔ R06 SUB-AGENT — ONLY Analyse. NO Changes.\n⛔ R09 DOMAIN — ONLY {target_workspace}.\
  \ NO domain-overreach.\n⛔ R10 CORONASHIELD — Validate each YAML before storage.\n\n## Edge Cases\n- DB gesperrt (Goose laeuft): Kopie fehlschlagen → \"⛔ DB gesperrt — versuche without Session-Data\"\
  \n- dev_goose_db.py not found: → \"⛔ dev_goose_db.py missing — only Grunddaten via sqlite3\"\n- sqlite3 not installiert: → \"⛔ sqlite3 missing — Session-Data not verfuegbar\"\n- 0 Sessions in allen Levels:\
  \ → \"ℹ️ No Sessions fuer dieses project\"\n- Einzelfehler at Session-Detail: → Aboutspringe diese Session, fahre with naechster fort\n- .goosehints not found: → Aboutspringe Level 1\n- include_messages=true\
  \ + messages-Table missing: → \"⚠️ messages-Table not available\" (NO Abbruch)\n- Einzelfehler at Chat-Extraktion: → Aboutspringe diese Session, fahre with naechster fort\n- include_messages=true + ALL\
  \ Sessions fehlschlagen: → \"⚠️ Chat-Extraktion komplett fehlgeschlagen\" (NO Abbruch)\n\n## Output\nAls YAML-Struct via stdout:\n- signal: DONE\n- request_id: UUID (from Input)\n- from: sub_mas-im-session-reader\n\
  - to: sub_mas-general-improver\n- status: success | partial | error\n- data: {sessions, messages, totals, stale, trend}\n- filter: {ebene: \"tag|working_dir|fallback|no\", tag: str, sessions_found:\
  \ int}\n"
