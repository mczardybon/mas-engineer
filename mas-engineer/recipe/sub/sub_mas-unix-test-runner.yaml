name: MAS Unix Test Runner
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🔧 SUB-MAS-UNIX-TEST-RUNNER — POSIX `test` builtin regression-suite
description: 'v1.0.0 | MAS-internal: Runs POSIX `test` builtin (the "unix test word")
  as a regression-detector for file system integrity. Complements sub_mas-test-runner
  (pytest) with shell-level checks.'
instructions: '# Extended instructions: recipe/instructions/sub_mas-unix-test-runner.md

  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-unix-test-runner.md`

  '
prompt: 'I am unix-test-runner (v1.0.0) | MODE-CHECK: mas-engineer | 🔧 UNIX-TEST-RUNNER
  (v1.0.0) ⛔ POSIX `test` builtin + regression detect. → ONLY shell-level checks —
  NO changes to recipes/tools

  # R10 CORONASHIELD Every YAML must be validated before storing (via sub_mas-recovery-immune).
  NO YAML-Save without vorherige Syntax-Check.'
settings:
  timeout: 300
  max_steps: 50
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 180
  bundled: true
