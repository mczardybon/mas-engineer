name: CR-REPORTER
version: 1.0.0
title: 📊 CR-REPORTER — Thin delegator for code-reviewer-reporter
description: 'v1.0.0 | MAS-internal: Thin delegator that routes all code-reviewer-reporter tasks to sub_mas-cr-reporter-orchestrator'
instructions: |
  # CR-REPORTER v1.0.0
  # Thin delegator — routes all tasks to orchestrator

  ## ⛔ ONLY delegation — NO direct report generation
  → Delegate all code-reviewer-reporter tasks to sub_mas-cr-reporter-orchestrator

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-reporter (v1.0.0) | MODE-CHECK: mas-engineer | 📊 CR-REPORTER (v1.0.0)
  ⛔ ONLY delegation — NO direct report generation
  → Delegate all code-reviewer-reporter tasks to sub_mas-cr-reporter-orchestrator
sub_recipes:
  - name: sub_mas-cr-reporter-orchestrator
    path: ./sub_mas-cr-reporter-orchestrator.yaml
    description: Orchestrate report generation — format then recommend
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
