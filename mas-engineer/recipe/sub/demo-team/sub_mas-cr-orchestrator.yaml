name: CR-ORCHESTRATOR
version: 1.0.0
title: 📋 CR-ORCHESTRATOR — Code-review coordination orchestrator
description: 'v1.0.0 | MAS-internal: Orchestrates synthesizer/reporter/validator coordination flow by delegating to specialized coordinators'
instructions: |
  # CR-ORCHESTRATOR v1.0.0
  # Orchestrator — delegates to specialized coordinators

  ## ⛔ ONLY orchestration — NO direct execution
  → Delegate to specialized coordinators based on task domain

  ## Delegation Map
  - synthesize/merge/deduplicate/prioritize → sub_mas-cr-synth-coordinator
  - report/format/validate → sub_mas-cr-report-valid-coordinator

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-orchestrator (v1.0.0) | MODE-CHECK: mas-engineer | 📋 CR-ORCHESTRATOR (v1.0.0)
  ⛔ ONLY orchestration — NO direct execution
  → Delegate to specialized coordinators based on task domain
sub_recipes:
  - name: sub_mas-cr-synth-coordinator
    path: ./sub_mas-cr-synth-coordinator.yaml
    description: Coordinate findings synthesis — merge, deduplicate, prioritize
  - name: sub_mas-cr-report-valid-coordinator
    path: ./sub_mas-cr-report-valid-coordinator.yaml
    description: Coordinate report formatting and validation
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
