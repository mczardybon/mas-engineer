name: CR-SYNTHESIZER-ORCHESTRATOR
version: 1.0.0
title: 🔬 CR-SYNTHESIZER-ORCHESTRATOR — Synthesis flow orchestrator
description: 'v1.0.0 | MAS-internal: Orchestrates synthesis flow — merge then prioritize findings'
instructions: |
  # CR-SYNTHESIZER-ORCHESTRATOR v1.0.0
  # Orchestrator — delegates to specialized synthesizers

  ## ⛔ ONLY orchestration — NO direct synthesis
  → Delegate to specialized synthesizers based on task domain

  ## Delegation Map
  - merge/deduplicate/consolidate → sub_mas-cr-synthesizer-merger
  - prioritize/rank/order → sub_mas-cr-synthesizer-prioritizer

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-synthesizer-orchestrator (v1.0.0) | MODE-CHECK: mas-engineer | 🔬 CR-SYNTHESIZER-ORCHESTRATOR (v1.0.0)
  ⛔ ONLY orchestration — NO direct synthesis
  → Delegate to specialized synthesizers based on task domain
sub_recipes:
  - name: sub_mas-cr-synthesizer-merger
    path: ./sub_mas-cr-synthesizer-merger.yaml
    description: Merge and deduplicate findings from static-analyzer + security-scanner
  - name: sub_mas-cr-synthesizer-prioritizer
    path: ./sub_mas-cr-synthesizer-prioritizer.yaml
    description: Prioritize findings by severity
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
