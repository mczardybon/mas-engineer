name: CR-VALIDATOR
version: 1.0.0
title: ✅ CR-VALIDATOR — Thin delegator for code-reviewer-validator
description: 'v1.0.0 | MAS-internal: Thin delegator that routes all code-reviewer-validator tasks to sub_mas-cr-validator-orchestrator'
instructions: |
  # CR-VALIDATOR v1.0.0
  # Thin delegator — routes all tasks to orchestrator

  ## ⛔ ONLY delegation — NO direct validation
  → Delegate all code-reviewer-validator tasks to sub_mas-cr-validator-orchestrator

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-validator (v1.0.0) | MODE-CHECK: mas-engineer | ✅ CR-VALIDATOR (v1.0.0)
  ⛔ ONLY delegation — NO direct validation
  → Delegate all code-reviewer-validator tasks to sub_mas-cr-validator-orchestrator
sub_recipes:
  - name: sub_mas-cr-validator-orchestrator
    path: ./sub_mas-cr-validator-orchestrator.yaml
    description: Orchestrate validation flow — cross-check then score
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
