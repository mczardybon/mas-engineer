name: CR-SYNTHESIZER
version: 1.0.0
title: 🔬 CR-SYNTHESIZER — Thin delegator for code-reviewer-synthesizer
description: 'v1.0.0 | MAS-internal: Thin delegator that routes all code-reviewer-synthesizer tasks to sub_mas-cr-synthesizer-orchestrator'
instructions: |
  # CR-SYNTHESIZER v1.0.0
  # Thin delegator — routes all tasks to orchestrator

  ## ⛔ ONLY delegation — NO direct synthesis
  → Delegate all code-reviewer-synthesizer tasks to sub_mas-cr-synthesizer-orchestrator

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-synthesizer (v1.0.0) | MODE-CHECK: mas-engineer | 🔬 CR-SYNTHESIZER (v1.0.0)
  ⛔ ONLY delegation — NO direct synthesis
  → Delegate all code-reviewer-synthesizer tasks to sub_mas-cr-synthesizer-orchestrator
sub_recipes:
  - name: sub_mas-cr-synthesizer-orchestrator
    path: ./sub_mas-cr-synthesizer-orchestrator.yaml
    description: Orchestrate synthesis flow — merge then prioritize
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
