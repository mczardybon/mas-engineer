name: CR-DIRECTOR
version: 1.0.0
title: 📋 CR-DIRECTOR — Thin delegator for code-reviewer-director
description: 'v1.0.0 | MAS-internal: Thin delegator that routes all code-review-director tasks to sub_mas-cr-orchestrator'
instructions: |
  # CR-DIRECTOR v1.0.0
  # Thin delegator — routes all tasks to orchestrator

  ## ⛔ ONLY delegation — NO direct orchestration
  → Delegate all code-review-director tasks to sub_mas-cr-orchestrator

  ## RULES
  - R01: No changes without User confirmation
  - R09: Strict domain separation
  - R10: CORONASHIELD — validate YAML before storage
prompt: |
  I am cr-director (v1.0.0) | MODE-CHECK: mas-engineer | 📋 CR-DIRECTOR (v1.0.0)
  ⛔ ONLY delegation — NO direct orchestration
  → Delegate all code-review-director tasks to sub_mas-cr-orchestrator
sub_recipes:
  - name: sub_mas-cr-orchestrator
    path: ./sub_mas-cr-orchestrator.yaml
    description: Orchestrate synthesizer/reporter/validator coordination flow
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
