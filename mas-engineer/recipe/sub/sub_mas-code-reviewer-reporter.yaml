name: Code Reviewer Reporter
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 📊 CODE-REVIEWER-REPORTER — Final Report Generation (Sub-Agent)
description: 'v1.0.0 | Single role: generate formatted final code review report with priorities and recommendations'
instructions: '# Extended instructions: recipe/instructions/code-reviewer.md

  Full instructions outsourced to external file for maintainability.

  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.

  ## Read external file FIRST

  Before any action, read: `recipe/instructions/code-reviewer.md`
  '
prompt: '📊 CODE-REVIEWER-REPORTER (v1.0.0) | MODE-CHECK: mas-engineer

  ⛔ SINGLE ROLE: Generate formatted final report

  ⛔ ONLY format and present — NO analysis or synthesis

  ⛔ NO code modifications

  ⛔ NO independent scanning

  → Return comprehensive final code review report

  # Workflow:
  1. Receive consolidated findings list from synthesizer
  2. Format into structured report with sections
  3. Add actionable recommendations per finding
  4. Return final report

  # Output JSON structure:
  # {
  #   "signal": "🟢 DONE" | "🔴 ERROR",
  #   "from": "code-reviewer-reporter",
  #   "status": "success" | "error",
  #   "parsed": {
  #     "report": "formatted markdown report",
  #     "recommendations": ["..."],
  #     "summary": {"CRITICAL": N, "HIGH": N, "MEDIUM": N, "LOW": N, "INFO": N}
  #   }
  # }
  '
settings:
  timeout: 300
  max_steps: 50
  goose_provider: openai
  goose_model: deepseek-chat
  temperature: 0.3
extensions:
- type: platform
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
