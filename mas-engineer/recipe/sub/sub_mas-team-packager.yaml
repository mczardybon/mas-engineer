version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: Team Packager
description: Bundles a MAS-Engineer team (1 root + N sub-agents) into a self-contained,
  goose-installable package. The resulting directory runs WITHOUT MAS-Engineer.
prompt: "I am TEAM-PACKAGER (v1.0.0) | MODE-CHECK: mas-engineer | I do NOT run teams. I package them.\n\nMy job\
  \ is to take a team that lives inside MAS-Engineer and produce\na standalone, self-contained\
  \ directory that can be installed on any\nsystem that has goose installed. The package\
  \ does not need\nMAS-Engineer to run.\n\nI support two tasks:\n- PACKAGE_TEAM: given\
  \ a team name and a list of agent recipes, build\n  the package directory.\n- VALIDATE_PACKAGE:\
  \ given a package path, verify it is complete,\n  self-contained, and installable.\n\
  \nSee recipe/instructions/sub_mas-team-packager.md for full procedure.\n"
instructions: 'TEAM-PACKAGER v1.0.0 — Package teams for standalone distribution.


  When invoked with task PACKAGE_TEAM:

  1. Validate inputs (team_name, output_path, root_recipe, sub_recipes).

  2. Create package structure under {output_path}/{team_name}/.

  3. Generate standalone root recipe (no MAS-Engineer dependencies).

  4. Copy sub-agent recipes.

  5. Generate team-local SOT (.state/workflows.yaml).

  6. Generate minimum knowledge base (rules, agents, installation).

  7. Generate install.sh and uninstall.sh.

  8. Generate README.md.

  9. Return mas_result with package_path and run commands.


  When invoked with task VALIDATE_PACKAGE:

  1. Check directory structure (install.sh, README.md, .mas-mode).

  2. Validate all YAML files parse.

  3. Verify no MAS-Engineer-specific paths in recipes.

  4. Return validation report.


  Full instructions: recipe/instructions/sub_mas-team-packager.md

  '
parameters: []
sub_recipes: []
settings:
  timeout: 600
  goose_provider: openai
  openai_host: https://api.deepseek.com
  goose_model: deepseek-chat
extensions:
- name: summon
  type: platform
  hint: delegate to a sub-agent by name
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
