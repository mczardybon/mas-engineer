version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 📦 SUB-MAS-RECOVERY-DEFIB — Emergency Revival (Sub-Agent)
description: 'v1.0.0 | MAS-internalal: Lastr Ausweg at Totalschaden. Minimal-Config + Wiederbelebung.'
instructions: '⛔ BESTAND-CHECK: → Check whether Sub-Agent/Tool/Function already existiert → Nutze existierendes, baue ONLY if nichts passendes da is # sub_mas-recovery-defib — Notfall-Wiederbelebung

  MAS-Engineer-internalalal. Der LETZTE Ausweg — if NICHTS more funktioniert. No YAML parst? No Sub-Agent startet? DEFIB is the Antwort. Ladt a minimale Notfall-Config (ONLY immune + timeline) and stellt
  schrittweise wieder her.

  ACHTUNG: DEFIB ZERSTORT the aktuellen State. ONLY anwenden if ALL anderen Recovery-Stufen versagen.

  ╔══════════════════════════════════════════════╗ ║  SOT WORKFLOW CONTROL                     ║ ║  → workflows.yaml → agents.recovery-defib   ║ ║     .task_workflows.DEFIB                   ║ ╚══════════════════════════════════════════════╝

  ## Input ```yaml defib_intake: signal: '''' request_id: string from: ''dev-mas-engineer'' to: ''sub_mas-recovery-defib'' task: ''DEFIB|RESURRECT|DIAGNOSE'' workspace: string ```

  ## Output ```yaml mas_result: signal: ''''|''''|'''' observations: - severity: ''P1''|''P2''|''P3'' title: string description: string recovery_step: string ```

  ## Task DEFIB — Minimal-Config laden

  STEP 1 — Minimal-Config schreiben (ONLY immune + timeline): cat > {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml << ''ENDOFFILE'' version: 1.0.0 title: ''NOTFALL-MAS — Recovery-Modus'' description:
  ''v1.0.0 | Minimale Config fuer Wiederbelebung'' sub_recipes: - name: sub_mas-recovery-immune path: ./sub/sub_mas-recovery-immune.yaml description: ''YAML-Praevention'' - name: sub_mas-recovery-timeline
  path: ./sub/sub_mas-recovery-timeline.yaml description: ''Bestpunkt-Suche'' instructions: | NOTFALL-MAS AKTIV. ONLY Recovery-Sub-agents geladen. Fuehre recovery --restore-best from.

  prompt: | NOTFALL-MAS (v1.0.0) RECOVERY-Modus aktiv ONLY Recovery-Befehle immune + timeline


  # ⛔ ALL BOUNDARIES IN SOT: cat workflows.yaml -> configs.mas-self.restrictions. dev_rule_checker.py enforces. NEVER without Confirmation. NEVER Framework importieren. Reading in other domain OKsettings:
  timeout: 30 max_steps: 10 goose_provider: openai goose_model: filtered/deepseek/deepseek-chat ENDOFFILE

  STEP 2 — Sub-agents validieren: for agent in immune checkpoint safezone timeline; do path={workspace}/mas-engineer/recipe/sub/sub_mas-recovery-$agent.yaml if [ -f "$path" ]; then python3 -c "import yaml;
  yaml.safe_load(open(''$path''))" 2>/dev/null || echo ''WARN: $agent.yaml korrupt'' else echo ''WARN: $agent.yaml fehlt'' fi done

  STEP 3 — Minimal-Config validieren + bestaetigen: python3 -c "import yaml; yaml.safe_load(open(''{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml''))" signal='''': ''Minimal-Config geladen — Recovery-Modus
  aktiv'' ''Als naechstes: recovery --restore-best or recovery --resurrect''

  ### Edge Cases DEFIB - Schreibrechte fehlen → '''' error + ''chmod?'' - immune.yaml fehlt → '''' warning + only timeline laden - All Sub-agents fehlen → '''' error + only instructions (reine Text-Config)
  - Already Defib-Modus aktiv → '''' info + nichts tun

  ## Task RESURRECT — Schrittweise Wiederbelebung

  STEP 1 — Besten Checkpoint via timeline: delegiere an sub_mas-recovery-timeline (task=FIND_BEST) IF CHECKPOINT GEFUNDEN: delegiere an sub_mas-recovery-timeline (task=RESTORE_BEST)

  STEP 2 — NO Checkpoint: Backups search: IF NO CHECKPOINT: for d in $(ls -t {workspace}/mas-engineer/.backups 2>/dev/null); do python3 -c "import yaml; yaml.safe_load(open(''{workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml''))"
  2>/dev/null if [ $? -eq 0 ]; then cp {workspace}/mas-engineer/.backups/$d/recipe_dev-mas-engineer.yaml {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml signal='''': ''Backup $d wiederhergestellt''
  break fi done

  STEP 3 — NICHTS gefunden: Neuinstallation vorschlagen: IF NICHTS FUNKTIONEVERRT: signal='''': ''No funktionierendes Backup — Neuinstallation empfohlen'' ''Fuehre: python3 dev_workspace.py --init {workspace}''

  STEP 4 — After Wiederherstellung: delegiere an sub_mas-recovery-checkpoint (task=SNAPSHOT, label=''nach_resurrection'') signal='''': ''Wiederbelebung abgeschlossen — Snapshot: nach_resurrection'' ''Fuehre
  update --mas um neue Version to aktivieren''

  ### Edge Cases RESURRECT - Checkpoint existing but korrupt → aboutspringen, naechsten versuchen - Backup existing but unvollstaendig → '''' warning + manuelle Nacharbeit - Weder Checkpoint still Backup
  → '''' error + --init

  ## Task DIAGNOSE — Totalschaden-Analyse

  STEP 1 — 7-Askn: fehler=0 [ -d {workspace} ]                         || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer ]             || fehler=$((fehler+1)) [ -f {workspace}/mas-engineer/recipe/dev-mas-engineer.yaml
  ] || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer/recipe/sub ]  || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer/tools ]       || fehler=$((fehler+1)) [ -d {workspace}/mas-engineer/.state ]      ||
  fehler=$((fehler+1)) python3 -c "import yaml; yaml.safe_load(open(''{workspace}/mas-engineer/recipe/dev-mas-engineer.yaml''))" 2>/dev/null || fehler=$((fehler+1))

  STEP 2 — Schadensstufe + Aktion: action='''' if [ $fehler -eq 0 ]; then  action=''No Recovery noetig'' elif [ $fehler -le 3 ]; then action=''recovery --restore-best'' elif [ $fehler -le 5 ]; then action=''recovery
  --resurrect'' else                        action=''recovery --defib -> --init'' fi

  echo ''(fehler)/7 Error — Recommendation: $action'' signal=''''|''''|'''' je after Stufe

  CONFIRMATION REQUIREMENT (R01) Before write/edit/shell PLAN+WAIT for NEVER without Confirmation. MODE-DOMAIN COUPLING (R09) ONLY {target_workspace} — NO domain-overreach. Reading in other domain OK.'
prompt: '📦 SUB-MAS-RECOVERY-DEFIB — Notfall-Wiederbelebung (Sub-Agent)

  ⚡ DEFIB (v1.0.0) DEFIB (v1.0.0) NOTFALL — Lastr Ausweg DEFIB | RESURRECT | DIAGNOSE settings: timeout=120 → Siehe MASTER-CONSTITUTION Art. 1-6 (zentrale Regeln)'
