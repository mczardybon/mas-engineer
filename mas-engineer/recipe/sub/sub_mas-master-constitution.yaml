name: MAS Master Constitution
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 📜 SUB-MAS-MASTER-CONSTITUTION — Central MAS Rules (Sub-Agent)
description: 'v1.0.0 | MAS-internal: 11 Articles for all Agents'
instructions: '# Extended instructions: recipe/instructions/sub_mas-master-constitution.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-master-constitution.md`

