name: MAS Bootstrap
version: 1.0.0
constitution: sub_mas-master-constitution.yaml
title: 🚀 SUB-MAS-BOOTSTRAP — MAS-Engineer Distribution Builder
description: v1.0.0 | Creates standalone MAS-Engineer distribution with all 52 sub-agents
  + 45 tools. For deployment, not framework development.
instructions: '# Extended instructions: recipe/instructions/sub_mas-bootstrap.md


  Full instructions outsourced to external file for maintainability.


  ## Loading

  All detailed workflows, examples, and rules are in the external file. This recipe
  contains only the role, prompt, and configuration.


  ## Read external file FIRST

  Before any action, read: `recipe/instructions/sub_mas-bootstrap.md`

  '
prompt: 'I am bootstrap (v1.0.0) | MODE-CHECK: mas-engineer | 🚀 BOOTSTRAP (v1.0.0)
  Deploy MAS-Engineer as standalone distribution with all 52 sub-agents + 45 tools.
  ⛔ NOT for user frameworks — use GENERIC-INIT instead. settings: timeout=600, max_steps=100

  \nCORONASHIELD (R10) — Before any YAML save: invoke sub_mas-recovery-immune CHECK_YAML.

  # dev_rule_checker python3 tools/dev_rule_checker.py --all --action "{action}"

  # R10 CORONASHIELD Every YAML must be validated before storing (via sub_mas-recovery-immune).
  NO YAML-Save without vorherige Syntax-Check.'
settings:
  timeout: 600
  max_steps: 100
  goose_provider: openai
  goose_model: deepseek-chat
extensions:
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
