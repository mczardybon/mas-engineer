version: 1.0.0
title: 🦆 framework Dashboard — Setup
description: 'Sets up the MCP App Dashboard. Execute once after init: npm install, Extension, Scheduler.'
instructions: "PARAMETER:\n  workspace = {workspace} (current Path)\n  mcp_dir = {workspace}/.mas/mcp\n  config_file = ~/.config/goose/config.yaml\n\nExecute ALL following steps:\n\n## STEP 1 — npm install\nEXECUTE: cd {mcp_dir} && npm install\nIF Exit-Code == 0: \"✅ npm install successful\"\nIF Exit-Code != 0 OR \"command not found\":\n  \"⚠️ Node.js missing? Install Node.js 18+: https://nodejs.org\"\n  Continue with STEP 2 (npm install can be done later)\n\n## STEP 2 — Register Extension in config.yaml\n1. CHECK: {config_file} exists?\n   IF NO: \"⚠️ {config_file} not found — Goose is not configured\"\n              → continue to STEP 3\n2. READ: {config_file} via cat\n3. CHECK if \"framework-dashboard\" already exists under \"extensions:\":\n   IF YES: \"✅ Extension already registered\" → continue to STEP 3\n4. CHECK if \"extensions:\" Key in config.yaml exists:\n   IF YES: Add framework-dashboard entry (after last Extension)\n   IF NO: Add \"extensions:\" + entry at end of file\n5. ADD:\n   extensions:\n     framework-dashboard:\n       type: stdio\n       name: framework-dashboard\n       enabled: true\n       cmd: node\n       args: [\"{mcp_dir}/server.js\"]\n       description: \"framework Dashboard MCP App\"\n       timeout: 300\n   (Note: YAML-indentation = 2 spaces per Level)\n6. VALIDATE: python3 -c \"import yaml; yaml.safe_load(open('{config_file}'))\"\n   IF error: ROLLBACK — restore config.yaml to original\n   IF OK: \"✅ Extension registered in {config_file}\"\n7. \"⚠️ RESTART Goose so that Extension becomes active\"\n\n## STEP 3 — Setup Scheduler\n1. CHECK: goose schedule list 2>&1 | grep dashboard-data-refresh\n   IF match: \"✅ Scheduler already exists\" → continue to STEP 4\n2. EXECUTE:\n   goose schedule add --schedule-id dashboard-data-refresh\n   --cron \"0 */5 * * * *\" --recipe-source {workspace}/mas-engineer/recipe/dashboard-data-refresh.yaml\n3. IF Exit-Code == 0: \"✅ Scheduler active (every 5 minutes)\"\n   IF != 0: SHOW error and give manual command:\n     goose schedule add --schedule-id dashboard-data-refresh \\\n       --cron \"0 */5 * * * *\" \\\n       --recipe-source {workspace}/mas-engineer/recipe/dashboard-data-refresh.yaml\n\n## STEP 4 — Generate Initial Data\n1. EXECUTE:\n   python3 {workspace}/mas-engineer/tools/dev_dashboard_data.py --workspace {workspace}\n2. READ: cat {workspace}/.mas/dashboards/data.json | python3 -c \"import sys,json; d=json.load(sys.stdin); print(f'  Agents: {d[\\\"agents\\\"][\\\"total\\\"]} | Changes: {d[\\\"changes\\\"][\\\"total\\\"]}')\"\n3. SHOW: \"✅ Initial data generated\"\n\n## STEP 5 — Summary\nSHOW TO USER:\n\"━━━━━━━━━━━━━━━━━━━━━━━━━\n✅ Dashboard-Setup completed!\n\n📊 Open Dashboard in Goose Desktop:\n   'Show me the framework Dashboard'\n\n🔄 Automatic Updates:\n   Scheduler 'dashboard-data-refresh' every 5 minutes\n\n🛠️ Manual Data-Refresh:\n   python3 {workspace}/mas-engineer/tools/dev_dashboard_data.py\n\n⚠️ IMPORTANT:\n   RESTART Goose if you just registered the Extension!\n━━━━━━━━━━━━━━━━━━━━━━━━━\"\n"
prompt: Set up the framework Dashboard
settings:
  timeout: 600
  max_steps: 50
  goose_provider: deepseek
  goose_model: deepseek-chat
