version: 1.0.0
title: 🦆 framework Dashboard — Setup
description: 'Sets up the MCP App Dashboard ein. Once after init execute: npm install, Extension, Scheduler.'
instructions: "PARAMETER:\n  workspace = {workspace} (currentr Path)\n  mcp_dir = {workspace}/.mas/mcp\n  config_file = ~/.config/goose/config.yaml\n\nExecute ALL following steps:\n\n## STEP 1 — npm\
  \ install\nEXECUTE: cd {mcp_dir} && npm install\nIF Exit-Code == 0: \"✅ npm install successful\"\nIF Exit-Code != 0 OR \"command not found\":\n  \"⚠️ Node.js missing? Installiere Node.js 18+: https://nodejs.org\"\
  \n  Continue with STEP 2 (npm install can be done later)\n\n## STEP 2 — Extension in config.yaml registrieren\n1. CHECK: {config_file} exists?\n   IF NO: \"⚠️ {config_file} not found — Goose ist\
  \ not configured\"\n              → weiter zu STEP 3\n2. READ: {config_file} msg cat\n3. CHECK ob \"framework-dashboard\" already unter \"extensions:\" steht:\n   IF YES: \"✅ Extension already registriert\"\
  \ → weiter zu STEP 3\n4. CHECK ob \"extensions:\" Key in config.yaml exists:\n   IF YES: Add framework-dashboard entry hinzu (after letzter Extension)\n   IF NO: Add \"extensions:\" + entry am End\
  \ der file an\n5. ADD:\n   extensions:\n     framework-dashboard:\n       type: stdio\n       name: framework-dashboard\n       enabled: true\n       cmd: node\n       args: [\"{mcp_dir}/server.js\"]\n\
  \       description: \"framework Dashboard MCP App\"\n       timeout: 300\n   (Note: YAML-indentation = 2 spaces pro Level)\n6. VALIDIERE: python3 -c \"import yaml; yaml.safe_load(open('{config_file}'))\"\
  \n   IF error: ROLLBACK — set config.yaml back to original\n   IF OK: \"✅ Extension registriert in {config_file}\"\n7. \"⚠️ Goose NEU STARTEN damsg Extension active will\"\n\n## STEP 3 — Scheduler\
  \ einrichten\n1. CHECK: goose schedule list 2>&1 | grep dashboard-data-refresh\n   IF Treffer: \"✅ Scheduler exists already\" → weiter zu STEP 4\n2. EXECUTE:\n   goose schedule add --schedule-id dashboard-data-refresh\
  \ --cron \"0 */5 * * * *\" --recipe-source {workspace}/mas-engineer/recipe/dashboard-data-refresh.yaml\n3. IF Exit-Code == 0: \"✅ Scheduler active (all 5 Minuten)\"\n   IF != 0: SHOW error und give manuellen\
  \ command:\n     goose schedule add --schedule-id dashboard-data-refresh \\\n       --cron \"0 */5 * * * *\" \\\n       --recipe-source {workspace}/mas-engineer/recipe/dashboard-data-refresh.yaml\n\n\
  ## STEP 4 — Initialdaten generate\n1. EXECUTE:\n   python3 {workspace}/mas-engineer/tools/dev_dashboard_data.py --workspace {workspace}\n2. READ: cat {workspace}/.mas/dashboards/data.json | python3\
  \ -c \"import sys,json; d=json.load(sys.stdin); print(f'  Agents: {d[\\\"agents\\\"][\\\"total\\\"]} | Changes: {d[\\\"changes\\\"][\\\"total\\\"]}')\"\n3. SHOW: \"✅ Initialdaten generates\"\n\n## STEP\
  \ 5 — Togetherfassung\nSHOW DEM USER:\n\"━━━━━━━━━━━━━━━━━━━━━━━━━\n✅ Dashboard-Setup completed!\n\n\U0001F4CA Dashboard open in Goose Desktop:\n   'Zeig mir the framework Dashboard'\n\n\U0001F504 Automatische\
  \ Updates:\n   Scheduler 'dashboard-data-refresh' all 5 Minuten\n\n\U0001F6E0️ Manueller Data-Refresh:\n   python3 {workspace}/mas-engineer/tools/dev_dashboard_data.py\n\n⚠️ WICHTIG:\n   Starte Goose\
  \ NEU falls die Extension gerade registriert was!\n━━━━━━━━━━━━━━━━━━━━━━━━━\"\n"
prompt: Richte the framework Dashboard ein
settings:
  timeout: 600
  max_steps: 50
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
