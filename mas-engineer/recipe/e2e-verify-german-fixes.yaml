name: e2e-verify-german-fixes
version: 1.0.0
title: ✓ E2E-VERIFY-GERMAN-DESCS-FIX — delegator
description: |
  Thin delegator that routes to sub_mas-e2e-german-fixes-director for
  orchestrated e2e verification of German descs + placeholder fixes.

instructions: |
  # E2E Verify German + Placeholder Fixes — Delegator

  You are a thin delegator. Your only job is to delegate to the director
  sub-agent which handles all orchestration logic.

  ## Delegation
  - Load and invoke: sub_mas-e2e-german-fixes-director
  - The director will handle T1-T5 tests via its own sub-agents:
    - T1-T2: sub_mas-e2e-german-fixes-validator
    - T3: sub_mas-e2e-german-fixes-runner
    - T4-T5: sub_mas-e2e-german-fixes-checker
  - Collect the final report from the director and present it.

prompt: |
  ⛔ I am e2e-verify-german-fixes (v1.0.0) | MODE-CHECK: mas-engineer | ✓ E2E-VERIFY-GERMAN-DESCS-FIX — delegator (v1.0.0) ⛔ ONLY delegation — no direct tests. → Route to sub_mas-e2e-german-fixes-director.

sub_recipes:
  - name: sub_mas-e2e-german-fixes-director
    path: ./sub_mas-e2e-german-fixes-director.yaml
    description: Orchestrates e2e verification of German descs + placeholder fixes

settings:
  timeout: 300
  max_steps: 50
  temperature: 0.3

extensions:
  - type: platform
    name: summon
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true
