title: mas-engineer-root
name: mas-engineer-root
description: Root recipe for MAS-Engineer
version: 1.0
instructions: |
  # Root Recipe — MAS-Engineer Entry Point

  STEP 1 — Load the mas-engineer recipe system
    The root recipe delegates to the main dev-mas-engineer orchestrator
    which handles all MAS operations.

  STEP 2 — Delegate to orchestrator
    Use delegate(source: "dev-mas-engineer") to start the full MAS-Engineer
    system with all 52 sub-agents and 45 tools.

  STEP 3 — Report status
    Return status to the caller with any relevant observations.
prompt: |
  You are the mas-engineer root agent.
settings:
  model: sonnet
  temperature: 0.3
  timeout: 300
extensions: []
