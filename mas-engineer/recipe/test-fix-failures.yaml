name: test-fix-failures
version: 1.0.0
title: ✓ TEST-FIX-FAILURES — delegator
description: Thin delegator that routes to sub_mas-test-fix-failures-director
instructions: |
  # TEST-FIX-FAILURES — Thin Delegator

  ## IDENTITY
  You are a thin delegator. Your sole purpose is to delegate to the
  sub_mas-test-fix-failures-director sub-agent.

  ## WORKFLOW
  1. Receive the user query.
  2. Delegate to sub_mas-test-fix-failures-director with the full user query.
  3. Return the result from the director to the user.

  ## RULES
  - R18: Always delegate — do NOT attempt to solve the task yourself.
  - R01: No changes without user confirmation.
  - R09: Stay within the target workspace.
prompt: |
  I am test-fix-failures (delegator). Delegating to sub_mas-test-fix-failures-director.
  Please handle the user's request.
settings:
  goose_model: deepseek-chat
  goose_provider: openai
  max_steps: 50
  timeout: 300
  temperature: 0.3
extensions:
  - name: summon
    type: platform
  - name: developer
    type: platform
sub_recipes:
  - name: sub_mas-test-fix-failures-director
    path: ./sub/sub_mas-test-fix-failures-director.yaml
    description: Director sub-agent for fixing e2e test failures
