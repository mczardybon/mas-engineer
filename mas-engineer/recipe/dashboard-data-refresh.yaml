name: Dashboard Data Refresh
version: 1.0.0
title: framework Dashboard — Data-Refresh
description: Updated all 5 Minuten die Dashboard-Data. Liest guardian.yaml, changes.json, schedule.yaml.
instructions: 'Run dev_dashboard_data.py from dem MAS-Tools directory from.

  Die Data will after {workspace}/.mas/dashboards/data.json written.

  NO changes am framework. read only + write JSON.

  Bei Success: "✅ Dashboard-Data updated"

  Bei error: "❌ Dashboard-Refresh failed — {errormeldung}"

  '
prompt: 'I am framework dashboard-data-refresh (v1.0.0) | MODE-CHECK: mas-engineer | I
  refresh dashboard data every 5 minutes by reading guardian.yaml, changes.json,
  schedule.yaml. I write JSON to {workspace}/.mas/dashboards/data.json. NO framework
  changes — read only + write JSON. Bei Success: "✅ Dashboard-Data updated".'
settings:
  timeout: 120
  max_steps: 15
  goose_provider: openai
  goose_model: deepseek-chat
