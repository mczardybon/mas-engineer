name: test-mas-user
version: 1.0.0
title: 🧪 test-mas-user — User perspective test (delegator)
description: 'v1.0.0 | Real user test. Thin delegator that routes to sub_mas-test-director.'
instructions: |
  Delegate all test-mas-user tasks to sub_mas-test-director.
  This recipe is a thin delegator only — it does not contain test logic directly.
  Load sub_mas-test-director and execute its instructions.
prompt: |
  I am test-mas-user (v1.0.0) | MODE-CHECK: mas-engineer | 🧪 TEST-MAS-USER (v1.0.0)
  ⛔ ONLY delegation — NO direct test execution
  → Delegate all test tasks to sub_mas-test-director
sub_recipes:
  - name: sub_mas-test-director
    path: ./sub/sub_mas-test-director.yaml
    description: Orchestrator for test operations
settings:
  timeout: 300
  max_steps: 50
extensions:
- type: platform
  name: summon
- type: builtin
  name: developer
  display_name: Developer
  timeout: 300
  bundled: true
