version: 1.0.0
title: SUB-MAS-RECOVERY-CHECKPOINT — Git-similare Snapshots (Sub-Agent)
description: 'v1.0.0 | MAS-intern: Creates Snapshots before jeder Change. Enables Punktlandung.'
instructions: "# sub_mas-recovery-checkpoint — Snapshot-System\n\nMAS-Engineer-intern. Creates komplette Workspace-Snapshots vor Changeen.\nmemoryt recipe/ + tools/ + docs/ + state/ in .state/checkpoints/{timestamp}/.\n\
  Enables: \"Stelle State von vor 3 Stepsn again her.\"\n\n## Input\n```yaml\ncheckpoint_intake:\n  signal: ''\n  request_id: string\n  from: 'dev-mas-engineer'\n  to: 'sub_mas-recovery-checkpoint'\n  task:\
  \ 'SNAPSHOT|LIST|RESTORE|DIFF'\n  workspace: string\n  label: string\n  id: int\n```\n\n## Output\n```yaml\nmas_result:\n  signal: ''|''|''\n  observations:\n    - severity: 'P3'\n      title: 'Checkpoint\
  \ {id}: {label}'\n      description: '{N} files, {size}, {timestamp}'\n```\n\n## Task SNAPSHOT — State sichern\n\nSTEP 1 — Timestamp + Directory:\n  timestamp=$(date +%Y%m%d_%H%M%S)\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints/$timestamp\n\
  \  mkdir -p $checkpoint_dir\n\nSTEP 2 — Backup der 4 Kernbereiche:\n  cp -r {workspace}/mas-engineer/recipe $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/tools  $checkpoint_dir/\n  cp -r {workspace}/mas-engineer/docs\
  \   $checkpoint_dir/\n  cp {workspace}/mas-engineer/.state/changes.json       $checkpoint_dir/ 2>/dev/null || true\n  cp {workspace}/mas-engineer/.state/best-practices.yaml $checkpoint_dir/ 2>/dev/null\
  \ || true\n\nSTEP 3 — Metadaten write:\n  echo '{label}' > $checkpoint_dir/.label\n  echo $(find $checkpoint_dir -typee f | wc -l) > $checkpoint_dir/.file_count\n  du -sh $checkpoint_dir/ | cut -f1\
  \ > $checkpoint_dir/.size\n  date -Iseconds > $checkpoint_dir/.created\n\nSTEP 4 — Confirmation:\n  signal=''\n  'Checkpoint $timestamp creates: {label}, $(cat $checkpoint_dir/.file_count) files, $(cat\
  \ $checkpoint_dir/.size)'\n\n### Edge Cases SNAPSHOT\n- No recipe/ present → warning + only tools+docs+state sichern\n- Write permissions missing → signal='' error: 'Permission denied auf {dir}'\n- Platte\
  \ voll (OSError) → signal='' error: 'No Storage space — Checkpoint not creates'\n- Label >80 Zeichen → auf 80 kuerzen\n\n## Task LIST — Letzte 10 Checkpoints\n\nSTEP 1 — Check Existenz:\n  checkpoint_dir={workspace}/mas-engineer/.state/checkpoints\n\
  \  if [ ! -d \"$checkpoint_dir\" ] || [ -z \"$(ls -A $checkpoint_dir 2>/dev/null)\" ]; then\n    signal='': 'No Checkpoints present — Create ersten mit SNAPSHOT'\n    return\n  fi\n\nSTEP 2 — Formatierte\
  \ list:\n  echo '=== LETZTE 10 CHECKPOINTS ==='\n  echo ' #  Timestamp          Label                        files  Size'\n  ls -t $checkpoint_dir | head -10 | while read d; do\n    label=$(cat $checkpoint_dir/$d/.label\
  \ 2>/dev/null || echo '?')\n    files=$(cat $checkpoint_dir/$d/.file_count 2>/dev/null || echo '?')\n    size=$(cat $checkpoint_dir/$d/.size 2>/dev/null || echo '?')\n    echo \"  $d  $label  ${files}\
  \  ${size}\"\n  done\n\n### Edge Cases LIST\n- No checkpoints/-Directory → 'INFO: No Checkpoints'\n- Kaputtes .label oder .size → '?' anshow + nevertheless auflistn\n\n## Task RESTORE — Checkpoint againhcreate\n\
  \nSTEP 1 — Checkpoint identify:\n  target=$(ls -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{id}p')\n  if [ -z \"$target\" ]; then\n    signal='': 'Checkpoint #{id} not found'\n    return\n\
  \  fi\n\nSTEP 2 — YAML-Check:\n  python3 -c \"import yaml; yaml.safe_load(open('{workspace}/mas-engineer/.state/checkpoints/$target/recipe/dev-mas-engineer.yaml'))\"\n  if [ $? -ne 0 ]; then\n    signal='':\
  \ 'Checkpoint #{id} has YAML-Error'\n    return\n  fi\n\nSTEP 3 — remainderore:\n  rm -rf {workspace}/mas-engineer/recipe\n  rm -rf {workspace}/mas-engineer/tools\n  rm -rf {workspace}/mas-engineer/docs\n\
  \  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/recipe {workspace}/mas-engineer/\n  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/tools  {workspace}/mas-engineer/\n  cp -r {workspace}/mas-engineer/.state/checkpoints/$target/docs\
  \   {workspace}/mas-engineer/\n\nSTEP 4 — Abschluss:\n  signal='': 'Checkpoint #{id} ($target) againhergestellt'\n  Create neuen Snapshot: task=SNAPSHOT, label='nach_remainderore_$target'\n\n### Edge\
  \ Cases RESTORE\n- id=0 → 'ID 0 unvalid — erste ID ist 1'\n- Checkpoint uncomplete → signal='': 'Checkpoint uncomplete — recipe/ missing'\n- equalzeitiger Access → temporaere files nutzen\n\n## Task\
  \ DIFF — Unterschied zwischen Checkpoints\n\nSTEP 1 — IDs aufloesen:\n  from_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints | sed -n '{from_id}p')\n  to_cp=$(ls -t {workspace}/mas-engineer/.state/checkpoints\
  \ | sed -n '{to_id}p')\n\nSTEP 2 — Verequalen:\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/recipe/ {workspace}/mas-engineer/.state/checkpoints/$to_cp/recipe/\n  diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/tools/\
  \  {workspace}/mas-engineer/.state/checkpoints/$to_cp/tools/\n\nSTEP 3 — Togetherfassung:\n  changed=$(diff -rq {workspace}/mas-engineer/.state/checkpoints/$from_cp/ {workspace}/mas-engineer/.state/checkpoints/$to_cp/\
  \ | grep -c 'change')\n  signal='': 'Diff {from_id}..{to_id}: {changed} Changeen'\n\n### Edge Cases DIFF\n- IDs equal → 'INFO: equaler Checkpoint — no Diff'\n- from_id > to_id → automatically tauschen\n"
prompt: " CHECKPOINT (v1.0.0)\n Snapshots before jeder Change\n SNAPSHOT | LIST | RESTORE | DIFF\n settings: timeout=120"
settings:
  timeout: 120
  max_steps: 40
  goose_provider: openai
  goose_model: filtered/deepseek/deepseek-chat
